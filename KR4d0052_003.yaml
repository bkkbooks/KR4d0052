body:
  text: 淨徳集巻三宋吕陶撰奏狀奏為繳連先知彭州日三次論奏𣙜買川茶不便并條述今來利害事狀右臣先于熈寧十年知彭州日為見朝廷依李杞蒲宗閔劉佐等起請盡數𣙜買川茶収息出賣大于逺方不便并據本州茶園戸屢有陳訴及為堋口茶場減價買茶虧損園戸致有喧閙遂於當年三月八日又本月十八日四月二十四日凡三次具狀論奏雖䝉朝廷施行後來續見李稷蒲宗閔陸師閔等貪功急利侵刻逺民阻節商旅増添歲課欺罔朝廷希竊恩賞借置乖謬遐方之人不勝其苦為弊之極凡有十端一則是髙估米價預俵與有茶之家名為茶本及至納茶頗有賠費二則是蒲宗閔首議興販大寧鹽并布等相兼取利充補茶息并陸師閔置都茶場以博茶為名盡買諸貨一如市易及典米收利以求出剰至令市并商旅動皆失業三則是般運不前往往是差雇税戸多有騷擾復并置茶遞鋪般載支費衣糧及于成都路差廂兵貼般力役勞苦走竄求死其數甚衆四則是將轉運司合收税錢作茶司収到數目申奏及郡縣畏懼茶司事勢以税錢為息錢上下表裏敢肆欺誕五則是通判知縣簿尉監官計賣茶息錢與牙子等均分隳喪亷恥六則是有茶及般茶郡縣知州通判知縣皆由茶司與運司奏明差注其間差注好利少恩之人貽害逺俗七則是監發茶綱官員并兼監知縣推賞過厚極為濫溢八則是私賣茶之人并遞鋪轉送茶司文字運限之法太重細民相率枉陷深刑九則是秦陜客商皆不入川販茶虧失沿路省税十則是增起陜西賣茶價直遂使民間當此闕錢之際更食貴茶凡此十事皆是臣熈寧十年論奏後來浸生弊害歲月愈久為患愈深近者伏聞朝廷遣使入川按察茶法所有昔年三次奏狀并今來條析利害備録繳連在前一卭蜀彭漢綿雅洋等州興元府三泉縣人户多以種茶為生有如五榖自官𣙜以來重法拘制不許私相交易被官中抑勒等第髙稱低估每斤只得半價須至賤賣入官亦有彼此侵害情願斫伐茶苖被捉送官又更科罪怨嗟無訢已及十年幸而屢歲豐熟糧食頓賤可以度日間或歲歉物貴茶價獨賤則園户大見失所多有為盜久為川蜀之害一茶司每於秋成之際収糴倉米髙估價錢俵與茶戸謂之茶本不願糴者例須支俵假令米一石八百錢即作一貫文支俵仍出息二分計一貫二百其買茶毎斤直八十文只折四十文借端刻剥大率類此一茶法許増息二分出賣縁茶司違法别作名目収及五分以上或加倍以來只如雅州茶毎斤三十文者計一百文賣二十文者計三十四文賣十八文者計三十二文賣乃是賤買園戸茶貨過取買人息錢兩自侵損原註有息錢頭子長引錢税錢牙錢打角錢凡六等一名為茶法却販布并大寧鹽及陶器并運解鹽入川相兼收受近更置博易茶場買絲綿紬絹紗羅綾布金銀楮皮牋紙香藥米豆等出息貨賣仍許監官出外招誘及遣牙子往諸縣編攔其害過于市易所買紗羅綾絹多是監官一員與牙子通同作過剰支官錢却將紗羅等運往陜西貨賣别無積滯難便敗露原註天下市易已䝉廢罷惟有博易茶場未䝉指揮乃是西路偏受其禍兼與成都府酒場典糯米一萬貫毎斗出息八文過半年未贖仍更出息二分如此多端聚斂豈是茶息歲收二百萬欺罔朝廷莫甚於此一川路險阻般茶至陜西極難始元豐初撥成都路兵士數百人貼補般運不一二年死亡逃竄幾盡茶司遂令和雇人夫同共般載州縣畏其勢力或和雇不行則差税户往前頗有賠費洋州一處因差夫般茶最為騷擾一末禁以前陜西客旅得解鹽并藥物等入川買茶所過州縣俱有一重税錢及至將茶出川沿路又納過税以此税課大段増羡自茶法施行以後商旅更不興販所收税錢絶少原註熈寧七年未禁茶法興元府收七百四十萬住税每斤六文歳收四萬七千貫次年所收纔及一二縱有各人在官場販茶往别州軍雖明納税錢其錢逐處畏懼茶司勢力及欲貪分息錢往往將税錢轉作茶息以此税課頗有虧減其所得茶税錢亦不曽撥還轉運司却滾作歲課聞奏一陜西之民食茶有定數茶司為貪羡息般運過多出賣不盡逐州有虧年額處却於每斤上添起價直務要歲課餘羨往往亦配賣與人户乃是𣙜茶之害非獨在蜀亦巳流及秦陜原註鳳州今歲賣茶凖茶同指揮每州添一百文一通判係按察之司令佐皆在縣令之上今來却計所賣茶貨與牙子等均分息錢虧損亷節畧無愧耻一盜及二貫文徒一年仍出賞錢五貫今將錢八百文買茶四十斤者原註毎斤二十文不幸被捉亦徒一年出賞錢三十貫是販茶之罪過于為盜于理不通遞鋪文字于外界軍機或非常賊盜日行四百里馬遞日行三百里違二日徒一年茶遞往來並日行四百里違一日徒一年立法太重有損治體一雅州名山縣監茶官但發及一萬䭾即轉一官知縣亦減三年磨勘且計綱發茶殊非常事冐濫頗為僥倖一茶禁之害日久日積朝廷所得者歲有一百萬緡而失陷商税亦數十萬今若推廣恵澤罷去𣙜利許令通商則百姓蕩無禁礙商旅大段通行秦陜客人入川隨行物貨已收一重税錢其賣茶先收住税買茶又收過税則一歲之收必數十萬貫每䭾直十貫者收長引錢一貫文不及䭾者計斤收錢又須有數十萬貫亦可充折茶司一歲之息但責成都利州運司令依律應副熙河則百事簡便公私兩得惟樁畱博馬茶若干萬䭾令鋪兵般運重沿邊私販之禁則于馬事並無妨闕而朝廷恩徳及民最深一若謂以茶博馬川茶未可通商縁李杞立法之初只認四十萬貫應副熙河後來蒲宗閔等漸販布販鹽添及六十萬貫李稷陸師閔又増至一百萬貫今則歲獻二百萬貫亦只以四十萬貫應副熈河且倚法刻民亦可增及千萬恭惟聖朝治道曰從仁厚若指揮茶司只得歲入一百萬貫不須出剰則茶官不敢過有掊刻仍不許俵米與有茶之家若俵本錢勿令出息買則添原估賣則減舊價并已罷博易茶場及諸般貨物並不得收買所有般載盡差茶遞鋪更不得差雇人戸免令賠費及罷官員均分息錢仍令將茶税錢撥還運司稍减濫刑漸抑重賞嚴戒陜西州軍不許添價配賣如此則𣙜茶之害十分亦去四五于博馬别無妨礙奏乞罷𣙜名山等三處茶以廣徳澤亦不闕備邉之費狀臣伏見朝廷察知茶法貽害數路生靈受弊之深特遣使者按視本末意欲更張與民休息今黄亷遍詣諸郡及山場等處尋究弊端盡見其實累具奏列皆有條緒蜀茶之害十去七八疲民延頸日望弛禁過於飢渇之待飲食而朝廷尚遲遲未决者蓋為邊費巨萬仰給於茶慮或缺用不敢遽然予奪臣愚以為持此説者知其一未知其二也夫陸師閔増歲課為百萬貫而又獻羡餘百萬貫者豈皆茶息哉蓋勇為屠儈之事扼民之喉刮剔骨髓攘奪百貨公為販易其極至於典米豆鬻物貨惟增厚利以欺朝廷爾今日陛下忍為此事乎恭惟陛下深仁博愛惠養萬物惟恐一夫或失其所必不忍為此也既不忍為師閔之事則禁可以盡廢利不可以過取雖黄亷之說猶未能盡副朝廷之意焉故臣願少變其議廣陛下之徳澤以慰人望至於邉備又豈敢闕而不計哉且黄亷所以欲𣙜名山油麻壩洋州三處者猶利𣙜買之賤出息之多爾然諸場不𣙜而此獨𣙜則民有幸不幸𣙜法猶在則嚴刑濫賞隨而缺作譬如治病不去根本未可以言愈也為今之計莫若稍髙三處之直如郡縣和糴米榖民間交易之類就彼和買及其起綱運致此於𣙜法須費一倍原註名山茶一馱𣙜買載脚至秦州不滿十貫而賣三十貫以來或四十貫今既和買須添原價并脚錢約及二十貫以來至出賣已有一倍之利毎歲約以五萬䭾應副熈河仍設秦鳳涇原兩路賣茶之禁並如黄廉之請則自可得一百萬貫以助邊計以行博馬法亦不闕少又何必獨𣙜三處以貽斯民之憂乎其他諸路所入素薄宜一切舍之以與商旅庶為昭來之漸也又況蜀茶歲約三千萬斤原註元豐七年二千九百一十四萬七千斤八年二千九百五十四萬八千斤除和買五百萬斤入熙河外尚有二千五百萬斤皆屬商販流轉三千里之内所謂住税翻税過税者亦可得五十萬貫原註舊例住税每斤六文容人買出翻税毎斤六文兩項可得二十五萬貫所過場務逺者十處近者三兩處再逺者四五處過税毎斤收二文五場共計十文又可得二十五萬貫熙寧七年興元府一處収茶税七百餘萬斤計錢四萬二千餘貫以此推之其數必有自𣙜法之行茶有牙税脚息頭子籠索等錢皆為無名之斂今既解去羅綱一切不問第以一貫之茶納長引錢百文則人情簡便必亦樂輸又有十餘萬貫原註川茶貴者毎斤三百賤者三二十文今總計為五十文凡二千五百萬斤計一百二十五萬貫乃得長引錢十二萬五千貫仍于六十餘萬貫中三分損一以為未必皆然之數則四十萬貫乃有其實而茶商諸貨之税復在此外總計其數則邊防之費粗可足用三郡之茶不必禁𣙜利害愈明矣貼黄臣今所奏皆據其實葢于民不擾而有百四十萬貫之利以助邊計伏乞聖慈採納施行奏乞罷京東河北路賒放大方茶狀臣訪聞京東河北路往年將市易大方茶撘算脚息召人通抵產賒請限半年納錢多是浮浪貪債之人及不逞子第䝉昧尊屬虛供抵當賖請出外減價破賣洎至限滿催錢不免抑勒尊長認納往往破薄資産償還未足後州縣買茶官更作饒限名目再賒一番暗令填納舊欠其何以堪雖䝉朝廷寛恩蠲放息錢外尚有欠數每縣約二三萬貫去年又差官將此等現在茶于兩路催促變賣諸州至今不住俵與屬縣賣茶仍限半年送納本息縁河北水患之後生民無聊京東亦有災傷去處惟宜百計存恤庶使安居若更將上件茶賒放與人立限督斂則民間愈見凋弊况此茶積壓歲久多有陳毁損壞強民賒請豈不重困伏望朝廷詳察指揮轉運司委官定騐陳壞不堪者並行毁棄外餘即減定價直分擘于自來貨賣得行處召人以現錢收買所貴不為兩路煩擾之弊貼黄臣今奏請蓋為逐處賣茶惟官務辦其職事不卹困窮積日累久民力轉耗須委署轉運司審詳措置伏乞採納施行以廣徳澤若只令賣茶官相度則無益於事奏乞權罷俵散青苖一年以寛民力狀臣伏以青苖之法始欲便民行之既久遂生弊害葢有司惟務増羡以為稱職原註俵㪚多則管勾官有食錢提舉官有陞陟雖云出息不過二分而節目頗多督責愈峻葢有詭名冐請賣牓予散甲狀支交子折足錢原註川中支交子一貫折為足錢民間只換得九百二三十文除頭子錢減尅升合量收出剰并書手保正甲頭識認等事費耗不一或請時榖賤納時米貴所出息數約三四分及至斂納官有期限吏有責罰使者競為風采逼迫所部郡縣主者各懷畏恐務於辦事稽遲則追呼差誤則取抄枷錮笞箠道路相望雞犬牛羊賤鬻於市甚者徹屋賣田以償其欠倉官受入又增斗面百端侵擾難以悉數朝廷雖切防察終難盡除其弊又况村落小民市井游手輩所請錢米得即用之其于耕夫少有資益一旦督納未免重困大抵樂于請之易苦于納之難此皆逺近所同上下通知恭惟陛下涖政之初廣霈徳澤天下生聚欣戴鼓舞臣意伏乞聖慈權罷俵散青苖一年以寛民力貼黄臣今所奏只乞權罷散青苖一年即于戸部常平法别無違戾若䝉俞允伏乞早賜施行蓋來年正月以後給散是時或行下稽緩則無益於事又自青苖法行以來民間出息供官不可勝計若權罷一年則國家用度未至闕乏伏乞早賜施行淨徳集巻三
