body:
  text: 淨德集卷十四宋吕陶撰記巡撫謝公畫像記真宗景德三年夏四月西南方有大星占者謂應在蜀分上惻然動心以為蜀去朝廷逺民之疾苦尤難知天有異象可畏不可忽其擇廷臣之賢而通世務者往綏元元於是公以屯田員外郎巡撫利益又詔同九河張公詠議鼓鑄利害乃考鐡價制錢幣重輕適均物估用平衆甚便之時方寇亂之餘百弊滋起土俗凋困惟九河公洎公相與謀議作為憲令安全紓息極盡統要俾其世世子孫恃之以生故張公之治蜀為天下最實公有以助之也既而舉部吏數十執政以多為疑公請連坐冀其必用自爾奉使舉吏皆連坐而公之舉者大半有立於時矣成都舊風凡奉使來者繪像天慶之仙遊閣公之後六十有四年其孫司封郎中景初師厚以按刑之命至故亦繪公之像於壁所以推崇先德而永蜀人之瞻也恭惟真宗皇帝承天下熙盛之極恩隆澤厚及民骨髓跂行喙息罔不欣戴然而星變一出則恐懼警戒以蜀為憂分命良臣審究時病豈非奉天愛民之心乎惟公純誠大略深體上意施設有原期底靜安豈非推已濟物之義乎夫奉天愛民聖君之令德推巳濟物賢臣之能事王道之起莫先於此而君臣兩得惠加逺方固可以著示後世率為大範也公諱濤字濟之為太子賔客陳留伯薨以子絳知制誥贈禮部尚書若乃出處之本末勳烈之始終則范文正公之碑歐陽公之志尹師魯之行狀悉得而載此特治蜀之一端爾師厚儒者知治體風槩落落有援世之意時方改作以福斯民而或忘義利之辨師厚纍疏列其不可無愧於祖構云熙寧四年五月二十日府學經史閣落成記蜀學之盈冠天下而垂無窮者其具有三一曰文翁之石室二曰周公之禮殿三曰石壁之九經蓋自周道衰微鄉校毁廢厯秦之暴至漢景武間典章風化稍稍復講時文翁為蜀郡守起學於市減少府用度以遺博士遣諸生受業京師招子弟為除更由且以補吏或與之行縣民用嚮勸幾比齊魯自爾郡國皆立學實文翁倡之所謂石室者存焉至東漢之季四海板蕩兵火相仍災及校舍絃誦寂絶儒俗不振興平中郡將陳留高眹修舊補廢作為廟堂模制閎偉名號一新所謂禮殿者見焉及五代之亂疆宇割裂孟氏苟有劒南百度草創猶能取易詩書春秋周禮禮記刻於石以資學者吾朝皇祐中樞密直學士京兆田公加意文治附以儀禮公羊穀梁傳所謂九經者備焉始漢景末距今凡十六代千二百四十餘年崩離變革理勢不常而三事之盛莫易其故然則冠天下而垂無窮非夸説也考實以議也惟經史閣之成基勢崇大棟宇雄奧下視衆屋匪隘即陋聚書萬卷寶藏其間斯亦近類三事傳千百年而不可輒廢者乎龍圖閣直學士濮陽吳公因其成也會僚佐與蜀之士大夫及其講師弟子凡若干人飲酒以落之德風洋洋頌聲愈愈布宣於一方有若闕里弟子集雩壇之下詠歌先王道德而歸諸聖門又若魯侯至泮水之上國人望其車旗和鸞而樂見之視其顔色笑語而有感恩向化之意嗚呼其盛矣夫公純誠好善治有本末所至以勸學為先見一士可以語道誘進之常若不及乃詩人所謂能長育人材則天下喜樂者也某於是推明公義而言焉夫治性修身以及國家天下大略本之仁義其文莫賅於經見古之人注措發施正邪粹駁與其生民幸不幸其迹莫著於史世之學者不矜誦數而率履其言不競多聞而慎擇其是則為有得亦庶幾善學歟初閣之營建皆幕府太常博士王君霽為之謀君修潔有文嘗典吳興郡學挈其規範來遺諸生匪獨施諸閣也時熙寧四年十二月一日成都新建備武堂記安危治亂之變豈不難言哉人之情狃常習故舍先幾取後患蓋亦多矣今朝廷所謂外憂者無如西北故秦晉趙魏皆宿徑兵為之用治軍抗武於政最先而天下之勢亦以為最重夫重輕者天下之異勢安危治亂所從出易而無備則變逆之資也漢之衰冀州之兵起唐之季桂林之戍叛禍結不解乃底滅亡前轍往鑒足以懲警議者知三路之為重而不知蜀之不可為輕豈善計乎夫蜀之四隅綿亘數千里土衍物阜資貨以蕃財利貢賦率四海三之一縣官指為外府北倚劒閣險絶天下東連獞獠蟠聚深固西南皆蠻詔自古獷強唐天寶後嘗與吐蕃并力以二十萬衆三道入冦又嘗止成都西郛大掠華人數萬而南方其王政衰圯則姦豪憑險自安或七八十載不以賦稅歸中國吾朝混平寰宇恩柔威禦咸有深意淳化之際吏暴於上澤壅不流經制燼矣民心懷危盜乘而作起甲午距庚子七年三亂狂夫一呼羣應如響今日取某州明日陷某縣嚮風輒靡何啻卷席之易戴白父老往往猶言其狀聞者為之寒心然則戎防軍政敢一日廢耶龍圖濮陽吳公之開府也馭兵如民條教詳白凡居處飲食之具與其役任之勞逸先治以宜用一厥心乃度府門之右作備武堂所以講師律而訓戎伍也日練月習率有定令數視屢閲饗勞繼之金鳴鼓奏士倍其勇萬衆旁睨震動耳目實鎮守之重務氓俗之深利也昔晉武既平吳欲去州郡兵以衒治安雖山濤盧欽力陳大本以為非是亦莫能用及永寧之後冦難交起則郡國無備不能制唐穆宗初兩河既定蕭俯假文昌謂武不可黷乃議銷兵及燕趙之亂始募市人以戰復喪河朔斯皆固不知變撥去根本苟近效忘逺圖安能成天下之務哉蜀無事七十有三年議者恬然不怪民尚嬉樂惡聞干戈公一旦逺思長慮而及於此不獨為蜀之計乃為朝廷計也始民惡兵異公之為懦夫曲士從而騰説逮其久也則曰吾將賴之以安而説者亦愧悔不敢議易之萃君子以除戎器戒不虞兵法無恃敵之不至恃吾有以待其公之意歟且魯有治戎之備足為世法孔子序録附於王言春秋書治兵大閲雖以義制文中存奧訓蓋亦區之大事謹興作也堂之成敢不第敘本末及其歲月云熙寧五年三月一日薛文恭公尚書真像記嘗觀西漢之興高祖勤於創業謀臣猛將乘時而起相與經營乃底靖康功成事濟咸享封爵其君臣恩義之篤則著位於朝藏籍於廟示以帶礪申以盟信期之千百年而無有絶滅厥初豈不盛哉及二三世或寖衰落以至除國失姓甚者乃陷傭保何物理隆替不常如是耶抑其後裔不克嗣守其先烈因隳沒也永言堂構災穫之論宜為寒心宋有重德君子尚書薛文恭公諱某字某世為華陽人太平興國中擢進士第遂居某郡至景祐某年薨於位厯事三聖率有大節出入中外風迹藹然書在國史實顯以光諸孫之得録者凡若干人西京左藏庫使某其一也按刑總兵留蜀五稔欲詢族祖之邱隴而展拜之則陵谷異變終不能識欲詢族屬黨巷之舊而親接之則契濶流散亦莫得知蓋仕宦四方歲月綿久而情好不相通故也平居感慨每有故鄉之念於是繪公真像於玉局觀之西室庶以榮里閈之觀而慰士林之思其尊先貴本之心亦勤矣乎惟蜀去朝廷最逺而賢士大夫最多或以忠義立或以文章稱或以操行著蓋自漢而下世常有之惟公生於盛時能以道德致位八座而子孫又能蒙其遺澤餘美保有爵位既蕃且昌匪惟不墜乃祖之烈而亦足以夸耀吾蜀之事逺視前古皆無愧焉夫於國為名臣於鄉為先生存有逺業沒有重名此晚輩所以仰望而矜式者也某聞公之風用自飭勵繼以左藏君之請故從而記之熙寧五年十一月五日蜀州新堰記熙寧七年冬十二月朔唐安新堰成廣民利也岷山之旁三水合而北注至郡之東隅與大江會湍悍湓激又潰而五霖潦間作橫山散漫高則沒邱壟下則漂田廬止者患溺行者苦濘江之故道日漏且涸棄失餘潤不能浸逺永壖之稼屢植盡稿蓋八九年矣渠江黎希聲既守郡深恤隱弊加意於此思有所以捍防之欲責於兵以致力則無羡卒欲出於廩以充食則無餘糧欲重困元元以起大役則素所不忍時旱甚穀貴流徙滿道皆仰給於公養而壯者僅三千人晨夕飽飫可任以事會新津老人陳汝玉亦狀本末以獻乃按度衝會布為巨楗制導異𣲖歸之舊蹤循源而下大患自弭始秋八月至是有成凡溉田三萬九千畝瀕側之民安而粒者無慮五千家其為利亦博矣誠能講葺以時久且完固雖或亢沴歲望庶幾不失也豫嘗究利害廢興之説蓋生民幸不幸繫焉君子必審而後動大率因物之自然徇人之所欲不矜妄智不計近功則事之有作簡以濟民之受惠逺以深若乃自用而鑿智飾巧偽背天理反物性苟期成效以要利取寵於一時而不慮吾民之困戚者彼安足與論利害耶西南雖號沃壞然賦斂百出於農耕夫日夜劬勞而三時有餒色百畝之家占名上籍而歉歲或不免飢惟是溝畎渠防之務於政最切上之人苟置不議非所以撫惠赤子也希聲儒者通經術以忠厚治常先民㥯故所施如此昔漢循吏皆以樂易德愛為之本濟時及物凜然足稱若召翁卿之於南陽王仲通之於芍陂前史嘉其風迹著範來世則唐安新堰者可略而不述哉八年四月五日文與可畫墨竹枯木記君子之智思能過於人則事無巨細皆足以取髙此衆人所以尊愛欽重之不已也畫者中有擬象而發於筆墨之間苟臻其極則近見羣物之情狀逺參造化之功力自古賢俊往往能之蓋取其如此歟與可之於墨竹枯木世之好事者皆知而貴子瞻嘗謂盡得其理固不妄也頃年來成都畫此兩物於嘉祐長老紀師之方丈紀師寶之以誇識者乃西州僧舍勝事之一也與可在文館二十年其材可巨用將老矣尚恂恂小州胸中之藴曾不少露通塞榮悴無一毫胃諸心名教至樂之餘時作墨竹枯木一二以寓其幽懷逺趣真所謂粹靜君子也豈特筆墨之間有以過人哉知則語其大不知則語其小知不知於與可何損益耶此可與高爽明逹者言不可與鄙暗道也熙寧八年六月十日記聖興寺僧文爽夀塔記僧文爽詣豫而言曰文爽之先居濟南姓朱氏方少時去父母來成都學浮圖道得聖興寺藴中而禮之會真宗皇帝吳國長公主為報慈正覺大師以普恩落髮今六十九載矣自為童讀佛書以至隸僧籍登講座主讚懴長戒壇居副職衣紫方袍無一不足者行年八十復何為哉惟晦默澄靜日俟終化有為我穴西郊之地他日以燼骨藏其間而謂之夀塔者敢請文以志焉某伏聞家君言師字鑒之相從最舊知其為人有律行該通教典終日演講僅五十年就壇稟戒者無慮千數嘗委槖金新護淨寺門闌求所利益天章待制李公為記其事年雖耄意氣不少衰某向遭先妣喪數為水陸大供覬享冥福師夜誦真諦亹亹逹旦聲韻逺暢愈於壯夫蓋諸經所載佛語者嘗總而記之故多且不遺也悲夫世之妄人牽聨馳突於利欲之墜裒惡貯過以自封殖伐滅天和投塗罪境不知其神魄之喪奪固已久矣而猶蚤夜惕惕恆恐浮軀之易壞凡如此者又安能知釋氏之於死生甚近而易乃有往來彼此之論雖然以師之輕清悅豫不夸能不役智則未可以歲月期也曰仲倪仲昻惟賢士曇士獨五人者實繼其後云元豐戊午歲季秋朔日眉州醴泉寺善慶堂記士君子少而從政老而謝事去仕途之勞就林泉之佚康寧夀考泰然自得其始終往返之際固巳高於人矣至於子孫皆能有立從而光大之則尤可高也吾鄉祕書監程公踐厯寄任凡四十年風迹凛凛德惠在民及其老也得請而歸高堂廣厦足以奉起居之安芳亭茂榭足以遂吟賞之樂安車輕蓋足以便遊從之趣道衣野服足以資蕭散之味凡塵埃網羅深可厭惡之事無一毫輒纍其懷賔客到門則置酒高會劇談大笑如少壯時往往日暮夜闌不欲其去有子五人而官者四其一人則又以才能見用而仕亦顯矣此退休之美紹續之隆皆可高也非獨此而已抑有可紀者焉公嘗念仲弟泳之之亡而祿秩未及乃以一子恩及其猶子所以公之幼子尚未仕而泳之之子巳為丞於大理則昆弟義好之篤於古無愧宜其見愛於鄉黨而推尊之也郡城之西曰醴泉寺者公之先世實葬其側歲時上冢必止息焉榛蕪滿前棟宇敗陋公出力而完之僧紹良德公之深乃建新堂以繪公之像及諸子之仕者凡六人而尊奉之且推本公之祖考以來積纍深厚之所致而謂之善慶尚虛西壁以俟後哲程氏之族信盛矣哉昔人蓋有父子皆至公卿兄弟同時為二千石則前史録以為嘉事後世藉以為美談考古揆今良可尚矣公官三品年八十古之鄉老也斯堂之成必飲酒以落之子孫列侍於旁鄉人愛公而來賀者或以爵或以齒序位於前起而執觴羅拜而為夀賔主相與尊斝相交樂作於庭酒行而無次老者得盡其樂少者不敢忘其恭一席之間有悅豫而無惰慢於此觀焉亦鄉飲之遺風歟某同郡人喜公公之落成而爾得偕衆賔之末酌以獻公已而從杖者以出安能無慊於心哉得書其事不敢辭也元豐元年十月朔日淨德集卷十四
