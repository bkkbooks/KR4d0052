body:
  text: 淨德集卷十宋吕陶撰書應制舉上諸公書陶聞之聖人之所謂道者以簡易為宗以該天下之理以仁義為用以成天下之務非幽逺而難明闊疏而難施汗漫而不可考信自微言既息章句之學隨流而興百家異騖衆說殊騁各習其師忘失統要故為易者不窮天地之本始變化之至神以推迹於人事而務言上下無二經之異繫辭非仲尼之作為詩者不究風俗之代變王道之初終以參驗於治體而好議商魯二頌之不同毛鄭兩解之小異為春秋者不考刑賞之大原權制善否一歸皇極而爭辨日月之為例五始七等之成文為書者不取君臣上下都俞告戒之義而令施設之體要而競論武成之不可盡信秦費二誓之不當作有釋數字之文至數十萬言而是非無所處正求以援世率民又天下國家之大略蓋闕如也昔者堯舜之盛崇冠百王而書稱其大乃曰順考古道而行傳說戒于商宗則亦曰師古以克永世孟軻皇皇戰國開說諸侯然非二帝三王仁義之語未嘗輒道托此而論則君臣之際舍斯文要道安所稽法以全適治之具哉是以二漢碩儒若董仲舒兒寬公孫𢎞夏侯勝雋不疑伏湛侯霸魯恭鄭興桓榮之徒皆以經術博彊果於適用其轉導世主推明治統建大議施逺業率有考據不悖於三綱五常之分義若持權衡按繩墨以審萬物之輕重曲直而毫忽莫敢欺也永惟聖人立教貽訓之心則既如彼君臣之際師經式道則又冝如此而學不執六經之用以酬世務之變乃放肆紛紜樂為衍說而滋破碎之害深足惜焉抑又聞哲人志士之所存不以難俗為髙求全於世而已蓋仁以為任逺而逾勵大則欲恢隆先務以躋至治之極小則欲舉偏補弊以便安於一時故也然三代之盛時皆出於聖人經營創業之法足以維持百世是故井地以授民什一以定賦而天下之人足九賦以待用九成以均節而天下之財豐制鄉遂以為六師農隙則教戰而天下之兵强自家黨以上至於國都皆立學以訓導而天下之士得其素養六卿率屬輔昌王治中外之務必舉而天下之官無幸位凡所以用於政教者皆可循而守之其賢智才能之人惟在辨事而不復有加損廢置之作逮夫而漢之興皆桑喪亂之極三代之宏規大範蓋無存者其君臣之計議多出于一時之苟簡而百度末俱不足為後世之襲用及其弊生變起則賢人君子裁量揆叙而為之策是以七國交峙而外有尾大之釁及者將起則朝錯獻削地之說以弱諸侯而彊王室百姓背本而趨末者衆淫侈之俗曰長而財用大蹶則賈誼陳務農之計欲驅游首而歸之南畝以廣儲積兼并之路不塞而冨室擁資巨萬貧弱愈困則仲舒貢限田之疑以檢過制而補不足牧人之吏屢見罷易而生民不能綏靜則朱浮申苛察之戒欲久其職俾人服從上教選舉失實賢不肖混亂而無以協宣風教則左雄抗限年之請以考練名實要之得人而任刑煩禁密世主以峻政為威而元元陷於慘暴則陳寵上蠲法之疏願除其溢於甫刑者以應經中禮而濟羣生凡為是者大槩綴緝缺漏技技傾邪隨形栽制則措斯民於康靖之域而巳也抑又聞聖人之政皆切致治而不能無弊學者之言務好陳文而未必可以適用以不足適用之言陳不能無弊之政則華崇浮勝而事非根切豈所謂有補於世哉昔漢文以恭儉治天下號為隆平朝廷無大過邊鄙無大憂天道地化無大變異生民無大失職然而獻書者以為可痛哭可流涕可長太息背理傷道難遍以疏舉豈當時之勢誠爾耶蓋亦激於忠憤力為切直可畏之語冀以感悟人生之意故也陶嘗讀六經探索要歸舍章句之習而務以簡要明切為之本統義嘗厯覽舊史竊迹近事考究古今得失盛衆治亂安危之變而僅有得者乃言而筆之不溺於侈辭夸說以求工於文而庶幾焉一有以資治理之用治平中知者謂其可塞天子直言之詔采而聞諸朝驗於今日則時異事變而疇昔之論多無取矣然猶勉劾區區欲求合於科舉之式度者蓋知其指歸也恭惟閣下德業文章之懿充積於中輝光於外以二帝三王之道獻告吾君講修國具以幸萬世摶收天下之材而耀乎器任俾盡其用安以一介為微而不見録於左右或詩曰菁菁者莪在彼中阿言君子長育人材則天下喜樂而詠歌之矣又曰先民有言詢于芻蕘言古之賢者謀及匹夫而取其善也夫二雅之奧訓皆明哲之所履蹈以完其事業陶國不足被長育之賜亦庶乎先民之詢者矣惟閣下一與之進幸甚幸甚乂應制舉上諸公書陶嘗讀舊史以窮治亂之變而察夫仁人志士之所存蓋亦見其略矣昔漢文以恭儉治天下號為安平朝廷無大過邉鄙無大憂天道地化無大災變生民無大失職然而賈誼獻書以為事弊可為病哭者一可為流涕者二可為長息者三背理傷道者難遍以疏舉豈當時天下之勢誠若是哉蓋誼之心發於忠憤務為切直可畏之語欲以感悟人主之意故也既而文帝亦深聽納養臣下有節封諸王有制至于唐文宗承長慶皆惰之政百度弛廢威令困弱國體不完然有意於太平之事一日燕見詢于朝臣牛僧孺以為大平無象且曰令四夷不交侵百姓不流散上無淫虛下無怨讟私室無彊家公議無壅滯雖未至理亦是小康豈當時天下之勢誠若是哉蓋僧孺之心不能勉於有為徒伺上意為順悅之言取容而巳故也既而王室之政委墜不振深足惜焉今夫人之疾恙雖感於外而未為腹心之疴扁鵲倉公望而督之以孟治者其人必有忠懼修慎之思而庶以就愈也及其有腹心之疴而庸醫告之曰無傷者是速其死之說也治安之時政亦有弊如疾之感於外也謂其未至於沈疴而不為是驚世動俗之論以開其視聽使之恐懼修慎以就愈及其勢幾於亡而猶告曰無傷者非扁鵲倉公之用心乃庸醫之為術也以漢唐之迹推二子之言則是非炳然矣君臣之際治亂安危之理烏可以苟於言乎國家設科以延天下方正者欲聽其言也不獨欲聽其言而欲用其道也士之存志而求以塞詔者非奪以祿利而為美仕之階也天災地異有譴告人道物理有危微紀綱有廢缺風化有流弊德澤不養而傷忠厚之政體要不辨而敗盈成之功皆世之大患而不可顧望隱避也陶惓惓於此久矣材下慮淺信道未篤固不足以承天下而謀王治也惟明公亮其言之不苟而亦與之進則亦庶幾治朝詢于芻蕘而君子樂育人材之道歟上吳殿院書某始相别之明年聞召自長沙作御史私心喜甚謂朝廷擢真忠之士求補厲庶政可為天下賀第未嘗走一書通左右叙所亦然不數月又間糾宰相過惡論列切正謫書池陽薦紳大夫皆惜其不當去今年春上念言職之難知公議不可廢復召以用而朝廷之貴乃塞夫閣下豎立何似而取重當世如是凜凜乎然則了天下之事不足為大也功名不足為有無也惟忠臣義士感慨抗激發露所蓄以康國愛君為先務始終無愧而後巳也陶間之古者采言之道博自三公四輔朝夕納誨卿大夫獻規士抗議下至百工之賤皆執藝事以諫故一有闕失衆得以論從而悟之今夫羣臣享祿居位雖有志於民而不職於言者倘語及朝庭臧否則譏以為僭且妄笑以為近名徼寵况其取信耶獨諫官御史得奮然不固避以指摘規正為己任然竊觀天下之事固有違於大公大正者隱於大利大害者幸而諫官御史言則救之不幸而不言則救之之道無因而至乃生民休戚之所歸國家治亂之所擊也方今之勢宗廟社稷計之最重者猶未聞焉永惟根本之說可為寒心陶疏逺鄙賤暗於體要得非迹涉機㑹必逺思熟慮而後發耶抑君臣之際置而未議耶將廟堂之上權制素定不得而知耶愚誠惓惓有望於閣下上趙雜端書某竊審朝廷慎言責之職艱乎其人乃召還執事任以雜端當其詔書甫下士夫大相與為賀以為朝廷昌明輔相協力樂得忠義之士共維綱紀以貽無窮是故執事兩出而再還至今之來也其望益隆其任益重其始終進退之際益為難執事天禀堅正信道以篤厚勇執之氣未嘗暴露於形色險夷之塗不能少遷其輒向敦大節以崇樹國體吐確論以該切世務發諸事業而暉光炳然已可見矣必能處之以無愧施之以有為足以歸天下之望而副朝廷之任也始終進退之際孰患其難乎方今國憲宏逺治具恢張求為根本之策不苟朝夕之計姦詖之迹不涉於廟堂朋黨之嫌不聞於百辟澤民之實惠雖未浹於四海而時有滲露制邉之大略雖未通於百世而日謹禦備循而守之䆒其所不至而講修之亦庶乎治平之漸也上仁聖慈恕言路不壅議臣獻替輒加聽納然而邪險之人任非其責徒能覘見利機忘失分義以為危言一出則主意駭動美名貴仕階此而得於是假忠倘之迹伸悖慢之志多作詭辨以訐發隱諱巧為愎辭以詆斥慰言片語上聞事白中外邸司傳報流及夷夏淺夫狂士得藉其口使朝廷受有過之名而已享直譽比嵗廣西之疏泗州之議舉類此也仲尼曰有德者必有言有言者不必有德又曰惡居下流而訕上與訐以為直者蓋君子能處巳而後能謀人顧內冝何如爾夫鼎鑊在前而氣不懾九命及門而容不喜惟社稷生民之安為務豈斯人之徒而能乎要其歸覬幸於世而已古人之入告于內過則稱已斯謀斯猷乃曰惟后之德曰為君言而四方不知其言不為己功而天下賴其功全臣子之大分畢賢者之逺業弼君致主之道不當如是耶是皆執事詳聞而熱計之矣陶奚足喋喋其間哉士固伸於知已微執事豈嘗語及惟恕之幸甚與唐士憲書前年冬執事以事親來晉獲承下風雖不敏相見苐論議每依於道德既而執事入御史府挺然在廷動多獻納㑹執法非其人中外失於瞻倚乃謂朝家綱維繫屬至重防微杜漸非正臣端士不可居封上謂報俄以親嫌補外此其由處進退之際凛凜有大節可謂能世其家矣天下識者於是聞風增氣而勤乎髙山之仰也陶今年秋罷官還臺見仲氏君益始知執事向者不鄙不肖援以自代竊漸材分之疏拙固不足服承厚愛然而義理之所激志向之所同安能無說以拜賜耶夫詩之君子至誠樂於賢共易之拔矛連茹以其彚征虞書之九官相讓儒行之爵位相先自代之迹皆原於此矣仁人志士所以訓從古訓而推盡其類者不獨好賢與盡朋友之分而已蓋以德業相期而欲著之行事與功名相始終也昔者姚崇以宋璟自代而應變守又各盡其才以成天下之務則開元稱至裴度以崔從自代而立朝正色不避權幸臺閣之事付內者抗請以歸有司則清議謂之得人陶雖愚按少立而能厚於處巳居常逺覽載籍深慮世變至于良史之大方直世之危論則意氣感慨篤好而力善之夫處已甚厚而報人以薄非陶之心也執事亮焉景陵風物清幽道味必樂奉見何時千萬輔重别范子功書自車從還家纍煩臨貺乍更軫翼欽嚮不勝死亡無日未能展候以别惶懼之至公之此行朝廷眷倚甚厚士林仰望甚深所履者正所陳者厚乃公素志雖禍福窮通之際未嘗須㬰忘也陶竊謂世之紛紛欲盡言則不勝言言而不用則又未可必事有以重輕理有先後時有幸不幸勢有難易期於見聽則不計乎激與不激要之有成則不聞其速與􅌧王陵雖面折廷諍及其計安劉氏則不如陳平魏文忠直剛方唐室之鑑也然亦願為良臣薛廣德從橋安危之論近情不夸人所悅聞陽道州在朝日久或譏其默洎延齡不相訖有力焉仲尼惡訕上孟子罪淺夫良有所謂哉敢以此少致鄙意自更祈厚愛與十弟書久别思念之深欲一相見終不得人來承書且知自祖黨而下洎嬸母各各安休欣慰欣慰兄之始謀發於不忍輒欲以一外郡之虛名救益利兩路數萬家之實患果是耶彼可以免凍綏果非耶此甘於罪廢得失止是斷之以前既而果如所料安有榮辱進退之念哉抑於天俯於人中於心皆無愧恃此三不愧以待小人則我固無損矣嵗稔物賤不覺食貧著作甚安房下無恙了人事數日後必得暇看書餘不足道重陽後相見未問保重淨德集卷十
