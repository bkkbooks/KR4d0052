body:
  text: 淨德集卷四宋呂陶撰奏狀奏乞罷軍器冗作狀臣伏謂古之明王講求治道以福天下者凡不急之務必先罷去乃省事省官之一端也國家自慶厯罷兵以來武庫百備廢壞幾盡神宗皇帝以常德立武事震耀威靈治兵制器憲度詳謹內置軍器監外創都作院日程其功月閲其課戈矛弧矢甲胃刀劍之具皆極完具等數之積殆不勝計苟有靈旗之伐可足數十年之用方朝廷弭戎息戍以戢干櫜矢為意兵械非今日之急務也此嘗降詔併為兩坊坊止三作省去監督縖轄之員㨂放疲癃拙惰之匠據所積材具以漸造制然至今兵匠尚以六千人為額兩坊額外亦四五百人以一歲計之為口食米者凡四萬五千石又緣內外廂軍大率闕少亦有廢事去處若值工役急速未免于民間差雇人夫官有耗費私有騷擾臣愚欲乞減兵匠三分之二罷監官四員小作料次責其日力積之歲月亦無所闕却將所減之兵分填添助諸處廂軍差使候將來修制軍器闕人仍勾抽赴作不惟省監官軍匠添給之費抑亦助廂兵役使之勞況今財利羡息之端多蒙蠲罷如此等事雖于國家富有之體未必為害亦宜裁損均節以稱量入為出之義伏望聖慈付有司相度施行請罷國子司業黃隱職任狀臣竊以士之大患在于隨時俯仰而好惡不公近則隳喪廉恥遠則敗壞風俗此禮義之罪人治世之所不容也太學者教化之淵源所以風勸四方而示之表則一有不令何以誨人臣伏見國子司業黃隱素寡學問薄于操行久任言責殊無獻告惟附會當時執政苟安其位及遷庠序則又無以訓導諸生措注語言皆逐勢利且經義之説蓋無古今新舊惟貴其當先儒之傳注既未全是王氏之解亦未必盡非善學者審擇而已何必是古非今賤彼貴我務求合於世哉方安石之用事其書立於學官布於天下則膚淺之士莫不推尊信嚮以為介於孔孟及其去位而死則遂從之而詆毁以為無足可考蓋未嘗聞道而燭理不明故也隱亦能誦記安石新義推尊而信嚮之久矣一旦聞朝廷欲議科舉以救學者浮薄不根之弊則諷諭其太學諸生凡程試文字不可復從王氏新説或引用者類多黜降何取舍之不一哉諸生有聞安石之死而欲設齋致尊以伸師資之報者隱輒形忿怒將繩以率斂之法此尤可鄙也夫所謂師弟子者于禮有心喪古人或為其師解官行服與負土成墳者前史書以為美後世仰以為高此固不論其學之是非而特貴其風誼爾昔彭越以大惡夷三族詔捕收視者欒布一勇士敢祠而哭之漢祖猶恕而不殺班固亦以為能知所處蓋氣節之可尚也今安石之罪雖暴於天下推其師弟子之分則亦不可輒廢而諸生之設齋致奠又非彭越欒布之比隱何必忿怒而遽欲繩之以法乎抑可見其不知義也向者有司欲復聲律朝廷方下其事集羣臣而議之隱乃不詳本末奉為定令揭榜學舍謂朝廷已復詩賦使學者知委傳播四方人皆疑惑此又見其躁妄趨時之甚也夫道德所出之地長育多士而庶幾成材乃以欺人為之二則何以飬廉恥厚風俗哉伏請早行罷黜以示勸戒無使邪憸之士久纍教化之職奉使回奏十事狀臣竊見昔年瀘州乞弟入寇始因求索一髦牛骨價事至毫未而邊吏貪功覬賞擅行殺戮以至敗軍覆將騷動一方上煩朝廷兩次命師西討調發數萬公私之費其數不資兩蜀瘡痍今未完復初林廣統領大兵深入巢穴及到乞弟住坐之處止有茅屋數間賊亦遁去竟不能獲乃是以天地之力與螻蟻計較毫釐以生民膏血棄如糞土爾此朝廷固未詳知也其後以王光祖為瀘南安撫意欲生致賊酋光祖怙權作威肆其殘虐蕃漢被害怨淪骨髓經營數年亦無所得此朝廷亦未詳知也今瀘州內外屯兵萬餘作為聲勢欲致此賊其䇿亦疏矣夫欲致賊而不匿其形賊不可得且萬兵之費饋運日勞雖無寇至坐耗民力臣愚以為乞弟之存亡違順不足上煩朝慮宜一切置而不問惟徒重兵歸內郡以省橫費戒邊臣守疆場示不必取之意要以歲月當有成效貼黃今春瀘南傳乞弟已死又云相次投降乃是招安將領輩妄為之辭以要小利皆不足信惟宜置而不問又瀘州極邊支移稅賦往被送納米一斗為錢三百文草一束一百文民力之耗可知矣臣伏見熙寧中朝旨下俞充按視成都路接近蠻夷州軍寨充乞修築雅州城所計工料萬數浩瀚續準密院批狀候漢眉州永康軍修城了日修築近聞本州申轉運司以為于事無益乞行寢罷臣體問得雅州自建置以來只以木為寨柵蓋州城北據大江之岸秋夏水溢衝浸木柵或修城牆即遭水患尤易摧塌其南據山山石險阻難為板築東西兩邊地勢稍平可以興工又緣土疏沙潤經雨即壞暫成復毁其勢必然所計工料人夫數目極廣雅州地瘠民貧豈有餘力可以具辦不免於户上科定及近裏州縣置買應副若城壁堅完已見騷動况此理勢不可修築乞下鈴轄轉運提刑司相度寢罷庶使公家無橫費之害遠民免勞役之苦只乞修完木柵自可防虞惟朝廷留意幸甚貼黃兵夫凡六十餘萬竹木磚石之類凡二百三十餘萬又近歲茂州亦因修築致夷人疑惑結集為寇遠方邉郡豈可率爾生事臣伏見川路近年賦斂失當民力雕弊其事在於科折不得其平聚斂之臣恣為掊克皆轉運司不任其責故也一路田稅雖名物不同大率錢米為多以錢十文折綿一兩以三百文折絹一匹天下稅額之重莫過於此既著為令不可改易至於米豆逐料科折不一或折絲絹或折紬布或納估錢先期拋下所折之物指稱本州以起納之月上旬價值科折縣令之職謂之親民民事之大莫若賦稅而不得與焉或郡守有愛民之心不附會轉運司厚斂之意估價既平公私自便稍異於此又將何訴蜀中比年米榖極賤而估價太高所折絹布則估價太賤有以米石二三斗折絹一匹者米一石直七八百文絹一匹乃為錢千四五百遠民重困良以此也朝廷若因臣僚論奏下轉運司分折不過謂折納有著令估值在諸州既能殘民又且逭責小人刻剶何所不為生靈削朘亦當深恤臣欲乞今後兩稅及官租斛斗若不納正色須至科折仰轉運司先次指揮州縣以某色斛斗折某色物帛逐縣各於起納之月上旬估定實直申州知州通判看詳所申子細體問重行估定申轉運司仍採訪覺察如無偏重方許折納若不得其實侵損官私轉運司及本州官吏一等科罪如此則朝廷寬恤之惠天下安集之望莫此為大臣嘗聞仁宗皇祐中京西路科折太重諌官極言其事仁皇嘉納轉運使蘇舜元得罪祖宗仁政自可取法惟聖明裁斷下修敕所先次立法施行貼黃賦稅科折不得其平則生民受弊乃王政之急務切慮諸路亦有如此伏乞早賜指揮臣伏見成都路轉運司逐年下六州軍買官布七十萬匹于十一月支錢至次年六七月收納並係上三等稅户名下均定收買因其田稅多寡而科所賣之數名雖和買實則配率行之已久習以為常元豐以前每匹支錢四百五十文或四百文不致刻剝人尚樂輸至元豐元年轉運判官王宗望曉論州縣各令減價其間官吏迎奉風旨損直太過蜀中近歲雖重物輕惟錢輕布價不甚賤蓋官中須索如此之多地利人力所出有限故也近歲逐處所支每匹才二百九十文而民間輸納乃五六百文郡縣每月所申實直每匹不下四百五十案據具在可以考驗豈于和買獨減價錢民力供輪尤為不易乞下轉運司今後勘會實直添支價錢庶得遠方農民蒙被德澤貼黃今年夏稅畸零布轉運司並令納估錢每匹四百二十文足及至和買只支二百九十文顯見侵損稅户臣伏見成都府每年上供錦帛原係預俵絲花與百姓織造往往有貧下機户已請錢物破用及其催納不免騷擾至元豐六年奏創上供機院令軍匠八十人織大料細法錦透背鹿胎共七百三十餘匹其小料綾綺易造之物一千三百餘匹仍舊俵在民間後因內臣郝隨齎到御前劄子添造緊絲等機法一十五色本府又奏差監官一員招軍匠三百人并將小料易造之物一千三百餘匹亦在院織造既招軍未足遂雇百姓助工日逐勾集三四百人雖支工價尚有虧損雖定日限仍更督促或無故拘留纍日或每匹又出罰錢歲月為常殊無休已細民失業不勝其勞昨已準聖旨罷織新俵緊絲等一十五色至今猶有監官一員并軍匠一百七千餘人費耗甚多仍更日役百姓頗見煩擾臣欲乞將易造之物一千三百餘匹仍令民間織作減罷監官其軍匠止八十人惟造大料錦自不闕事即不許勾集百姓匪惟裁節冗費寬假貧民抑亦防異日作為淫巧之弊并漢州綾户造官綾向因知州席汝明性好刻剝逐年減絲數數工錢以致人户積欠綾四千餘匹刑箠濫錮乃至家業併盡償納未足現今拘管在綾務織作剋除臣詳此弊蓋因官司減物料工直方致拖欠亦合依赦蠲放伏請下所屬施行仍乞依席汝明未減以前絲工織造臣聞日蹙國百里非治世之事也昔光武中興因王莽之亂户口雕耗乃併縣邑唐元和中以天實至德衰殘之後李吉甫欲省郡縣而議卒不行蓋建置之始或以版籍之蕃庶或以訟欣之浩穰或以防寇盜之變或以示形勢之重皆有意謂不徒置也免役法行提舉司多廢州縣蓋利於減罷公人而所收役錢多有寬剩未始有以民事為念也既而神宗皇帝知其未可旋亦興復如滑州及偃師汜水縣皆是也今年二月詔下諸路已廢州縣相度復置成都路亦嘗申請復永康軍及籍縣至於成都之犀浦綿州之西昌皆可興復乃有異議伏緣成都府界四境之土相距皆百二三十里之遠昔為十縣縣之主户各二三萬家而客户數倍焉征賦錯出訟訴叢委昔年議廢犀浦止以介於成都郫縣之間東西五六十里由是四分其地𨽻於成都郫縣溫江新繁至有一家之産割裂而屬四縣推之人情自已厭苦而南自溫江北至新繁乃八十里之遠中間居民稠重去縣既遠盜賊嘯聚竊攘劫奪屢常有之昔未廢縣不至如此又犀浦田稅比四邑為重今既差役必以等第而等第高下視稅色之多少則犀浦之上户常四邑之中民力役既同則犀浦役重此人情之願復也以地理考之成都府永康軍彭漢卭蜀眉州皆平川之地止三百餘里之中而為州七為縣三十四中間未有相去八十里而無一縣者此事理之可復也前代創建豈偶然哉又如綿州之西昌分𨽻巴西神泉龍安之三邑道里之遠各七八十里輸稅訟訴今又復差役皆不為便其甚者縣之數里之內三處渠堰逐年修治蓄水溉田無慮三萬畝昔時本縣官員當工役之日親往檢視堰功乃集廢縣之後别縣相去遼遠不復前來監修以致工料或虧水利不時人被其害兩縣百姓屢已申訴監乞興復利害明白而監司所見各異不為申請乞賜指揮下不干礙官司相度施行貼黃熙寧四年欲廢犀浦鈐轄司相度以為不可其後提舉司再奏乃廢以此可見廢之未當也又陵井監百姓亦乞復貴平縣監司未許乞一并相度施行臣伏見興州濟衆監自興置以來歲鑄錢六萬二千貫至嘉祐三年減半鼓鑄其所用生鐵並在衙前酒場和買每斤支十四文雖有賠費緣酒埸利息稍豐未見破産自賣酒埸後以來本州勸誘煉鐵之家通抵産預借錢每斤支三十文彼時山林不遠可以就便置爐煉鐵應副足用續又以銀絹折支漸虧實價至元豐三年頓添四萬九千貫以三萬貫借充茶本四年又添二萬貫每歲共鑄十萬貫文其鐵每斤又減六文其爐户為纍年採礦頗多土窟深惡并林箐踈淺燒炭漸稀倍有勞費兼數遭大水漂壞冶竈破蕩抵産逃避亦多現今本州與三泉西縣爐户拖欠額鐵四百餘萬斤禁錮箠楚曽無虛日緣地産有限民力甚困每歲鼓鑄不已雖百計督責愈有逋負況今來已蒙朝旨更張茶法則本錢三萬貫更不須借自可歲減錢額仍乞下本路相度量減料例鑄六萬二千貫庶使數郡之民不為錢鐵所壞稍得休息即於本路支用亦無闕乏貼黃臣又聞知興州陳鵬曽具利害陳奏乞鑄減輕錢歲可減錢鐵四十餘萬斤民間深以為便蓋現今行用鐵錢頗重若稍裁損即輕省易為齎操往來公私兩便伏乞檢會施行臣訪聞前蔡濛任成都路轉運判官日不與本司共議因公事出巡卭州一面將爐户杜中林中所有官鐵纍次減下價直仍别作一項椿留所減錢貫意欲以為勞效及致杜中林中等各家節次敗闕現欠官錢蔡濛并將郭舜良等兩稅地內創造爐竈買礦煉鐵去處作坑冶發露召人實封投狀承買各爐户等莫不冤之遠方疲俗因而重困伏下本路轉運司審詳改正施行臣伏見陵井監嘉州等處人户久來開鑿鹽井謂之卓筒蓋鹽泉所在皆山溪開鑿地十數丈以竹隔水故也官為比𣙜月納課利助一路之費蓋亦不少始嘉祐中轉運司奏請今後更不許卓筒非為其偽濫也止以鑿井既衆出鹽滋多射破蒲江官井鹽價然已開鑿者亦存而不廢至熙寧九年轉運判官段介又奏請閉塞本路及梓州路卓筒鹽井一為欲蒲江官賣貴鹽二為欲興販大寧鹽解鹽入川高價出賣多取羡息苟求恩賞是時梓州路轉運司以為年計所賴固執不可惟成都路盡行閉塞煎井之家由是失業近歲為有熙寧五年六月十四日中書劄子許開鹽井除卓筒井不許興開向之井户各經所屬陳狀乞開大井但砌井面其下亦須卓筒井研等縣無慮百五十所逐年出納銀絹及五萬數其始避卓筒之名方得開鑿既而有違法之實深自恐畏浮浪遊手州縣胥吏曰有凌脅未嘗寧居臣竊課卓筒與大井煎鹽及所納課利其實不異而卓筒獨為礙法理有未安欲乞下轉運司相度嘉州陵井監今日以前鹽井一依梓州一路鹽井敕條指揮其熙寧五年六月十四日中書劄子卓筒不許興開亦乞刪去即於公私實為兩便又訪聞成都路鹽井先差官比榷後轉運司指揮本州更勾追開井户于所𣙜額外增添歲課多有破敗欲乞指揮轉運司勘會自額外添起課利盡與除放免致三二千家因此流殍為太平之纍貼黃蒲江鹽昨準朝旨減價易為出賣近又黃亷奏乞減井額貨法已通今若許復卓筒井則於蒲江鹽委無妨礙臣伏見興州青陽鎮銅錫場舊屬本路運司就差青陽監程官兼管向因李憲申請撥隸熙河經制司及自奏舉監官今屬陕西運司本場逐年支官本一萬貫以來收買銅錫應副通逺軍鑄錢自熙寧七年至今發過一百六萬餘斤其監官有食錢有驛料有公庫供給有役人四名並係雇募有兵士七人歲費共約二千緡所買銅錫不多而所費不少又利州路官局隸屬陜西運司名亦不正方裁節浮濫之時臣欲乞仍舊令興州青陽鎮監程官兼管亦可以稍減冗費淨德集卷四
