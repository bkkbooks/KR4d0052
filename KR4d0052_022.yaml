body:
  text: 淨德集卷二十二宋吕陶撰墓志銘朝請大夫知卭州常君墓志銘元豐七年七月初六日朝請大夫知卭州事常君卒于官享年六十一其孤卜以元祐二年某月葬于華陽縣某鄉某里以君之行狀來求銘豫與君同郡而家世往還最舊自慶厯中天下興學君為石室生豫亦肄業其間始與君相從及宦遊四方多與君接今四十年知君可謂詳矣敢不銘按君之先居長安六代祖有任唐安椽者卒葬江原子孫寓焉曽祖延昱以氣節自任所與游皆一時豪俠然於財未嘗苟得也方是時宣徽使雷公入蜀平寇思得竒特不羈之士以傋其用得見甚喜凡捍禦術略多從之謀既而雷公守成都以書招致遂為成都人祖思齊性孝友能竭力事親雖亂離不失其樂考禧好事喜儒善擇師友以教子故君起家入仕生有榮養沒有寵賁贈至中大夫封母袁氏華陽縣太君卒成其志也君諱珙字君璧性穎悟初就學誦書雖數百言一閲遂記稍長泛觀羣籍好周官戴氏禮凡先儒注釋異同微顯錯出互見悉能通之尤精於名數制度以至圭幣冦服車符樂舞牢鼎齊尊之類用於禮者其規範之巨狹容色之丹黝先後之序繁簡之差皆能條别指數聽其言如視諸圖作為聲律曲折中度慶厯六年南宫試進士孫文懿公夢得與今少保張公安道實司文柄以獮日祀祊為題君之辭章詳實華潤考為第一二公於是勉君以逺到士人始知君力學而文既擢第調合州軍事官徙華州節度掌書記用薦言者改祕書省著作佐郎知江陵府公安縣遷祕書丞移福州之閩以親年髙乞便官得洋州之西鄉未行丁中大夫憂服除轉太常博士知三泉縣歷尚書屯田都官職方員外郎賜五品服通判欣州遭太夫人喪終制又通判漢遂二州為屯田都官郎中移知資州官至行易朝散大夫知果州又遷朝請知卭州君敏於吏治濟以彊力事不擇巨細必究極底裏然後行之人多以為宜在公安承廢紊之政民苦無聊凡賦徭訟訴處決以平遂號無事㑹嵗歉釋圭田之租以賑流殍三泉邑陋俗野初不知學君治之有餘裕乃作庠序擇吏民子弟可教者躬為課試人用嚮儒君之力也懷安軍三江堰以侵競致訟歷四十年不能已君時在漢州兩蜀使者委之按治君鉤索本末得其情歸所侵田而復其堰溉潤之利凡四千頃果州瀕嘉陵嵗嵗水患君審視形勢為長堤捍其衝民得不魚至今賴之君襟度踈簡不競矜式見善必褒愛作意引汲見不善輒暴揚挫折若仇怨然交遊視此或少之徐就其中無他也嗚呼君少勵學博覽彊記為文字就科舉一試禮部遂能先衆人聲華翕然苟有攀援慿藉將之緣飾則仕可以顯巳而汲汲吏檢老於郡不失為良二千石蓋無愧也娶孟氏封永安縣君子三人景修宣德郎景仁昌州大足縣尉景儒舉進士三女適懷州武陟縣主簿劉舜臣管勾成都路帳司文字袁平簡州陽安縣尉何宗師孫男六人女三人銘曰少也務學求以發身壯而從政思以與民六品之位其志亦伸三郡之治有顯厥聞墓崇于岡銘堅于珉告其子孫敢忘其親中大夫致仕石公墓志銘有宋名卿蜀之純德君子中大夫致仕石公享年九十言三以元祐六年十月某日終于眉州私第之正寢八年十月某日葬于眉山縣懷德鄉先塋之次禮也維石氏出萬石君之後唐有仲覽者仕至兵部郎又六世曰藏用大厯中為羽林大將軍善星緯之學當朱泚未亂時已告老嘗謂家人曰天下將有變惟蜀稍安乃擕孥而西依其親眉州刺史李滈遂家焉至公七世矣曽祖瑭隱居守道爵祿不及祖昌齡纍贈屯田員外郎考待舉贈至開府儀同三司公諱洵直字居正幼有志操彊學力文為辭章清贍尚理舉進士聲稱翕然中景祐元年甲科釋褐知涇州保定縣又知并之祁縣通判遂并二州守鳯歸成陵彭五郡分司南京遂謝事自祕書省校書郎五轉至太常博士又八遷為光祿卿官制行易中大夫纍封開國侯積勳上柱國以三品服終此出處之大槩也始蜀人去五代亂俗未嚮儒屯田君即其居搆層臺以儲書以經術教子弟里人化之絃誦日聞號書臺石家有子待聞卒其業咸平中及進士第又登賢良方正科志大言髙與世多忤仕竟不顯終檢校水部員外郎乃公之季父也公以性質之美家法之良深滀厚養完就德器剛不暴於容貌柔不混於履趣平居恂恂然即之甚溫及其遇事決可否則賁育其亢其勇在成州時寬恤民力之詔下部使遣官行郡有楊士元者持檄而至作氣勢事求索重為民病公以狀白轉運使即召之還李元瑜者天資憸刻人也知彭州永昌縣為公屬吏忽就領常平事輒依法逞其私傲上凌下無愧恥鋭意戕剝公以理解譬使之馴伏卒無所施一郡不被其毒陵之醫挾其技犯分抵禁詐為疾幸恩霈以免公一日引而榜之彭之巫詐於郡僚搆淫祠誆俗以禍福公收而置之法其敏決舉類此識者畏其勇力其少時能安貧重義不求苟得既貴益堅如故在我者約故於物不擾秭歸漆林之饒官史多為髤器以廣資用耗地産奪民利上下習以成俗公一切罷去邦人䝉其惠殿中御吏張唐英因撰漆民語刻石紀之陵陽圭田之入素號優腆不問嵗美惡倚辦較吏務登其嬴公盡革之後人遵以為常君子服其亷夫勇則識者畏廉則君子服然皆公之小者近者其大且逺者蓋未嘗發也竊嘗論之公少而博學舉進士為天下第六風度清懿從政知治體苟少露餘藴以示衆或有資地可憑藉則推志及物利澤滋廣功名將赫然豈特數郡而巳惟其信道甚篤處已甚重待外物甚輕安晦靜默寶其所有以為高世所謂進取榮利者未嘗萌於心出於口是故人無知者卒不巨用亦未嘗有毫髮不滿之意其高標令節足以立懦夫敦薄俗鄉黨賴以主風教多士仰以為師式其顧視悖義喪恥以僥幸錙銖之進者如糞土也公既退休終日閉門泊然無所營不與俗子交即城南舊圃為亭沼植名花異卉每乘輿往遊其間以詩酒為娛其詩尤平暢閒淡無一語及榮辱時大中大夫程公濬吏公瑜亦已引年龎睂鶴髮安車相還往燕喜賡唱里人敬之號三卿凡如此者二十年此又非世俗之所能享也與夫馳騁於名利之場一絓世綱終身不復出回首故鄉如逆旅心欲奮飛而迹不能者楚樂蓋異矣所得孰為輕重哉進退豈不裕哉公娶蘇氏纍封仁夀郡君先率幾年子二人長景修宣義即知嘉州洪雅縣次詠嘉州軍事推官監蜀州陶壩鎮皆亡女一人適朝奉郎郭子臯孫三人順之承務郎延之太廟齊郎元之尚幼孫女六人長適進士程輿次適蜀州永康縣尉蘇其餘木字水部有三子伯與季皆早世公既貴各官其一子田疇室廬均而畀之尤見其雍睦也元祐初某為諌官議事及權貴得請補外公之從孫朝奉君嗣慶其以本未告公公曰士之所養有素動而得一善足矣安俟其餘斯言其知我哉及公將葬朝奉君狀公平生行業求志其墓其敢辭乎銘曰十尋之木或植于荒所立不高視以為常我固不競誰其度量不剖而尊彜不削而棟梁不弊于刻剜不罹子斧斨根堅幹老惟日之長彼自曰勝此庸何場所貴在德久而不忘朝議大夫黎公墓志春秋事出於吏而法與義生於筆削雖游夏不敢措辭其間及夫微言寂絶大㫖畔散傳注解詁之象坌並而起各持其說以誇異騁髙於人蓋自左邱明而下五傳殊歸歷漢晉及唐之盛而祕府所藏至六十餘家千餘卷嗟乎春秋之難知而學者之難論亦巳甚矣渠江黎希聲専經而信道常謂春秋緣舊史之文假聖師之筆行王者之事其文坦易其法簡嚴思之不必太深求之不必太過則有得乃探索藴奧敷暢厥旨著春秋經解十卷大率以經為主不泊於異家曲說之紛紜傳諸士林信之深從之衆熙寧初丞相韓魏公上其書於朝謂可置文館翰林王禹玉輩援之甚力㑹貢舉更制春秋不為科議乃寢公亦浩然有歸意遂老於蜀今天子嚮儒重道謂一經不可輒廢為置博士用以取人則公之亡久矣嗚呼道之明也有至是乎狥一時之好惡而經術用舍繫焉亦儒者之不幸矣此所以古之人著書立說或藏之山巖屋壁或投之煨爐而不欲傳於後世蓋有謂也按黎氏之先出北正其後子孫散處四方建隆中有曰嵩者初自雲安徙居潼川今為廣安人嵩生元祐元祐生德頴乃公考也纍贈金紫光祿大夫妣王氏贈太原郡夫人公諱淳字希聲幼務學既冠與仲兄洵游京師當時儒宗石守道孫明復皆美其才韓忠獻公召置門下譽望益顯第慶厯六年進士調利州節度推官以父憂罷終制除成德軍觀察推官監延州折博務轉大理寺丞改殿中丞知䦘州南部縣以母喪去職服除監在京鑄䥱務遷太常博士屯田員外郎歐陽文忠公吳長文薦為學官得國子監直講是時大學士凡千數諸博士講解先日撰口義升座徐讀而退無復辨析㫖要公獨不然置經于前按文釋義聽者樂聞其說咸宗向之公凡守雅蜀睂簡四郡皆先德後刑務存治體不汲汲簿書期㑹君子喜其勸小人畏其懲有古循吏之風在唐安乘嵗饑募民完堤堰兩得其利不浮而稔此治狀尤炳然者元豐七年以朝請大夫致仕哲宗即位加朝議元祐八年五月二十九日卒享年七十九天聖四年十二月十日葬于渠江縣敦義鄉書臺里書臺山下公娶安氏再娶周氏封仙居夀安皆縣君一男傃太廟齊郎早卒女四人長適朝議大夫蒲宗閔次適朝奉大夫楊􅖴次早夭次又適宗閔孫男二人暹升皆郊杜齊郎公善學知原本窮經立言雖皓首不倦六卿薦于朝將用已而棄不録然能以教于鄉其臨政必重民所至有可紀舒而廓之豈特沾滲四郡乎世所謂鄉先生良二千石公無愧也銘曰言可以垂世屈伸存乎時或布于廊廟雍泮震發斯文之光輝或委之重巖餘燼來者莫得而知志可以澤物廣狹繫乎用或彌塞海宇鼓舞萬靈之動或踧踖遐陋敝米鹽之司名在彼孰先義在我孰重欲識公懷銘于高冡朝奉大夫知洋州楊府君墓志銘漢太尉揚震以忠義剛方之節扶危持顚王室倚之雖亂不忘功德及四海深且大矣天與令善子孫盛多厯九百九十年爵祿猶不絶間有賢者出焉蓋二十四世生漢公在唐宣宗時領宣武天平二節度君靖恭里光顯一時又二世生珂任金堂縣令生國子祭酒擔因葬金堂於綿作遂為綿竹人祭酒生頴仕孟蜀為漢州别駕别駕生曮懷道自悔不願仕族黨尊為隱君祥符天禧間大臣表論行義授國子監主簿隱君有二子長曰至為尚書郎故纍贈太常少卿次曰孰乃君考也趣識超邁有君子長者稱鄉人之善者皆師式其行贈朝請郎君諱忠惠字敦夫孩提時己莊謹不妄笑言既長能學以干祿擢嘉祐八年進士第初授眉州司法以親嫌徙陵州視條格有未安輒論奏往往如請著為令遷遂州青石令改著作佐郎知綿州巴西縣是時苖役之令初下逺方郡邑行之或過與不及獨君能體法意推廣以序民得不擾使者請君齎奏而上謂可遷進君以親年高辭不行就辟監成都商稅前此有司幸賞征斂無名求溢常課多至遷二官君能汰甚者羡入遂寡疇其勞惟可減歲進秩丁母憂去未服除改祕書丞君居喪逢郊霈未封其親乃叙前勞於朝丐一命以及父部使亦為之皆不報君自是不復語減歲之賞朝請公公既沒終喪踰年顧松檟不忍去殆無仕進意親友强之久而後行今天子即位詔天下實封言事君獻十議一任宰相二選將帥三省冗官四薄賦斂五愼名器六安邊鄙七廣言路八重法令九節浮費十議科舉其言有補於治賞通判衡州嵗大水民饑且溺郡守坐視不恤君盡假官舟以濟發廪貸之然後白使者全活甚衆湖南郡縣凡追集吏以文書鬻於皂頴謂之賣帖得者藉以斂賄公肆掊擾上下不為怪民甚病之君嚴治之立禁條以上聞朝廷因作法頒天下又賞知洋州為幼學文諭郡人朔望率諸生釋菜於先聖退而環坐執經講論課試能否於是舊俗一變學者數倍爭訟為之衰息紹聖元年十二月十二日卒于官既閲月朝奉大人命始下享年五十六某年某月某日葬于某鄉先瑩之次母張氏封廣德王氏封靖安皆縣太君妻黎氏壽安縣君子六人綝􅀈細纁絿綨綝瀘州司戶參軍緗早卒餘皆力學求舉女三人長適宇文綱次適李際季適奉議郎張及君孝友亷靜貴義而賤利事親能養志惟恐一毫違其欲愛人惜物甚勤不汲汲於榮祿朝請公長女既適朝散郎宇文昭度愛之留於家與君共居三十年內外無間言泊析産為二君乃占瘠土故伏臘冠婚之費有不給而終身猶貧親黨無以葬與孤女不能嫁則出力資之壬申嵗綿竹水災君率里人瘞溺戶几千數其在官亦以為功務元祐中大臣有喜君者欲援以進君不趨合乃已或勉之則曰用舍在道通塞在命求無益也平居不倦學有文集二十卷晚讀釋老書常戒殺間不茹葷旬至四五日非賓客盡晝默坐將捐館之數日呼綝讀司馬承禎坐忘論既而嘆曰人之處世要在如是於物我始終之理其有得乎及其亡也親友或謂君常苦脾疾蔬食損氣以及大故蓋惜君不幸而云爾有王從古者持術考數或以竒中嘗告君曰異時有同祖考名者位己之上宜慮以避禍君既在洋㑹朝奉郎張孰為利州路轉運通判適與朝請公同諱未幾君乃卒嗚呼天下之不可致詰豈一端者元豐初年豫始識君一日與客偕至客詫其親侈縱聲色以自奉真得富貴之樂君愀然顧豫曰審如是何以示子孫子嘗研味此語愛君之清識云銘曰其質也良其守也方外舒其華中斂其光富兮非吾樂嗟悖義而多藏貴兮非我好敢枉己以自戕豫迹孰從泰然不競之場豫心安歸漠然無何有之鄉令名不忘終焉允臧淨德集卷二十二
