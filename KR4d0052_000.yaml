body:
  text: 浄徳集别集類二宋提要臣等謹案浄徳集三十八巻宋吕陶撰陶字元鈞號浄徳成都人皇祐中進士熈寧間復登制科歴官給事中改集賢院學士知陳州紹聖末坐黨籍貶徽宗初復集賢殿修撰知梓州致仕卒事蹟具宋史本傳陶秉性抗直遇事敢言所陳論多切國家大計其初應制科時值王安石方行新法陶對策言願陛下不惑理財之說不間老成之謀不興疆埸之事安石讀巻神色頓沮神宗使馮京竟讀稱其有理而卒為安石所抑僅得通判蜀州其知彭州力陳四川榷茶之害為蒲宗閔所劾謫官其召用於元祐初又極指蔡確韓縝章惇等之罪請亟加罷斥其他建白至多大抵於邪正是非之介剖晰最明而據理直陳絶無洛蜀諸人黨同伐異之習嚴氣正性與劉安世略同至哲宗親政之始陶首言太皇太后垂簾九年小人不無怨憾萬一姦邪之人謂某人宜復用某政宜復行此安危之機不可不察其後興紹述之說卒應其言其深識逺慮亦不在范祖禹下故其所上奏議類皆暢達剴切洞悉事機蔣堂以賈誼比之良非虚譽其餘詩文亦多典雅可觀至學論二篇力攻王氏字說不遺餘力尤為毅然自立不附合時局者矣宋史藝文志載陶集六十巻久無傳本其得見於世者僅宋文鑑所載請罷黄隠一疏今就永樂大典各韻内採掇裒輯分類編次釐為三十八巻雖以史傳相較其奏疏諸篇或載或闕其應制科策一首不可復攷未必能盡還舊觀然已什得七八所闕者固無幾也乾隆四十九年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀原序嗚呼靖康丙午之禍奚為而至是極哉熙寧當國者患時舒緩不振大為理財拓邉之規諸老臣不可則援引少年鋭于事者慫恿附和而小人徧中外矣雖然自熙寧至宣和五十年間累聖賢明固嘗用賢士大夫而俱無改絃易軫之調何耶夫一薫一蕕十年猶有臭邪正並用則小人卒以得志故也元豊間棄置王安石者八年有悔意矣而執政皆其徒也元祐克成先志内君子外小人天下稱治矣而永年乃用調停之説使其徒厠執政之列紹聖遂熾然而作也建中靖國固已並用無何愛莫助之之圖行改元崇寧蔡京當國善類殲焉不可復措手矣中間雖一再罷京用趙挺之張啇英輩皆一出一入之人何能為哉是以五十年間有為之君子皆以邪正並用竟墮小人網罟中良可歎已吾鄉有給事呂元鈞者以賢良召試于熙寧初極論理財拓境之非雖為外官必行其言無所顧望暨召用于元祐則專以判别邪正為事雖去國猶丁寧反覆言之今以遺文攷其議論但不使小人居中撓政非有訐斥僇辱之甚激其狠毒之性至儕類之失亦不芘之其用心如鑑之照如四時之生殺各因物之所當得者與之而物之受之也無怨亦無徳焉其守道如此使得大施用于世亂何自作哉公于紹聖坐黨事貶湖南後守潼川拜崇寧改元詔即乞身而歸遺令不作碑志休影滅迹故崇寧以後追貶不深而復官亦不及是又能以明哲自全者然至今卹典未及無身後之澤而名不登于太常史院雖公韜晦本志無所事此而一世明徳嘗登禁從後世無傳焉此有係乎國體者子孫之責亦鄉士大夫之責也是以諸孫出其家集使著于世云成都馬騏序
