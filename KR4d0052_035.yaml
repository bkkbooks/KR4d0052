body:
  text: 淨徳集巻三十五宋吕陶撰七言律詩次韻張懐安題雲頂浴室院山門漸近少凡塵佛子長棲物外身款戸多因遊寺客倚欄時有羨魚人祥雲結蓋應非霧法雨飄花别是春數刻盤桓覺蕭散囘頭官事又勞神次韻張懐安喜雨詩雲密西郊末作霖暫憑精禱快羣心望如至寳難搜索來似嘉賔忽訪臨古廟有靈惟響答洪鈞於物已恩深春膏直待沾濡足不使狂風取次侵過金堂偶記舊詩因贈宇文縣宰嘗聞縣古槐根出最愛官清馬骨髙前輩有詩談事實今辰此景入風騷飛雲幾處籠山頂密雨連宵發土膏公事稀疏吏歸去不妨歡待對春醪和野軒答李著作見寄公居何事葺幽軒客味蕭條稱養閒人笑規模猶物外我憐風景勝花間穠林鬬影舒帷幕淺溜餘聲雜佩環欲把郡圖傳向此座中常得見岷山登攬秀亭亭在西山積翠中煙嵐氣象一重重芟開簷際偏髙竹見得雲問最後峯野色為誰長鬱荗物情於我似從容年來已有林泉興倚着闌干興轉濃次輔元韻山嵐穠秀望中青路轉松隂步步迎十里晴郊供野意萬家和氣發歡聲春臺不覺殘春景樂國偏知衆樂情公向蜀人深有意更憐風物暫閒行鍾陽道中和酬輔元忽捧瓊瑰俗眼驚荷君深照舊交情歸心自喜雙親夀拙計難酬厚禄榮十舍路岐平野闊幾重村落霽烟生羈遊毎憶家山樂況是花時到錦城送任遵聖之官富順二首千大蒼松出故林喬枝成就古根深棟梁須負平生用霜雪難移此日心月白曽經丹鳳宿風悲定有老龍呤重巖複澗何縁幸一旦家家得茂隂野鶴孤髙舊羽儀超然殊不事卑飛有心雲路翺翔去迴首芝田迤邐歸白日漫教羅網密紅塵堪笑稻梁肥仙家自有千年約應許先生學令威竹枕不誇雕琢畧磨礱溪叟持來贈野翁氷雪易侵毛髪際塵埃難到夢魂中消除暑愠宜無價安養慵閒似有功富貴人家應笑我水晶新様極玲瓏次韻家渠州承議春隂春工用意本華鮮氣候隂沉未逞妍風色送寒無甚雨雲容垂逺又非煙遷延鸎舌應嫌巧抑遏花心恐占先稍待新晴纎翳廓穠芳齊媚艶陽天官舍東偏海棠開最晩落亦後時以詩嘲之花到春深半已過此花猶見滿枝柯傳來芳信雖為晩占得韶光却是多愛惜錦文愁雨急留連妝臉笑風和後先榮謝人休問且伴樽前一醉歌送秦漕歸淮南襲得芝蘭一室薰更將三美向誰論原註公與某同時中第在潼川嘗共事暨岷蜀報政又得繼踵宦遊之美有此三者亦罕也光輝自可誇僚友契愛猶能及子孫金節暫求康爾俗錦衣歸去大吾門西南終是天涯逺却羨鸞凰集九閽寄新寧黎叔蒨平日論交重久要毎懐髙誼寸心搖君恩最是憂民社吏隠偏宜逺市朝諄誨佇聞流尺素嘉篇頻為寄瓊瑤笑言契闊勞生甚别後堪嗟壯氣消寄周才叔天涯羈宦落蓬蒿漫說平時器業髙寒暖所逢皆物理悲歡相較只秋毫徒嗟壯士難行已懶學風人便著騷樂道養閒俱可羨念君清誼甚魂勞和周簡州寄范蜀公三章禁林元老忽西歸衆謂西州此事竒矰繳漫勞鴻去後桑田未變鶴來時一鄉金帛皆沾惠千載松楸得奉祠預想年前至京國子孫持酒獻春祺春深歸到錦江頭笑傲光隂巳晩秋内相貴名雖烜赫山翁行李甚優游詩中氣格超摩詰方外情懷類子休原註莊叟字南下有期風月爽鄉人從此望仙舟法從深嚴寵禄榮清標素節兩難并有心報國雖謀國無意求名又得名道服豈煩垂寳帶安居何用􅎖華纓秋風一夜喬林減惟見松篁不變更昨日昨日文書挿羽毛征夫連日整弓刀雲如野色隨時慘風作邊聲特地號八陣威靈今可託六州形勢古稱髙西南久不聞金鼓莫遣人人著戰袍又賦二首千里征蠻向不毛坐籌先勝自三刀井中蛙力狂雖躍弓下猿聲怯便號草白見城羌地淺月明聞角漢天髙將軍幾日當雄㨗速把功書上赭袍忠膽輕生甚一毛奇謀破賊鋭於刀横行容易平烏合面縛須臾作犬號霜甲共輝軍帳冷煙烽齊出戍樓髙羌酋若也投降早定得君王瑞錦袍雪白金鋪野玉堆簷獨上危亭喜再瞻多積豈能填澗底已髙猶未累山尖碎聲著物飄來急寒色侵人霽後添時節霏霏末還役賊平消息願重占岷峨王髙士賫牟中祕墨帖來求跋自言能䕶真氣鍊大丹罹兵禍而輟同輩有志於斯事者皆然又言老人村凡二三百歲者亦皆死於兵嗟夫兵之禍生靈甚矣禍蜀則尤慘禍及髙士更不輕矣遂為之賦詩道人少日鍊神形兵禍俄乘竟不成欠為黄庭判一死所酬丹事又三生眼㸔殘盡雞窠老膽破寧寒犬䑛盟豹養虎攻嗟爾似却求翰墨作虛名石泉道中和綿州通判李朝散見寄深僻﨑危不厭過欲將涓滴助恩波躡雲髙步三休在踏雪清寒一倍多依約度溪投野店逡巡扶杖厯新坡原註山有極險如不可登者里人謂之新坡初春此去纔旬日屈指流年奈老何有觸三十餘年齒士林青綸一命鬢霜侵策名雖動遲留嘆行已常存少壯心月滿漲潭清逺夢春歸平野付長吟前溪況亦稱南浦惜别情悰幾倍深城西龍祠二首市橋官栁翠隂垂路嚮西郊駐彩旂故事毎從遐俗尚清歡又送晩春歸留連野色遲遲去珍惜年華苒苒飛老杜有詩殊有味風光流轉莫相違林密溪寒錦浦西千年靈宇舊憑依竹村迎路堪行樂麥壟連雲已應祈詩將早從吟社去遊人暮到醉鄉歸隼旟莫倦徘徊久化日舒長未夕輝和賞申氏園海棠誰裁錦段碎文章憑借春工便吐芳自是多花宜少葉原註蜀人以花多葉少為海棠花葉相間而開者非也肯教仙格有凡香妝容試酒偏増麗舞興迎春擬作狂使幕縣庭雖甲乙更饒鄰圃借餘光原註舊記云成都使院海棠第一成都縣庭第二今申園所植乃其類也和姚提舉賞海棠曉霧籠花暖漸収萬枝難盡數花頭臙脂半為傷春淡錦帶翻因拂地羞圍飲舊風傳樂國原註田宣簡云命酒圍海棠而飲乃蜀故事縱吟清味屬詩流西園韶景真無價紅滿池臺月滿樓和蜀守道中書事天恩流布下天津沴氣消除生氣淳昔慮早饑農失職今逢賑惠澤如春綏懷有術推儒者全活為功類古人賢傑一心溝壑起翕然歌頌在生民題友人西行雜詩一官一集古稱賢未似西征五十篇雅頌純音流管磬風騷餘味到林泉光生曉岫刋岷石價踴春溪費錦牋愧幸師門舊林教得為家寳子孫傳讀黜邪詔天詔丁寧逐佞柔不須請劍復持矛平生邪膽君前落後日汙名紙上傳寶鑑乍開消魍魅正聲纔作罷離兜便為葅醢何嗟及貪得浮榮似食鈎晩向南樓野情無限物無窮一凭危樓又晩空過雨郊原渾積翠送春亭榭尚餘紅煙光已屬綃圖上湖影初歸寳鑑中飛鳥潛魚應自得倚欄小憩豁雙瞳送張頴達屯田西風獵獵馬駸駸極目歸途寄静呤美玉自藏圭璧用寒松偏有雪霜心皆知舊徳淹郎署合寵耆儒鎮士林勢利競馳孤介少為懷清誼動離襟和寄治之少卿榮路層層滿眼開家山在望懶徘徊霜侵客鬢須歸去塵拂朝冠是儻來一棹綠波遊不厭三竿紅日夢初囘更聞觴咏同幽趣應少閒人可預陪送張静之少卿東歸禮寺居卿寵搢紳若求清議尚沈淪三千里外甘投足四十年前已化鱗何必萬鍾如已欲好將一笑寓天真當時共獻藏珠賦夀考康寧有幾人象棋二首咫尺楸枰計慮深偶縁嬉戯便交侵縱横各有往來道勝負豈無名利心終局漫誇兵得地在宫渾倚士如林安危成敗何殊此付與閒人為討尋星布重重陣脚深不須輕敵事相侵渡河雖藉竒兵勢對壘難知老將心酬酢巨杯宜燕席消磨永日稱山林呼盧格五前賢有莫笑年來共講尋送楊聖愈口中赴益倅畫轅曾記到西州莫為題輿厭滯畱官況優如支郡樂風光渾似昔年游日無餘事知閒暇時有清呤競唱酬政績易成恩典在天涯不覺兩經秋寓意夕陽芳草自天涯倦客何須感物華無計可能逃世網有心剛欲慕詩家將烹誰惜能鳴鴈安足翻成強畫蛇白髪漸多瞳漸翳少年相見莫揄揶秋郊西風蕭瑟動年華村望猶將景物誇山色半隨雲勢斷浮光多被竹隂遮社前歸興雙飛燕雨後新聲幾處蛙萬里橋南亦如此十分有意在農家寄唐君益秋日晴如春日遲山間水際盡光輝江湖頓減騷人詠父老爭誇太守歸歲晩莫驚松易葉時來又見錦為衣門前行馬雖崇竣應許衰翁一叩扉淨徳集巻三十五
