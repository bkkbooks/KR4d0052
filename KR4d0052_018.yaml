body:
  text: 淨德集卷十八宋吕陶撰論文武舉大略論古之人制為君臣之分者不獨全人主之尊而巳勢必相須義必相濟所以經綸天下國家而措斯民于治安之域也故比以元首股肱耳目腹心之象明其同心合體而成功立事此萬世不易之道矣然而天下治亂不常苟值創始造端之勢則其君臣之際為力難易又可知矣夫非上之任下者得其道下之事上者盡其能則天下之務孰能應之哉韙乎髙祖之經營羣臣之際會也可謂上任之得其道下事之盡其能也方秦之衰天下惴惴困于暴刻之餘而求其所以息肩之地是故以布衣之資一劒之任始終五載遂成帝業鼎祚之安傳至二百餘年而始危者豈獨髙祖之材能所致哉蓋亦一時之賢傑有以先後左右而勳業始完也班固之論曰任蕭曹之文用良平之謀騁陸酈之辨制叔孫通之儀文武相配大略舉焉盡之矣夫庶事草創而天下之法度不立則何以維持民心哉此蕭曹之文必任而寬厚清靜所以率下也四方多難而天下之勢易動則何以保于全安哉此良平之智必用而出竒決勝所以中于機會也干慮則智有時而窮此酈陸之辨所以必騁而開説于後也連衽而起被衮南嚮而接之則人未之服此叔孫通之儀所以必制而示朝廷之禮也此四者皆聖人所以經營天下而守之之先務而髙帝能之則大略已舉大功巳成乃其驗也議者以為知人善任使而史臣亦言其規模宏逺信不妄矣張馮近王道論聖人之所謂至公者情無所狗而已故朝廷之事君子有以一言而正之者蓋體于至公也體聖人之公出君子之言而朝廷之事得其正推此心加于天下乃至治之道矣求之于古人而見于張季馮公矣質之以六經之義而合于洪範之皇極矣夫洪範之皇極蓋統九疇之中而立為之法以為人君大用中道以範四海不可過之而不可不及也故其説曰無偏無黨王道蕩蕩又曰無黨無偏王道平平且天下之治莫尚王道而王道之説惟戒于黨偏則王道豈有他乎一本于至公而已也以至公為言而適于正則君子何慊于王道哉犯蹕之罪文帝欲誅之釋之請以贖論為之言曰法者天下公共廷尉天下之平用法一傾則民無所錯既而獲從其請文帝引李齊之事思得良將馮唐為之言曰雖有頗牧亦不能用以發上意而辨魏尚之非罪帝悟其説復以尚守雲中夫釋之非私于犯蹕也蓋能執法持平而不奪于人君之勢也馮唐非私于魏尚也蓋惜有功見廢而明于任將之術也以釋之守法之心措諸天下則獄訟有不平乎以馮唐論將之心措諸天下則賞罰有不當乎求之王道誠近之已此太史公所以深嘉而屢歎也後之議者謂天子之吏猶不可失平而天子之身安可以失則釋之之言未探本矣文帝能信亞夫之能軍何至不用頗牧則馮唐之論為有激矣豈有責偹賢者之意哉然厯觀漢之名臣言切于事而會合經訓如二者鮮矣書曰皇極之敷言是訓是行以近天子之光其張馮之謂歟賈山與路溫舒同傳論自春秋之法絶筆于獲麟之一句而褒貶重輕之義進退是非之訓卒不可得而復見耶其大權大法幽深隱奧則不可得而見矣其祖述聖人之緒餘而立為一家之學裁成義例以示後世庶幾得其髣佛者猶可見焉遷固之史是也馬遷始改編年之舊而為紀傳之書以帝王繼統而謂之紀以公侯傳國而謂之世家以卿大夫列位而為之傳而善惡褒貶之意寓于其中其為功亦勤矣至班固則又繼其法而成一代之史夫二百年間天下國家君臣事物之變可謂廣且多矣以八十萬字之文可勝載耶向非裁之以義例則錯亂糅雜而莫能究其體要知其統類烏足以稱為良史哉故紀言其略而傳載其詳而傳之先後抑有義焉以功之大小而次之則韓彭之後當繼之以衛霍也以人之賢愚而次之則蕭曹之後當繼之以丙魏也而世之逺近殊不接矣亦非記事之體也故傳之所次服虔謂不以功之大小人之賢愚惟以時之先後而顔師古亦曰又以事類相從夫時之先後相繼而事之義類相從則一時之本末衆人之是非舉其端而可以推之矣賈山之至言皆借秦以為喻路溫舒之抗疏則亦曰秦有十失其一尚存治獄之吏是也二人之志皆指明秦氏之亂亡以劘切世主而欲其除煩救弊豈非事類之一耶傳而同之不為失矣不獨此而已也欲觀其變詐之迹則見於張耳陳餘欲觀其開陳治亂之道則見于徐樂嚴安欲觀禦邉之䇿則見于賈捐之嚴助欲觀撫民之要則見于龔遂召信臣凡為此者皆類而從之之謂也師古之言槩舉一二以明之信乎固之稱良史也湯周福祚如何論甚矣天道之難言也六經之説有曰皇天無親惟德是輔又曰作善降之百祥作不善降之百殃又曰積善之家必有餘慶積不善之家必有餘殃此儒者守之以為定論而謂其可必也豫考以人事而實其福善禍淫之説則亦未必皆然蓋昔者司馬遷以為伯夷叔齊以義諌周食薇而死顔回無遷怒二過之失孔子美其好學而亦夭喪盜跖恣行暴虐殺千人反以壽終天之報施善人信何如哉此史遷疑而未辨學者嘗惑矣至于班固評張湯杜周之子孫則又可疑焉固之言曰張湯杜周並起文墨小吏列于酷吏皆有良子德器自過爵位尊顯繼世立朝相與提衡至于建武杜氏爵乃獨絶迹其福祚元功儒林之後莫能及也夫蕭何曹參之才張良陳平之智與髙祖經營天下措之乂安要其所以興利除害功濟斯民蓋亦深也韋賢貢禹之學匡衡薛宣之能其輔導時君有補于治蓋亦多也而其後子孫或數十年而世絶或一冉傳而國除彼持法刻深者乃享祚悠長有至建武而後絶者豈報施之理不得而知之歟竊嘗思之顔子死孔子謂之不幸夫以德而夭聖人以為不幸則德而壽者出于幸而已使天之禍福家至而人論之則審無可疑而聖人亦不以幸不幸為之説而乃遍覆包含于九州之內外為善于此者未必蒙祐于彼履惡于下者未必獲咎于上則難以一人之報施而言天矣以聖人幸不幸之説而求其福善禍淫之應則天與人兩不相廢而教存于中夫又何疑焉且于公之善聽其髙門以自顯豈幸哉丙吉之隂德則傳子而不侯蓋不幸矣湯周之福祚抑可明于斯也教論因人之所能而導之不強人之所未能而使之自至則天下皆知為善之易而不苦其難吾之教亦不勞而成也人之所能者素有于內也其所未能者擴于外而後得也施其素有于內者則用力固少矣而又擴之于外則何行而不健何求而不遂乎抉瞽者之目而授以離婁之任提聾者之耳而訓以師曠之技彼自知其資之不可為也雖早夜諄諄語之安肯信其説而從哉御不失其步驟射不失其容止而告之曰久而不已則五節五善可以具焉其人必有激昻自進之心而無恐縮不敢之意何則其資可為而無所憚也及其久而不巳則所謂五節五善者亦庶幾矣忠信廉孝者天下之人皆目之曰善行而欲行之也或告之曰如比干乃謂之忠如尾生乃謂之信如伯夷乃謂之廉如虞舜乃謂之孝則其心莫不畏其不可及而自惰焉倘告之人不欺于人足以為忠不食其言足以為信不苟于得足以為廉不悖其親足以為孝則孰不欣然而願行之行之而不己安知其不盡夫所謂忠信廉孝之道哉古之聖人察夫人情而知其資之可為而慮其心之畏不可以及是故為之教也不過其端不咈其欲充其所有致其所無引之以至易要之以至難昔孔子之門人弟子皆賢明才哲可謂造乎道者然其問答之語多切身近情而無髙逺難知勤苦難行之事是故以敬飬為孝以言動視聽不涉非禮為仁以敬鬼神而逺之為智以先行其言而後從為君子凡為此説者欲人為善之易及後世道喪而教衰人持異論而失其本統以告子之賢而猶有杞栁杯棬之喻謂仁義戕賊其性陳仲子許行之徒則又叛禮義之中立苟難之行以惑世噫斯言也斯行也無乃室天下之善心而為仁義之禍歟故孟子之教皆先乎人之可為者後乎人之畏其不可及者先乎可為者蓋因人之所能而導之也後乎畏其不可及者蓋不強人以所未能而使之自至也且其言曰四端猶四體也苟能充之足以保四海如是則有惻隱之心者可以為仁仁之至則不止于惻隱也有羞惡之心者可以為義義之至則不止于羞惡也又曰徐行後長者謂之悌堯舜之道孝弟而已又曰雞鳴而起孳孳為善者舜之徒也夫惟徐行後長者雞鳴而為善皆衆人之所不憚而其歸乃至于堯舜凡為此説者所謂引之以至易要之以至難也人之所未能者可以自至夫然後知孟子之深于教也學論上治天下有大分大分定則天下不勞而治矣古之聖人立為名教者蓋道德仁義之施設所以齊一生民而維持萬世與天地日月相為終始而無窮已也天地之位有髙卑日月之行有明晦此物理之大别也是故有貴則有賤有上則有下有長則有幼有大則有小有內則有外有近則有逺有重則有輕有親則有疏有貧則有富有隆則有殺有衆則有寡有強則有弱有本則有末有先則有後有恩則有威有刑則有當有善則有惡有是則有非有愛則有惡有剛則有柔有寬則有猛有用則有舍有行則有止有治則有亂有興則有廢有福則有禍有生則有殺有與則有取有屈則有伸有寵則有辱凡如此者蓋天下之理勢可以俱有而不偏立也為父主于義為母主于慈為兄主于友為弟主于恭為君主于明為臣主于忠夫婦有别長幼有序朋友有信是亦不可一日忘也仁也者以愛而濟此者也義也者以宜而裁此者也禮也者以體而履此者也智也者以明而知此者也信也者以誠而任此者也堯以是首二帝之德舜以是致無為之功禹湯文武以是隆三代之治皋夔稷契伊尹周公以是輔導其主綏靖其民揭而為法度如日星之明不可得而差也施而為教化如江海之流不可得而竭也是故傳世數十纍年纍百雖其子孫僅可承而守之猶足以保天下何則大分定故也名教存故也詩者咏歌此以美刺于上也書者謀議此以號令于下也春秋者嚴其體使民畏此而不敢犯也易者神其用使民由此而不得知也六合之外聖人不言千古之上聖人不取其不言不取者非不知也為其不足以明大分著明教也甚矣學者之蔽且惑也舍乎邇而求諸逺也違乎明而趣諸幽也指有以言無也借虗而論實也三光五曜燦然目前曽莫之見及其蒙冥邃黑則熟視四方而欲辨合散之理寧非欺吾哉四通八逹坦然易履則莫之行而乃冒險阻涉危隘或奔崖谷或穿林莾終日踽踽求以適夫大道蓋亦迂矣胡不以名教大分為之宗主耶彼名教大分者蓋與天地日月相終始而無窮已也雖能廢之名教大分廢則三才壞滅生民不為禽獸者幾希矣學者之力既不能毁天地日月又烏能廢名教絶大分哉徒見其嘵嘵于天下而滋聾瞽之惑也且天下之事有可以力奪者有不可奪以力者有可以勢驅者有不可驅以勢者有可以法齊者有不可齊以法者凡出于迹者上之人可奪以力也可驅以勢也可齊以法也凡藏于心者雖其力與勢可以死生禍福于人而不可奪我之有驅我之從況能以法齊我哉是故君子可蹈白刃而不離中庸也忠臣可趣鼎鑊而不可忘大節也昔者道之不幸無如暴秦焚燒詩書坑殺學士挾書抵禁偶語棄市其勢與力固足以勝天下矣其為法以破毁聖人之道亦已至矣道果從而喪乎及漢之興六經百氏之書翕然雜出遍滿天下老生碩學接武于朝文章法度一日振起議者謂其與三代同風然則秦之法固不能繩學者亦甚明矣道不可喪教不可廢故也由是而言則天下之學安可齊之以法而必使從爾所好哉學論下天下之學而可齊以法固無有也學之興廢繫乎時之好惡則有焉昔者春秋為經一而傳者三師徒異論父子異説世主惑于其間天下從而取舍是以武帝好公羊則穀梁廢宣帝置榖梁則公羊亦詘左氏之書乃不為世用及劉歆鄭衆賈逵陳元輩辨析是非折以中道然後三家之學並行于漢而傳習至今不絶方其舍而不用與其取而立之時一時之好惡耳未能破碎大道敗壞風化也今則不然六經之舊説先儒之所講解多士之所宗師朝廷之所崇信凡立于學官者一切擯棄以為無取而乃獨伸一已之私見力毁萬世之公議一夫倡于前百夫和于後百夫倡于前萬夫隨而和之雖亦出于世俗之好惡耳而于大道有破碎于風化有敗壞此君子之所深憂也夫易者生于數而成于變化聖人所以盡三才之理也其吉凶禍福進退得失之塗其安危治亂否泰消長之勢其隱則造于幾徵之先其顯則立于神用之表烏可以七八九六之數言哉是故劉牧以數解不若輔嗣以用説也詩者出于性情因人之善惡而形之言也日月星辰風雨雲雷霜露山川草木鳥獸蟲魚衣服器用或目之所觸或意之所寓苟可藉之以為言而諭人者莫不備有方其為言也何睱考合于名數制度而後言哉是故康成以禮求不若毛公以意得也然則易以數解詩以禮求猶不能知其旨而況以字説乎字之大本莫過六書引而伸之觸類以長而天下之字盡在是矣一字不足以言事物之義則至于數字數字不足則至于百十又不足則至于千萬句字者所以成文文者所以言義安有一字而能言事物之義者且字有體也有用也今夫以健言乾以順言坤以止言艮以動言震以入言巽以麗言離以險言坎以説言兑則可也凡可以一字之測皆其體也至何從而為乾何省而為坤則一卦之用六位之變固未之盡況乎造化之餘藴神明之妙用而欲釋以一字是猶以尋丈之竿而測滄海也成功告神謂之訟立政埀法謂之雅繫其國俗謂之風指物明事謂之比取譬申義謂之興兼總辭體之用丁寧反覆務盡其情而不厭一篇之中屢致意焉謂之賦故桑柔之作凡十六章閟宫之一章凡三十八句如此者安可以一字為解乎昔人説堯典數字之文至數十萬言班固以為癖儒之患蓋破碎大道學者深蔽今乃區區求考于點畫從省之間則破碎又甚于曰若稽古之説也且上所好惡風化治亂由乎此出昔晉之公卿徇其宗尚終日馳騁于沖寂虗曠之域若乘輕舟以適江湖泛泛然自得而忘歸其于天下國家之實不一語及焉其視生民蓋亦爾我而已故姦雄伺隙而起則無術以救終之覆亡壞滅流禍數世迹其由求蓋王衍王導輩為罪之倡今之解經者不以莊則以列不以佛則以老浩乎其無涯冥乎其無心指鬼神之情狀以言乎分義推有無之體用以及乎政教三綱五常之所先君子之所取以守人倫之所恃以安一切置而不議曠日持久則安危治亂之任其誰尸之西晉之風將復見矣此君子所以深憂而不能已也安得循理知變之士與之言學哉淨德集卷十八
