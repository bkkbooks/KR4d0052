body:
  text: 淨德集卷二十五宋吕陶撰墓志銘著作佐郎李府君墓志銘祕書省著作佐郎知眉州丹稜縣事李君熙寧乙卯嵗四月某日卒于官享年四十有幾元豐乙丑嵗某月某日葬于晉原縣某鄉某里從先塋也君諱逢字承之唐安人曾祖勤祖圜考平皆晦德不仕君為兒童時超然有志氣憤其家世不耀願學以起之資頴力勤居數嵗遂能博強下筆為文辭雅有理趣流輩畏伏搢紳先生褒譽之里人度支郎閻公仲孚以道德自任名重一時於後進少許與每稱君才嘉祐二年擢進士第授陵州仁夀縣尉捕強冦獲七人于格當遷官太守趙公敏達亦以功賞諭之君謂子弟曰士君子進退通塞固有義命吾將遷乎雖不戮此孰禦之將不遷如命何藉七人之死以幸進不忍為也乃削去強迹皆可不死獄具趙公愕然問之以前説對公嘉其識量且曰餘慶之報遠矣再調歸州司理參軍商人有撑舟夜泛以避關征者津吏彎弓警之誤中輒死羣欲以故殺論君持論不可乃請于朝卒從輕罪徙利州綿谷縣令改某軍節度推官知遂寧縣是時轉運使急功利不復恤困窮小人好承迎議置鎮市稅局以圗羡入主者委君按視鋭意必行君以為村落細民間日而集有無相易苟營朝晡之費一旦設官置局限其稅課則瘡痍何時而愈理不當置主者雖不悅亦不敢行嵗時以薦格改秩得知丹稜束館僧持悔過懺罪之説率其徒早夜講佛書聽者踰百數浮士造飛語指為妖訛以亂上之人聰明且以媒進提點刑獄者信其言移文委君急捕連逮坐繫者將衆人情大駭君曰此豈有巨惡不過以其教誘民而從者偶多爾安足深咎遂寬其獄蒙宥頗衆縣郊多棄水散漫流溢君命引以溉鄰田之荒易瘠而腴凡數百頃初母畢氏既亡君晝夜哭不已遂夢焉乃思所夢而刻之以木形色肖類終身奉事不敢懈鄉閭稱之尤善篆𨽻知書者以為自成一家之法嗚呼君少力學有文聞譽彰者時既從政又能不忍削民以媚權勢其治獄務求之生有古仁厚之風矣而用不適于顯享不及于耆良可悲夫娶楊氏男六人騤未仕驤陵井監司理參軍騏嘗得試禮部駿卭州臨卭縣令騊知漢州綿竹縣侁舉進士女二人嫁楊籍費霖皆進士也孫男九人孫女十二人並幼銘曰古人治獄多隂德子孫當有顯者于公之報明矣君不忍以七人之命易一官津吏得不死東館之岡無所寃視古人何愧哉諸子森然有美才可以光大迹其慶驗又非若湯周福祚之幸也秭歸縣令李君墓志銘西南士大夫言善教子者以李君希聖為先希聖有五子學者四方五六嵗時即使誦詩書日須數百字雖携抱玩戲不以他習眩其耳目稍長不復出戶外至于飲食動止一語一笑皆不離文字間凡風俗遨遊奔集之盛如燈夕藥市者去其居不遠未嘗聞知也早夜訓飭月考嵗練積之數稔術業用成慎修年十六慎交十四乃能以辭重求舉同時擢第皇祐初慎微亦中科甲其後君又繼之此所以見稱於士大夫而謂之善教也君諱慎思字敬中於諸子為季孩提而孤聞先君之餘訓抗志勵學欲與諸兄相上下探索研味實詣有餘華藻煥發能就楷度既中第調遂州小溪主簿遷青石尉部使郡守知其才屢委以事裁宜處正咸適其意交章慰薦惟恐在後未幾移歸州秭歸縣令縣僻民野舉不知法禁君治以誠視之如一家期會聽決諄諄戒諭雖極冗微悉使曉信新灘在境內官舟饋運間有毁溺皇祐中使者建議鐫崖拓江以紆湍怒嵗役萬夫芻薪數十萬三邑之民困于費不能已君以為灘雖險暴惟春冬之交水涸石露厄于沿泝方是時灘之上下官舟畏而不進者倘易陸載而往則皆可遠險兩獲其利當塗行其説乃罷修灘之役歸人深德之嵗滿代還父老涕泣惜其去薦者如格吏部以課最上嘉祐八年當陛見泛江而東七月二十四日次雲安軍感疾遂不起享年三十有八君資稟樂易力學有美名與人交多風議朋友愛之既仕不廢書好易春秋每多論述著治策五十篇講明世務欲獻之朝庶奉大對卒不伸其志按君之先京兆萬年人自唐廣明西狩時有為晉原令者留居溫江後遷于郫晉原四世生承粲承粲生洪慶洪慶生章甫乃君考字希聖也以長子故贈中大夫妣文氏贈仙源縣君君娶張氏治家訓子動有準的子五人紹卿彥卿某晉卿皆舉進士旦緝嘗薦于鄉二女適范祖修張寅君沒十九年未葬諸子待祿以祀而未能也乃以元豐七年二月庚午朔葬于新津縣修覺山依仁鄉曷伏里然則未葬而有待者出于義而待而葬之者禮也鳴呼君少而學壯而仕策發磨勵所志者遠去為古人今則久矣此可悲也豫與君皆皇祐四年進士成都同籍凡十一人三十年間存三人焉榮謝合離不常如此此又可悲也世之人有以錙銖得喪或競于秋毫之未而不究其終者豈知覆載為逆旅而吾遊其間哉所以遺生齊物之論起而覺其未喻也銘曰有文矣藻繪其傳不發之危言有位矣撫字而安不尸之大權天嗇以年志莫究宣巨山崇原卜云新阡墓松森然人知其賢李太博墓志銘君諱彤字周伯姓李氏其先京兆人八世祖遠從唐僖宗幸蜀調晉原令因家焉高祖臻仕孟氏朝為永平軍節度推官曾祖某亦任太子司議郎祖某不願仕父某以君登朝贈大理寺丞母黎氏贈成都縣太君君少篤學頗頴秀時鄉先生職方員外郎張公中行守嶽陽君往就正得易與春秋大旨朋友畏其博聞又嘗托前世忠邪事以類相從為史斷十二篇以監治亂慶厯六年中進士第調眉州青神尉言者謂蜀人官近鄉非所宜於是近皆徙遠移萬州司理參軍嵗滿用陟狀遷江陵府松滋令丁寺丞君憂終喪授隴州判官吏部上其課轉著作佐郎知太原府平晉縣今天子踐阼改祕書丞尋遷太常博士知華州鄭縣以疾分司西京卒于盩庢之寓止享年五十四實熙寧五年春二月某日也既沒七年貧不克葬至元豐元年三月某日乃葬于某鄉某里先隴之次君強明喜節亷自處素高待交遊如少所與然不廢於義休戚可以同於政事知大略而未嘗以忿恚任刑聽斷適其理大率剛而不撓恥為流俗態度也在萬州有箠人之脈者提點刑獄視之疑且怒欲以骨折論太守畏不敢辨君提傷者以告曰折則上下不相屬今舉其上而下不少曲非折明矣使者無以勝卒輕之又有三人謀殺一人者君方攝督郵當議法即白守曰一人死安可戮三人坐謀首可也守不聽有詬責言君持之益堅請於提點刑獄且曰某寧解印綬去安忍妄殺人求順太守意耶得聞之朝止報一人萬州帑失緡錢數千萬俾君驗之君以為貫朽鐡壞不知幾十載一旦指為盜疑或刻深請飭吏共償無煩搆獄守從之免數輩刑竄松滋産茗嵗輸府千斤春未社牧遣校至督所有君曰今未知茗之芽否可偕往視即斸根株俾校持以歸願牧植之後園俟其芽可責輸矣牧始不懌既而從之植者既芽則謂同僚曰李松滋以芽為期今可取乎校復至具言君乃戒茗戶以五日集如其令無一毫私撓民深德之有宿寇數十結山民聚境上往往害捕吏纍嵗莫獲君開以威信許其歸首乃至無盜功當賞君不言賞亦不及隴之汧源號難治凡閲嵗定籍則吏民相因為姦厯十數年官不敢輒易其舊君權涖未幾遂定籍高下適當人伏其平平晉民冒居公地而縣𨽻為輸租緣此以斂剝習久縱不問君使冒者自陳盡得其實免代輸之患又嘗為增隄以捍汾流以軍事未報君已解去既而大水一城蕩然識者稱其先見鄭縣之西舊以石隄水過守居洎他官池圃以及富強治榭君始來方諭民得取以溉水既不至為總管者謾其詞移檄於縣覬水以禦火符下凡四五君悉不應時都官員外郎郭君源明以方靜為州君具白所以然信之民甚賴其利洎引疾而去有恤君之貧者告曰願一曰留則終月祿入可享乃笑而謝之即日不視事君先娶包氏在萬州時遇君之疾以憂卒再娶郭氏封夀安縣君包氏生子覲孝友力學自二曲護喪歸葬靈泉不違治命長女適瀘州司戶文朝光郭氏生子規治經力學從舉薦於鄉必能世其家次女適鄉貢進士李葆光二孫曰皓曰晏嗚呼君平生施為如此剛矣哉苟遭時得志盡發胸中藴則軒騰馳驟立事致功卓然有竒節可必也惜乎仁不顯而見於用者止此耳豫少從君遊洎官晉陽又與之同竊思仲尼未見剛者之説信剛者之難見愛君氣節舊矣覲來請銘敢為銘曰剛近於仁亦鮮克舉剛生於氣充則孰禦申棖徇欲義所不取孟子養浩以是為主家山之東喬松之塢嗚呼剛者李君之墓光祿寺丞致仕何君墓志銘何氏之先蓋晉之卿佐封于韓者子孫因以為氏秦滅韓其後流散四方或謂韓為何故漢魏以來始著何氏有居于閩者至瓚乃顯即君六世祖也仕後唐厯太原留守除西川副使會孟氏僭竊耻屈其下飲恨死其子柔不能東乃家青城遂為青城人柔生令昕令昕生繕不幸逢亂離無復振起繕生中即君考也任道晦處無意官祿以聚書為能以賦詩為樂蜀之耆儒李畋渭卿戈淵仲顔皆與之友子四人君其季也諱敏字希顔簡慤莊重克承厥家貧而能力生以養親奉祀至于撫養百口靡有不給富而能好善以訓其子孫至于起家從仕翹然有聞旁攴外屬之無歸則倍仰而濟鄉閭識者以吉人君子稱焉熙寧初今天子祀南郊以君之子大章登朝封大理評事四年明堂大饗遷光祿寺丞六年十一月某日終于家享年七十二八年十月某日葬于縣之某鄉某里君娶李氏今封仁夀縣君生三子大章皇祐四年中進士第五遷太常博士通判漢州大臨某皆飭行不墜先訓孫四人宗元榮州榮德縣令宗範合州巴川縣令某某悉志于學期以自立惟何氏蜀來中葉不耀至博士君始以學文德祿而榮德巴川二君又能同時取科第士議榮之君可謂有後矣某與博士君同進士籍且為姻家君之葬也敢志而銘銘曰何遷于岷五世至君既永以年再光以恩山之阿江之濆祗厥祀傳後昆奉議郎何君墓志銘余嘗銘光祿寺丞岷山何公之墓考論世次及其里居詳矣君乃光祿仲子也諱大臨字才叔少讀書知名教以修潔治身以恭願事親鄉黨以善稱閨門以孝聞通詩騷之學倣約大致作為篇章適情寓物平暢純淡有昔人風格或告以釋氏之説當虔敬崇奉乃享令報則曰廣慈心即佛不妄語即經若乃禍福之應惟修其在我者而順以聽命吾知此而已晚從道家之教信尚清寂求以養心治氣歸之虛靜故能委置世紛無競于物漠然自得有方外之趣尤長于教子擇師取友必以賢飭勵以經術欲其慎行而寡過誘掖以辭章欲其資身而得祿凡朝夕所肄習而謂之課試者每與之講解切劘不倦若朋友然由是起家中第孟仲接武西南士大夫舉義方之訓皆推君為先君娶倪氏纍封安仁縣君卒十年矣子五人宗範朝散郎眉州教授宗奭早亡宗誨以學求舉宗韓資州磐石縣令宗哲果州相如縣尉孫男十二人元豐三年神宗祀明堂封君承事郎其後五遷至奉議郎宗範又嘗得五品服請以賜君不著于令詔特可之議者以為榮君享年六十三元祐五年三月十五日卒于家八年正月四日葬于青城縣之懷仁鄉赤木里先塋之北初倪氏之葬也君為夀冢其旁弔以詩曰我來同穴知何日石火光中更十年已而其言驗嗟夫始終生死之變豈偶然哉銘曰每讀五代忠義傳至明宗命何瓚入蜀制孟知祥事未嘗不廢卷而嘆也夫以明宗區區暌弱之唐任一何瓚而欲禦權強僭叛之蜀豈不難哉瓚意不屈繼以死何其易也自瓚至君六世而子孫之盛如此究觀前人之大節推驗後嗣之吉報則福祿之來抑有由矣淨德集卷二十五
