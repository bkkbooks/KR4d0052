body:
  text: 淨德集卷三十七宋吕陶撰七言律詩戢武堂書事和韻永日華堂靜掩扉道膄深味敵珍肥一軒有景詩求勝十邑無塵冦懾威雅性自髙間去樂泛交難合信來稀誦君清句知君意秪任天真不任機和董奉議喜雨需雲草澤為時來間作雄風鼓迅雷信有威靈周闔境應無偏黨限枯荄滿山和氣卷舒易原注六月壬申辰刻客有登清風閣者見白崖煙霧如練勝空而起疑其欲雨午間果大霈詢之里人云孚惠行雨先有雲氣起於廟上一夜豐年消息回愆亢霖霪皆吏責幸慿神力庇凡材提舉道祖監丞愛靈隱泉之景因廣其地可置坐席賦詩見貺極有雅味次韻奉謝巘溜涓涓在目前更開餘地助賔筵方池可鑑無深淺樽酒相逢有聖賢每為野情貪勝槩暫慿清味滌塵緣何時學得琴書趣一寫林間石上泉登兜率寺閣次薛道祖韻乘間極望興悠哉遠眼宜於此處開危磴直穿修竹徑虛窗深占白雲堆江湖有景侵平野棟宇何年倚巨材自是登髙乃能賦誰嗟古往與今來道祖訪趙太賔舊居惜其荒毁慨然賦詩有懷賢念往之深意次韻經濟書成祕書收依然蓬蓽在巖丘淒涼往事慵開卷想像髙風合倚樓山色無言終日見泉聲有恨為誰留懷賢訪古間中味宜與詩人作勝遊道祖示及遠祖師像及唱和佳什次韻山深縣古蜀江濵往哲聲華尚未湮物外低昻應絶品榜間廋硬亦通神名稱三鳯古為瑞書作二家今有人首唱繼酬皆盛事通泉從此識陽春清風閣晚景晚際間將景物看郡人休笑苦慿闌逺山露色知晨霽素月籠光報夜寒野燒順風穿絶頂漁舟隨浪轉長灘故鄉回首七百里歸去不辭行路難伏承原伯安撫侍郎為江雨所阻未即會見遠寄雅章深敘勤眷次韻奉答憑髙日日望交遊方寸飄如一葉舟文酒相從期賦詠江山何事尚遲留洲中橘熟輝晴晝原注潭有橘洲潭上花繁送暮秋原注鄧有菊洲南路士民應有語旌麾早晚到吾州和寄景仁致政侍郎文章道德冇源流進退瀟然信自由身在禁林方倚望年侵老景便歸休素雲收雨還層岫徑柏凌霜茂晚秋何日家山縱吟賞間中情味更優遊榴花十分紅色占亭臺不恨春風不許開摺疊染成隨日麗芳菲過後為時來賦詩多是題千葉釀酒誰能飲百杯翠蕚丹鬚無計學佳人屢把絳紗裁殘葉和韻秋光何事易陵侵不許芳條展茂隂曉色向風生别意夜聲隨雨入愁吟已嗟禽鳥幽棲淺漸失園林幾處深榮謝循環都物理肯將零落動豫心和禮部孔經甫齋宫三首試思離合數光隂日月消磨世纍侵晚嵗心懷如止水舊交情分敵兼金相從不厭春壇逺共語誰知夜漏深頻閲來書諭勤意愧無青玉報璆琳讀書到老應成癖了事他人莫笑癡敲印舊曹煩夜直看花新句感春熙已聞騏驥騰千里應許鷦鷯附一枝薦牘屢交虛席久塤篪應喜共君吹嘗馳别乘走龍沙過盡春寒始到家已置功名如外物只慿詩酒作生涯回頭忽上青雲路洗眼重看紫禁花百日絲綸君定掌文章從此燦朝霞瑞聖園齋宫花鑰重開不禁闌眼前芳景未凋殘仙花笑日欲爭媚禁栁受風疑怯寒詩興似春多麗藻齋心如水自澄瀾慿君賦盡園中景免向綃圖指點看致齋北園因記舊遊書呈經甫齋館深沈舊苑開嘗從祀事偶參陪故人已步青雲去倦客還尋紫陌來清景暫從塵慮滌流年長恨物華催唱酬不講詩情懶獨對風光疆剪裁與臺中同飲答諫院王明叟休沐無多欵聚難暫留佳客解朝冠蝦頭泛酒樽前樂麈尾生風席上寒陪集敢誇言路盛詼諧漸覺醉鄉寬敲門又報青蒲信捧得新詩似執桓冉和溫風一袖己董然燕坐何須更整冠沈李杯盤聊避暑飲冰懷抱暫生寒縱談無間情相照清句難酬韻不寬莫笑未曛車馬散嘗聞陳仲諷齊桓同文館諸君遊金明池春風拂拂動輕隂四望歡聲雜雅音人在華胥無限樂路經蓬島幾重深潛鱗可羡遊靈沼巧舌時聞轉上林况有賜樽堪一醉百愁從此定消沈和觀瑞聖宫殿有感屬車何日泛塵清舊苑沈沈隔禁城别殿未聞天蹕嚮華封常聽寶鸞聲禽魚欲遂靈臺樂燕雀終期大厦成敢告冬官舉常職莫將池籞等間輕次韻藝叟燕瓊林苑御水休論九曲池宫花爭發萬年枝長虹駕浪人間去大翼乘風海際垂原注大翼巨舟之異名事見文選均被上恩容燕集共憐嘉景事遊嬉願公早獻金明賦紀述吾朝全盛時和藝叟左司被資治通鑑之賜感事賦詩廟席詞林一二臣校讎選述體惟均聖心欲以古為鑑史法有如王次春神武略中書事類原注仁宗嘗撰神武祕略凡軍政兵機之事靡不該載此書亦紀將帥之方略其一端殆相類近天和覽後得名新原注太宗嘗詔近臣撲天和殿御覽數十卷分門紀事亦此書之比羡君受此傳家寶遺與兒孫似昔人和彥常舍人元夕扈從二首東風將暖不鳴條霽景曈曈薄霧銷五隊繡衣華廣陌一聲天蹕振層霄清塵少拂鸞旗動紫氣長隨鳯蓋飄向晚都人相與語更誇明日似今朝原注次日太皇太后駕出羽衛森然翠輦平仰贍天步出西清月行青道夜如晝春入皇州花滿城三五良辰傳盛觀九重歸路沸歡聲君王已向龍樓望喜奉慈顔酒數行原注是日午漏上御宣德門俟太皇太后回駕觀燈己卯冬至後月律潛萌斗柄移陽和氣象等間知五雲已驗天心順一刻先添日腳遲燕雁待時思北嚮嶺梅乘暖發南枝人人盡冇春臺興料得東風不失期次韻答何爽監簿二首十年勤苦學詩騷擬向篇章運短毫廢井心情傷汲綆沈舟氣象怯驚濤恭謀可法無如杜常侍難攀獨有髙自是土風忘不得南音莫訝楚囚操清才何事愛清呤從古詩人誤此心按劍莫投隨氏寶騎驢難和有虞琴賦成物外雲無著搜到天涯海不深自顧巴詞終鄙俚願從鄰友聼純音穆伯通謫官合陽居常鬱鬱忽見近報必有賢守善待故以詩賀之浪如奔馬葉舟輕畏景炎炎盡室行自處雖無遷客恨相逄誰有故人情年來江上嘆頭白日近樽前覺眼明浣濯塵埃好吟笑春風旦暮入巴城送穆伯通歸成都二首宦遊無著任東西通塞惟將物理齊平日風波方艤棹經年桃李又成蹊塵埃易沒千金劍霄漢誰為數尺梯三驛錦江歸去近知君不厭子規啼欲賦長謠贈别君不勝離緒懶條陳讀書有感舊循吏對酒無悰少故人事往何須嗟蹭蹬時來應是起沈淪石城山下西南望更約瓜期在早春和靜之登樂俗亭亭下寒流碧似天亭邉疏柳尚嬋娟山林隱隱岷峯出江路超超楚峽連對景宛然開畫幅放懷宜此醉金船嗟豫望極終留恨千里濃雲與淡煙子進舍人北歸過衡陽纍曰會話粗釋暌間之念復辱佳章存慰衰朽輒次韻以謝昔年詞掖與君逄今日天涯白髮翁賴有江山供晚景未先蒲桞困西風歸心已適三川外髙論仍倍一笑中深幸未寒交道在非徒清句及衰窮道州何道士相會於途次匆匆告歸余亦北還作詩致遠别之意九疑山色望中青似與湘江展翠屛終日掩關澄俗慮有時開卷讀仙經談端往往該窮逹酒興悠悠混醉醒南去北歸皆惜别更嗟衰鬢尚飄萍王定國北歸過衡陽惠示四詩其聚散憂樂之興盡矣率賡二篇可資笑噱臘寒嘗醉蒲桃酒春霽空搖舴艋船倦客偶來皆失路故人相值似逢仙半生感事驚殘夢兩世知音話宿緣聞説三懷長秀茂子孫才業信家傳壯年馳走太行車晚嵗還家幸有餘進取厚顔嗟鶴髮退藏深計得蝸廬五湖謫去誰收骨千騎歸來尚載旟回首太平堪頌詠聖君勤政式啇閭過合江望安樂觀四十年前會作詩為題山觀有髙碑宦遊奔走過此地情思光隂非昔時北望數峯殊隱隱南飛一舸尚遲遲仙家跬步未能到深愧勞生龍與池原注皇有初有李道士者來京師求觀記得翰林李獻臣文石經陽南仲書集賢邵不疑篆豫嘗以詩美其事謂之三絶碑答季鎮老向家山領一麾安間惟有故人知塵埃是幻勞湔洗水月如流任轉移可笑書空徒咄咄願同舍哺亦熙熙春來景物雖佳麗多謝東風少賦詩次韻吳師益三首從宦故為涉險塗強教人事與心符狂言喋喋真無補虛譽紛紛更不虞世味已如流水薄野情常逐片雲孤聖恩寬裕歸來好免得鄉人笑懦夫謫官誰更恨蹉跎回首浮雲亦幾何雖向士林為覆轍却於言路得餘波當年志氣消磨少晚嵗光隂賦詠多每閲塵編無愧赧此生應不負丘軻珍重良交苦愛忘記存愚陋枉詩章華林才日敷春藻蔀屋今朝得夜光寶鑑未逢猶獻璞俊鋒終在不摧剛淹翔日久雄飛近早嵗才名振玉堂昨日漢公承議見召與二三老友談笑退而為詩少謝勤意六十年前里巷遊北歸重此接朋儔據鞍矍鑠誇朱紱把酒殷勤勸白頭況是三春同對景何妨一笑自忘憂間中嵗月非難遣須仗新詩共唱酬挽吳太君詞寶絡疏封得令名人間慶事屬平生身居夀域幾三世福及兒曹已九卿埋石有文深紀美弔喪多客亦哀榮泉塗一往應無憾十八年前吉冢成七言長律詩答陳彛仲天質疏慵一野夫因從利祿走官途惟知名爵有常履非向塵埃言自殊萬事放懷歸失馬百年過客任踆鳥雪霜毛髮來還近宵漢岐程去已迂凡骨易沉羞許衛短材難斫纍班輸每甘流落為遷客豈免挪揄笑癖儒處落未能醫拙病揲蓍安敢卜亨衢宜將大夢消榮辱肯把虛名計有無顧我拙艱當晚涖惜君留滯却長吁玉工早夜榮圭壁莫使球琳委路隅聞蛩和長句啷啷微呤透綺疏乍令人意少歡娛留連夜景蕭條甚引惹秋聲迤邐殊似向蝸廬頻學嘯恐隨蛙鼓亦吹竽能鳴豈羡蚣蝑股不語堪􅥾蛺蝶鬚賦就情詩感長信驚回仙夢失蒼梧雖知物性何喧寂應念年華却嘆吁從此漸為寒月計憑誰與畫小軒圖西堂忽起東歸興望斷青嵩接緑蕪淨德集卷三十七
