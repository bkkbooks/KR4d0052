body:
  text: 淨徳集巻八宋吕陶撰内外制誡厲諸路監司修舉職事詔朕思古之人君恭已無為而恩之所加者深威之所制者遠群黎百姓莫不悦懐畏服而無一夫不獲者其道非他盖有法度以為治世之具張官置吏奉而行之足以整齊天下而導其徳澤以及于遠近幽深故也今四海之廣判為諸部部有使者以督察郡縣乃為朕行法度而導徳澤者比嵗以來或不勝職以苟且為易簡以解縱為寛裕以懲奸去惡為惨暴以度用均財為刻剥政有先務則置而不問事有中道則違而不循是以賦役不均刑罸不中盗賊不戢疾苦不除其勢駸駸然日趨于偷惰弛廢之餘而不知止朕何望焉元元何頼焉朕夙興夜寐講求治要論議所先詔今數下率從寛厚者盖欲安養生民而躋之富夀爾非謂使汝一切廢事而竊禄傋位也詩不云乎彼其之子不稱其服書曰敬爾有官亂爾有政斯皆士大夫之所習聞也爾其勵志意修職業特凖䋲以肅庶務推仁惠以蘓疲民使四方無咎咨憔悴之嘆而朝廷享太平之福豈不美歟苟蹈前愆必罰無赦吏部郎中制敕文昌六官分董天下之務而吏部最號要劇盖萬官之衆流品有清濁資格有先後法不歸一吏能為奸夫欲銓綜至當而選授之路不失于紛縟則小宰之任安可虛授其人哉以爾具官某學而從政志尚不苟更渉中外風迹可稱擢其規鍳之明處以銓衡之貳昔韋陟以殿整稱職孝本以清慎服人勉蹈前修無忝朕命禮部郎中除吏部員外郎制敕吏員多而待次者衆條目混淆而吏胥得以因縁為姦此選部之公患也故特擇清尚通識之士以助長貳庶㡬銓綜有序而物論平允爾端亮不倚敏於從政出將使指入踐省曹皆有能名效於已試天官之屬宜以才任惟公可以循守法式則吏不能欺惟明可以甄别流品則士皆無憾往惟懋哉以稱朕命吏部侍郎除戸部尚書制敇中臺之建六卿異職别流品精選㧞使人材無遺者天官之事均財用審出納使民力不匱者司徒之責皆朝廷之重寄士大夫行已及物之地也由彼遷此莫非能臣以爾具官某愽識多聞明於世務資忠履信蔚為吏師頃從四户之華總泣三銓之務嚴整稱職如韋陟之賢清愼服人有孝本之譽推其餘藴可畀重權宜邦計之總司庶賢猷之兼濟予有量入為出之法爾其愼詔於他求予有損上益下之心爾其深思於邦本勉從明訓永底茂庸資政殿學士通議大夫知成徳軍李清臣可户部尚書制敕周之制以九賦九貢歛財致用而以九式均節之入有藝極出有度數是以民不告勞而經費無不足此王道之資也今天下大計歸要地官凡盈虚登耗之差髙下輕重之勢必審處而後行其任可謂難矣然特有司之事爾朕擇輔政之舊臣而付之愛民保國之意可見於斯具官某讀聖賢之書而學通今古辨義利之分而行有本末早䝉先帝之遇乆踐禁近之榮謀於廟堂得持綱操轄之體任以蕃屏見承流宣化之勞宜國計之總司庶賢猷之兼濟予有量入為出之法爾其愼詔於他求予有損上益下之心爾其深思於邦本惟敷餘藴以底茂功寳文閣待制權知開封府韓宗道可户部侍郎制敕左右侍從之臣朕待之無間也外則王畿之政以綏乂萬衆内則文昌之貳以總領庶務寄任皆重要之得人具官某才資愽通志尚中正忠良之訓能世其家愷悌之心克施有政滋試猷為之美乆安禁近之聨天邑之繁既踰年而成政地官之副宜分任以責能况此要途盖為舊物爾其體解用裕民之至意量入為出之規勉續前功輔成大計除尸部侍郎制敕周之制以九賦九貢歛財致用而以九式均節之入有極藝出有度數是以民不告勞而經費無不足此王道之資也今天下大計歸於地官凡盈耗登耗之差損益重輕之理必審處而後行則建正立貳可不愼哉具官某忠正出於天資彊明通於世務多藝故能從政知義可以理財故命以小司徒之職俾任其事爾其體節用裕民之意謹量入為出之法輔成大計以稱朕心兵部侍郎除禮部尚書制敕小司馬典五兵之政所以申講國威大宗伯掌三禮之務所以翊成邦化眷惟職任率頼俊良某粹積於中壯行其學式敷遠業乆序禁途以周之九伐治兵有嚴我武以隋之四曹授政無瘝厥官爰取用於賢猷俾進司於國憲夫聲明文物之盛乃風俗教化之原予欲考三代之情文爾其崇本而抑末予欲傋一朝之制作必也引古而騐今勉勵寅清以勤職業給事中除禮部侍郎制敕東臺之制以駮正為任所以慎命令而維紀綱秩宗之貳以禮樂為職所以和邦國而厚風化皆朝廷之髙選士大夫得志行巳之地為官擇人豈虚授乎以爾具官某學該本原行著坊表在侍從之列每善於論思凡政事之行能檢其違失更踐寝乆譽望益隆循名考實故命爾以小宗伯之事夫典章度數因革有不同述作情文議論莫能一惟考古騐今以求損益之當惟體常盡變以傋制作之功庶㡬文物聲明之盛炳然同於三代則儒者能事盖無愧矣端明殿學士知永興軍鄧温伯可兵部尚書制瘝敇中臺之建六卿異職惟大司馬綜五兵之要盖申嚴威制而鎮重國體也擇人以任安可易哉具官某學該本原行有坊表夙敷遠業乆序要途入則制司命於禁中極為儒者之榮遇出則頒教條於閫外雅有循吏之休風其還方伯之符歸領夏官之秩盖推乆次必允公僉爾其以周之九伐訓戎有嚴我武以隋之四曺治事無瘝厥官行乃夙聞副予愼選著作佐郎時彦可集賢校理兵部郎中制敕具官某古之人學而仕也其心豈有所苟哉愽聞強識則發之以文章陳力就列則著之於事業朝廷所以養材任官之術亦本於此是以賢者在位能者在職而天下之務巨細畢舉焉以爾儒林之秀藴積深厚試藝於廷名在第一登踐秘館亦顯厥聞集賢之華遷汝以職司馬之屬付汝以事郎選清矣勉而莅之庶㡬於文於政兼能而两得豈不偉歟除刑部郎中制敕法者公天下之具也而有司用之輕重或出其意豈欽恤明慎之謂哉以爾忠恕之資善燭厥理故命以秋官之屬傳不云乎刑者成也一成而不可變是以君子盡心焉爾能求為君子則庶㡬當罪而無寃民矣左朝請郎喻陟可刑部郎中制敕具官某法者公天下之具有司用之重輕上下或出其意豈欽明慎之謂哉朕憂憫元元之不辜而慎重聼聼訟㫁獄之職盖以此也以爾疏通之才善燭厥理刺察之政頗宜於民惟導宣徳澤而有惠養之功惟循守憲度而無弛廢之患秋官之屬用旌其能傳不云乎刑者成也一成而不可變惟勉之哉庶㡬刑不濫為君子矣惟勉之哉庶㡬刑不濫而民不寃則汝之職業舉矣秘書省校書郎陳師錫可集賢校理工部郎中制敕具官某朝廷設文館以養天下之士俊觀其成材而用之是故郎臺之選往往由此而出則待之之意可謂厚矣以爾多聞愽識守以端荘發為辭章擢在異等言路之獻告册府之紬繹率有聲聞推於搢紳書殿之職起部之官考于公僉肆以命爾所以待之者固厚矣則報之安可薄哉其勉猷為以稱褒任中書舍人遷給事中制敕朝廷之政歸於臺閣而黄門給事總領論駮盖樞機周宻防過舉而從至當也擇人以任允屬俊良具官某操履之修求合道義更踐之乆推髙搢紳潤辭為詔命之光端議乃政事之益宜自西掖遷之𤨏闈兹用所長固非虚授夫代言敷訓之體既有得於文華則封制還敕之能必将見於事業汝惟懋哉秘閣校理試秘書少監王古可起居郎制敕具官某朝廷之用人雖以行實才能為本其遷進之序則途轍各異盖甄别流品而愼重名噐也是故祖宗以來二史之職或以科舉之髙第或以儒館之乆次或學術推于一時或更踐由於要地然後擢而任之國有舊章朕不敢易以爾名臣之後力學自進出將使指入造省闈秘閣之校文卿寺之副貳率有顯譽乆而益彰是用輟從麟閣之逰處以螭拗之位夫能直筆以記傳為信書使朕無過舉而爾得良吏之體則善矣秘書丞吕希純可起居舎人制敕具官某先王之設官愼之至矣大則凝丞輔弼必得正人小則攜僕庶府其惟吉士盖左右前後皆當其位則出入起居罔有不欽而况立於殿陛以記言動則授受之際可非其人乎以爾徳義之訓克承厥家文史之學自進以道儒林推其強愽禮官服其辯論一代之典既有撰述之勞右史之華是為褒擢之漸夫端良之士日侍朕側則庶乎無過舉而有常徳責任之意豈特執筆以記哉益勉猷為以副眷待起居郎姚勔可中書舎人仍賜紫金魚袋制敕二帝三王之制坦明雅奥邈乎不可復也漢之訓辭號為深厚亦足嘉焉有唐之盛間得名儒典司詔誥如蘓李常楊賈許軰皆以大手筆相髙一時至於發明人主之意該切事物之情形於筆端感動天下則陸贄無以加而封敖亦有得焉我思古人極慎兹選考以清議咨於老成以爾具官某性質之美學問之富積于中然後發于外知所重故能有所輕早懐禄仕之情中有山林之興起而復用尤見其實伏蒲以力諫執筆而直書俾代予言必稱其任夫辭以體要為尚庶㡬助風化之純官以侍從為稱不可忘論思之益敬服朕命往惟懋哉監察御史來之邵可殿中侍御史制敕具官某御史以辨邪正維持法度為稱制朝廷以别能否進退群吏為至公二者相濟而上下两得則天下之事何患不治以爾端良之資無所避就言而可行有補于政稍遷以位示旌勸也古之人有歴五院者前史載以為美而後世推以為賢汝惟勉哉以期終譽除殿中侍御史制敕朕嗣位以來開廣言路招致端良之士聼受讜直之言八年於兹忠益多矣慎重其職敢虚授乎比者御史員闕近臣謂爾操立中立宣任兹選朕信其言而命焉其審辨邪正指陳得失使朕又信爾言而濟乎治豈不羙歟尚書吏部郎中莊公岳可鴻臚少卿制敕具官某朕推至誠以待大臣安問其小嫌哉然大臣之事朕則不敢以不嫌為説盖為朕守法度而示天下以至公也夫為大臣而守法度示至公則朝廷之事當無不治矣遠嫌有請可不從歟以爾良於治躬敏於應務刺察之寄屢試四方銓綜之司亦惟乆次屬命相之始以避親為嫌参考故常重違誠懇其易臺郎之任往從卿寺之㳺歆服寵嘉勉修職業皇叔太子右内率府副率叔釗可特授太子右監門率府率制敕具官某朕於宗室不敢以恩廢法凡遷進之序必付之有司而後行所以示至公而防虚授也以爾居寵能戒為善而樂考其嵗月之乆察其行誼之常當懋以官用勵於衆益思祗慎乃稱寵光龍圖閣待制權戸部尚書錢勰可龍圖閣直學士權知開封府制敕夫王畿千里萬衆之所聚而豪宗大姓以權利相市憸民黠吏以巧詐相髙獄訟繁興奸宄竊發政非其人則四方無所法治待其術則朝廷頼以尊必任老成庶諧公議具官某富通儒之學而輔以強敏明當世之務而審於辨裁文陛之㳺每竭忠而慮國地官之職常重本以厚生尚頼賢猷慎司民政是用因河圖之舊職進以美名付天邑之要權續其往效若夫施廣漢之鉤距以屏息攘盗用延篤之寛仁以綏安善良皆汝舊聞何煩多訓服我殊命底於茂庸除節度制敕治兵者天下之至權故列貔貅之士以傋宿衛命帥者朝廷之大事故有斧鉞之賜以示威靈眷内外之所毗惟忠勲之克稱爰申渙命昭諭群工具官某推竒正之學以臨戎持果毅之氣以報國建靈旗而敵愾報克㨗之勞提甲士以環宫畏肅清之令予欲嚴六師之政必先申命於勁臣予欲同四國之藩莫若正名於方伯式舉武安之邦用襃兵要之勲益以爰田衍其真賦允矣寵光之盛壯哉形勢之強於戱軍如羽林盖象天之壁壘國有祈父實為王之爪牙惟威愛適中則士心服惟機權應務則邦體重益堅壮節以副茂庸侍從乞郡制敕左右侍從之臣立朝既乆知朕愛養元元之意願得郡以自試者盖有志於民也宣示寵敷用光其行具官某學知大方行有素守以譽望之顯歴髙位以文藻之懿踐禁垣方資潤色之才亦佇論思之益遽形奏牘懇請州麾宜陞延閣之華往莅丹陽之衆夫古之循吏盖有君子之風儒者在位則能美俗苟以文雅緣節使政平訟理而斯民安其業得非朝廷之美歟西京左藏庫使榮州刺史帶御噐械朱伯材可特授文思使依舊榮州刺史帶御噐械制敕具官某朕郊見天地䝉神祗之休敷為煥渥均被四海愛自親始恩典尤殊故外戚之家有以慶澤陞進者乃法所當與非朝廷之私授也爾於太后之親實為近屬擢遷使秩盖恊彛章其服寵光益思報效皇城使帶御噐械向綽可遥郡刺史制敕具官某朝廷設懋官之法以待羣吏之進重輕髙下曲折必當有至公而無虚授所以嚴沮勸也以爾忠勲之家早易武弁更練庶事恪勤累年歴職於兹城滿嵗則有賞執兵於殿陛解秩則當遷酬此勞能之殊擢以刺察之重益圖報效無忝寵光得功人蕃官六宅使李宗誠制敕具官某古者軍賞不踰時故傳有舎爵䇿勲之禮盖以褒寵功功感勵事氣於事不可緩也爾為朕捍邉能奮勇力鋒鏑之下執俘以獻遷官一等庸報厥功往服恩休益圖報效浄徳集巻八
