body:
  text: 淨德集卷二十六宋吕陶撰墓志銘故光祿寺丞致仕張君墓志銘某年某月甲子張君元老以疾卒于卭州安仁縣之居第享年七十四凡三族之親及其鄉之士大夫聞而哭曰義士死矣今而後吾屬有患難誰其恤里巷之耆叟耋婦與其孤童弱女聞而哭曰仁者亡矣今而後吾家有窘困誰其濟至某年某月甲子將葬于縣之某里則向之哭者又往弔而哭焉君諱某字元老而三蜀之士識與不識皆稱曰元老者愛之也蓋君天稟仁惠而樂於義與人交同其休戚施與不吝以急難告不擇險易必竭誠拯之以貧匱請不間疏密必極力賙之友人黃子山客死合陽子幼且窶寓櫬未還謀於鄉無肯出力者君奔走數百里護其喪歸郡文學張之翰父亡二十載未遑窀穸之事莆陽范還卒於安仁諸孤無託君皆給田使之葬樊氏女大歸父母繼沒貧甚君擇良家子妻之其勇義好施率如此於親屬尤篤愛雖淪沒不忍欺仲父惟一女早失怙恃君撫養勤至為納贅壻分産與之如昆弟或謂在律不然給之田太多君曰吾仲父不幸無子幸而有壻吾與之田奉嵗時血食安忍計多寡哉按君之先居南陽值唐季亂避地入蜀今為臨卭人曾祖某祖某考某皆不仕君娶黃氏生二子長曰某早卒次曰某皇祐中舉進士為天府高第纍遷朝奉郎君以子立朝封大理評事遷光祿寺丞孫男幾人曰某某君少力學善詞章一時名士多師友之晚嵗安閒惟詩酒自適其生平氣節好出於仁義故書其大者以示來世銘曰仁及鄉閭義加朋友懿行之最君安而有儻或得位力行其志擴而充之人䝉其利惜也不逹用於退藏勒銘墓隧顯發幽光著作佐郎致仕宋府君墓志銘宋氏之先居京兆唐僖宗時為屯田郎中隨乘輿入蜀任彭眉二州刺史諱挺者乃君七世祖也卒官葬武陽因家焉其後有五宗次昌殷始遷卭之蒲陽遂為卭大姓昌殷生賢賢生珂珂生皓皓生平即君考也君諱慎交字葆初七嵗失所恃執喪如成人族屬異之既長剛方厚里若少緣飾然有識度不以賤貧榮富動懷無一語及非義談說慷慨厯厯可聽多與名教合其治家有範約而中禮恥徇浮侈之俗其教子有術嚴不傷愛從學者諭以修身礪行效官者勉以急吏緩民其待物甚恕蓋雖有怨不復里人伏其量熙寧元年上親祀昊天以子照登朝封大理評事纍遷光祿寺丞著作佐郎享年七十八十年九月某日卒于成都之别第卜以元豐二年正月戊子葬于依政縣某鄉某里四公山先壠之次君娶李氏封仁夀縣君生四子煒早亡煥舉進士照為屯田員外郎爟嘗貢於鄉孫男十二人也自君之喪屯田君哀毁骨立早夜惟窀穸是謀日月先其吉宅兆貴其安衣衾棺槨悉以度數弔者不冗挽者不譁既祖於庭雖親朋猶有未知者君子謂宋氏之葬得其所以葬初刺史君葬武陽後葬四公至昌殷遷蒲陽則葬升平君常愛四公有佳山水巳而葬焉亦遵平昔之志且不遠其祖也銘曰質直好義犯而不校二者聖賢著以為教君有是德匪習而樂聽言則厲人可法效愛子則嚴納于忠孝族别而五疏矣情好墓析而三異矣祠報四公之岡祖始之兆君歸於斯夙昔所詔期百千年銘此以告長樂馮先生墓志銘蜀之有道君子馮先生諱某字損之其先蓋長樂郡者姓自五代祖儔仕孟氏任眉州司戶參軍卒官因家焉曾祖少連祖承諒父知禮皆為彭山人先生生而聰穎與他兒異才五嵗聞鄰人誦書輒喜稍長遂好學讀五經尤專詩書探深抉奧志其本統泛閲古史百氏該綜得失舉進士不第退而講學誨人每正席橫經演明大旨凡訓傳之殊騁及其膚說則判别是否歸于至當學者多信嚮之往往化而博彊先生常曰學所以治性修身而充吾之所有非特誇論辨要利祿為也能積乎中發而粹乎外則無愧為君子若夫貴賤榮辱通塞險易當以義命委之世俗所謂厄窮憔悴者安足纍吾靈臺是以抗志礪行愈困愈篤口不出柔言目不顧令色不枉己以徇物不違義以求人簞瓢藜藿裕然白首乃貧無諂怨飯疏飲水曲肱而樂之徒歟娶唐氏亡九年矣二子長曰敢靜默有文登進士科纍遷彭州軍事判官得祿就養里人榮之次曰敏力學慎檢操蓋隱德不位而慶流於後也三女皆嫁良族孫男三人女五人先生享年九十一熙寧八年五月某日卒于天彭之官舍十月某日葬于彭山安鎮鄉祖塋之次舉唐氏之喪以祔焉禮也其平生所著歌詩若干卷藏於家銘曰夀考康寧好德終命此四者先生兼享之不富以利而富以道洪範之五篇亦具矣吳府君墓志銘蜀有吳氏其先京兆櫟陽人自唐中世有名祥者宦於唐安愛其土俗風物之美遂占籍華陽後四世生處謙仕本朝為膳部員外郎膳部生傳紹任涇陽縣令涇陽生季回授郊社齊郎乃府君考也府君諱拱之字宗象性孝友事親盡其道既長從學讀書通義理當彼時蜀去亂未久俗未甚盛仁人志士多以退靜相高於榮利無所慕府君雖嚮學亦無仕進意治身守道恬晦自如居鄉里善惡甚明不妄許可結交以義患難則出力恤物以仁貧而樂施好談算數推步之術以禍福諭人使之修省戒懼常閲書曉方論以疾告者為治之中年以來擇親朋之厚者而告曰吾儕生太平日無事閒居盍遂所樂以適吾情乎於是結為棊酒之社而謂之太平棊酒友縱謔高談連日無倦色蓋優游於此者三十年元豐六年忽謂其侣曰明年春豫乘厄限殆將終乎七年正月感疾二月二日果不起享年八十三悉如其說既卒即以某年十月乙酉葬于華陽縣居賢鄉先兆之次娶張氏先卒十三年男三人師俞檢已無過師益舉進士有聲名纍上未第師臯亦與計偕早卒女三人適進士史圭前萬州南浦縣令郭由儀進士宇文遘孫男女各六人豫於吳氏有世舊知府君為詳其孤乃以朝議公所述仲父平生屢行之狀示豫求銘其墓豫以為莊生有言人之生除疾病死喪憂患其中開口而笑者一月不過四五日不能悅志意養夀命非通道也若府君者生逢治安傳襲祿仕而能遠世紛薄外纍以顯晦榮悴為一悲愁死憤不汩於中三十年間寓於棊酒一月之笑豈其四五日而已乃能全天真享高夀其逹人之徒歟銘曰進榮退辱率非己欲貴富賤貧莫非吾其忽然而勝歡然而競飲酒而醉默然如靜雖曰形器吾不刻鐫古之逹者宜其永年醫博古府君墓志銘豫謫官懷安得古太素與之游太素知道者寓于醫以自誨始即之如不能言謂其魯人也徐而叩之或及于治病謂其良醫也久而親之知其通物理能自得也蓋少時嘗遇河南李君傳以丹訣戒以素書晚又得隱者趙君付以金丹二故練藏養氣皆有深術所謂丹訣者蓋順天地隂陽造化自然之理受之以神持之以心所謂素書者蓋言保生之要本于內真知之必修修之必不怠所謂金丹者燦然有晶輝圓而粒也太素既語豫以丹訣其二物皆得而見之若李趙二君則不得而免不知其何如人也太素又嘗謂豫曰趙君既以金丹見遺且言修道有三限之别上者享年百有二十九十次之七十又次之豫至七十有疾將解去即服金丹以固性涉厯三世乃超離形器之外豫聞是說至元豐七年太素年七十忽感疾如趙君之言餌其金丹後二日而卒實某月某日也嗟夫道家之說天地與人以生不與之死戕伐其生而死者舉世皆是也知有神仙之道從而學之者欲保其生也如趙君之言必涉三世而後得其難如此乎豈塵埃網罟之內罪垢汙濁纒結塗漬必洗蕩刮磨經數百載然後完潔乃以可保天地之所與者乎抑定于中者不亂纍於外者可忘水火刀劔之來尚委而去況疾病乎天下之事有不可致詰者今趙君之論太素之亡亦其一端乎太素諱世淳曾祖諱某祖諱某皆占籍金水太素好恤孤賙急人多賴其力亦濟世之意也家藏道書五千卷著禪頌千餘首述五運六氣圗六十年氣候訣皆有理趣子三人公輔公述先卒成之舉進士女四人悉嫁良族八年九月某日乃葬于柏廟鄉羅曲里西山之陽銘曰君常攝耳宜夀且祺乃以疾終莫得而知仙說有夫生兮可遺或寓而正或委而馳為君作銘縱言及斯君如不昧尚亦笑之淨德集卷二十六
