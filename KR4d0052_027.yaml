body:
  text: 淨德集卷二十七宋吕陶撰墓志銘夫人文氏墓志銘瀘州判官蕭君叔獻之母夫人文氏世居遂州之青巖父寶龜母孫氏皆早亡淳化咸平間蜀寇亂郡邑擾蕩夫人既失怙恃復遭時多故與昆弟徙居合德以完其生既長適蕭氏事舅姑以孝事夫以順訓子治家愛而有法性喜儒學尤好施天禧中老儒唐恕善談合理郡人推為有道每過蕭氏必從容語及飭身臨事之要夫人嘗志其言謂其子曰兒終身能如唐翁語吾門當大夫某卒叔獻未中科夫人戒之曰為子貴能樹立使父母存沒無慊乃可汝無怠終吾老期汝得祿酬平昔意其判别善否惜之母道如是豈古所謂賢母者歟親黨內外洎里閈之衆貧不能自濟則賙瞻存給俾之有賴未嘗以遠邇厚薄形諸意以是無餘藏於家子男二人長曰允昭先卒次叔獻也一女嫁陳紀慶厯六年叔獻既以進士第詔許蜀人初仕于鄉遂佐寧武幕秩滿當遷北地以夫人老請便官歸養乃除武信從事又除瀘州始終十餘年以祿為養鄉閭榮之夫人嘉祐三年某月某日卒于里舍享年八十二五年某月某日葬石照縣某里叔獻字師元志行和謹接朋友間言不入厯官多有能名豫愛而與之厚故于其葬母也來求銘銘曰少也艱危已而有歸母以夀考終子以藝學顯于時可謂有後矣仁夀縣太君魏氏墓志銘熙寧七年十月某日仁夀縣太君魏氏以疾卒于普州大爐鎮王誼家享年八十明年其子護喪而歸卜以十二月某日葬于華陽縣晉安鄉先塋之次禮也夫人世居成都曾祖某仕孟蜀補東頭供奉官將兵戍普慈因家焉祖淵父昭乃遂為普人夫人年十五歸于故贈大理寺丞費君諱文字正用生五子曰珍珣今亡矣曰圭璋祗慎寡過曰琦以孝行稱鄉里皇祐中登進士第纍遷屯田員外郎通判蜀州四女長適李惟吉次適楊士賢次適張鐸次適王誼皆良族也夫人仁孝敏惠得自天稟聞前世賢婦烈女事厯厯志記以自規飭好佛書知緣報大略特加崇信閫法愛而嚴雖壯子長婦侍之每有畏色寺丞君舊豪舍財不屑屑治産惟好賢樂善宴衎自適夫人罄奩中物及父母所與之田以資其用至于匱竭曾不少慊寺丞君之亡屯田君之幼也名聲未聞生事困約夫人殊無他憂務擇師友磨礪其業至于起家得祿板輿就養士論推以為榮宗親黨巷指以為楷範治平中屯田君之官河朔夫人年踰七十歡然願行熙寧元年上初郊祀乃享今封四年大饗請進以邑則曰吾婦人一受命足矣在河朔七年而歸涉深登險水陸僅萬里康寧喜樂未嘗一日不豫然起居語默惟王氏女之在念欲往見焉凡如此者將一年子孫固留不可㑹誼亦來迓即與之行至則浹日而逝王氏女哀夫人離闊之遠而㑹合之近遽及于大變也自是毁頓骨立誓以死殉後五月而亡其將亡也語不及他亦惟夫人之鳴呼始終存沒之際果何如耶夫夫人與其子官于地方凡二十年無恙一旦歸而卒于女之家豈冥理素定不可輒徙耶人之生聚散休戚何常之有惟是母子之愛遂繼以死得非鞠養大賜雖終天莫能以報稱而至是耶臨夫人之喪者既弔而又傷之也銘曰享年于耄惟德之施受封于朝惟母之儀祿以養裕于私禮以葬得其歸滔滔此生固有合離惟此合離喜樂憂悲夫人之懷吾女是思往卒其家女亦繼之理涉茫昧尸者云誰抑亦偶然莫得而知勒銘幽石以顯孝慈李夫人墓志銘夫人李氏封夀光縣君故尚書屯田郎中常公諱漙之婦宣義郎致仕構之妻左朝奉郎安民之母其先蓋唐之宗室為鹽鐵判官從僖宗西幸遂居卭州之依政者曾祖也好施不吝賙及凍餒者祖元熙也以文學名鄉里為詩尤工者父奐也郎中公家範嚴整太夫人雅好賓客夫人夙夕奉事周盡敬禮諸姑悅其恭娣姒服其和宣義君少從學不治産不恤有無夫人能成其志不纍以家事凡嫁娶伏臘問遺之具一切處辦莫不中禮享年六十有六元祐五年十二月十八日卒子六人長安石衛尉寺丞早亡次即安民志尚清壯學行治最推高一時次安序安節安稷皆舉進士季安時尚幼女二人長適左承議郎宿州州學教授梅貢次適左朝奉郎大理評事滕友孫男四女七人惟常氏世世守亷約族屬衆資費寡自夫人之來歸勤儉以修婦職慈恤以敦母道損口體之奉以豐􅎵瀡完繒緼之敝以備祑𥜗養足于老愛隆于幼三十年間閨閫雍睦人無間言可謂賢矣既而二子得祿安輿潔膳始有可樂之意則感疾攣痺凡十餘年不能痊朝奉君嘗由太常丞除江西轉運判官懇請留京師力謀療治朝廷從之改宗正丞遷開封府推官國醫高手診視殆遍竟不起得非命乎自郎中公而上皆葬臨卭至夫人之喪貧不可以歸乃以八年三月甲申葬于陳州某縣受節鄉三河村之原蓋亦不悖于禮也銘曰祿以養何報之凉禮以葬孰為之鄉有宛惟丘蓋得其藏孝乎親乎要之不忘夫人吕氏墓志銘鄉先生光祿寺丞任君遵聖有賢配曰夫人吕氏眉州眉山之著姓祖考皆以好善稱鄉里夫人年十七歸于任以孝敬奉舅姑以禮義事夫以節行教子遵聖之考居家嚴整子孫侍左右未嘗少假以容色惟夫人能盡婦道朝夕承養順適其意終身無樂之語遵聖趣向向高篤學力文得聖賢指歸處已從政恥枉道不與流俗合仕宦多齟齬飄寓四方幾至憔悴夫人輔助艱勤雖衣食不足終日裕然所以遵聖得遂剛簡之志而不隕溺于困窮者夫人能成之也子一人伯雨學有本原彊明重氣節擢進士第今為宣德郎某王宫教授士林多推之異時在朝廷必有立夫人能教之也遵聖治郴縣會王師討儂冦道過境窘于餉餽議斂來嵗賦入貸民財以濟之守將難其說遵聖又從往議夫人止之曰竟不從可遂已乎莫若専達以辦事雖得罪何愧其善慮而斷又非婦人之所能也伯雨未第時以祿養為憂忽忽感恨夫人戒之曰取舍在人通塞在命吾豈强汝以人力所不能致者哉既釋褐則又戒之曰堂構不墜吾無慊斗升之祿非歡戚所繫不義之富貴不可以悅親惟求汝父之志慎所履不獲罪于名教則子道盡矣是故遵聖去世二十年終有良子乃夫人始卒之訓也晚嵗好佛書知緣果大略怡然若有得紹聖元年四月壬子忽感疾閉目誦金剛經凡二卷無一字舛謬翌日乃卒享年七十有八明年某月某甲子葬縣某鄉女四人長適里人孫伯宗次適朝奉郎師規次適黃裳次適史喬年皆進士孫男二人祖構祖福孫女一人曾孫二人豫交遵聖父子間以夫人之志之德考驗前載蓋鮮倫擬昔孟軻之母擇鄰教子卒為大儒然其父之行業不傳于後世梁鴻之妻甘樂隱遁並著高節然其子之威名不耀于當日豈傳記有所略乎抑亦無足述者推役校此孰為全懿則夫人之墓可不銘哉銘曰有夫而賢涉世孔艱惟其助之困節以完有子而才持守莫遷惟其訓之克承厥先茂矣令德錫之永年著之銘辭爰信而傳長安縣君祝氏墓志銘祕書監濟隂祝君正辭在嘉祐治平間守密深衛襄四州皆有治效朝廷嘉其才嘗降詔賜金以褒顯之蓋當時良二千石也其女嫁同郡人奉議郎致仕董君綎生四子曰丕朝請郎知閬州曰萃未仕曰平兗州瑕丘令曰中渭州平凉尉孫十一人曰耕隰州隰川尉早卒餘皆從學舉進士夫人以丕登朝封長安縣君元祐三年十一月十七日終于家春秋六十有八紹聖三年十月庚午葬濟隂縣安平鄉南十里存榮沒哀其中禮也董氏與祝皆為良族以純約治家以雍睦聞鄉黨自夫人之歸奉其姑以孝從其夫以禮友其夫之妹以和教其子以立己之大方紃紉組綴之事雖勞必親蘋蘩簠簋之薦雖老必勤女功婦道兼修兩得由是閨閫之內益治而明至于不誦佛書不講淫祀惟儒者禮法是從皆婦人之所難能者諸子既仕則告之曰凡不欺于心不害于物謂之君子反是謂之小人窮達異分貴賤殊轍惟不悖于義則無愧為君子不為人人雖五斗之奉吾不憾也為小人不為君子雖萬鍾之養吾不悅也爾等勉之慈訓所及率有令懿豫嘗與朝請君為同僚愛其趣操方靜多文而敏于政則夫人之賢從可知矣銘曰祝氏之慶克昌子孫夫人鍾之德慈行溫董氏之法有嚴閨門夫人守之禮隆教存致養以祿惟義乃尊享封以邑惟善乃聞刻銘幽石貽範後昆靜安縣君蒲氏墓志銘夫人蒲氏世為閬中贈太子少保諱穎士人之曾孫贈太子少傅諱伸之孫贈太師衛國公諱師道之女資政殿學士諱宗孟之姊贈太中大夫蘇公諱渙之冢婦太子中舍不欺之妻慶厯中太中公任閬倅與衛國公善結為姻家夫人年十九歸于蘇資稟慈和勤女功循婦道亦喜讀書娣似族屬無間言舅姑繼沒有季女未嫁夫人撫愛愈厚逮其有行出奩中物以資之族人或以此譽美則曰先姑即世新婦當任其責安敢衒以為能尤敬于祀先凡嵗時嵗獻與忌日之奉其炮燔烹飪之具雖老矣不以付子孫必擇平時之所嗜而羞之既享則怵愓齊栗終日愀然如見所祭蓋得孝子所以饗親之義中舍君之亡失夫人持諸孤而哭曰汝父棄不待年今壯者未有立幼者尚可保耶訓飭教戒益嚴且勤既了嫁娶則又告曰吾事而父畢矣汝曹惟勉學慎行庶幾成就以顯爾親則吾無憾昔馬援聞人之過如父母之名吾自幼至老不敢言人之非小人識之可以寡尤也某年天子既郊夫人當封邑資政公以其性行靜専動有法度事父母奉舅姑皆盡敬愛請以靜安封之又嘗丐于朝乃賜以帔紹聖某年七月某日以疾終于眉山之所居享年六十有八明年十一月某日祔于中舍君之墓次子五人千乘千之某官千能千秋千鈞皆舉進士女三人長適鄉貢進士任忠弼次適承奉郎監杭州洞霄宫蒲徹次適進士雍緝孫男十三人孫女八人銘曰閨閫肅肅兮德之宗子孫詵詵兮慶之隆美封貴服兮恩以崇高丘深蘧兮禮以終婦則母儀兮傳素風庶幾陵谷之無窮淨德集卷二十七
