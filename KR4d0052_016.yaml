body:
  text: 淨徳集巻十六宋吕陶撰論西漢論善治天下者必觀諸時而不擇事之難易蓋天下之事有逺近大小之别而無難易之定體惟其時不可為則謂之難時可為之則謂之易昔者聦明睿聖之君賢智才能之臣未嘗不欲舉其逺者大者而行于天下惟直乎時有不可而遂不為當時之深有不足之心後世亦為之惜然則時者治之端又君子所謂詘伸也夫時不可而不為則固足惜矣時無有不可而亦不為則又仁君子謂之何如嗟乎天下之事多失于此而莫能臻夫極致王道所以不及于古而生民有不幸也秦之将亡祸流四海嗷嗷之民求息肩措足之地而舉無所容漢髙帝仗義以起誅代無道援而出之于塗炭首除奇法約以三章數赦罪屢賜爵軍事勞苦者復其田租郡國多賦者減其歳獻郷縣為置三老以帥衆為善飢者甘糟糠寒者利短褐故得望之如雲霓親之如父母以布衣一劒之任五載而成帝業然當此之時去周未乆三代之宏規遠略遺規舊制與其民之耳目相接疑其猶有存于天下者以新造之天下而乘民心之初得苟能講求三代少倣而用之則愚者不以為驚智者不以為迂濶然而不能者何也十二年間寇難未盡平法度未盡立而未暇及之也故高帝之政不過前之數事而已至于文景以恭儉養民孝武以雄才大畧至治皆處大有為之勢而亦不能者何也非時之有不可也彼見高帝得天下如此之易其所行者乃前之數事而民之悦服亦已如此之易則其心以為治天下之道不過如此而無難惟不為秦之所為而行高帝之所行則亦足矣蓋不察高帝之時有不可也于是舍其遠者大者而取其近者小者以行之是故不立公田什一之法而除租釋賦以勸農不敦引年養老之教而歳次牛酒以示惠不遵賢能賓興之制而務察孝廉不施鰥寡有養之道而惟行賑貸不崇郷黨庠序之訓而増置生員以廣學者不書徳行道藝之羙而復其孝悌以風斯民事皆近而易行不足以經遠名為治理而曽無其實使三代之道邈然不可復見政教益苟簡風俗益偷敝可不惜哉是故仲舒譏其不能更化賈誼痛經制之不立王吉以為未有萬世之長策者此也昔唐太宗與房杜議興禮樂而曰有志不就古人悠悲時難得而易失朕所以遑遑也嘗三讀而歎之苟易地以處則西漢之風豈有不至三代乎東漢論天下國家之權不幸而為小人所乘則生民受敝社稷有可憂之漸于是忠臣義士痛心切齒合謀共力犯大難而攻之攻之而勝則天下頼之以安攻之不勝則繼以死而無憾然其勢常不勝以及于死天下從而悲之竊嘗攻求成敗之迹為之深思遠慮而見其亦有可禦之策不必犯難以攻而使之不可勝蓋先幾之謂也夫小人而能竊天下之權則安有無故得之者哉其始也蓋天下有不幸之事君子不為之辨而小人辨之幸而有成以為其功以固結世主之意于是氣燄熾烈而黨與盛大後之人君生于深宫溺于近習熟聞其説而謂斯人之足以辨吾事也則又從而親信之故天下之權為其所乗至于喪亂而下可觧世之君子既有扶衰持危之心盍先天下之憂而為之謀使辨事在吾而収功不在于彼深防其源痛遏其流則奔衝泱溢之患不及于後世豈有因之而遂喪天下者哉惜乎始也不能一出力以辨其事由是功不在吾而在彼既以啟其强梗之漸以遺彼世及夫權移勢力而乃與之力決勝敗于死生之際多見其重不幸也此譬如此百金之劒授于盜賊逮其行劫有人焉一旦竊不平其暴戻敢持梃而搏之反至于死死之者固無愧矣授之劔者安可逃其責耶東漢宦官之盛自鄭衆始衆之盛以和帝㓜弱而有誅竇憲之功其後國統遽絶母后臨政孫程定立順之議曹騰参建桓之䇿朝廷綱柄盡付其黨陳蕃何進竇武之徒懐憤奮發欲清妖祲而不免殄戮之祸劉氏龜鼎由此淪失使誅憲立順建桓之事當時将相能収其功而不出于三兇之手則姦佞之勢豈遂滋長而至是耶忠臣義士亦未遽然為之死也唐之宦官亦大類此自輔國元振之後其徒日益肆横而不可禁然二人者其始亦有寳應定䇿之功故其終乃有甘露之事此前世安危成敗之明騐炳然可見者矣嗚呼功者忠義之實也君子之所宜有非小人之所可居也小人而居功㣲則利已而害物巨則至于亂天下豈獨宦官而然乎有天下之大節者然後可以任天下之大事也幾微付畀之際敢不慎哉師之上六曰大君有命開國承家小人勿用象曰小人勿用必亂邦也夫處師之極為衆所歸以大君之命而有開國承家之事豈小人而可用乎此聖人所以深明夫治亂之大計也魏論善計天下之安危者必審其利害之兩端而不泥於懲戒之偏説思其所以為利則防其所以有害葢有其道可施于安可施于危使天下之變不能乘間而發是之謂知本天下安則内足以制外天下危則外可以禦内此利害之所宜審也彼狥懲戒之偏說者見其利而不知其害可施于安而不可施于危也蓋天下之變所起有二一曰諸侯之强盛二曰大臣之持權强盛則為外憂天下所以漸亂持㩲則為内患天下所以速亡此二變者有内外遲速之異世主豈可不察哉然則所謂更相制禦之道者何也曰修法度愼政教足以杜强盛之漸固蕃衛完形勢足以破持權之姦周之始封八百餘國有賦足用有兵足戰朝覲貢獻莫敢先後而至當此之時未聞有不庭之國者何也有所服于内也及其衰世大邦千里齊晉起而為盟主天子尊之僅存位號當此之時未聞有擅命之臣者何也有所忌于外也是故内有治政則無慮諸侯之強外有諸侯則無慮大臣之横所謂相制之道也昔之圖治者不究于此以為廢諸侯則無憂外天下可不僣亂是安間無事之策也是不知諸侯之强始于王室之不綱也徒知外憂可弭之為利而不知内患無以禦之為害也若去天下之僣亂而反取天下之速亡也其説豈不偏哉秦懲周之所以亡不授子弟以尺寸之士獨収其權以控制四海纔歴二世乃死于趙高之手漢監七國之所以亂推恩分國以銷維城之勢軽根易㧞危基易墜方百年間乃為王莽之所乘世祖中興失于遠覧封建之制日益陋郡縣尸其政于外臺閣總其務于内宗室王惟衣食租賦而已暌孤之釁遂為曹氏之所窺此三者皆外無以救變生于内而不能禦焉曹魏之亡何以異此既以詐力而得又欲以詐力而守無親疏無小大未嘗以誠信待之故于同姓之臣尤為猜貳雖有封疏之名曽無任爵之實官属則付以下才兵衛則給其殘老惠澤不流科禁峻廹失侯削地無嵗無之至有兄弟不得同路而出者權軽勢弱僅同匹夫是故賊臣一施其謀而魏之神噐失矣夫以任城之剛武敢為陳思之機慮敏博而使之握重兵至勝地洎諸宗子分列建國以忠義同憂之心為膠固不㧞之勢處可以遏姦萌出可以靖大難則司馬氏安能遽遷其祚業哉昔者朱虛之謀倡于内齊國琅邪之兵待于外乃能平諸呂之亂由是而言則利害之端可見矣惜乎魏之不監于此也晉論晉之亂亡議者談之多矣或曰外裔盛疆侵暴王室劉聰石勒之徒據有中原兵寇乘風而起徧滿天下惠懷昏庸力所不制乃有奔播之祸或曰當時公郷大臣宗尚虛曠徇名而忘實好清言而不可適用姦雄之士窺其所不能而攻之乃底于敗壊此二説者皆指其已然之後而不究其将成之前也今夫富家巨家多蓄貨財父祖處之有素子孫亦能守其所積苟不至于慢藏則平居終日安見刼奪之患哉惟失其所主而軽其所蓄舉希世之寳以寄諸臧獲舍千金之貲以委諸通衢則盜賊肆志而奄有之矣勢至于此而不窮致寇之因而乃責家人之不能禁宼抑亦惑歟然則劉石足以亂晉而晉之禍不始于劉石之盛彊公卿雖不足捍患而晉之亡不繫于公卿之崇尚虚無蓋天下䘮亂之端何嘗不自内起人君失道則姦民叛羌有竊伺之意權臣擅命則壯夫烈士懐不平之心此前定之理也宣景之取天下豈有分毫仁義以服人之心乎索其始終則皆天下之所不容誅也然而得之者幸也天下有以幸而得無以幸而守何則其得以天而其守以人也武帝之于天下豈非亦欲以幸而守乎彼賈充者魏之賊臣耳而任託大事與之婚姻知惠帝之不肖而不能處以大義提四方新定之勢而付授非人則其心亦欲幸天下之茍安而巳固不暇深思逺慮求為千萬世之策也既而楊后得循其爱又以楊駿為之輔翼此數事者足以啓竊伺之意而激不平之心矣亂亡之根固以盤于朝廷也是故自太康之初呉人獻地天下始一至于永平方十餘年三楊被誅賈后專政宗室諸王自相殄戮中外觀釁反者屢起永寜而後天子日有遷廢之慮統緒之大不絶如綫是以元海父子始建僣號之議石勒之衆繼為寇孽自是而下中國之勢四分五裂而天下之祸遂至于不可解嗚呼有武帝之不斷然後有惠之闇弱有惠之闇弱然後有賈后楊駿之暴戾有賈后楊駿之暴戾然後有宗室諸王之變故有宗室諸王之變故然後有劉石侵暴之祸皆武帝有以導之也彼武帝始為之謀則亦不謂其祸之至于此惟其欲幸天下之苟安而遂及之矣周之王業自后稷以來積功累徳歴數十世大命既集猶不敢遽然當之及武王成王之際則以周召為之左右聖人之欲天下之安也豈敢有求於幸哉經曰慎厥終惟其始差之毫釐繆以千里又曰國之将亡本必先顛其晉之謂矣嗚呼自古喪亂之端未嘗不起于内得失安危之相倚㐲可少怠而不思乎隋論案此篇原闕今據論畧所叙存其目于此唐論隋唐之際天厭亂乆矣高祖始受命經營創造天下畧平太宗宏謀遠算以底大定高宗昏庸權移武周中宗繼之韋氏奮抦唐之基緒絶而後續此二者皆起于女子之祸而下生于天下之變豈待擬議而後明乎然自天寳至天祐始終幾二百年變故數起而遂乃至亡者何也迹其衰䘮之端葢有四焉一日方鎮二曰四裔三曰姦臣四曰宦者四患之生則又有所從矣方鎮之患生于倚之過重而養至彊大四裔之患生于苟其為用而不復禁制姦臣之患生于聼任之惑宦者之患生于危難而頼其功其生雖異而其迹相表裏内有以召則外有以應惟其明君忠臣或禦于外以定内之勢或制于内以成外之功是以亂而復治危而復安及其内外之患并起共攻而上下無以制禦則天下崩解而不可支此唐亡之明騐也藩鎮諸帥分列四方大者千里少者數郡建幢授鉞犬牙錯﨑沿邊皆置節度府范陽朔方兵至十萬威武相高暴戻相勝一旦窺伺國釁卷甲而前則中原丘墟天子播越亂根逆萌既無以制然後加之王爵以安其意賜之金劵許其自新姑息繼世幸于無事此倚之過重而養至彊大也肅宗之初志在恢復西戎嘗引軍赴難収復二京亦頼其力代宗時寇孽未殄又嘗率衆討逆既與之和親又待以殊禮西戎之性暴而無厭及大厯之際吐蕃侵掠屢至近輔卒犯京師此苟其為用而不復禁制也明皇之于國忠林甫代宗之于王縉元載徳宗之于趙賛盧杞此聼任之惑輔國元振始建寳應定䇿之議而宦官張盛此危難而賴其功也國忠林甫既專政乃有天寶之亂縉載輔國元振既用事乃有大厯之冦趙贊盧杞既擅命乃有奉天之危此内召而應也然天寶之亂則子儀光弼能靖大難再造王業而天下不遂壊大厯之冦則又為子儀蕩平而中原不遂失奉天之危則渾瑊李晟竭其忠力以清妖祲而王室不遂亡此之謂禦于外以定内之勢徳宗之季以延賞之怨罷李晟以延齡之謀廢陸贄始置䕶軍中尉中䕶軍以兵授閹尹當此時姦臣宦者之勢可畏矣憲宗憤威令之不振勇於撥亂誅劉闢執李錡討王承宗而不疑一用裴度則淮西之孽掃去逆藩叛將蓄鋭喪氣而思效順穆宗之時崔植杜元穎不知兵朱克融之亂復棄河朔元稹與魏𢎞簡交害國政至于文宗則守澄有勲宗閔為相甘露之敗京師喋血當此時姦臣宦者之勢又可畏矣武宗以雄謀勇斷抗舉國勢一用李徳裕而誅陳行泰破回紇討劉稹皆有成績而冦孽不敢肆其暴此之謂制于内以成外之功僖昭之際主徳既昬令孜復恭擅執威柄盧攜張濬輩爲之輔翼既有沙陀之侵暴又有朱温之吞噬則天下之勢固去矣嗚呼唐三百年而治亂循環如此為萬世之䇿者安得不逺監而深慮哉五代論甚矣天下治亂之不常而爲君之難也其始也未嘗不欲為千萬世大定之䇿及夫一日失其制治之道則喪亂之勢如洪河之去其隄防奔衝決溢㪚漫四逺流至百年然後其患稍稍止息方其安流而未潰也可不深窮其源而預慮他日之害乎周之衰自昭王而下諸侯之勢日益盛强齊晉秦楚有國千里以兵相攻以地相制大吞小滅二百餘年然後併為六國又一而為秦秦不能守纔二世而遷為漢天下至漢而始服晉之衰自惠帝以來四裔之勢日益熾烈劉聰石勒乘王室之多故裂中原而處之擅王僭帝倡為禍首四方巨盜如毛之多援迹而起百餘年間天下分割而為國十六又二百年而傳之者七代然後合于隋隋不能守未三十年而遷為唐而天下始定唐之衰自穆宗而後方鎮之勢目益暴横兵强地大盤結于外亂根逆本深不可㧞百餘年間唐祚因之以亡唐雖亡而其遺毒餘烈存于天下姧雄藉之以盜神噐是故未六十年而社稷五禪厎于喪亡壊敗之極聖人出而天下始安嗟夫此三亂者其源之從來甚長故其流之所適甚逺皆歴數世而後可以止息夫五代干戈之事固不足議惟以其去唐最近而于今不為逺亦可摭其既徃之迹而著為監戒以杜萬世之患焉昔者唐之禍始于方鎮終于盜賊而遂為梁之所乗自梁以來以亂濟亂其覆亡之端則與唐無異或以將帥之䟦扈或以外裔之侵廹繼之以驕悍之兵滿于天下而不知所以制禦之道是故或變于外或潰于内而不復支矣國家蕩除根芽混一區宇立成法制思與萬世為利罷藩侯銷武力將帥之臣受成于内雖擁兵專閫而未嘗敢擅威福凡進退出處惟天子之命是從求其䟦扈之状固無有也然而外侮驕兵之勢則志士仁人竊以之為憂焉以後唐之亡驗之則悍兵可不為之防耶以石晉之亂推之則邊圉可不為之備耶失慮于一日者召患于百世矣詩云殷監不逺在夏后之世書曰無若商王受之迷亂酗于酒徳夫詩書之所戒必稽稱衰晚假譬近事至于賈山獻書漢帝而又借以為喻其言最號明切然則條季末之迹為隆盛之規豈非聖賢之心歟此鯫生所以畢其説于五代也浄徳集巻十六
