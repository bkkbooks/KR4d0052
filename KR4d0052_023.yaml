body:
  text: 淨德集卷二十三宋吕陶撰墓志銘朝散大夫致仕陳公墓志銘某先妣樂夀縣君陳夫人本眉州眉山之巨姓其再從姪仕至都官郎中以行義聞於鄉事業見於時者乃公也諱習字傳正曾祖諱德念祖諱贊值時季亂爵祿不及考諱位有器識讀書知世務以氣節自任重義好施急人患難如不及鄉閭推為豪傑纍贈工部侍郎妣楊氏早卒贈華陽縣太君公少鞠於外氏能抗志從學為辭章舉進士聲名赫然中慶厯二年甲科調武昌軍節度推官掌永興軍書記改著作佐郎勾當開封府檢校庫轉祕書丞遭工部公憂服除授太常博士通判慶州永康軍厯尚書屯田都官職方三員外郎為屯田郎中監齊州新孫耿鎮鹽酒稅知處州不赴改渝州遷都官郎中嵗滿還朝年六十有五遂告老元豐初官制行易朝散大夫公剛簡靜重氣守完固博學通古今治已慮務正而不苟雖貴權豪勢不能少屈故相劉公沆守鄂州政任強果凡所可否賓佐不復議有未安者公與之辨則從嘗謂之曰異時立朝宜不遷此志今北都留守馮公亦嘗移書稱公在武昌時論議操守古有道君子也翰林侍讀楊公察治長安幕中皆名輩蕃總之務悉以委公深加禮敬期以遠到神宗初即位詔百官轉對公以十事聞其大者謂裴度有大勳德為李逢吉元稹輩毁沮得韋處厚論奏時君警悟今宰相韓琦於嘉祐中乞立先帝為皇嗣定策兩朝功施社稷不可置散地願陛下一閲裴度傳乃見情偽是非又謂自陶榖失對參知政事遂下宰相一等不敢當筆可否事非朝廷任用輔弼意願陛下諭趙抃唐介政有未便宜指陳得失又謂自古人君昵信宦官盜弄威柄多致敗亂始東漢距唐簡策厯厯可鑒願陛下深以為戒又謂自昔乘喪亂據有坤維僭名號者自公孫述至孟知祥皆非西南人今承平百餘年海字混一案此下有脫文慮囚得免王吉之死王吉者扶溝民吉妻之姪貧無依為吉所養夜聞吉語其妻以發冢事乃以告鄰父捕繫具獄吉罪當死公歎曰同財共居於律聽容隱妻之姪素養於吉而冒法訐告乃同凡人豈近情哉逐以疑請故貸焉案此下有脫文至于比嵗以來西南士大夫得守鄰郡小官亦不困逺適法禁稍略乃公之助襄陽山水最佳處公因卜居為老焉之地既得謝愈放意自適遊山中諸佛剎往往彌月不返元豐元年二月十二日疾終于家享年七十有六娶楊氏封仁夀縣君先公二十六年卒二子長曰續太平録事參軍次曰綬鼎州司法皆祇慎自立一女嫁渝州巴縣尉唐子昻孫男四人曰沛曰漁曰潛曰淵方從學求舉以元祐二年十二月二十七日葬公于襄州襄陽縣望楚山之東原有集三十卷其文如其為人尤好為詩有古作者體某童丱時數聞先妣稱道公志苦力學雖甚寒暑或達旦不寤每以相訓飭心竊慕之既長而仕則又仰公器業之宏遠惜乎不能盡發其胸中也敢序實而銘曰行義之域君子務適公造之安屢而不息勢利之途小人爭趨公望之畏却而不驅位則不克志則不遂夀則不嗇名則不墜山有峴首水有漢川雖百千年猶知公賢朝請郎新知嘉州家府君墓志銘眉陽士人之盛甲兩蜀蓋耆儒宿學能以德行道義勵風俗訓子孫使人人有所宗仰而趨於善故其後裔晚生循率風範求為君子以至承家從仕譽望有立者衆家氏之族乃其一也自周衰大夫家父之後遷於晉至唐德宗時有為職方員外郎者從乘輿幸山南因入蜀遊青衣訪故人路眉愛樂風土遂居眉山今十一世矣曾祖光不仕祖正贈大理評事考某隱居鄉里有善人長者稱纍贈左朝議大夫母楊氏纍封長夀縣太君君諱定國字退藏六嵗知聲律朝議君嘗與客飲客以對句試之曰笙歌陪酒聖即應之曰桃李從花王客大驚聞者以為竒童子方冠舉進士聲華翕然慶厯中詔天下興學時歐陽文忠公友人張公應之為治中課試羣士善君詞業純茂與俱來京師既擢第除雅州名山尉居朝議憂執喪不違禮將葬舍墓次晝夜哭不己有甘露之祥見者以為孝報服除調永康軍司法韓康公帥蜀欲治西山道至威茂建玉壘關君謂蜀近夷惟恃險以安昔唐中衰吐蕃三入冦一出汶川今鑿石平塹為坦塗將貽蜀之憂康公信其言捐工役之半再調灃州司理提點刑獄賈宜言囚部吏饒瑄欲誣以巨罪君不從賈怒屢托以事卒莫能得識者嘉其持守遷祕書省著作佐郎知嘉州洪雅縣嵗大旱詔減民賦轉運使韓璹好裒聚官屬畏之不敢告以實君曰嵗凶民甚病朝廷以為憂而使者不恤郡縣又相附會誠何心哉苟不負於民雖得罪無憾是嵗獨洪雅田賦十減七八就差僉書蜀州判官事二川田稅舊有折變絲綿者估才十之一監司猶欲加以耗君謂既變而斂則與正稅異豈復有耗耶乃以辨析得免又嘗增損卭蜀水平之制均二渠水利鬭訟止息人至今以為宜嵗滿通判瀘州夷羅狗村責言于寨王馬仲通與之戰既敗夷人將執而歸吏以急告君遽往曉譬招撫給牌示信有降附者矣議者議討之朝廷遣韓存實經制夷事君具以本末白轉運經制司請戒于軍凡降而給牌者勿妄殺以為功雖行之終莫如其言也烏蠻乞弟先使其弟一毛遺江安令馬既不納遣去又隂諭羅箇牟村夷襲殺之乞弟怒甚藏怨未發間輒以兵往來境上一日率衆次江安聲言將不利于令人情大恐郡將欲挈牙兵以禦君曰彼衆我寡而從以兵是速冦也乃止遂以檄君即馳至納溪俾招安將以利害鐫告乞弟亦從命歸所掠資畜而去會轉運判官許安世欲以弭兵懷逺為事遣介與議打誓移文瀘州行之元豐三年瀘守喬敘及乞弟盟于納溪既而報怨羅箇牟大縱攻掠路分都監王宣戰死朝廷謂乞弟降不以誠兄議誓與行之者皆得罪君方知渠州亦罷歸久之知懷安軍其政皆有惠愛長夀君既去世君年已六十哀慕殆不能勝終喪還朝氣貌減平昔得知嘉州未行時大疫從弟朴在太學病甚君遷置於家朝夕視藥食不少避及其死哭之慟因感疾不起紹聖元年五月朔也享年六十四二年之二月二十二日甲申葬于眉山縣德義鄉積玉山娶楊氏封仙源縣君一子彬奉議郎太學博士有學行為士林所高女三人長嫁武昌程卞次未嫁而卒次適故左承議郎監在京綾錦院王君卿孫男二人餘慶昌祖孫女四人長適廬江何恂次適承務郎范洪餘尚幼君姿韻恭粹務自修適燕處無惰容縱談無謔語慎於事勉於政論交接物未嘗少忤尤工於詩古律凡三十卷雜文十卷體格清懿如其為人蘇公子由嘗送以詩曰鵠鷺性本靜芝蘭深自馨知者以為紀實初君欲葬先塋之右嘗植木志其穴及將葬以地理驗而果得之吉皆如其言死生之分豈偶然哉嗚呼瀘夷作禍蓋小人鋭進行險以覬萬一勇夫乘其後急功趨死凶焰既不可撲禦經制顛紊遠方為之騷然朝廷再遣將剗蕩巢穴乃班師厯三四年然後定君始終其間與事居多平江安之變則無功行納溪之議則有罪時無為君言者君亦不言亦古人之不伐歟銘曰有行在躬靜恪而文有政在物和簡而仁瀘夷復仇貽憂爾民往諭以言亦懷而賓既盟則渝有功莫伸隱德顯報期于後人承事王府君墓志銘王氏出姬姓其先居太原自唐僖宗幸蜀有從而西者遂為華陽人至先生五世矣曾祖某祖某考某皆樂隱晦不仕進先生諱某字仲符性篤孝事親能養志讀書務窮大指不溺章句學文章純明簡重一與道合尤好為詩每遇事感物輒賦詠以自適有唐人格趨與人交推本誠慤終身不失其歡或即之謀必曲折詳盡以告急其患難若已有居鄉恂恂然無少長疏戚接之皆以禮家窘於資不恤生事客至如歸士有貧而就學者衣食而教焉嘗舉進士與計皆一試未第遂歸岷山之下安退自若後二十五年詔許赴禮部將恩其遺滯則不復起識者高之趙清獻公鎮成都最加厚遇即其居與之田以資隱計先生樂道人善恥言過缺至于斷否臧明利害則勇不可奪有永康軍守郡某者淫刑刻深轉運使彭公思永將按劾之見先生問其詳乃以官吏能否非士子所與聞為對彭公嘆其長者導江令吳太元剛亷少與小人忌之部使不能察欲繩以罪先生於是移書清獻公謂太元履尚堅正不當以小過廢且曰某受田於公每思所以報公苟以某言為是辨太元而薦之非獨免今日過抑可為他日用則其報公之責塞矣清獻信其然待太元益厚小人不能勝太元竟為朝廷所擢先生所娶李氏封長安縣君先卒男四人長曰彀嘗貢於鄉次日轂亦善辭業皆早亡次曰任有志操好學力文熙寧六年上策試進士能以經對拔為天下第二纍遷奉議郎成都教授季曰價克勉家學女二人長適某人早卒次適某人孫男幾人女幾人先生有岷編凡十卷元祐三年正月某日衣冠燕坐與族人飲酒而教飭之若將訣别然其夕遂終即以某月某日葬于某縣某鄉某里舉長安君之喪以祔焉初先生從學於舅氏端明殿學士蜀郡范公故其行與文得為君子進趨祿仕聲名翕然人皆期其顯矣已而止塞不進終遁丘園則又能委已順命不露欣戚及其嗣子果以器業奮起承家而光大之今天子祀明堂乃以承事郎封先生其道德之報歟銘曰公有隱居岷山之陽山間之雲卷舒何常或畜不雨或需以雱有如公懷惟行與藏溫溫未試自韜其光有子克家積之博強起踐亨轍坦如康莊乃公緒餘而能顯揚公其無憾寧止崇岡知渝州王叔重墓志銘元祐戊辰嵗豫嘗銘王君承事仲符之墓述其性質之粹履尚之安問學之正惜乎不幸而不踐高位以充行其志不享遐齡以崇養其德幸而有良子曰任克承厥家博學多文早自振起士林推先天下共仰意謂必能展布餘藴為朝廷用庶幾仲符之幽光垂耀不朽後十三年則亦卒矣嗟夫善惡報施之際禍福始終之迹竟何如哉或可索而質其是非乎或不可得而知一歸於偶然乎或合一舛二參差不齊徒滋惑於人乎此聖賢所以有幸不幸之説而古今莫能廢也君字叔重承事之次子弱不好弄勵志在學讀書務究大旨得治已及物之原本不汲汲於章句為文雅健純贍先體用後華采熙寧六年神宗以馭吏務農訓兵之要策進士君條析治道傅經義以對擢為天下第二方唱第之初有司誤贊其名君亦不辨少頃上訝無應者覺其誤始正之君乃徐進焉在廷識者伏君安重有遠量調卭州軍事判官遷宣義郎知漢州什邡縣用薦格充成都教授遭二親憂去位洎終喪中丞蘇公轍辟主臺簿蘇公既登用鄭公雍李公之純相繼執法皆薦君材得太學博士李公謂為下遷即復疏論之遂除祕書省正字又改校書郎會朝廷還日厯於省乃以著作佐郎典修之凡五年為朝奉郎知渝州君聞道而篤信守已甚重視外物甚輕語默出處惟義命是安要之無怍而已既以高文陟上第跬步可貴顯而一切晦靜如不居之遷宣義時詣審官求為鄉邑安公燾方主此選謂君曰故事凡巍科皆不次用奈何俯首就選乎將以君請于朝姑少待之君辭以親老在蜀不可官京師安公不能強益重君所守吕公著亦嘗諷君自陳可得美官君退謂范醇夫曰較文場屋緣一日之長得上第又衒以媒進亷恥喪矣日厯之還省也權臣欲私其親舊以君等可修者三人上之其二則所欲私者也哲宗以君素少援遂命之儒館上下公議翕然謂君不求而得可以抑躁進警流薄君在省五年沖淡自養終日讀書為樂不與外事如林棲谷隱之深公卿大臣之門或纍月不造倘知之則不趨合以求悅不知則愈密不露言色未嘗輒愠然竟為異趨者所疾故有渝南之行初君讀書知治身及物之用雖以文藻光輝人世而涖官從政不敢少忽苟可濟物勇而力行蓋嘗懇部使永罷什邡之市易衆安其業請增成都學田以養士詔可之達州斷獄謂縣令李傳失入奪官傳以寃告事下御史府君為辨直竟無纍在渝州不夷陋其俗葺鄉校集諸生躬自課試以補不學少儒之弊置醫生審方劑督察診療以救尚鬼不藥之死議七郡貧瘠非蜀他地比願弛荼禁卒如其説峽人深德之其明逹不撓率類此元祐紹聖間天下之事再變士大夫奔溺勢利視時可否從而離合雖姻戚僚友間輒向背甚者至自相魚肉以取寵邀遇苟得毫髮則悻悻市權有厭飽充滿之色不啻商儈然君於是時獨立坦履了無避就凡十餘年完潔而去亦明哲保身之效歟彼從而離合者聞君之風宜少愧矣今天子嗣位推原本末講修治具别忠邪而進退之海宇生聚濡滲厚德如脫隂霾覩白日如出險窞步通衢公卿大夫非罪廢逐者悉與之滌蕩且召用焉蓋所以承天心而又皇業也惜乎君不及見豈非重不幸者哉竊嘗論之天下之治亂生於風俗之厚薄風俗之厚薄繫於士大夫之出處若夫棄維常逞利欲覬幸朝夕之得一唱百和競為喧閧積習逾久散漫四出一旦如洪流決潰無以禦塞則將有不勝憂者仁人志士其可不遠謀極慮而慎所取舍乎如君之氣守志尚可謂能慎取舍也君娶李氏封夀光縣君子五人曰鏄曰鐸曰鉉曰銓曰梁鏄前開封府扶搆縣主簿鐸嘗預鄉貢鉉銓梁早卒一女未嫁君有文集三十卷享年五十某年某月某日卒于渝州之正寢某年某月某日葬于某處豫表其墓而銘曰士於周秦生質何殊或重而千鈞或輕而錙銖乃曰貴賤緣其所趨乃曰否泰出由此塗智者見微詳研疾徐違險從夷誡哉覆車君有良守明晦弗渝君有宏業終卷莫舒遐望古人並軫齊驅托實以書斯銘不誣淨德集卷二十三
