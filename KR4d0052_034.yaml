body:
  text: 浄德集巻三十四宋吕陶撰七言律詩和正月二日遊碑堂寺二首農事初興欲及時東城風物又春熙出郊開燕始今日迎馬獻花纔幾枝萬室遊人方雜遝三竿煦景漸舒遲乖崖眞得綏懐術八十年間俗不知綵旗連道過重闉却訪僧居暫柅輪平野一朝鋪秀色輕風十里散香塵此時燕賞須從俗昨日陽和己發春自古成都稱美酒細傾聊以度良辰觀打春牛和韻塊然形質本何殊似為春來出舊墟以色配年疑未可與耕為候信非虚升陽蓋自寅正始取類還當丑位初但得碎身資穡事豈須功效載農書浣花泛舟和韻野店村橋迤邐通蜀江深處茂林中花潭遠漾春波緑綵閣相迎畵舫紅修岸幾朝經宻雨芳樽盡日得清風詩翁舊隐知何在且事嬉遊與俗同寒貪新火乖時熖已燃寒雲收盡晩晴天欣逢佳節遊花圃獨欠詩人泛酒船南畝如雲鋪秀色西樓照日起祥煙傳聞里巷嬉㳺俗盡説豊年勝去年和重九遊栁溪西溪景物似江鄉無頼秋容到岸傍勝事可懐樽酒樂淒風渾減路塵香半凋栁色猶垂帶欲凍泉源秖濫觴㑹向明春重遊覽春暉依舊倍舒長晩過西溪煩暑襟懐倦客情西湖虛爽暫閒行林間聞雨未為閙池上得風尤覺清斜日漸因山隔閡斷雲應與月逢迎牧之才調誰能繼一為慿髙賦晩晴多日牽俗闕西溪之遊和友人來韻西溪流水正涓涓髣髴江村種稻山弱枊依風徒自困晩花經雨更誰憐已知榮謝椿如槿莫問飛潛魚與鳶結得勝遊須盡興醉鄉岐路在傍邉赴官唐安益帥呉公以詩寵行次韻為謝二十年前許進趨原註公赴官南犍日已嘗參候六科重沗薦論書獻言悟主慚明詔乞禄還家得副車此日詩章形黼黻當時匠手器輪輿恩知最厚難圖報有意髙賢一挽裾送劉儀甫職方東歸二首藍田良玉古稱珍品屬瓊瑶異碔珉純有英華為國寳貴無雕琢是天眞連城享價千金重垂繅承光五采新羣后在廷皆執瑞大圭終得奉嚴宸南山蒼柏自森森長就喬枝出荗林肅政臺中思直幹孔明祠下得清隂原註君嘗有御史之薦㑹使節西指尚稽除命風雲毎助孤髙勢霜雪難移勁挺心大厦有成梁棟在平時燕雀望皆深題府廨清素軒蘭麝香濃玉少塵開軒相對似交親臘寒庭院春将近晩吹簾襲月又新慿檻雅宜題雪女銜盃俱是咏花人原註古詩云今朝梅樹下定有詠花人碧爪故事標圖記從此嘉名亦等倫原註乖崖種𤓰後園田宣簡葺軒賦詩以記之懐鶴鳴棣華曾到翠㣲中一别仙宮入泮宮眞景望如雲在上年光去似水流東青霄得志雖榮已白髪多情亦念公若許他時遂休逸山翁携手有詩翁偕友人遊上方南禪出郭行行数里村石梯盤曲到禪門亭開髙檻侵山脚水過方池斷樹根城市塵埃終日逺煙嵐氣象四時存約公乘興重來此延納清風盡一樽廨舍之北有海棠二本惜非其地移植庭前呈晦甫同年博士何事當庭植海棠欲乘生氣待春光恰逢輕雨渾如意若得和風定吐芳籬下不堪藏秀質眼前從此識清香一樽㑹與嘉賓賞屈指紅英在艷陽寄花廣漢守倅地産名花敢自珍百枝聊且寄强鄰分将雨後千金色添得罇前一日春檀板屢歌慿侍女玉簪齊挿奉嘉賓明年紅爛還馳去惟恐流光老却人荅髙進賢南歸見别春波萬里己魂銷況是分携過蜀橋吏隐有心終濟物他山無術可除妖好將醒醉迷千日莫為興亡感六朝南望襄山何處是悒然懐抱更無聊答晦甫花徃詩來報禮優不慙蕪累願賡酬青春易去何妨賞白髪相欺未足羞萬事放懐閒歲月一樽髙笑好朋儔公堂訟簡心情在莫對風光取次休次韻思道同晦甫春日過李氏園亭二賢談笑共為州深惜青春爛漫遊吟到醉鄉須一飲歩回芳徑亦三休風前幾㸃見蛺蝶雨後數聲聞栗留人望使旌應喜樂此心於爾亦何羞和晦甫答思道䇿馬悠悠倦徃還竹邉林下舉吟鞭忙中對酒成閒客老去逢春憶少年三島月來清入牖十洲波浄碧涵天歸歟且共良朋賞花未飄紅柳未眠次韻周思道喜正孺過廣漢二首霜臺御史逈名藩氣象光隂動故山此日郡中誇盛事明朝堂上拜慈顔御香持去仍輕别天詔飛來即召還南北唱酬皆勝絶一窺方識豹文斑鴈樓南畔報來期遠俗騈闐望錦衣官府奉迎因直指家庭喜樂是榮歸款慿罇酌延談議密獻囊封中事機莫嘆宦遊多闊别九重深待弻予違送東方子春歸廣漢閒上層樓賦式微暮雲重疊鴈南飛三秋已有還鄉念十日那堪送客歸世路最宜心似水年華休嘆露沾衣一官擬得知何處回首風標又闊違送周思道郎中通理益昌閩見寃魄久艱伸吾以仁心濟不仁十室苟能全一子萬家無慮活千人于公治獄門生相韓厥成功世有民隂德所施陽報在莫嘆孤宦老朝紳和寄周郎中省郎華髪倦遊時却憶當年一布衣仕路更勞何足戀家山可愛不如歸吟中斗絶紅塵味静裏能延白日輝某水某丘眞舊物春來贏得掩重扉寄廣漢周思道鴈橋古郡誠佳絶熊軾名郎暫鎭臨雨滿郊原千里潤春歸臺榭百花深將迎意味煩清燕閒暇工夫屬静吟若詫湖亭風物好西鄰猶有不平心和陳圖南州學石柱題名之作三首方柱鎸題誰厭頻三年還見一畨新姓名已載推前逹行列猶虚待後人清世雲霄如坦道壯夫思慮惜青春瓊瑶定得連城價至鑒從來不貴珉鴈塔題名故事存泮宮鎸柱又増新十行詔下方求士千佛經中定有人錦繡燐斌涪水畫風雷變化集英春公卿皆向此途出豈待區區佩瓀珉匠氏磨礱用力勤先生序引亦清新尺書已報泥金帖原註唐人登第用泥金帖字報其家丹字仍題衣錦人桂籍共誇亨有路泮林無倦誦於春東川素與西川敵又見榮名上翠珉原註父老謂東川不在西川下事事同之昔田宣簡鎮成都始建大柱於石壁之西刻進士登科者榜曰滎名堂今郡學之柱亦其類和陳圖南安昌巖避暑詩二首石穴虚深宛似房石形方穏亦如牀千年知是誰人隠一郡除非此地凉山外雨來煙色暝林間風過藥苖香塵埃巳斷尤清寂今日禪僧不上堂巖前數步到幽房巖裏聊安息偃牀已得清風極瀟灑休彈白雪恐凄凉平時地籟乗空發何日天花墜雨香三伏屢來君莫厭流年背我去堂堂和再遊二首仙居殊不類樊籠瀟灑清涼皆可封原註古詩松竹可封瀟灑侯又云便須封向清涼國寒溜恰如揚子水脩筠應有稚川龍雲深沉是門無客人去惟聞鶴在松原註古詩只應松上鶴便是洞中人向此却疑推律法應鍾何事代林鍾石門髙下両相通冰屋初開不復封睡穏好欹方水玉味清須試密雲龍詩筒迭和難親筆談柄閒摇屢折松便寫姓名鎸翠壁休論功烈刻華鍾和三月二十一日遊海雲玉節重來鎭此州暫驅千騎上峯頭春䦨好為良辰惜俗樂誰知急景流山色也疑今日盛物清渾勝昔年遊登臨賦詠知難再持語鄉人早借留南充縣野翁亭勢利紛紛萬慮侵縣亭聊可一登臨日前不近将迎路塵外能消富貴心燕處自知如隐遯縱談誰更及浮沉時平樂得常棲地且向幽閒寄楚吟和義夫出文谷羸馬駸駸不厭驅望中天勢接晴蕪一朝偶適林泉興十里誰開水墨圖枊線漸看金弄色雪花猶見玉為柎登臨自得詩家路寄語紅塵為訝迂雲頂寺秀巘層層一徑通秋來更植萬株松閒中日永宜禪性望處雲平見物容半夜起風喧地籟何年説佛響天鐘塵埃滿馬遊從隔寄恨煙蘿第幾重雲頂寺蹙雲軒寺枕山巔擁翠峯幽棲更與白雲通半空欄檻千尋外兩蜀風煙一望中晨霽最宜天浩蕩夕隂先覺雨𠖇濛頃年曾坐盤陀石不到軒前目未窮送唐誠老秘丞越溪千里碧滔滔匹馬西遊豈憚勞文牘甚稀如吏隠江山有助作詩豪和風盡日生眉宇白髪何年上鬢毛好向堯庭露華彩韶音方奏德輝髙和紅蕉二首嫩青叢裏色何如猩血雖紅莫奪朱曉薦赤璋開繅藉夜燃綘蠟照珊瑚穠華如擘霞光紙芳價堪酬明月珠欲識此花堅與否願將眞偈叩文殊綺牕開處畫堂西紅緑相参數尺低種得青琳生寳熖裁將丹錦䕶封題染因乘露皆鮮翠舞為交竿少整齊惆悵夜來經暮雨糚痕幾㸃帶嬌啼有惠詩求酒者和答二首贈以兩榼閒居偏向酒中間已把人間比夢間飮量欲希江海納醉鄉應有路岐還髙談好對清樽樂屢舞猶嫌數斗慳信有金船少風浪莫乗輕舸下深灣愁腸思得濁醪澆渾似春苗旱欲焦洗甕已於坊禁㠜原註洗甕先知醒酒期見韓致光詩典琴誰向息錢饒原註村酒典琴醉見栁仲塗詩醒心未免嗟牢落醉眼偏宜望泬寥酩酊到來須畫寢信知畢卓勝邉韶次韻劉希道龍圗鹿鳴燕進士賢能書上鹿鳴時欲歩丹梯别釣磯名世公卿加寵薦故鄉親友待滎歸通經豈比籯金價成器難藏璞玉輝威鳯有雛鵬有路相將盡向九霄飛和知府右丞秋貢燕士席上所賦應書羣彦稱旁求勸駕賢公禮數優名出士林當赫赫詩歌鹿野自呦呦雲霄去路程皆逺杞梓良材幹盡脩登却龍門須變化奪標人已在船頭和鹿鳴燕進士二首石室宏開化二川文場今歲不遺賢鸎慿暖律方遷木鶴遇祥雲必到天隨貢充庭知有路乗風破浪去如船龍墀唱第程塗近應在春餘數日前里有賓興方啓燕詩稱樂育願升歌英才盡向師門出貴器須慿匠手磋澤射定誇楊葉箭鄉衣便促錦機梭諸生大㨗諸公賜先紀王勲後戰多和八日登髙八日登髙九日同拒霜寕有兩般紅流隂漸老三秋後嘉客相歡一醉中塵裏仙官應混俗坐間談麈自生風龍山故事今辰㑹雖欠笙歌不是空重陽登城上得層城暫倚欄況逄佳節萬愁寛山青水緑等閒好酒白花黄隨分歡一月放懐能幾許九秋生感又多端龍山勝事今何在空使騷人賦蕙蘭和十日菊今辰誰道此花衰更倚欄杆把酒巵白眼漫生秋後意黄金不减夜來枝化工應己均開落心賞何須問速遲嵗歲樽前鎭相似風光千萬莫差池和郡齋即事表裏山河久鎭綏府無留事縱懐時自將遠業更中外不向榮塗計速遲冲談本從天理得安閒常有道心知元元未盡躋仁夀日望登庸為審思郡齋春暮自覺勞生萬事非宦心從此更遲遲凄凉好飲悲春酒閒暇猶吟送老詩軒冕去來皆萬物雲山早晩是歸期懐民報國終無術空負慙顔對一麾淨德集巻三十四
