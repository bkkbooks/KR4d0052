body:
  text: 淨徳集巻十一宋吕陶撰申狀申府帥并二司狀右某自今年四月三日後來累據九江縣茶戸等各陳文狀申説彼官場減價買茶却將餘上價錢令各人充息請買及不分早嫩粗細色額只作一般取買委有侵損乞指揮貴獲存濟某尋帖堋口作場令依市價收買兩平稱來如敢淮前以好為惡將貴作賤及不分等第髙稱斤兩牙子専攔必定根勘斷决監官以按劾申奏如此行下非不丁寧緣議者立法要除息三分旋賣旋買逐塲若盡價收買之後將來客旅計算不成不願興販必至積壓損壞監官例遭責罰干連人盡著賠填以此須至順承茶場司風旨減價收買所貴客人願來興販變轉得行原註假如茶一百斤毎斤一百文若便作一十貫買則恐客人不肯用一十三貫又請買以此減下園戸假錢只作七貫收買所貴有客人作十貫請買或是園戸自納三分息錢請引出外原註園戸茶貨須得中賣與官若將往别處變賣便成犯禁無引不行𬒳此仰逼須至自納息錢三分請引出外情弊如此上下通知茶場司僚臣恐出息不多難沾賞典空行文牒督迫州縣其實則任今減價收買逐塲監官畏懼茶埸司威勢恐遭責罰干繫人則深憂將來損壞賠填一向刻剝圓戸低估價直收買毎斤除牙税頭子錢及交子陌外只及半價州郡之吏熟視疾苦無力以救行之日久為害轉深茶戸嗟怨屢有詞説及至今月十九日為本埸支錢併盡有園戸三百家以來約及三千人止約不住各自將茶直上監官㕔堆垜團圍秘丞伊固主簿薛翼語言不遜須要稱茶逐官各回廨宇衆人遂便撦破薛翼袍䄂并至打隨行手力等其牙子一十二人並各迴避陶尋出榜且令園戸任便四散暫將茶戸往蒲村木頭導江等處官場中賣并行諸縣曉諭保正等不得妄有在路阻節及差九隴主簿勾龍驤前往曉諭園戸同共買賣兼差本縣令薛髙或三日或五日一次前去照管陶當時即不敢皇申覆亦不敢𦂳行根究致打手力之人葢縁愚民聚衆忿怒爭閑惟雖難恕而虧損茶價其曲在已從而賣法愈更厚顔以此一面出榜嚴行約束及根䆒次陶再詳山戸茶戸若外面私賣一兩便成犯法將至官場例被監價費用不足大抵小人之情至於窮塞則何所不為深恐此事非西南之利伏望某官更賜體訪減價事理喧閙因冝如陶所言不妄即乞特為敷奏乞改茶法以便逺方陶聞體以得六月以後猶有晩茶一色貴者毎斤不過三十文若盡收買所出之息亦不甚多縁逐處自開埸至今買獲茶貨旋行出買頗有厚利如或朝廷謂此成法難便改更即乞自六月一日以後權任收買法令克私交易所貴園戸留得晩茶一二分盡價買與客旅少助生計亦遺秉滯穂與民之義謹具狀申知府龍圖運使學士運判大博提刑郎中啟謝薦舉啟官無異最恩出誤知索實於中寄顔何地葢聞得士若賞君子本乎至誠事君以人上臣存夫大節言其理勢則親讎不間考以分義則貴賤相須然而性品之偏未嘗無蔽才資之義安可求全必恕已以窮微務擇能而適用韋弦因緩急之利規矩從方圓之宜寧可棄千金無俾衆心之失不輕一介庶幾乎羣智之求故甄揚之道甚寛而疏懦之人有立伏念陶寒鄉寡與樸學粗堅操修務合於大方策發願於素業也以治身而議乃戸庭自處之常以任職而言無毫髪可褒之效居常懐倖位之恥何當卜當塗之知伏遇某官博愛推仁大公為治待之以簿書之外納之於名教之中特爾採收欲其磨厲此明公育才之意不責以近切則賤子報德之誠亦期與他日自明以義岡食斯言謝薦舉啟官無善狀事出誤知索實於中寄顔何地竊謂朝家揭三銓之制較羣史之財責在薦論因而甄陟科條詳宻統要謹嚴郡邑之差各限員於衆寡賢愚之際皆同義於戚休然以一嵗而言計其四海之大擇能顯舉者不啻千載第課引對者不慮百人厯驗前朝推之今日豈非有與進之道則多士得以憑藉有至公之義則名卿受以抑揚可潔其流而不可窒其源乃重其體而不可易其用夫何物理寖薄人謀少敦苟奔援致之塗肯顧持循之操各矜巧行多餙偽端或姦回其心迹希蘧史之直或貪冒乃欲口誦夷齊之㢘或抗戾以謀知或將迎而幸進故朝稱良史暮陷匪彛少享令名長違寸節薦之不慎玷者實繁嚮嗟紛縟之風重革選求之弊特頒明詔申諭庶士戒以自陳責夫至當其難亦甚所採踰常直得偉人以快輿論如陶者稟所不慧嚮學粗堅既得祿以代耕愈愛身而有待所先行已未可自明其次及親居常有得幸而進趨屬部寖沐清庥子舍親賢毎襲芝蘭之益賔除請覿屢聞藥石之談固未嘗輒吐一辭仰睎奬遇妄修尺牘僭上品題誠以處躬不祚則無患莫知冒恥以進則頗均市道且審知於寒懦冝引避於豪英何愧此心惟安其分伏惟某官厚忠義之藴持權衡之平恢令徳以澤生均愛心而接物明於察隠昭若戸庭凡所留忱傅如羽翼謂犯難沽衒者難亮其往謂循黙懇愿者可要以終無間短材遽飛陟狀竊謂磨一鈍可以得貴器扳一賤可以來智人髙賢之懷兹有所激愚者之慮敢忘其歸陶謹當究從之以大方朂治身之素守炎凉忽易性所不能名教可遵巳將焉往倘力行而寡過亦論報之一端舍此以還非敢語及答諸官謝薦舉啟比聞治罪輒露奏封蓋為公朝之薦才敢言私室之専恵遽煩厚眷特貺珍題仰荷謙光徒増感怍謝登制科啟聖問該明深究一時之弊芻言猥略愧非三道之才服寵過優寄顔良厚夫取人之術惟名實之辨不欺則可要以終行巳之方惟義利之分不惑則能伸其志嘗觀制舉之開設莫盛本朝之選掄公卿間出而廣有濟時之功豪俊繼起而屢聞康國之論髙風慤矣故事存焉以科試論謂之名而實乃詢於闕失以進取待之亦謂之利而義難苟於謏從雖隆薄之在人亦輕重之由巳如陶者寒鄉寡與樸學粗堅强為文辭而氣格不髙好窮事變而事畧無取徒謂前良之可慕又思聖主之難逢輒不自量庶幾少立幸被德音之召俾從國士之游咸造廣延仰承清聞方朝家大有為之日惟萬物更新而詢于芻蕘非天下不敢言之時故一夫進説而寛其罪戾况夫自漢而下有唐以來賢良為舉者凡幾人得失最明者惟二子以谷永之附託而轉攻世主之過咎則今之愚者所不能以劉蕡之量切而卒為有司之案遺則古之賢者或不幸殊自慚譾陋亦預甄収此葢以某官講求治體而務在得人崇倡化風而樂於進善權衡之平也不私髙下於彼物鈞軸之運也不繫剛柔於我心是致孤生偶塵髙選昔也謀道素聞取舍之大方今也丁辰益勵始終之常節倘力行而寡過亦論報之一端過此以還非敢語及賀宰執啟伏審中扆疇庸外延申命爰咨舊徳入正冡司一發寵章交流善政竊以明王席盈成之勢所急任人大儒懐康濟之才乃能致治聖賢胥㑹海宇均歡恭惟某官體合道原用該皇極敷為逺業茂對昌辰以經緯之文發揮三代之風以疏通之智酬酢萬事之變如君陳之孝友務適厥居山甫之將明不遷其守也盛矣垂裳之善繼著哉衮繡之來歸股肱良而庶事康允為社稷之鎮陰陽理而四時順兹見天人之苻凡屬羣率依洪之化陶幸分符竹獲守近邦鈴閣深嚴阻聞名于將命台躔炳焕徒延頸于平階蹈咏之誠敷宣罔既賀成都趙大資啟伏審誕告外廷再煩舊徳進徽名於秘殿倚重鎮於遐方凡出綏懐舉增歡頌竊以天下之勢如腹心手足之交扶劒南之權實屏翰蕃宣之最盛葢冨彊者縣官之所仰給而險固者中夏之所防虞昔之國步天夷則二偽乗時而苟處間者王澤或壅則三盜觀釁而輒奔驗聖朝逺馭之心盡累世深思之要有恩以結其情也故文法之體大槩歸諸簡易有威以神其用也故牧伯之任一切付以權冝習慣百年靖康三蜀物情自遂帝力何知幸㑹熙辰始更洪化雖朝廷之盛舉方改弦易柱以圖寧而風俗之未諳或傾耳側目而駭政伍保周之遺法也行之所以息寇盗而連甍多懼於網羅租庸唐之定賦也復之所以抑兼并而下戸反嗟於朘削患浮費之不㑹而裁以憲度則父老謂絶其嬉好與大法之有宗而戒其權斷則姦暴竊窺而倡獗此四者之異論乃一方之切憂冝得鉅公以寧舊俗恭惟某官至誠自任大節不欺體魏相之方嚴濟酇侯之清淨言其更踐由臺閣而至廟堂考以猷為該本原而盡變之故惟方面宻若家庭因冝施務則益適中和以俗教安則安由仁義譬如陽春之令一動而品彚蘇百樂之音一御而淳氣浹必復頃年之治體載揚今日之歡聲陶早以疎凡誤煩敦奬預里人之胥慶同郡吏之知歸謝轉官啟銓臺第課宸扆均休擢自選曹置諸文省撫躬踰分祇命若驚竊以古者任官舉求實效昔之受位葢恥虚名惟史局之舊員亦儒林之清選魏晉而下隋唐以還偉人迭居大雅交勝圖書東觀之直元本承明之庭綴集多聞補完缺典撰名臣傳每取信於當時有良史才頗見稱於後世風徽既逺職業寖殊雖𨽻籍放秘文苐服勞于外事鞹猶虎豹有慊於中體若柚榛徒華其外况國家天綱清乂世路寛通詠思皇之詩實生多士調經入之費足食萬官然而事失於循仍弊成於積久雜流乗奔潰之勢正塗有紛縟之幾持議者患吏冗之未澄務艱其採擇干禄者喜時平之難得益競於進趨其求之矣自處巳輕其待之矣亦從而薄以至錄勞而改秩猥多立式以求全既詳其保任之科又嚴以資考之格旁窺釁漏密較錙銖嵗月以須僅同癈去毫釐或誤輕以罷聞苟天幸而有成豈地寒之可望如陶者稟靈不慧嚮學粗堅憑翰墨之空言竊斗筲之微祿夤縁冗調微覬序升逢堯舜之昌明敢忘希進誦周秦之貴賤亦已厚顔非有力成胡然虛授此葢某官厚樂育之藴輔泰通之時恢令德以澤生均愛心而遂物颷然若傅之羽翼指秋漢以遐飛沛然若假之舟航臨長淵而獲濟乘以雲霄之勢脱其塵坌之蹤頂踵甚明邱山何補嚮之探道已知行巳之大方今也丁辰惟勵終身之素守庶幾異日無忝隆知荅周考功賀轉官啟比以年勞偶遷祿級小材累日練覆無聞寵命自天叨塵可愧寸進雖朝廷之格力成皆嘘借之功此葢某官樂善以誠愛人由義厚鄉曲之契常借品題從搢紳之游陰為援助誤令嵗滿以可階升占謝後時愧區區之闕禮致勤委教聞侃侃之令言仰識庥光伏増銘佩淨徳集巻十一
