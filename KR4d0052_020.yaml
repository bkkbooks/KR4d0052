body:
  text: 淨德集卷二十宋吕陶撰䇿究治上臣伏思國家享有天下百餘年矣吾君吾相同心合德日夜孜孜營治之勤過於前古而太平未見其實者弊果安在哉好靜而惡動喜無事憚有為而然也夫靜出於動無事本於有為天地之生萬物其先莫不旋斡運變周流不息以極其神而後乃收功於靜聖人之經綸斯世其始必剗除蕩滌無所不施以平天下之多難而終乃底於無事此物化之先後治道之始終其致一也今惡動而憚有為則所謂靜與無事者終不可得而猶好之喜之不亦異乎世俗之論曰動不若靜循仍易而興作難是不究利害之深淺理勢之宜如何也是執一隅之説不知適變之道也是苟一朝之樂不議千日之憂也夫人之受疾有輕重故醫之為術有速緩或一寒一暑之侵爍發於膚腠此其淺而易去也則治之之術不過安神靜氣而自固可計日以起至於腹心難治之疴則不然彼其所感者深故所苦者甚異既將鄰於悴亡而吾猶使之自養以待抑亦遷矣是必力攻急逐於死生之際而決其一勝何瞑眩之足惜哉大厦之居莫不欲便安而重創建藩籬缺漏補葺之可也榱桷敝壞完治之可也若乃基構頽圮梁腐棟橈一大風雨幾有摧覆之患則又豈補葺完治之可救哉勢至於此而猶重創建之勞則無以享便安之逸矣天下之事固有不可已者而已之非所以振起治功而恢明國體也方今之弊豈非天下有不可已之事而朝廷有不欲為之心乎持不欲為之心當不可已之事則取適目前而未暇於長久之計臣恐國家之政日苟一日歲苟一歲而可憂之漸有甚於此時者矣夫二敵盛強窺侮王室兄弟之好既結於北而王爵之封已加於西歲出金繒數十萬分命賜與以為固盟之具可謂厚矣諸邊要地夙昔經意城守攻戰非無傋矣介使屢至謾書數上出無厭之語啓難塞之求以搖動吾君吾相之聽亦已久矣此朝廷之公患而天下之深不平也然猶以勞民為説以好戰為戒未嘗一議誅伐之䇿而與之正中外之分惟默然貸忍百計應接而幸其不為南牧之舉臣竊以為未安也大河為患歲歲決溢朔方諸郡衝潰不常生民之死于墊溺者為不少幸得保其餘生而力困於河者亦多矣蒸薪之積隄防之勞無時而已也大扺壅之於東則奔於南障之於西則注於北而不見其素所謂河者果安在也洪流之害可謂極矣此朝廷之所共憂而天下之所熟聞也然猶以開疏為功以遏塞為利募富人度釋子以給其費欲息尋丈之奔衝乃致千里之漂潰而未聞建定大議觀水所向徙民避患而徐為之謀臣雖甚愚亦不敢有取也舉今之務莫大於此兩端皆其勢之不可已者猶已而不為推此而下則庶政之苟簡臣不得而悉數矣是以天下之人激昂奮厲之氣少偷且怠惰之心多事勞而治功不立政發而王道不隆由此其故也惟吾君吾相深窮利害之本而權之以時乘聖賢之會而相與講磨淬濯於廟堂之上不惑於一偏之説而斷之以力行善動而不懈大有為而無所憚以起天下柔弱不振之態而完其堅壯全盛之體可也古所謂日中必熭操刀必割則機會之至其可失乎究治下臣聞人主欲有為於天下而無所憚則天下之事不足為也然而名實之辨不可不察也舉天下之事而皆可以為則天下莫不知其善治也後世莫不稱其難能也天下之事舉皆為之者實也莫不知其善治稱其難能者名也事有本末名實有先後本近於實末近於名實居其先而名處其後也好實則所務者本也無意於名而名隨之好名則所逐者末也未必有其實也此名實之辨也昔之聖人施為於天下者蓋非有求於名而行之及其成功事立而名自傳舜舉十六相誅四凶所以去天下之害而興其利也然後有進善黜惡之名禹舉四載決九川導九河驅洪流而放之海所以保斯民之命而粒其生也然後有捍災禦患之名三代君天下耕以井田稅以什一教以學校罰以肉刑所以援斯人而納之仁壽也然後有至治之名然則名者豈在好而求之哉王政之弊莫大於好名而不為其實好名而不為其實則事失本始而所逐者末也後世不知聖人有得名之實徒見其名之甚美竊好而欲求之乃獵取其近似者而行焉及索其實蓋闕如也今日之弊信有類此矣國家嘗詔司農條三歲之出納命執政議其入計者豈非古所謂冢宰以通法制用於歲杪乎然而取之過藝極而橫斂數下積之非有餘而浮費無窮不可量入以為出也耕三年者未有一年之畜也旱乾水溢則多菜色之民也又嘗詔羣吏勉修厥職毋以簿書期會畢事者豈非古所謂興教化以厚風俗乎然而朝廷所擬議制令所布告者類多賦役獄訟米鹽貨幣之情乃俗吏之為而未見其可使天下回心嚮道之具也又嘗詔中外臣屬以密封論時政者豈非古所謂明主好道而求諫百官針王闕乎然而公車不召對尚書不問言未聞燕見紬繹而覽章引咎也凡為此者得非先名而後實歟誠能均節財用寬裕黎元矣可以命計司制國之經費也誠能導民以德動民以行矣可以責羣吏於薄書之外也誠能求善無厭改過不吝矣可以來天下之上封論政也凡為此者為先實而後名也天下方患名之浮而不見朝廷勤治之效苟人主一旦奮然揭其實而示之以聳動天下之耳目則德日起而大有功若雷霆之震日月之臨照威聲光耀窮極天地之表而著見萬世矣所得之名豈若向之近似者哉臣敢遂道前世有為之君殊勳懿烈已驗于往者以取必於睿斷昔漢宣帝勵精親政綜核真偽信必刑賞樞機周密品式傋具上下無苟且之意於是生民安業而單于慕義來享議者以為效優於孝文而德侔於商周之賢主唐憲宗決䇿定議明抗國威以平數十百年方鎮僭叛之勢則亂階逆本誅削幾盡而唐之紀律復振齊威王小國之諸侯也委政不治強鄰交侵及其封即墨大夫烹阿大夫發兵四出則趙魏衛之君請和國人震懼無敢飾非者此皆為之有其實也况以國家大定久安之勢究其實而不奪於名則何施而不可何為而不立豈特漢唐之比耶惟陛下留神考察明任上古之聖人制為君臣以立於朝廷者豈獨辨上下之體全人主之尊而已乎其勢必相須其義必相濟將以辨天下之事也然而君臣之際常患乎責之非其任待之失其心無相與之情以固相須之勢無相信之實以伸相濟之義是以賢智才能之士不獲自盡於上而治道有未至焉此其故非他蓋人主以細務為先而不留神於天下之大計以猜疑為術而不思憂患之誰與處也夫天下之事固有大小矣治亂安危之機政教威福之具所謂大者也舉而責之大臣則當矣大臣之責既重而天子待之又深不以崇髙富貴自處而薄其顧遇之禮不以盈成間暇為足恃而與之計及存亡休戚之外相接以情相交以道上無疑二之隙而下無猜嫌之端則固能竭忠致力盡其得為之分而天下之事不足辦矣此易所謂泰而劉向以為通而治也永惟堯舜之盛九官分職禮樂刑政任得其人而朝廷之上咨嗟都俞君有以諭於臣而臣有以告於君其言皆出於懇誠而其道各務於訓戒昌明之化基於此歟漢髙帝唐太宗皆以英豪蓋世之才經營天下竒謀密計則責之蕭張典章禮樂則求之房杜其君臣之間相與論議則丁寧反覆切究事情密如朋友此聖君賢主善任大臣而能盡其心以崇王道之大略也二府者所謂經邦論道之官與天子維持天下而圖安危者其智慮之所存其才業之所及豈止於除吏斷獄之間而不出金榖律令之外乎生民未乂必有以安也四方未寧必有以禦也教化未至必有以導也紀綱未傋必有以完也朝廷之所責者其重如此則所待宜何如哉昔我祖宗皆深明大臣之任而明職任以待當時之輔相可謂至矣或諭以撫中外和隂陽為效或戒以進賢退不肖為職或命以簿書之外極言時務或賜以詔旨問扞圉之䇿或給以筆札俾疏陳利病其於君臣之義豈不篤哉此真忠大節之所以感奮而嘉猷至計之所以不可默也天下之務不患其不能盡矣今埀拱坐朝邇英召對奏白之餘清間燕處其亦暇及於此乎其未暇及乎臣實疏賤莫得而知也及于此矣則聖賢之交萬政畢舉天下之大福也若猶未也則上下之情疏而君臣之義有未至朝廷庶務失於講之無素重貽他日之悔矣固非臣之私憂過計也然好議者竊謂陛下嗣政之始天威赫然睿略雄斷如髙明之不可窺而度左右大臣雖有逺謀竒策可以盡天下之利害猶深思極慮而不敢輒發則亦非朝廷之光懿伏惟明主以社稷生民為心敦厚恩義八大臣耳方其天下無事朝廷清明刑訟衰少財用富積禮樂大傋兵戈不試則大臣無與彼事而享成功可也若乃法令不一而刑罰濫國費不給而民力困禮荒樂淫而教化流弊軍旅不足用而四方未寧則安可無與其施為興作之間哉今天下號為治安然非無事之時也元勳舊德謀議廟堂非無致君援世之術也而天下之人有未喻者三臣是以不敢默也夫是非異論成敗異勢則處之以與奪乃可以成天下之利然而功過隨之行有得失政有可否則補之以獻替乃可以全人主之美然而榮辱繼之賢不肖混淆升黜謬戾則辨之以進退乃可以用天下之君子然而毁譽應之不處以與奪則不能息天下之謗而何以成其利不補以獻替則不能救人主之失而何以全其美不辨以進退則不能除天下之小人而何以用其君子是故大臣之於君必息天下之謗而不計其功過必救人主之失而不慮其榮辱必除天下之小人而不恤其毁譽此所以成其利全其美而用其君子也漢欲擊丐奴右地魏相以為不可報怨於逺夷願罷其兵既而三世稱藩無敢入寇於君臣之際示之以至誠結之以不隱降意垂聽從容終日以咨訪詢求於二府之臣使之言當世大務而與之圖其取舍則處無遺䇿舉無過事治道日隆而盛德新矣明任下天子待大臣以不疑則上下之情相通此治化之所由起也而大臣之報於天子豈可少愧於心三公之官不以一職而名者蓋天下之事靡所不統而未嘗專於一也是故與天子論道於朝廷而參六官之政與六卿之教焉且論道經邦而六官六卿之政教皆有所與則天下之事安有不責於已乎然而理勢有本末體用有大小務其本不務其末為其大不為其小此所以持其宏綱聽其治要而不若百官之瑣屑也古謂宰相不親小事者如此而已後世惑陳平一時之言而為之説曰決獄以廷尉治財以司農禮樂有奉常軍旅有將帥宰相者任人授職享其成功而已至於施為興作皆莫得而與也為是説者知末務而不知本可襲常而未可應變矣何則天子容保四海臨制萬事而與之其政者乃七唐欲赦吳元濟以恱方鎮裴度謂不與賊俱全請自督諸將以討乃能平蔡之亂此處以與奪者也今天下之事或急於邊或切於國或未宜於民而羣臣有以更張廢置之議聞於廟堂則少為之裁決而多委之有司且要以不可有失上指者何也王嘉在位數務諌諍陳蕃楊震疏佞邪列災異語皆切直魏徴指陳善否多至數十萬言此補以獻替者也今朝廷之政未必無失或繫於睿德或關於聖教或動於天變惟諌官御史敢語其端而未聞謀猷入告彌縫衮闕者何也傅遷訐政則孔光勇於罷黜楊肜在朝則王商為之奏免此辨以進退者也今天下之士上自朝廷之吏而下至山林之匹夫修潔操行苟有所立則大臣嘗收其器而用之矣至於宿惡巨愆足以殘民黷化幸而未投於罪罟則未聞顯白其狀而廢放之以激清下流而感起昏俗而猶使之貪爵冒位以居人上者何也凡為此者豈非以人君之權不敢侵而功名貴其全歟惟明主深察夫為臣之難與得君之不易既待之不疑以通其情又亮其不侵以責所報則庶乎能釋天下之所未喻矣議官上天下承平既久任官之弊極於今日矣仕路益寬紛紜坌塞而朝多幸位也吏員愈衆國費益廣而生民困窮也郡縣之重牧以匪人而德澤不宣也日月為勞職業不厲而萬事墮廢也人人競進茍覬祿利而亷耻銷亡也積數十年之弊而欲一朝革之不窮其源而決之於橫法未見其可以澄清也弊固有源矣入仕之法不精用人之制不愼也臣不敢逺托古訓立為迂疏之論以取髙於衆惟列述祖宗成憲參以近事願朝廷揆酌其宜而用焉可也貢舉之數雜流之選昔歲議之熟矣獨任子之恩雖加裁節而猶或疏焉臣故曰入仕之法不精也建隆之制歲補有定員而重以試覆試不如奏書坐之也祥符之詔入學習經限年課試對於廷而授之職公卿子弟有以術業不明而罷歸也夫定員入學之制固未易復於今而習經試覆可少倣而行矣臣愚以為凡廕奏書可著藉而未命詔以一藝為能若經史若兵刑惟習之聽嚴其科格而核其能否能者官之而未能者使之退而復習要其成而復命之則上有考實之功下無增年之詐恩補之數頗損於舊而不患於濫矣夫州縣之吏為考六七舉者一二人則亦可以治縣治縣者考六七舉者五六人則可以為京秩而治京縣門資而京秩者考六七舉者一二人則亦可以治京縣治京縣者六歲舉者又二人則可以為治中為治中者五歲舉者又三人則可以為郡守以國家斂才旌善之深術使人樂為之用而不已也然而法制一定循襲既久泥不知變則進退在下而與奪不出于上反為用人之大弊甚可歎也且天子之尊人皆畏信而不敢慢者惟取舍在我而不徇於衆人也今責考其任如此限其舉者又如此苟有合於式度則選吏而上至郡守皆可計日而得是下有必取之勢而上無必不與之理安敢議其賢愚而進退哉所謂人主之威柄者猶不得而持之也夫不議賢愚而惟式度之從則黑白雜糅而官政壞不足怪矣臣故曰用人之制不慎也臣聞祖宗之時州縣之吏陛見而改秩其升黜可否一出於人主之意而無必得者也凡以私弊被坐於決獄而失於深故者屢對而不遷矣自擇能吏分治方州而責以秦彭之效矣選治中以佐武人之為牧者也録外官功過而閲於禁中矣以名召對而旌擢者二十四人矣凡此者皆以明威斷而示奬勸也今陛見之吏未嘗不遷向之不遷者惟增歲考而益薦員也郡守治中之舉歲無常數而塞詔者衆惟有司第具先後而授之也外官之功過天子未嘗盡知也召對而旌擢者未見其人也為法如此而求任使之當將可得乎臣愚以為凡吏有升見而改秩者莫若就按故事差次功過而特可否之增考益薦之令輒廢而不用凡京秩而上素所謂舉而升者自今以往悉宜罷去時召大臣部使者二千石慎擇良吏而薦如近日尤異之比歲不過幾人命有司與左右之臣詳考行能倣用資格如比歲政府除選之類任以守宰郡承之職明主周詢廣采而寵榮其卓然者則與奪在式度之外而進退出於威柄天下之吏孰不淬濯奮厲而求聞於朝廷哉其衰懦猥暗自知不能有立於斯世者必亦退避縮藏而不敢覬幸矣任官之大弊庶幾可以革也議官中救弊之術如治水既澄其源而不疏其流以就潔清則必散漫四出漸潰汙濁之地而復為向時之患臣前所論者宜為之先可以澄其源矣繼而有潔流之議則安敢默哉夫精其入仕慎其用人者所以進天下之賢而退不肖也以一日之法制施於十萬人之間而救數十年之弊則天下之賢豈能盡進而不肖者豈能盡退耶蓋亦大為之防而徐導之磨以嵗月而期於成也夫天下之吏非盡賢而亦非皆不肖其勢相雜而未一則導之之術莫若明趣尚嚴責任使天下之人曉然知君子小人之分不可少亂而朝廷懲勸之道詳審别白則賢者安其勢而不肖者易其非何弊之不可去哉今日之患蓋趣尚不明責任不嚴君子小人之分亂而所導非所勸故也趣尚者義利之辨責任者勤怠之分也厲之趨義而不誘之以就利所以明趣尚也而趨義者多矣督之勤勞而不開之以怠惰所以嚴責任也而怠惰者少矣趨義則亷就利則貪勤勞則稱職怠惰則廢事此人情之所同而天下之所共知也朝廷之於百官貴其亷而賤其貪者欲天下之吏皆亷也而或誘之以就利則安能勸天下之亷乎樂其稱職而惡其廢事者欲天下之吏皆稱職也而或開之以怠惰則安能勸天下之稱職乎且仕而受田者所以旌圭潔之行而養之非計其歲入之豐而設為髙爵重位也守以長千里丞以佐郡而令以治縣名器之辨在此而不在彼也今圭田之任皆躐而授之不復議名器而為歲入之辨守或俯而為丞丞或詘而為令矣為之者豈皆妄庸而無知哉世所謂善人能吏者往往流入其中而無甚愧之色謂法令許我以然也趣尚之不明如此則仕者何利而不就乎此貪冒之風所以起也夫張官置吏而分以職者欲舉吾事也事而不舉則職廢雖罪之亦無憾矣生民之疾苦未蠲賦稅之事輕未一監司守宰之過也可責之矣朝廷嘗欲恤其疾苦均其重輕而不貴於可責之官乃特遣吏以辦之臣不知髙爵厚祿而素養之命曰與我共理者將安用耶責任之不嚴如此則居官者何事而不怠乎此廢弛之患所以成也二者非獨吏之不肖皆朝廷有以導之而不勸矣臣故曰所導非所勸也嗟夫圭田之躐授足以起天下之貪冒矣况姦贓有復用而無永黜哉祖宗之禁不如是之疏開寶以來有棄世者也恤民均稅之特遣吏臣以容天下之廢弛矣况不職聞于上而無失舊物者哉祖宗之恩不如是之濫淳化中有處以州佐者哉臣故曰莫若明趣尚嚴責任趣尚明責任嚴則吏勸而政舉也議官下夫古之循吏布宣德澤設為條教使民宜之深而信之篤所居稱治所去見思風迹炳然垂休千載而後世莫能及之者何也非古之人皆賢而後世之吏多不肖也非風俗之醇漓代變而治體不可復也意者朝廷之於君子待之不適其分用之不盡其材而遂有所不為乎尊賢而退不肖者人倫之大别也尊賢所以勸不肖退不肖所以任賢此乃使天下之士求為之用而務有所立也今智愚混亂而失其别用舍重輕惟式度之聽是故雖有卓然之才雜處其中而無所辨異則其心必亦自惰而不欲有為矣此所謂待之不適其分也法令者禁非防過之具為小人而設也君子不幸而過猶議賢能而釋之則用之於君子可疏而不可密也可疏而不可密者使才勝於法而足以適用不使法勝於才而無能施也舉今之法蓋密於君子而使之不能施其才矣科條詳悉網羅傋具大至於生殺與奪之間小及於出入起居之際一不可離於法是故雖有傑然之士願發所存以盡行已之道回環四顧而皆為法之所繩則其心憤悶沮法而不敢復議安肯觸罪冒禁以求驚世駭俗之名乎是以其勤勞止於簿書刀筆其思慮不出於規矩繩墨矣此所謂用之不盡其材也夫君子始仕則未嘗不以濟時及物為先務安有不欲不甘之心哉及乎既從事於其間觀其勢之如此而與志願相違也於是抑而不振晦而不彰滀而不流藏而不試惟明主思致天下之力而輔成治道豈不惜於此乎昔之賢君待循吏者可見矣拜刺史守相輒親問觀其所由不數變易使民服從教化有治效者勉以璽書賜金增秩公卿缺則以次選用今皆不可得而有也民政之重宜莫如守宰一官而共之者三人羣趨於有司閲籍而聽命計以歲月輒復代去雖百職曠惰而未至於受任則澄按所不及其治尤無狀則碌碌罷退而合為一又羣趨而聽命矣其所得之分則分毫無損益也昔之賢臣為循吏者亦可見矣使郵亭鄉官養鰥寡貧窮而又為之制喪祭之具也擅發倉廪以賑餘縣流民而得全活也減少府用度齎刀布遣諸生詣學京師也以守相賦斂違法而遽解印綬也以孝婦寃獄不理而謝病求去也今皆不可得而有也於法無有而人不可以行也一郡之廣坐斯民民將斃而不能輒濟者朝廷有未報也一邑之大熟察斯民之所勞而不能輒革者州郡有未從也不慮乎此而遽為之則姍笑其近名貶駮其興事甚者至於罪廢而不録也昔之人恢閎曠闊多出於繩檢之外以望其成功今之吏委曲遜避以趨於法禁之中而求其無過也嗟夫上之所任者既如彼之輕下之所畏者又如此之重則尤異之效循良之政何時而及於古哉待之有别而使進退出於威柄則臣嘗議其略於前矣嘉祐之詔有察守宰治行而命以久安者何中道而止也惟明主既先之以擇才授任而不取必於式度又繼之以循率先憲而戒其屢易褒賞其不欲之節而使之磨礪凡天下之吏有以宜民便國而抵罪可特議其過而時亦宥之勿拘深文遂至廢斥以振動不敢之氣而使之馳騁則賢者無自惰而有所施古之循吏出矣昔漢臣有言二千石部刺史三輔縣令有財任職者人情不能不過差宜可闊略俾盡力者有所勸可為今日道也䇿問問卦者時也爻者適時之變也觀其時窮其變賾之以吉凶推之以進退天道人事其相參乎何以周公履而不處仲尼需而不進明夷之六五利箕子之貞既濟之九三見髙宗之伐文王之德居升之四仲尼之志當革之初索求義象而質以聖賢之迹兹有望於強博也問六月宣王北伐之詩也歷序小雅廢缺為變之始則厲王之詩不列於小雅明矣十月之交雨無正小旻小宛皆刺幽王鄭康成以為刺厲王之詩學者惑焉夫康成之於詩造其藴奧也其説非妄也諸君宜辨之問三代之政各有所尚故忠質文循環為用以求其弊推其損益而百世可知矣然則聖王之垂統御極必鑒觀物理參驗勢數量揆敘以建治體使元元之生歸於中和之域而後已也豈可泥於循仍而昧於適變哉國家剗五季亂本造四海大業百餘年間號安平矣教化所漸摩法度所處治其所尚者何也逺稽三王之道近撫當世之務則所損益者又宜何如而可以濟於時耶諸儒固嘗極慮於此也敢問其略無讓焉問經者所以載道而道者適治之路也士之窮經探道而有志於從政者豈區區章句而已乎必能推明聖奧而適於用也且禮有九經書有八政皆治道之要務施之於今無不可也請條其目而陳其效焉問堯湯水旱必推之數也洪範休咎必歸之數也推之數則災異生於自然也歸之數則精祲兆於有象也國家仁厚之化蒙被動植太和之氣充塞方外然而水旱有時而作豈數之然耶抑體咎亦有其象也却衆沴而來諸福得無術乎昔董仲舒劉向父子夏侯勝谷永李尋之徒皆以經術推隂陽為儒宗今之經明行修者豈宜自謝古人而不言也問四裔為中國患難三代之盛亦所不免故禦外傋邊之策興焉議者必曰重任將勤訓兵厚其儲蓄此其大略也然則將以何道而任使之必勝兵以何術而訓使之不驕儲蓄以何法而積使之不困於民願畢其説可也淨德集卷二十
