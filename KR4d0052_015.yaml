body:
  text: 淨德集卷十五宋吕陶撰論論略聖人之道布於方策非髙逺而難知迂濶而難行汗漫而不可考信大槩以簡易為宗以盡天下之理以仁義為用以成天下之務自微言既弊章句之學承流而興百家異論衆説殊指學者各習其師亡失本統釋數字之文有至十數萬言而是非無所取正求之以經世範民之用為天下治國家之大略蓋闕如也豈故教貽訓之深旨哉人君之立乎民上雖至誠深智究逹萬事之表必師式要道以建皇極是故書陳堯舜禹之德皆以順考古道而行之為盛至于傳説之戒髙宗則亦曰事不師古以克永世匪説攸聞孟軻區區戰國遊騁諸侯非二帝三王仁義之説未嘗輒道由是而言則為人君者安可不知經術哉舍是則萬化之原無所稽法而治亂之幾隳于應變矣人臣之處乎朝廷圖逺謀至識欲盡致君之分必通習經刻求古知今然後可以剖決大疑而裁量先務是以兩漢諸儒若董仲舒兒寬公孫𢎞夏侯勝吕季主雋不疑伏湛侯霸魯恭鄭興桓榮之徒皆以經術博強果于適用其輔導世主究陳政教建大議逺業以率有位足以垂憲千古若持㩲衡按繩墨而以别萬物之輕重曲直而毫忽莫敢欺也由是而言則為人臣者安可不通經術哉舍是則止于簿書刀筆之間而無以謀王體斷國論欲移風易俗使天下回心而向道難矣永惟聖人垂教之原則既如彼君臣之際體道師經則又冝如此而學者不窮六經之用以推治亂之變規于章句之習務為衍説而滋破碎之弊亦足惜焉臣嘗探索大原得其至要以為易之本始由數而入象得象以窮理皆天地萬物自然之藴不必旁托異端以就其説故論易政教之迹不同則風俗代變聖人著其始終以貽後王之戒可以意得而有不可以文辨故論刑賞失柄則王道歸于筆削其文則史其義則裁之以權制故論春秋天人精祲之際莫若修巳以奉順政執其中則萬端不失于偏陂故論洪範明天性者長於教故論孟軻言而不知其歸則或叛去禮義故論荀卿䋥所以議道而不可議以數故論揚雄不以天下動其心則能保天下之治故論唐虞垂法創制其效逺者其流長故論三代得天下而無以守之則亡必速故論秦乘可為之時則不當苟簡而治故論西漢先幾預論則勢不奪於小人故論東漢利害之體必通究而善治故論魏禍亂之萌必有以召而後發故論晉治人之道必以誠為任故論隋天下之勢陵壞必有漸故論唐鑑於近事則切直而易論故論五代舉其條目而著之篇故有論略言古驗今庶乎有補而巳也易論上易之始蓋生于數而成于變推之而及乎人事以盡萬物之理學者安可不知也世之學者不知數之有然或以為無補于教略而不言之或言而駮誕迂怪務欲求合其説其甚者流而入于占術方技之事而後已夫略而不言者既不能洞明其原本矣言馳駮誕迂怪者又不足以尊髙易道取信于人而反為之纍則三才造化之藴孰從而究極其理耶嘗聞之曰陰陽之消息兩儀之動靜四時之生殺萬物之始終若有以尸之而不知其然者數之謂也數也者至神運動之迹顯見于外而可以名之也成變化而行鬼神者五十有五也五行生成之用而數之自然也分陰陽而生八卦者九六也九六者出乎數而入乎象也數之自然者五十有五而卦則生于九六者何也參天兩地而之本立其始也是故有太極而後有兩儀有兩儀而後有四象八卦易始于一一生二二生三三也者兩之則六三之則九九者為竒而六者為偶則陰陽之始而象數之本也聖人觀察天地之本統參考萬物之情狀探之于渾淪之先發之于成著之後為之三畫象三才也是故以畫言則曰三以象言則曰乾易也者變而相生也不變則無以通其用是故數變則三為九象變則乾生坤乾畫則三坤畫乃六因而為九也乾坤之畫未定陰陽之氣不相須以成則生生之用或幾乎息是故乾三畫下交于坤則為震為坎為艮此關氏所謂得乾坤竒數為陽也坤三畫上交于乾則為巽為離為兑此關氏所謂得乾坤偶數為陰也八卦之位二十有四非無陰也而有陽之數也八卦之畫三十有六非無陽也而有陰之數也此陰陽九六之數互見也八卦之生本著乾坤乾為陽故其策二十有四坤為陰故其策三十有六九六之數此抑又合于位與自畫之然也不言少陰少陽者七八居九六之間也數變而卦有六十四卦生而爻有三百八十四爻具有策有萬一千五百二十萬物之數盡矣聖人知夫數之自然八卦有之而生萬物由之而成於是推明其作易用著之意而之于經曰大衍大衍者所以演天地之數而神乎易之用也是以明于無心之畫而陰陽竒偶可見焉今夫三揲之後不取其籌之竒而歸與挂而一者而取其己揲者或多而三十有六或少而二十四有或易而三十二有或損而二十有八則天地之數兆於此而不兆于彼也夫不取其竒而一者何也蓋道者以靜為本以動為末靜者得之於不為不為則自然也彼竒而歸與其挂而一者皆動也此以四揲之而有九六者靜也豈非其自然耶或曰然則其用四十有九者又何也曰未分而二者一也太極之象也二以象兩而後見其用也四十有九者案此下脫二字數之極也卦以八而生位以六而定畫以九而變大衍以七而知則陰陽竒偶之數其可晦乎明此者可與言易矣伏羲仲尼之心豈異哉易論中乾坤之生六子可得而知也八卦之為六十四其可得而知乎不牽于數不惑于氣而後可知也夫易固有數而八卦之成列不可以數言也卦固有氣而六爻之適變未可以氣言也以數而言者求於八卦之先而未至于象也以氣而言者得于六爻之後而歸于象也以求于八卦之先而牽乎數故于坎離先天地得于六爻之後而惑乎氣故謂卦氣起中孚蓋數與象與氣于卦之相生其迹甚近而其理甚微宜乎説者之不能别而紛紛其間也譬之於人其智愚夀夭者數也其四體具者象也其動息語默者氣也今目之曰人者將以其智愚夀夭與其動息語默之何如而稱之耶亦以其四體之具而稱之也其生而有智愚夀夭則置而不言其動息語默之何如而未議及之蓋有生而後有體有體而後有動息語默數之與象象之與氣亦何異於是有數而後得其象有象而後知其氣也有數而後得其象是以三畫為乾六畫為坤謂之乾坤而不謂之九六則卦之相生不可以數言而可以象言也有象而後知其氣是以有復之象而後明之曰七日來復有臨之象而後推之曰八月有凶則卦之相生可以象言而未可以氣言也苟質之於經以乾坤為之始以六子為之次俱不為異端小説之所奪一本諸象以求六十四卦始終之變其誰曰不然昔者聖人之言曰震一索而得男故謂之長男巽一索而得女故謂之長女坎再索而得男故謂之中男離再索而得女故謂之中女艮三索而得男故謂之少男兌三索而得女故謂之少女其言曰震一索而得男巽一索而得女者猶言曰一索得震而為男一索而得巽為女也此諸卦相生之法也夫陰陽者相求之物也由其相求然後有生生之用成萬物之象焉是以乾坤之位定八卦之爻重陰必求陽陽求之陰始于一陰一陽之相求六子以次而生再變而求而十有二卦成矣故乾之初求于坤得震而為長男則謂之復坤之初求于乾得巽而為長女則為之始乾之二求于坤得坎而為中男則為之始坤之二求于乾得離而為中女則謂之同人乾之三求于坤得艮而為少男則謂之謙坤之三來于乾得兑而為少女則謂之履此其一變也乾之四求于坤得震而為長男則謂之豫坤之四求于乾得巽而為長女則謂之小畜乾之五求于坤得坎而謂中男則謂之比坤之五求于乾得離而為中女則謂之大有乾之六求于坤得艮而為少男則謂之剝坤之六求于乾得兑而為少女則謂之夬此其再變而求也以此而推其中則二陰二陽之相窮六子以次而生起于屯鼎四變而窮而二十四卦之象成矣又以此而推其終而三陰三陽之相求六子以次而生起于否泰三變而窮而十有八卦之象成矣與夫求之于數得之于氣而涉乎異端小説之紛紛者孰為簡易哉易論下卦之有象由乾坤六子之相生而陰陽變化之各適聖人因而名之所以該三極之道括萬事之藴示人以易之本統也先儒雖有假實義用之説而未嘗互明其所以然或迂滯而不通淺易而無所考信夫物用體必有用體之所主者一而用之所召者衆始乎天施地生之至廣至大而盡乎人事物理之至纖至微未有不由乎此也天髙地卑水流濕火就燥雷之轟轟風之冷冷山積而上澤聚而下皆其體也視之而有常也天地相交水火相逮風雷不相悖山澤相通晦明寒暑得之而循環凡有生知血氣之類由之而始終皆其用也推之而無窮也其歸之于卦而揭之於象也専言乎體者用有所偏直言乎用則體有所晦是必觀陰陽之相須因上下之相重而互言之乾坤坎離震艮巽兑者諸卦之祖也止一體言而用居其間也天地不交為否交為泰雨未及于下雷澤宣于上則曰屯雨潤而下雷動而上則曰解地必有水為師水必親地為比天與水違行訟也雲上于天可需待也上天下澤尊卑辨位則曰履澤上于天決然下潤則曰夬天與火曰同人火柔而明居于外天剛而髙處于內內有剛德而外示柔以容物不失其明有髙明柔克之義曰大有地雷復靜也雷地豫動也山附于地外雖剛正而內附柔邪剝也地中有山外柔順中剛正謙也長陽少陰歸妹也上示以悅下感而動隨也漸進也故上山有目曰漸蠱事也上以剛德止節于物從權行令所謂有事而待能者也故山下有風曰蠱地中生木升也令行于衆而可觀望觀也火地晉顯也地火明夷隱也山下出泉處得其地有決導之理養晦俟時蒙也水以就下為和居山之上處非其地蹇也澤性處卑在地之中上以順道臨之而下悅臨也澤必就地萃也火炎而上山止而下旅無容也坤變而艮乾變而離剛柔相交者道成賁也盛升陽而在上助天施化大壯也剛德上居威令下動物不可妄也木有上火烹飪也風自火出由乎明內而後物不可妄也外家人也艮之氣始萬物繼之以震皆得其養故以山雷頤也物之生離始于艮及其鼓動甲折則雷之功顯而艮之用隱也其體則二陽究其發生之迹則雷有以過之故雷山過也木進而上澤順而下物之分者故以澤木為大過柔在內而靜剛居中而正內靜而正信發乎中號令行于外以感物之故風澤為中孚風行水上波險渙散也木上水順乎上而有水井之功也上火下澤暌也澤居上火處下位則相易勢則相戰而變生革也君德在上號令施於下則物有所遇故天風為垢君德未居于上號令不及於下則待時而發故風天為小畜雷電者相須之物也電作于上雷動於下有必合之理故火雷為噬嗑雷電既合威明之至則臨照天下故雷火為豐山髙澤卑山下有澤言髙必有卑虧損之相也澤上有山男下于女威感之理也長陽長陰相配而成尊卑之位正剛柔之氣合萬世不易乎此恆也風散雷動百物鬯茂盛也澤無水困也水在于澤蓄而不流物有其節也水火未濟不相入也水火既濟相逮也然則否屯言乎體泰解言乎用推之諸卦皆可知也蓋易以變生而象以互立皆體用之未也或曰卦之象皆用也安可謂互見也曰立象者以體用取知易者得其用而體可忘也詩論春秋論洪範論孟軻論案以上四篇原闕今據論客所敘存其目于此荀卿論天下之物理其始若不可究其終必有歸星之所經躔次舍合散犯守紛錯陵亂莫得而息然所統者北辰也水之東西曲折源長𣲖廣聚為四瀆離為百川蕩溢泛濫莫得而測然所赴者海也途之逺而上下險艱易直或嚮秦蜀或通吳楚舟車人迹莫得而窮然所會者中國也一言而可以盡天下之物理者蓋知其歸也言乎規則天下之圓者不能遺矣言乎矩則天下之方者不能遺矣方圓者歸於規矩而已者道德仁義者其微發於神明其著極於萬物幽及于鬼神明見於禮樂籠絡萬世之前馳騁千載之外弛張變化於天地同其歸可得而知歟以宗主言之則止乎聖人也以法度言之則存乎皇極也總其大分而言之則謂之名教也名教者雖無知不肖之人可以納諸其中而賢智才能之士不可出乎其外也豪説侈論又安得而過乎仲尼嘗謂博學于文約之以禮可以弗畔其稱道前古之君則以堯為巍巍蕩蕩舜為恭巳而治禹無間然巳衛靈公問陳則對以俎豆子貢欲棄信則答以去兵夫以天縱之聖生知於道則固能放言髙議恢其端於無垠神其用於不測謂天下之治皆出於我矣而乃曰以禮約文則可以弗畔而又推尊堯舜禹之善如此夫以倣徨天下欲伸其道以濟斯民之心則固冝舉一切便利之事求合於時然後得奮其志矣乃以問陳答禮貴信賤兵其言之不苟則又如此得非以道德仁義之大分歸于名教而不苟越其外乎名教之不可越故博學者必約以禮堯舜禹必為後世之所推尊君子之言必無所苟也孟子奔走戰國開説諸侯而善必稱堯舜政必陳三代養生送死必得其詳其迹雖類迂濶其心則仲尼無異焉惜乎荀卿之不出于此而務為毫説侈論往往越于名教之外而不知其歸也為仁義禮樂之宗主萬世仰而師之者聖人也荀卿曰堯舜跖其性耳又曰禮樂生于聖人之偽則萬世安所師乎為二帝三王之法度萬世推而倣之者皇極也荀卿曰有治人無治法又曰欲觀先王之迹則于後王彼治而無法不本于先王而本于後王則萬世安所倣乎失其宗主忘其法度則必越于名教之外也越于名教之外則何為而不妄哉斯言也未足以適當時天下之用而足以啓後世天下之害也立説好異誇辨太過而不知其歸矣夫揚雄論世之論太玄者多矣是非何其異乎或曰雄之為玄也得自然之數始於一而三之故有天地人之體而統之曰玄四乘之極而至於八十一故有方州部家之位而名之曰首從而三之故有二百四十三表又從而三之故有七百二十九贊以一首為四分度之一而周天之夜又以踦嬴為四分度之一而周天之度二十八宿之次舍一期之日四時之氣節盡于此矣猶六十卦之當夫一嵗而有六日七分也或曰玄之數可損益也首為者四日有半而為分者四百八十有七則所謂周天之度與夫四分度之一者亦可以合也其踦與嬴者不必加之也嗚呼雄之為玄止于是而已乎曰未也昔之作易蓋有憂乎于後世矣深探天地之本而得於數之自然數不可以為教乃畫之一卦擬之以象重之以爻繫之以辭而後見三才之用焉故曰立天之道曰陰與陽立地之道曰柔與剛立人之道曰仁與義然則易之生也出於數而其成也數亦隱矣聖之所以之濟乎斯民者曰道也道之用在乎教也彼天地五行之竒偶者不適夫道之用也雄之書其為數乎抑為道乎觀其覃思于渾天三摹而九據索研隂陽晝夜之運考究節侯鍾律之紀星斗五行既得其詳然後定之以為首敘之以為贊以求合乎周天之度一嵗之日則幾乎為數而巳也至于一首之不同則言一時之理一贊之不同則言一人之事而又設為衝錯測灘瑩數文掜圖告以解剝其義而敷繹其教關之以休咎禍福播之以進退動靜其微則一身之吉凶悔吝其聚則天下之安危治亂以可以推而及之蓋為道之用而著以為教也者亦有憂患後世之心而不獨為乎數也然則説者多惑其數少言其道抑有由矣蓋其説曰與太初厯合而又有顓頊厯夫厯者以數推天之書也以數而差于天不能不差于秒忽是故千載之後疏密異端而其法不可歸一使雄之書専為厯耶其數雖有小差尚可成一家之法未必廢而無取况雄之所為者寓乎數而言乎道哉然則所謂合乎初顓頊厯者玄之體也寓乎數而言乎道者玄之用也説者貴其道之有取而不議其數之何如可也昔王莽用之以筮旦占而遇干其贊則一五七蓋言以逆為事而終至于害身故其贊三違示其不可動于禍亂也此與夫南蒯將叛而子服惠伯謂易不可以占險之義同矣雄為數乎為道乎唐虞論人之心苟有以大受而不為外物之所奪則天下之廣不足容也履安間逸樂之時而常懼及乎敗亂則天下之物不足治也深居髙堂運其計數而日獲千金之利未嘗喜形於色乃良賈也所畜素厚而所享冝其博也和鸞中節平趨大道而忘銜蹶之變以乃善御也所向雖無虞而所思不敢怠也授之一命則慊然如不滿祿之萬鍾則泰然如巳盈必失其所守也百日之安則習之以為常一日之危則置之而不慮必妄其所施也以一心之所存而得所關如此世主豈以可不深窮其源而慎執其用哉今夫巍巍乎立斯民之上合天下之勢以成其髙使天下之能以給其用罄天下之愛以廣其惠齊天下之長以隆其威而乃怙然自處若無恃乎尊崇冨盛者是人情之所難也而聖人者不以為難其教化足以召萬物之和其法度足以為萬世之準其安如磐石其固如泰山而乃惕然自勵若不免乎憂虞敝壞者是人情之所難也而聖人者不以為難是以聖人之于天下其視之則至輕其待之則至重視之至輕故其心亦不易以天下動待之至重故其心亦不易乎天下然則四海之大不足為容而萬事不足為治矣夫昔者嘗聞堯舜之為君當時號為至治之極而後世有不可及之名乃觀傳記以求之夫所為然者而見其行事不過命官分職以禮樂刑政為之具舉而措之悉有條目竊以為堯舜之治其迹如此而已亦非有以大過于人者而當時號為至治後世不可及則又何哉即而推之蓋凡所為人情之所難者其心舉能為之焉耳且堯自唐侯而升天子舜以匹夫而有天下向也處乎一國耕于畎畝之中今也居乎四海之上享有生民之奉如固有之而未嘗少慊焉是以土階三尺茅茨不剪飯土鉶啜水而謂之中禮九男二女百官牛羊倉廩之盛而憂不見愛于父母彼豈以天下動其心哉以欽明文思溫恭允塞之德臨可封之民成無為之功而兢然于日行其道以天下為憂不以位為樂耳與其臣下相博謀議則吁俞訓飭盡夫君臣之義抑又作歌以戒以示奉若天命順時慎徽安不忘危之意彼豈以其心易乎天下哉堯舜之所以冠百王而為人主之師者不在其外而在其終也孟子曰服堯之服行堯之行是堯而已又曰舜何人也子何人也夫資有二帝之資行之至而熟謂不可乎三代論夏有天下十四世四百餘年而後化為商商有天下十七世六百餘年而後化為周周有天下三十一世八百餘年而後化為秦由秦而下迭興迭廢不復有如三代之永其故何也慮世之有深淺也為治之有厚薄也體用之有大小也迹效之有逺近也慮世之深者為治必忠厚也體用必廣大也迹效必悠逺也能識天下之大用者不苟天下之小利也能成天下之逺效者不急天下之近切也聖人之所謂政教者非一朝一夕之事也其道則仁義禮樂其具則法制也仁義禮樂之行于天下如導四瀆之水以灌良田使之源源而流要以千載而不可竭涸非徼幸決溢乃得一溉今嵗為腴而來嵗為瘠也法制之立于天下如以九牧之金鑄為巨鼎本之模範而成要以千載而不可破壞非假借苦窳以便其用今日可舉而明日不完也是故祖宗相傳至于今孫循而守之雖其材僅可以保天下而其過不以至播于萬民則天下之勢猶盤固堅重而未易拔得非所慮者深所為者厚體用至大迹效至逺而然乎夏商周之有天下厯二千年而才三易姓者其原出乎此也天下之先務四曰政也曰兵也曰財也曰士也天下之政人君莫不欲歸于一以全其尊也而三代之封建使諸侯世守其強土家有其人民教令自出兵賦自奉為天子者受其朝覲貢獻而巳以一時觀之則權散于列國王室幾乎不振反而求焉以至于久則藩屏之勢拱衛中夏可與之始終也天下之兵人君莫不欲強其衆以暴其威也而三代之君政隱于鄉遂卒乘馬牛量力而出三時務農俟其隙而後教戰以一時觀之則國之武備疑其修講之未至反而求焉以至于久則井地之民舉皆吾之精兵而不可勝用也天下之財人君莫不欲問入之多以足其費也而三代之賦稅授田于民十取其一以為公利以一時觀之則國之用度常若不給反而求焉以至于久則下有餘力而易供上有餘冨而不可勝計也天下之士人君莫不欲速求而驟用以盡其材也而三代之選舉先以學校養而教之德成行立然後量能而定位以一時觀之則殆非明王急賢之意反而求焉以至于久則素養之賢其積衆多而不可勝任也由是推之則三代之凡曰政教者皆有寬緩遲久之心而無淺暴苟簡之態非邀功于目前務為利于後世其名雖類迂濶其心乃切于事是故規模宏逺德澤深厚而子孫亨國之永冝矣孔子曰無欲速無見小利欲速則不逹見小利則大事不成治亂之至鑒也思慮不能極于深施為近于薄法度狹隘而功效易見而欲希風于三代者殆却行而求及前也夫秦論按此篇原闕今據論略所敘存其目於此淨德集卷十五
