body:
  text: 淨徳集巻一宋吕陶撰奏狀奏乞放免寛剰役錢狀原註熙寧十年三月十日臣伏以朝廷欲寛力役立法召募使民均出傭錢雇人應役即無過斂民財之意有司奉法惟恐不能足用遂于一年合支役錢數外増添科出謂之寛剰葢欲凖備修葺橋道廨舍并買置什物之類官中逐年支用雖少民間兩科所出甚多自熙寧六年施行役法以來至今四年臣本州四縣已有寛剰錢四萬八千七百餘貫今歳又須科納一萬餘貫以成都一路計之無慮五六千萬推之天下現今約有六七百萬貫文寛剰在官歳歳如此科出不已民間何以送納況今泉幣絶乏貨法不通啇旅農夫最受其弊葢是現錢大半入官市井少有轉用臣愚深恐朝廷不知免役錢外有此寛剰數目伏乞聖慈指揮諸路提舉倉司契勘現在寛剰錢數約度支得幾歳不至闕乏霈發徳音特與免數年或乞逐年限定數目不得過役錢十分之一所貴民力不至重困貼黄朝廷如以臣言可采只乞下司農寺取索今日以前天下支役錢外寛剰錢數便見利害又臣伏見二年以來川中見錢絶少物價减半銀毎兩絹毎匹各只直一貫四五百文米毎石一貫二三百文其如免役并寛剰錢並依舊數送納比之熙寧六年所出即似加一倍若不契勘除減深恐民間不易奏為役錢乞椿二分準備支用狀臣伏覩近制役錢寛剰不過二分此朝廷撫惠元元之意最為深厚然於法禁有所未盡不免重斂葢有司奉法太過條目滋蔓於雇役錢外尚有數等如耆户長不雇而斂則有椿留錢橋道廨舍之類數年一修而逐年計費知縣簿尉三年一替而毎歳計署中什物則有費用錢非泛差出役人及起發雇人則有準備錢此外方始謂之寛剰且如成都一路毎歳只合支募役雇食錢四十萬六千二十四貫又椿留耆壯錢五萬七千六十二貫又椿雜支錢二萬二千九百八十六貫又椿起雇人錢一千貫外更有寛剰一十二萬八千六百餘貫其雙流一縣毎歳只合支雇役錢九千三百二十餘貫更椿費用錢二千三百七十餘貫外方有寛剰錢二千八百九十餘貫以此考究則雖云寛剰不過二分其實不止于二分矣臣愚伏乞聖慈指揮諸路提舉司除實支雇役錢外更出二分椿為寛剰應係準備費用等錢並于寛剰二分内支破如此則朝廷實惠均及生靈有司奉法不敢重斂貼黄華陽縣昇仙橋一所役法估計毎修一次斂錢一百貫十二年中偶有損壊支三十貫修葺則是一千一百七十貫虚斂入官皆為寛剰推之他處計亦如此多矣奏具置場買茶旋行出賣遠方不便事狀原註熙寧十年三月八日今具本路置場買茶徃熙河博賣并盡𣙜諸州茶貨入官便收三分利息旋行出賣致令細民失業枉陷刑憲大于遠方不便謹具畫一條列如後一臣伏以國家富有四海山澤之利多與民共自仁祖臨御以來深知東南數路茶法之害制詔有司一切弛放任令通啇貨法流行徳澤深厚聖時盛事高出前世今天下茶法既通而兩川獨行禁𣙜此葢言利之臣不知本末苟貪勞賞而妄為之非所以綏靜遠方之意況乎兩川所出茶貨較北方東南諸處十不及一日月行照文軌混同法無二門仁不異遠豈可諸路既許通商兩川却為禁地虧損治體莫甚于斯乃為害之大者故臣敢先言之伏望聖慈特寛茶禁所貴法令平一以幸遠方一本路既為置埸買茶将往熙河等處并逐旋取利出賣之後更不許民間衷私買賣遂令諸色人告捕依編敕禁𣙜茶法斷罪州縣承此指揮來累有成都府邛州百姓馬吉等為衷私賣茶被人告捕有至徒罪各追賞錢一路之民遂生怨誹葢緣立法太重有害于人大凡官中原有之物民間私侵其利方是犯禁只如解州有鹽池民間煎者乃是私鹽晉州有礬山民間煉者乃是私礬今川蜀茶園本是百姓兩税田地不出五穀只是種茶賦税一例折科原註茶園税毎三百文折納絹二疋三百二十文折納紬一疋十文折納綿一兩二文折納禾草一束役錢一例均出自來採茶貨賣以充衣食伏縁此茶本非官地所産乃是百姓已物顯與解鹽晉礬事體不同一旦立法須令盡賣與官或敢私相交易便成犯禁斤數稍重乃至徒刑仍沒納隨行物色别理賞錢恭惟陞下仁聖卹物之心必不如此伏乞别立條約以救苛刻之弊免使刑辟滋彰有傷和氣一本州導江縣蒲村堋口小唐興木頭等鎮各準茶場司指揮盡數收買茶貨入官並已施行民之受弊大率均一惟導江縣一處尤為切害葢縁本處是西山八州軍隘口自來通放部落入城博易買賣其蕃部别無現錢交易只将到椒蠟草藥之類于鋪户處換易茶貨歸去喫用謂之茶米或有疾病用此療治旦暮不可暫闕今來官中須要現錢出賣則蕃部難更将椒蠟等物入場博買若于鋪户處博易則鋪户價例自然増長原註官茶毎斤先收三分息錢官中毎斤若用一百文買即作一百三十文賣若用五十文買即作六十五文賣蕃部買賣便致阻節沉茂州事宜之後人情方始安帖豈宜更使茶貨不通别生邉事一茶園人户多者歳出三五萬斤少者只及一二百斤自來隔年留下客放定錢或指當茶苖舉取債負準備糧米雇召夫工自上春以後接續採取乘時高下相度貨賣中等毎斤之利可得二十文次者只有十文以來累世相承恃以為業其鋪户收貯變易却以白土拌和每斤之息不及十文所以川中茶價不甚湧貴民間日用充足今來既被官中盡數收買價直一定若将銀色準折毎兩須高擡四五百文原註臣竊聞蜀州熙寧八年銀毎兩官折二貫三百文足市價一貫六百文九年銀毎兩官折二貫二百文足市價一貫四百文或多支交子少用現錢原註茶塲司指揮成貫並支交子餘零方支現錢交子所支既多錢陌又須虧折則園户所收茶貨只得避罪納官安敢更求餘利一旦失業何以為生臣恐户口逃移賦役失陷漸由此起原註臣竊知永康軍熙寜九年買獲並税過客人茶貨共一百三十二萬餘斤比八年計虧九萬餘斤比七年虧二十六萬餘斤葢是園户畏罪失業造茶减少是致税數有虧以此推之則失陷税賦誠有其漸又縁旋買旋賣先抽三分之息只此一事極未為宜日來州縣逐旬各申時估或増或減官司據以為定豈可朝買一貫之茶暮收三百之利一日之内貴賤兩般則州縣所供實直遂成空文有司出納之際乃同聚斂且鋪户既與官中出利則民間豈有賤茶日用之物漸見不足錐刀敝法徒可斂怨必非朝廷理財之本意伏乞聖斷特賜改更一本州所準茶埸司今年二月二十四日指揮限半月令園户鋪户盡數出賣舊茶不得夾雜中官如限滿更不施行如有違犯並依法施行臣雖即時行下逐處然計其日限令至三月十日已滿縁民間累年積貯茶貨準備高價相度變賣一旦偶因官中為買新茶亦不預先䁱示忽然責立近限令将舊茶疾出速賣若出限未賣被人告捉斤數稍重即至杖脊安有數日之内盡底變易得行舊茶因此大叚減價無頼小人輒有告捕之心臣尋具狀稱若只限半月令盡數出賣則必是減落價例變轉不行消失錢本便見失所兼慮纔出限日之後被牙子或别人告捕送官枉䧟深刑顯屬不便又緣新茶與舊茶色目不同若将舊茶投税出賣則與官中收買新茶事不相妨本州須至申明欲令逐場一面收買新茶民間出賣所有舊茶乞限至今年八月終曉示園户幷停塌之家盡将赴場投税出賣令税務公明聲説給引前去破賣仍乞指揮逐處官司如有諸色人把捉到衷私買賣茶貨切須辦認新舊如是新茶即乞依法施行若是舊茶只乞罪在捉事之人所貴積貯舊茶之家破賣得行不枉受罪兩次申茶場司未䝉指揮若不許展限則貯積舊茶之家便見破蕩如此措置豈不害民一官中買茶明收三分利息方行出賣沿路税錢盡已批過更無分毫僥倖商旅興販必是細筭不行難以盡數販賣竊聞蜀州永康一處現今積壓茶五十六萬餘斤在務臣料將來出賣不盡之後則必積壓損壊虧折官錢若般徃熈何亦悞邉計或仍舊停貯則嵗課不登難沽賞典建議之臣必須均匀配賣與販茶之家如此則他日舖戶不勝其害伏乞指揮茶場司具去年終已買及已賣數目申奏仍令分折現餘茶貨若經隔年歳合如何變轉即自然見得此法可與不可經乆施用免令言利之臣有誤朝廷大體右謹具如前所有茶禁不通細民失業刑辟太重最于遠方不便事理並已條折如前臣竊見熙寧七年朝廷遣李杞蒲宗閔入川相度買茶往熙河博馬等事當時使者急于進用不察事體遂認定逐年息錢四十萬貫應付熙河後來運茶積滯歳課不足即便擘畫却于彭漢二州逐年收買狹布各十萬匹名為折當脚錢其實将市井所得之息充入茶利自後又恐買布亦難敷及原數則乞雇回脚船車船解鹽入川泊至鹽法難行則又乞将川中有茶去處並行收買前後乖錯非止一事只是切欲功賞不卹民間弊病臣愚伏望聖慈特賜采察所貴遠方之俗被惠安身至如官吏費耗道塗阻節税額虧損得不補失則臣不敢喋喋開陳以瀆天聽乞以臣此奏下本路安撫轉運提刑司相度利害特賜施行貼黄若䝉朝廷埀察即乞下本路取索熙寧八年九月分永康縣銀價比對茶場折銀貫陌自見有無侵損園户免令将來高價折銀虧損本州賣茶之家又臣所謂得不補失者竊聞永康縣熙寧九年發茶三百䭾往熙河除諸般費用及沿路批税外計算每斤已是一百九十四文足其兵士請米猶在數外不知到熙河貨賣所得幾何如此事理亦乞朝廷體察奏為茶園户暗折三分價錢令客旅納官充息乞檢㑹前奏早賜改更事狀原註熙寧十年三月十八日右臣先為本路置買茶般徃熙河幷明收三分利息旋行出賣大于遠方不便尋具畫一條列申奏去訖愚瞽之言必已上凂天聽臣伏見國家置市易司籠制百貨歳出息錢不過二分須以一年為率葢為今年支出官本一百萬貫至年終要見息錢二十萬貫即不是早買一百貫物晚賣一百二十貫文今來茶塲司却不以一年為率務将重刑立法盡𣙜民間茶貨入官旋買旋賣取利三分或今日買十貫之茶明日便作十三貫賣于客旋或朝買一貫暮作一貫三百出賣日逐将官本變轉殊不休已其公牒行下州縣乃云務令買賣通快無致妨滯錢本則所出息比至歳終不可勝算豈止三分而已比于市易原條自相違越竊緣茶是民間日用之物有如水火一旦忽被官司盡數收𣙜獨專其利仍以嚴刑過繩其罪遠方細民生長休息在朝廷恩徳之内豈誠此事兼據本州堋口鎮茶場申自今月十日至十五日終逐旋買到茶八百八十六斤計本錢一百六貫三百二十文隨日出賣收到息錢三十一貫八百九十六文别無現在臣看詳上伴申報竊疑本處首尾六日之中買獲茶貨八百八十六斤隨日便賣了當並無現在存貯慮恐買賣之際别有侵損官私尋行體訪乃是客旅并牙子等為見𣙜茶不許衷私買賣一向邀難園户或稱官中高擡斤兩或言多方退難遂便于外面預先啇量減價其園户各為畏法懼罪且欲變貨營生窮迫之間勢不獲已情願與客旅啇議毎斤只收七分實錢中賣于官所餘三分留在客人體上用充買茶之息纔投場中賣了當即時却是客人明立姓名正行請買所以隨日賣盡原註假如茶一百斤毎斤合賣一百三十文計價錢十三貫其園户既被邀難恐動情願只作十貫賣與官場即時却是客人納錢一十三貫請買文厯雖正情弊則深如此則是園户只得七分價錢暗折三分官中雖得三分之息自是園户本錢客人未㑹出息竊縁山鄉人户自來以採茶為業輪納兩税折科最重並出役錢飬生之計並在其間一旦既遭禁𣙜遂被啇旅幷牙子等恐動邀難頓減三分價直行之日乆必見窮困誠可嗟憫其如逐處買茶官司多是畏懼茶場司威勢務欲買賣通快出得息錢度可免罪以此互相欺誕不敢申陳臣伏謂園户是國家兩税土著之民今來被好利之臣設此弊法要出息錢却令啇旅生姧侵損兩税人户最于遠方不便又况隨日計利殊無分限顯是違越市易原條伏乞聖慈檢㑹臣前奏特降指揮下本路安撫轉運提刑司體量詣實早賜改更庶使王澤不壅可救大弊貼黄若官中實于客人體上收得息錢三分則尚恐貨法不通民受其弊而况自是園户暗有賠折其買茶之人原不出息豈得穏便奏為官場買茶虧損園户致有詞訴喧閙事狀原註熙寧十年四月二十四日今再具官場買茶取息太重虧損園户致有詞訢及生喧閙畫一奏列如後一據九隴縣税户党元吉等状稱自來相承山壩茶園等業毎年春冬雇召人工薅剗至立夏幷小滿時節又雇召人工趁時採造茶貨逐日收來堋口投場貨賣得錢收買糧食毎一稱和袋一十八斤内除出上件破用并輸税免役等錢折除算計外毎稱只有利息一百五十至二百文以來往年早茶毎斤貨賣得九十至一百文今來官中置場收買毎貫上出息錢三百文招誘客人貨賣其茶牙子幷興販客人為見官中息錢却只于茶園人户茶貨上估定價例低小每斤賣得一百文以來者現今只賣得六十至七十文却将餘上價錢令客人用作官中息錢收買前去以此園户盤費不足念元吉等家各只有此小茶園並不種植得諸般苖色又為路途遙遠往復相去本場約一百五十里以來若此價例低小難以造作茶貨必見破敗伏乞指揮貴獲存濟一據九隴縣税户牟元吉等状稱自來只以佃食茶園為業其茶園偏峻不任種植諸般苖色逐年舉取人上債利糧食雇召人工兩季薅剗指望四月小滿前後造作訖茶投場破賣得錢填還債利幷送納諸般税賦若遇豊熟之年米價平和毎袋上除折上件盤纒輸税外上頭只餘得利息一二百文或遇年辰較惡米糧價貴天時亢旱茶生短淺以此數目減少虚折薅剗盤纒今䝉官中置場收買園户茶貨毎貫上出息三百文其茶毎稱和袋十八斤牙子只稱作十四五斤若是薄弱婦女賣時只稱作十三四斤以來毎稱約陷著一二斤别無上頭利息心極憂惶昨䝉提舉推官躬親在茶場内看覷收買茶貨不與園户分擘逐處茶埸時候早嫩粗細等第色額只作一樣收買去年時節毎斤賣得七八十文今來只賣得五十文除牙子錢了收得四十七文所有餘上錢數令客人用作官中息錢收買不管園户裹纒不足若不具状申請竊恐将來轉見淪亡失所本州所據党元吉并牟元吉等二状尋行遣帖堋口茶場鈐束茶牙子並專攔等不得凖前大稱園户茶貨及剰除園户牙錢仍仰常切㸃檢茶貨粗細等第色額一依自來價例收買幷申茶場司更乞措置免致虧損園户去訖一據堋口茶場申據至徳山人户将到炭焙新茶赴場中賣後却出納三分息錢收買請引出外貨賣又申自三月二十一日至月終買得第二等新茶並是園户馬吉等情願出納息錢請引前去一據蒲村茶場申本場逐日據園户将到新舊茶貨赴場隨日收買出賣内有園户自出納三分息錢請引前去破賣亦有客人在外與園户啇量價例了却于園户處除下息錢投場收買請引前去不虚一據九隴縣園户石光義等狀稱今月五日将到茶貨投場破賣毎袋計一十八斤和袋不委茶牙子除折只稱得一十四斤其茶係第二等毎斤合凖直價錢九十文當日減下價例毎斤只收得大錢四十七文至到十三日其茶毎斤係第三等合凖直價錢七十文毎斤又再減價例又只作大錢三十七文今來茶牙子收光義等茶貨比前山下路人户粗茶一様減下價錢念光義等住處係在後山為地土寒冷以此至小滿前後只造作得似前山第一等第二等茶貨現在委的不依毎年逐時等第價例一様取意團斷即光義等各為雇召人工毎日雇錢六十文幷口食在外其茶破人四工只作得茶一袋計一十八斤切慮光義等家向後必有失所乞指揮本州所據園户石光義等陳訴虧價事理已帖堋口茶場仰檢詳承受前後所降敕條指揮候茶園户将到茶貨赴場中賣請監官當面看驗前山後山色額等第粗細依自來市色實直粗細逐時市價添減兩平稱來收買畫時當官支給價錢即不得容令牙子專攔等依前低作價例只作一等茶貨收買及非理大稱斤兩致有虧損園户無致擁併阻節仍仰出榜曉示園户知委如受此指揮後却将好為惡将貴作賤只作一等價例收買致令園户再有詞説或因本州察探得知其牙子專攔等必當勾遺赴州報勘施行官員亦當勘劾聞奏仍取責監官并牙子專攔等知委仍仰本場分析今月十三日因何将石光義等第三等茶毎斤只作三十七文收買因依并兩次申茶場司更乞措置免致虧損園户去訖一據管勾堋口茶場秘書丞尹固並濛陽主簿同共買茶薛翼等二状甲今月十七日收買茶六萬斤計錢三千六百貫文支用茶本淨利錢併盡遂于十八日申州乞相度支移交子六千貫文應副十九日并二十一日市收買茶貨至十九日天色纔曉據園户将到茶貨赴場中賣當日已時後固等為現請交子未歸兼更値雨遂向園户道請交子相次回歸及等團圍固等須要稱茶及向牙人道爾等當時通出抵産在官今來官中無錢買茶你牙人須著與我出錢買茶一市固等各回廨字及安下處主簿薛翼行至淨衆院門其園户却致打本官手下公人兼撦破薛翼𫀆䄂更尋牙人意要相爭其牙人為見如此各自廻避現不住差人四散尋覓固等切恐二十一日市别牙子買賣茶貨又慮園户凖前爭閙别致不慮係屬人衆難為止約乞差九隴縣官一員赴茶場告諭園户三五日所貴曉㑹本州所據尹固薛翼申報尋體訪得今月十九日有園户五千人以來投入茶場直上監官㕔上止約不得致打公人幷毁罵官員葢為劉佐等起請須要旋買旋賣出息三分其逐場若盡價收買到恐客人興販無利将來出賣不行以此須至低估價例收買毎斤委只及一半價錢又緣逐日買及數萬斤監官實難照管得盡其園户既被虧損無可申訴遂便聚衆喧閙人數頗衆難為約束今來後山正當茶貨出衆時節切恐少錢收買凖前爭閙當州勘㑹前後六度支與堋口茶場交子現錢一萬一千二百餘貫銀一千兩其銀為園户不肯折請已分與九隴等縣出賣又為市井絶無現錢因是貨賣未得外餘茶場司兑撥交子一萬貫文至今未到若得上件交子盡數支用亦只買得三兩市原註在州現今實直第二十七界交子賣九百六十茶場司指揮作一貫文支用第二十六界交子賣九百四十茶場司指揮作九百六十文用此亦虧損園户之一端也本州雖已出榜嚴行約束指揮本處候園户将到茶貨赴場即便依次稱來收買如是園户準前要致打公人等或毁罵官員仰擒捉送州待憑取勘依法施行兼差九隴主簿勾龍驤前往曉諭同共買賣茶貨切慮園户準前喧閙别致不虞又差本縣令薛高三五日一次在前照管尋申茶場司催促交子並乞大段支錢赴州應副使用及令檢㑹本州今月十七日申石光義等告説虧價事理許令添展價錢去訖右謹具如前所據茶園户党元吉等狀幷蒲村堋口兩鎮申述並已條列在前臣伏見劉佐李把蒲宗閔等妄陳愚見苟希進用盡将川茶禁𣙜旋買旋賣立法太重取利太多致令茶户被此深害遂于今年三月八日後來兩次具狀諭奏乞賜更此弊法以幸遠方狂瞽之言未䝉採納方且日俟朝㫖俯就誅殛而臣部内百姓累有申訴皆言被官場減下價例大有侵損以至嗟怨聚衆喧閙臣雖嚴行約束及差官同其管勾湏得相度茶色添長價錢去訖今若隠而不言慮恐因此生事上誤朝廷須至再具論列煩凂聖斷葢縁劉佐等起請要出息三分若逐場盡價收買之後将來商旅計算不成不願興販則積壊茶貨例被責罰及干連人必著賠塡以此湏至順承茶場司風㫖減價收買所貴客人願來興販變轉得行原註假如茶一百斤毎斤一百文若便作一十貫買則恐客人不肯用一十三貫請買以此減下園户價錢只作七貫文收買便于客人作十貫文請買或是園户自納三分息錢請引出外原註園户茶貨須得中賣于官若欲别處變賣便成犯禁無引不行被此抑遏須至自納息錢三分請引出外情弊如此上下通知茶場司臣僚恐出息不多難沾賞典空行文牒督迫州縣其實則任令減價收買逐場監官畏懼茶場司威勢恐遭責罰干繫人衆深慮将來積壓賠填一向刻剥園户州縣之吏熟視疾苦無力以救之日乆為害轉深恭惟陛下仁民愛物與天地等夙夜孜孜講求治要惟恐一失未得其所必不容此刻薄小人苟希勞效作為敝法以困西南生聚有累聖政衆所不平臣愚伏望聖慈檢㑹臣今年三月八日并十八日及今來所奏早賜睿斷特降指揮下本路監司或師臣採訪利害如臣所言有一事一件稍渉虚誕甘俟誅戮若萬分有一可以採用即乞更張茶禁以便遠民或限數收買或量減息錢則山鄉茶户不勝至幸貼黄臣體問得六月以後猶有晚茶一色貴者毎斤三十文若盡收買所出之息亦不甚多縁逐處自開場至今買獲茶貨旋行出賣稍有厚利如或朝廷謂此成法難便改更即乞自六月一日以後權住收買放令衷私交易所貴園户留得晩茶一二分盡價賣與客旅稍助生計亦遺秉滯穗與民之義伏乞聖明特賜採察淨徳集巻一
