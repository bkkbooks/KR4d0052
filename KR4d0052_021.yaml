body:
  text: 淨德集卷二十一宋吕陶撰墓志銘樞密劉公墓志銘元祐元年三月某日樞密學士朝議大夫充涇原路經略安撫使馬步軍都總管兼知渭州軍州管內勸農使彭城郡開國候食邑若干戶食實封若干戶劉公以疾薨于位驛奏至朝廷悼之道內侍護喪以歸賜贈加等凡所以賑恤其家者甚厚詔贈太中大夫越明年七月某日乃葬于頴城府某縣某里循禮考吉務其稱也公諱庠字希道世為彭城人其先蓋漢楚元王交之後曽祖諱某祖諱某皆恬於隱晦爵祿不及考諱某博學知道為世大儒有器業可巨用不幸仕齟齬終青州觀察推官門人考其德義諡明道先生纍贈銀青光祿大夫妣李氏生顯家有賢行治家教子如古烈婦以公責纍封某郡太公公少孤八嵗能詩為石曼卿所器年十四以文謁明道先生之友蔡文忠公公竒而壻之以文忠遺奏試將作監主簿調宋城縣主簿用程文公薦改陳州司戶參軍移鄭州鄭縣令治塘水溉民田數千頃嘉祐二年擢進士第六年遷著作佐郎知河南府伊陽縣遇英宗踐阼遷祕書丞修奉昭陵百貨之須動趣千萬公治之有序邑人不告病而官亦足用轉太常博士充髙密廣平兩縣教授是時詔兩制舉御史知制誥蔡杭薦公可任㑹英宗以災求言公即上書論世務十餘條英宗嘉歎以書示宰相韓忠獻公且問所以韓以不識對上益重之遣內侍宣㫖有甚知才美之語遂用杭薦除監察御史裏行及對英宗曰欲用卿久矣有大臣言卿與蔡杭親朕答以內舉不避雖親何害搢紳士大夫咸以為用公之當九月壬子朔日有食之未數日陳張幄具後苑以待宴幸公言去日食太近非畏天之威恐懼修省也乃為罷宴㑹聖宮創仁宗神御殿宏麗過制費巨萬公謂天子之孝不在宫廟之奢靡在繼先志隆大業今營建甚盛非所以昭先帝儉德英宗為損其制襄陽郡王允良郊祀不陪祠久罷朝謁公陳其桀傲慢上帝無人臣禮奉宸庫失盜公劾巨閹領皇城司職事者以嚴宫城之禁願陛下不以近習撓天下法英宗曰法令之設內外一體翌日都知以下皆論罪李珣犯銷金開封府以中㫖輒釋公纍言乞正國典請對又陳之英宗曰朕豈私一李珣耶乃仁宗外家若行之天下謂朕如何更不須言公知上意如此方已其論又嘗言命令失名器濫則知制誥還詞頭門下封駮願申飭臣子舉職如故事諫官御史皆所以補闕失柅違謬宜增其員吕誨等既去位公纍疏乞留又求對奏誨等忠正敢言意在愛君陛下奈何輕斥之以纍盛德上曰朕本不貶誨自是誨等不肯留爾公懇請召還詞不少屈時論韙之英宗不豫公力陳日食星變宜崇儉納諌布惠澤以解天意則轉災為祥聖體當享無彊之休久之朝政多自中出皇嗣未立人心尤不安公獨拜疏謂太子天下本漢文帝唐太宗皆於即位元年預建太子為宗社無窮計頴王長且賢願陛下亟立為皇太子上感悟大位遂定又請頴王侍禁中閲天下奏報降付如平時俟康復乃罷則聖躬便於頤養而機務不壅宰臣韓琦樞密使文彥博宜夜直以安人心英宗崩百官臨福寧殿大宫給肉食公謂先帝棄四海臣子豈知肉味請給素食庶近禮州郡遣子弟納貢賀即位恩補過幸宜罷去事雖不行識者以為是以神宗登極恩補主客員外郎殿中侍御史裏行未幾遷右司諌兼提舉國子監一日神宗語及漢武事公對曰王者當上法堯舜之德下迹成康文景之治漢武不足為陛下道神宗恱其忠時邊臣有邀功致冦者本非朝廷意公疏其姦謀請置於法以謝天下及下二府大臣措置邊事之宜定以公罪庶幾不苟簡誤國事又陳中國禦外之體守信為上武帝深入為下䇿昔寶元時元昊叛五來五背天下為之困敝今莫若崇大信舍近功為國家長利古者冢宰制國用量入以出請詔二府議大計京師久不雨蝗害稼公引王弼京房說以為隂不能固陽故不雨臣安祿兹謂貪厥災蟲請黜臣下不勝任安祿無德蔽惡為孽者則雨以時降蝗不為災又乞貰孫琪留馬默以來直言優容王陶以全恩舊公之啓沃獻替正紀綱紏姦佞著聞於人者如此其祕詞切論未嘗語於私者則莫得而知也是年秋奉使大遼故事兩朝國忌不相避公將還度以正月八日至白溝宴用樂然是日英宗小祥也公具以告願於涿州插宴則八日達雄州且行杳得遂臣子之志遼主歎美從公言使還除集賢殿修撰充河東轉運使蓋公論議剛果權貴忌之而利其去也時晋地旱饑軍費日廣公計一道之産惟鐵利為饒請復舊冶鼓鑄通隰州溫泉鹽􅈨博易以濟用又請募民入粟塞下預為足食計悉聽之俄遷起居舍人除天章閣侍制改河北都轉運使契丹人侵霸州土場為已地集兵疑我河東亦奏契丹徙帳西京朝廷為之動詔公驗狀公曰雲朔去嵗饑荒孰便於屯聚今往西京者不過集部族數萬人西脅秉常南疑中國爾安肯舍定州平易之塗趨并晋險厄之地而入寇乎又以五說料其必不能有為宜安靜持重以待可遂無事後果如公言二股河之役興兵無餘力邊城遂不完公謂城壘之設俯瞰敵境勢不在河防後請輟二股役兵傋霸州等城以嚴守禦黃河起春天御河繼之凡十七萬九千人期以朞月罷公謂今年河始東流其南北岸創隄防千餘里以夫役爭土功力不足用雖責以速成未見實益願減半先治其急而徐其他則無枉費勞民之患詔約二股北流口以拔水勢公言河方東流而遽遏其北則澶滑以下將有潰溢之虞儻以歲月分殺其勢漸議閉塞乃得治河之䇿宦者程昉乞益兵助御河之役欲以奏功公謂督工於盛夏則暍死者衆乃奏緩之又請銷開塘口泄水勢外示設險之方而內不失蒲葦樵蘇之利朝廷皆信其說青苗令始下公謂不可行奏願罷之歲餘差知成都府以親年髙不拜得知真定府屬并晋用兵之後民疲不聊生上以安輯之㫖諭公又除河東都轉運使至則寬力役蠲逋負賑流散以稱上意凡三閲月乃召還知開封府前此議者置廂官分治府事凡輕罪聽決遣公謂京師多豪右廂官體輕人不畏或緣而寬縱有罪且政出多門非所以肅清浩穰之術昔趙廣漢嘗患二輔亂其治猶欲兼之况廂事之末乎請罷蔡確沈振願殫力公事以報萬一是時宰相王安石用事與公異論確主於安石見公不庭參公謂朝廷之儀安可以私廢上疏辨之由是上失宰相意神宗亦嘗諭之曰卿奈何不與一二大臣協心濟治乎公對曰臣子於君父各伸其志臣知事陛下不知附王安石不數月除龍圖閣學士知太原府充河東路經略安撫使蓋朝廷以二鄙為慮謂公深知西北事故以閫制付之也前帥嘗建惹凌議不足示威武公奏罷之夏國降羌數千人公慮其為患請遣詣境上召其䇿歸之有不去者乃留外以示大體內以消姦萌兩得則䇿事未報果有謀歸者中㫖亟令徙內郡公謂降羌遷則生變宜假宴犒漸移徙至太原並邊既無虞比次區析於華人之中久則吾民矣從之塞外以寧纍請復憲州以重形勢還置惠寧肅定神木三堡以傋應援又請募兵民子弟之彊徑者為勇敢以壯軍聲如漢謫民戍邊故事下流非巨蠧積姦者擇少壯貰罪徙河外以實邊徼皆可其奏契丹議侵彊諜者謂有稱兵意朝廷問公以為未必然岢嵐雁門求濟師皆不應契丹主駐雲州遣數騎涉吾境邏者得之契丹馳檄紛辨不已公奏曰契丹意在彊場持此為端爾臣刺知雲州無兵朔應艱食願朝廷緩答而峻拒之方盛夏兵未必至惟以有傋待非常乃得計願遺劉忱等至境上姑以理論臣俾將佐飭兵觀釁而動此事機也時朝廷以契丹使言順禮恭及持敦睦和好之說乃録契丹主書付公諭以地界且通啇公復奏曰臣竊疑契丹此舉非本心蓋見朝廷尚未克復河湟不得不為脣齒之計故以此嘗我爾今欲爭辨積年已定之彊界曲固不在中國而在彼則泛使之來禮宜偃蹇而反恭順辭宜髙抗而反卑遜臣竊恐其意别有所在也敵意無厭朝得寸暮求尺必又有僥幸之請宜直以拒或與以不當得之地既杜其姦未必不疑中國有謀用此以餌之者若妄意於我背盟伺隙恐非嵗月可解也公爭之既不能得㑹遭太夫人喪去位後竟以黃嵬山分水嶺地與之公常以為恨士大夫為國逺慮者至今惜焉郡邑酒戶月以課入供河外逺或至千里公請以季易月麟府州漢戶之單丁與蕃族之內附而遇歉者檄有司蠲其役且著為令晋俗尚焚骸貧不克葬者遂委不視為竁四穴以藏之公在晉二年治兵與民皆得其心以靜制寇不勞而服父老至今猶能稱道感歎之不巳喪既除又差知成都府蜀久安無事朝廷以德惠撫之官吏或縱情忘分守公一切齊以法度上下宜之細民競利以髙直占坊場破産不能償相繼箠死或自殺公請蠲所負以惠逺人乞推之諸路天子可其奏獲免者凡數十萬計文州蕃族有復讎者當以蕃法論朝廷欲加誅請赦之以寧邊圉緣罪徙內郡者願復之以示恩信西山六州與漢人為㛰姻者請禁之以防後患悉從公奏至于治石室黌舍增置學官廣朝廷教育之意又新乖崖張公祠為書韓忠獻公碑立祠下慰蜀人之思皆有助於治體也遷禮部郎中知泰州充秦鳳經略安撫使以失舉降秩一等改虢州及朞知江寧府官制行易朝廷大夫未踰年又坐失舉降秩知滁州雨三月特起知青州充京東東路安撫使又徙知永興軍時征西戎無功調發恟駭關右騷然天子震怒大臣無敢議也公過闕賜對言虛內事外恐動搖根本邊隅之患特手足之疥聖德宜涵容置之度外天下幸甚上嘉納焉陜右保甲行團教法州邑擾動公奏曰軍旅之後年饑人勞正當完養其力宜權罷教俾之少休乃得罷一年稅租苗役之逋薦饑不能償請倚閣以紓其乏流徙漢南者請依富弼青州賑濟術俾京西安集之移稅往他州民不堪其勞請寬下戶詔皆納可南山逃卒僅百人依聚山谷時出剽近縣或殺官吏厚遺山民為耳目因保甲團教掠兵器驅村落馬騾乘以遁捕者雖勇鋭終莫能遏長安大恐公於是徙山中居民入保奏罷並山團教令厰外馬悉歸州縣乃發兵驅之未幾賊勢自蹙遂殲凶渠而支黨亦潰矣是年十二月拜樞密直學士旋除知渭州時轉運使辦軍儲非其術按版籍强民以供公揭榜罷之增物價而民來願輸者衆廪計大實邊吏請發防春兵公謂彊圉無事遂不遣卒無他虞弓箭手屢以戍廢耕公下番休之令凡旬有五日而罷邊戶便之朝廷方與民休息有懷柔四裔之意公亦以綏邊弭寇為先務不幸在鎮三月而卒故宏規逺略未施一二也初公感疾有大星隕于正寢人咸異之及其沒也華人羌族皆慟哭訃至京師太皇太后嗟悼之深且謂如劉庠輩不過數人方將召用而命不少假搢紳士大夫識與不識莫不傷之嗚呼公剛方直諒學造本統通古今治亂安危之變積深而蓄厚親達睿明被遇隆眷發為愛君憂國之謀惟為澤民恤物之利賢者事業蓋無愧負惟屢忤歡貴不忍一俯已狥合悠然四方遂至終老此可悲也太皇太后為宗社萬世計保祐嗣皇裁決大政圖倚舊德共底治安而公不及見焉此重可悲也公娶蔡氏封安康郡君男六人端夫鳳翔府觀察判官先公五年卒次三人早亡次敦夫承奉郎次寬夫承務郎女一人適定州北平縣主簿朱師略孫男二人沔假承務郎浩早夭女一人尚幼公享年六十四有文集二十卷奏議三十卷藏於家雅不喜治生祿廪所入均以贍族人使契丹得金幣則以葬宗黨之貧者凡二十餘喪兄之子互以恩補故捐館之日寬夫猶未仕此人所難能也儲宫之議公尤晦密終神宗一朝無知者此又難能也視古君子何愧耶蜀茶之初禁某知彭州輒條其害以聞朝廷委公與部使審議公以某言為然某既罪廢公又纍疏辨之知我可謂厚矣後八年見公於渭從容語議慨然有憂天下之心至明年而亡矣其德業始終大慨某可得而知也重以諸孤之勤請敢哭而銘曰彭城之劉實繼楚元奕世有顯又生公賢惟公之賢以剛濟忠獻告二后靡言不從治平之未獨建大議天人合符傳以神器始終一朝公晦不言方之古人孰為後先公忠自將義不附㑹天子倚信用公于外公之在外十有八年威揚惠浹卒老於邊離明坤載協德而濟黃髮在廷惟公已矣生有大節沒有重名敢告無窮勒之斯銘太中大夫武昌程公墓志銘通義郡西醴泉山之陽有巨冡焉山隆而磐水悠而澄松檟叢鬱以深門闕崇廣以嚴乃有宋太中大夫武昌程公葬於此也維程氏為眉大姓世有令德曽祖諱沼祖諱仁霸值時季亂爵祿不及考諱文應以公故纍封大理寺丞贈官光祿大夫妣宋氏封長安縣君公諱濬字治之天禀方厚少有大志力學舉進士時輩推其才天聖五年賜同學䆒出身選河中府猗氏縣尉戎州司戶參軍鳳翔府節度推官用薦者言受大理寺丞再舉進士中乙科通判彭州遷殿中丞又通判梓嘉二州改太常博士賜五品服歷屯田都官員外郎遭長安君洎光祿公憂服除知開封府太康縣遷職知歸州移遂州為屯田都官職方郎中提㸃荆湖南路刑獄除太常少卿賜三品服徙䕫州路轉運使熙寧三年年七十乃謝事公儒者讀書知名教大㫖鑒古今治亂之迹其取舍進退未嘗違道以徇所欲其治事通果敏密先體要濟以忠厚其庇民恤物所至可紀在鳳翔有盜五人者法皆宜死㑹公至自外邑吏抱案請書之守丞以為不疑見促甚遽公審情閲法謂四人不當死指以示吏吏驚且拜公曰吾豈乘人不逮少覬勞奬第慮殺之誤爾卒如其說一府大服又有誣執盜者所司考驗無得欲以藏禁物處罪公力爭不可乃以狀議且曰始則信其厚誣既非實狀終則求其别坐率置嚴科古之浮刑無甚於此衆不能奪遂勿論然為守者自爾忌公而欲踈之未幾出權岐山轉運使假公少連一見謂曰軍興事劇小邑非君所處即日移公長安是時正獻杜祁公以德望臨鎮開府待士賢俊鱗集得公甚恱㑹萬年令謝病去請公暫治仍檄他官將代之公聽決有方嘉聲翕然一日祁公見而言曰依稀似曲無易君矣蓋喜公之政務修舉有漸故引古詩以相褒譽於是委公領治如故而知遇深矣詔下籍民為鄉兵羣情震恐多走南山以避上之人欲遮道止之公曰民方如駭獸遏之適足激也大不可乃指他事集里胥條其鄉之丁壯且開以籍而為兵之意亦無足避雖遁將安歸宜以某日與為兵者至民素信服聞公言無他憂如期而集遂籍之不浹旬事定議者歎其神速陜西治軍器以牛革數十萬須於郡縣期㑹尤急民多屠殺以輸公謂轉運使蜀之筋革積於荆渚數不勝計儻由襄鄧致於陜雍不閲月可足用行之乃免暴賦舊制蜀人官近鄉止再任公既通判彭梓以親髙年乞便官朝廷推異恩俞其請又通判嘉州僚友稱其孝鄉閭榮其歸或板輿迎養或持檄還省始終十餘年庭闈歡然得盡人子之心太康𨽻畿甸民素驕橫官政尚姑息幸無事以去至有擊尉弓手掩不問者㑹豪子縱奴毆平民深竄逺匿公搜擲必得之痛繩以法自是彊猾戢畏境內大治朝廷議弛六路茶禁擇良吏往究利病公當詣二浙三司承風㫖以定論諭諸君公獨不從乃逡巡白中書曰朝廷所以遣官者欲察利害爾今既付之成法則雖有可否安敢陳恐非遣官之本意願飭不往遂以羅拯代焉由六路者後多顯用則公之守道難進可知矣梓䕫兩道兵為鈐轄者素専其事遂州雖兼總之實則無所與奪至公不然凡軍政邊防必議而後定淯井監有言雲南鬼主將請道來貢人皆疑其與儂賊入冦専其事者請移兵嚴備部使亦以為憂公曰雲南於中國道路梗絶之久彼自衛巢穴不暇安能逺來吾屬當慎所舉以寧人心兵乃不移冦亦不至遂人賴公鎮重以鐡塔號之仁皇帝遏密時潭州巡檢與客飲酒輒謳歌卒有告者仍以貿易為說究其實貿易不當坐公欲懲卒之妄而他不復責轉運使謂非忠臣孝子所為必論以法公曰彼武人爾逢敵值冦不用命報國乃非忠孝至於醉飽不思之過何足深咎况自下告上安可啓其端遂無異論乃釋之衡韶二州間有凶黨七八百人縱火掠黃幹坑戶一道駭然公巡部撫遏不張賊勢以希功賞下令捕首惡論誘脅者使潰去民得安堵事訖以聞朝廷嘉之道州有父子歐人至死子當伏誅以尸壞獄疑為請委公審覆處之公詢察情狀子願死無他辭猶疑不忍決奏得免死湖外二稅率經五六嵗斂入不已胥吏緣為姦窶弱重困公請量戶衆寡每嵗緩以期限畢則州為鈎考有逋負督於邑吏從之著為令民甚被惠茶陵縣擅增役戶七十有八循仍久之公按劾罷去頗紓衆力卲州嵗運淮鹽凡六十舟舟萬斤自潭之益陽泝險而上風濤屢溺主吏二十有四往往耗産兵三百多還糧於官終身不能巳公請置倉於永之祁陽去卲才六舍以所役兵𨽻九鋪運致如舊簡費蠲害遊效甚白言雖不報識者服其是忠州臨江縣鹽井五以吏十四人與居民主之彊弱勢不一汲訟日起吏苦劇役民亦罹敝公奏専委之民兩獲其利至今不能易渝州李光吉輩三族旁夷落慿阻逞暴納亡命聚邊雜殺虜剽奪郡縣不能禁公請出師治其罪訓兵蓄糧事將舉而代去來者用其謀蕩平之以功遷官至貴仕公不言勞賞亦不及時論惜焉薦屬官無慮二百人或以過將得罪未嘗陳其不當薦亦未嘗有纍之者匪惟能知人抑可以敦流運尤惡淫祀力禁之彭人有為灌口神娶婦者潭人有祭張太保神者皆訛作亂俗一懲以法邪風為之變既得謝而歸即其居為林下軒日㑹賓侣以詩酒自適而氣韻清壯笑談髙爽俯視俗罟有超然不可慕之勢凡如此者又十三年以子登朝封光祿卿遷祕書監易中大夫元豐三年天子祀明堂又當進秩于時方議官制留恩未下五年十一月戊子無疾而卒春秋八十有二明年四月始降太中大夫誥娶宋氏封長壽縣君雅有賢行先公十六年卒公以六年十一月庚申葬同長壽君之塋禮也子男五人之才朝奉即嘗為司農寺丞歷梓利䕫三路轉運判官瀘蠻犯邊王師西伐朝廷賴其才復還梓州路之元奉議即嘗從使者治淯井叛夷遂知瀘州江安縣以功通判本州又從辟渝南平冦有異效除䕫州路轉運判官嵗滿請便郡得知嘉州之卲奉議郎嘗為三司磨勘官辟勾當公事又從使者按視江廣鹽策還對如㫖除廣南東路轉運判官之祥宜德郎之儀未仕女二人適通直郎句洙承奉即史敏孫男十人庾成都府郫縣尉庚早卒度廊序㢕唐廡亷廙皆廪訓不怠孫女十四人適前進士史厚簡州司理參軍李葵太廟齊郎黎傃進士史器孫宗彛餘未嫁公之康寧也子以才能出使孫以進士中第出使者蓋三人中第者巳三世上林景慕宜矣初仲兄湜有氣節善治産光祿分財置第與之使自滋殖湜亡其妻又能嗣守資計益豐光祿公嘗許以其所積為之分巳而諸姪議將均之公曰士人所以異於編氓者蓋有孝義亷恥也治命在耳慎勿言嫂之積秋毫不可覬未數年湜之子縱侈無賴蕩去生業反訟財之不均公自引咎惟有司是聽而猶子有獲嫂氏所自具資産之數乃向日禀於光祿公而許以為分者蓋倍於衆人所有也官得之信訟於是息人皆服公之義又嘗念仲弟沿亡而嗣未祿乃以一子恩薦其子之竒故終公之身之儀猶未仕族屬貧者聚而衣食養孤女寡婦而嫁之者凡六人此皆鄉黨所矜法也平生所為詩醇深閒易有唐人風凡五百餘篇藏於家篤信莊老造達理致其將終也神氣凝靜視死生如寤寐非有得孰能至此然傳者謂公之初生羣烏大集其第三日乃去朞復然里人以為佳祥洎將終之二日集噪如昔又三日乃去其祥不可得而知某亦不敢略也銘曰允矣程公實材之良起仕於朝克循大方乃牧千里惠孚以雱乃使一道其為典常歸有林泉錫之壽康韜我器業以詠以觴德久則茂慶流而長既穫于菑亦構于堂令猷不隕奕世用光銘以傳永故書其詳淨德集卷二十一
