body:
  text: 淨德集卷九宋吕陶撰內外制資政殿大學士太子少傅致仕韓維可太子少師致仕制敕左右輔弼之臣謝事而歸久矣間者以相祀起之則以老不至朕懷思儀刑而未嘗忘也今其世嗣乃援郊霈之令有請於朝而欲加命焉亦可以致豫貴老之意而成汝報親之心矣具官某父某重德偉望著在纍朝忠言嘉謨有補大政知止去位積年于兹退靜之風聳聞中外宜乘禋享之祜進陟宫師之聨惟爾克承顯家繼有高爵至于休居之後復享封敘之榮里閈增光搢紳所仰在君臣之分尤見始終于父子之間可明義訓其膺寵渙以介壽康虎翼左第二軍第一指揮軍都指揮使成州刺史賈真可右領軍衛將軍致仕制敕具官某少壯而責以力老疾則休其身始終之際恩禮存焉爾奮自行伍遷至戎校軍中之事固嘗任責今其老矣以疾求去國有常典朕不汝遺其升雜衛之職以為退居之寵權泉州惠安縣尉王侁父景年可右承務郎致仕制敕具官某父某朕既郊而赦雖一命之吏其親髙年則許以名聞而褒寵之亦先王貴老之義歟爾生于盛時享有上壽祿食之養已遂佚安官封之榮宜示旌勸非特慰爾子孫之情亦可以助風化于天下也新授蘇州司戶參軍王浩父允恭可假承務郎致仕制敕具官某父某年之貴于天下久矣三王四代未嘗遺也況孝治之世而敢薄其禮乎郊赦之令所以推封敘之恩及于一命之吏得以褒其親之耄者意本于此惟爾克稱宜服寵休皇叔故右武衛大將軍榮州團練使仲雪可贈徐州觀察使追封彭城侯制敕朝廷之于族屬始終之際恩禮可謂至矣生則髙爵重祿以處之以示敦睦之教沒則隆名異數以贈之以致哀榮之情國有舊章朕不敢廢以爾具官某少蒙祖宗之澤長親師傅之賢禮敬以自文富貴而能守降年不永朕甚傷之命以廉車進之侯爵兹為五等之貴以慰重泉之思幽穸有知尚歆寵賁皇族郊恩封贈制敇祖宗之于族屬始終之際恩禮亦至矣生則髙爵厚祿以處之以示敦睦之教沒則隆名異數以贈之以致哀榮之情國有舊章朕不敢廢具官某慎靜而保富貴修飾而蹈禮義宗族仰其訓範子孫蒙其寵休五福考終既全洪範之錫九命作伯宜享上公之封服我恩光以賁窀穸三司使父某加贈制敕朕嚴郊廟之享格神祇之休推朝廷報本之心慰人子顯親之志褒榮有典存沒率同具官某故父某學焉醇儒仕至髙爵經術自信士林所宗昔在仁祖之朝嘗預邇英之選淪謝雖久風徽若存位次三公已膺恤典階崇一品載錫寵章冥漠有知光歆光賁龍圖閣直學士中散大夫陳安石故父任尚書刑部郎中直昭文館贈司徒貫可贈太尉制敕朕答天地之休嚴郊丘之享順受景福敷為渙恩推布德行惠之心達于遐邇隆顯親追逺之制不間幽明況處從官之崇宜褒先閥之驗具官某故父某履有吉德富于多文被遇祖宗之朝更直圖書之府詩禮之訓見于義方閈閎之髙彰厥善報宜追榮于公爵以昭賁于家祠冥漠有知尚能歆服陳安石故母蔡國太夫人李氏可贈魏國太夫人制敕古之人其母賢則其子有立於時其令名懿德可見于後世此報親之恩所以加於存沒而廣孝之教成于天下也具官某故母某氏生有淑行宜于顯家萬鍾之養雖不及于承顔大國之封亦足彰其流慶庶幾幽穸享此寵章陳安石故妻太原郡君王氏可贈京兆郡君制敕三年而郊受釐于神祇嘉與海內共焉是以行慶施惠及于庶工又從而廣之以及于伉儷之親不問存沒咸有褒賁幽明之際可無憾矣具官某故妻某氏率履婦德作配良士雍睦之教嘗推美於令門湯沐之封宜追榮於大郡詔於幽寢尚或歆承陳安石妻安康郡君王氏可封普安郡君制敕既郊而赦均神明之休及于天下凡造朝之士皆得褒其室家而況侍從之貴乎具官某妻某氏柔順慈愛能循法度作配君子時惟邇臣迹其內助之功榮以進封之澤祇服寵命以勸閨門右通直郎掌世康弟左朝請郎世衡故父任尚書工部侍郎致仕贈開府儀同三司禹錫可贈司徒制敕朕荷二儀之休虔三嵗之報丕承靈貺渙發湛恩既均受嘏之祥及于列位又錫漏泉之澤褒乃先猷具官某故父某以博識多聞見推學者以純德懿行仕至邇臣雖淪謝厯年而風徽如在宜進他卿之貴庶為家廟之光幽穸有知其歆服命右朝散郎馬玕弟左朝奉郎玿故父通議大夫充天章閣待制特進仲甫可贈司空制敕荷二儀之休講三嵗之祀著誠以致其報受祉而不敢私推布德行惠之心溥周萬宇廣奉先追逺之致咸暨九泉而況仕從之賢嘗仕祖宗之世風徽未遠褒恤敢忘具官某故父某才猷博通事業著見夙有邇臣之望久登延閣之華雖淪謝厯年而聲光如在宜進冬官之秩式旌賢範之良泉壤雖幽尚期歆服馬玕等故前母齊安郡太夫人鍾離氏可贈榮國太夫人制敕具官某故前母鍾離氏榮則受福期中外之率同孝以顯親故幽明之不間申豫褒恤之命慰爾劬勞之思以爾來歸令門率履柔德治家以禮協齊明之大端有子立朝表善慶之顯效其選上郡之號遂正大邦之封幽穸有知尚歆寵賁馬玕等故母樂平郡太夫人楊氏可贈崇國太夫人制敕具官某故母楊氏推天澤以及下朝廷之至仁極孝思以顯親人子之能事宜舉追榮之典以報顧復之恩以爾系自令門嬪于吉士志專以靜著為閫德之良德積而深衍乃世嗣之慶告于家廟進以國封尚期光靈服此旌賁馬玕等故繼母安康郡太夫人楊氏可贈康國太夫人制敇其官某故繼母楊氏生則養之以禮沒則顯之以恩人子欲報其親朝廷推而為教此郊祀慶成所以講褒贈之典也以爾勤勞雍睦率履婦道柔順慈愛克全母德會乘禋享之祜宜錫追榮之休進以大封自郡而國幽靈不昧尚或歆承右朝散郎行司農寺主簿韓祗祖弟左朝散郎行都水監主簿祗德故父任正議大夫致仕贈右光祿大夫璹可贈右銀青光祿大夫制敕朕答上帝之貺嚴圜丘之禋順受繁禧敷為大號推布德行惠之意達于邇遐隆顯親追遠之恩不間幽顯況惟侍從之貴嘗仕祖宗之朝當厚褒崇以旌懿美具官某故父某志尚敦篤才猷敏強雅有循吏之風久踐邇臣之列詩禮之訓見於義方閈閎之高彰厥善報宜加章綬之秩以慰蒸嘗之思期爾光靈歆兹寵賁右朝奉郎楊良顯故父任翰林侍講學士兼給事中贈右銀青光祿大夫安國可贈左銀青光祿大夫制敕朕禋奉上穹祀嚴清廟著誠以致其報受祉而不敢私推布德行惠之心溥周萬宇廣奉先追逺之致咸暨九泉而況侍從之臣嘗仕祖宗之世永惟懿美當厚追榮具官某故父某學能通經行不違道以儒術自奮為士林所推親逢仁廟之好文嘗預邇英之勸講閲世未久遺風可懷宜敷錫于靈休遂進升于貴秩非特徇乃子之請可報義方抑亦示我朝之仁不忘舊德詔于幽寢其尚歆承楊良顯故嫡母中山縣君王氏可贈泰寧郡太夫人制敕朕奉三嵗之郊膺百順之貺慶及中外所以均受嘏之休澤該幽明所以廣顯親之教況于鞠育之報必厚追崇之恩具官某故嫡母某氏生鍾慈柔躬履法度婦德之懿施于顯家慶源之長衍至後裔其新陽邑之賜式正郡封之名魂而有知服我休命楊良顯故繼母太原郡太君王氏可贈太原郡太夫人制敕推天澤以及物朝廷之至仁極孝思以顯親人子之能事適乘禋享之祜率有追榮之光宜爾寵章隆于慈訓具官某故繼母某氏生藴令德來嬪顯家均愛子之慈心勤教忠之懿範慶流于後恩報厥躬特因大郡之封遂正小君之號尚期幽壤歆此殊休右通直郎楊元永故父任給事中充天章閣待制佐可贈右正議大夫制敕朕荷二儀之眷虔三嵗之郊仰承靈休渙發大號既均受嘏之福及爾庶工又錫漏泉之恩旌其先閥具官某故父某志慮強立才猷博通昔在仁祖之朝嘗登從臣之列屢試以事所至見稱雖淪謝厯年而風徽如在會精禋之終禮宜贈典之為光進以祿階式褒賢業庶幾泉壤尚服寵休楊元永故母髙陽郡君張氏可贈譙郡太君制敕祭則受福期中外之率同孝以顯親故幽明之不間申豫褒恤之命慰爾劬勞之思具官某故母某氏來歸令門常履柔德治家以禮念風徽之若存有子立朝知善慶之獲報宜隆贈典進易郡封幽穸有知尚歆寵賁左通直郎邵聞禮弟右通直郎敦詩弟右奉議郎約史故父任龍圖閣學士尚書右司郎中贈通議大夫必可贈左正議大夫制敕始皇祐至治之際名臣接武儒館詞禁光輝一時世變風移朕常念之不已今其嗣子有以厥考之懿請命于朝欲從郊社而褒顯之況有故常安可忘也具官某故父某以學術自奮為士林所宗被遇祖宗之朝推髙侍從之列淪謝雖久聲猷若存宜均神貺之休增踐祿階之貴非特慰後嗣之追逺光于而家抑亦見本朝之多賢盛哉往日詔于幽穸歆此寵章邵聞禮等故母通義郡太君蔣氏贈永寧郡太君制敕具官某故母某氏生則養之以禮沒則顯之以恩人子欲報其親朝廷推而成教此郊祀慶成所以講褒贈之典也以爾生名臣之家為吉士之配母道之懿著于德門慶源之深衍至世嗣其新湯邑之賜進易郡封之名泉壤雖幽尚歆寵賁邵聞禮等故繼母和義郡太君蔡氏可贈遂寧郡太君制敕具官某故繼母某氏均帝祉以及下朝廷之至仁極孝思以顯親人子之能事宜舉褒榮之典以報顧復之恩以爾生鍾愛慈躬履法度齊家以禮仰風徽之若存有子立朝知善慶之獲助告于家廟易以郡封幽壤有知其歆寵賁右朝散大夫充集賢院學士李周故父贈通議大夫齊可贈右正議大夫制敕朕答天地之貺嚴郊丘之禋順受繁禧敷宣渙號推布德行惠之意邇遐率均隆顯親追逺之恩幽明咸暨況處從官之列宜報先閥之賢具官某故父某潛德在躬治家有範詩禮之訓見于義方閈閎之髙彰厥善報乃有良子進為邇臣特頒贈典之優昭示祿階之貴告于家廟歆此寵章李周故前母仙遊縣太君周氏可贈安定郡太君制敕古之人其母賢則子有立于時其令名懿德可見于後世此顯親之恩所以加于存沒而廣孝之教成子天下也具官某故前母某氏婦道惟恪母儀可宗旨甘之養雖不及于承顔侍從之榮亦足彰其流慶會郊祠之均福宜郡望之進封泉壤有知其歆寵賁李周故前母仙源縣太君黨氏可贈馮翊郡太君制敕報本莫重于郊故祭有順助之福顯親無大于孝故沒有追榮之恩肆均錫于靈休庶推褒于慈範具官某故親母某氏婦德柔懿母儀恭莊以禮事夫既睦于閨門之內以善教子遂至于侍從之途其升湯沐之封以為泉壤之賁李周故繼母仙居縣太君姚氏可贈襄陽郡太君制敕神錫以福惟四海之與同母主于慈雖九泉而必報豫方致祀以均慶爾可承休而顯親具官某故繼母某氏來嬪德門率履婦道乃有良子進為近臣推積纍之源流不忘閫德正追榮之名分式慰孝思魂兮有歆知此休命李周故繼母壽安縣太君劉氏可贈彭城郡太君制敕嚴吉土之禋所以同天下之禮濡漏泉之澤所以慰人子之心懿範可懷寵章惟渥具官某故繼母某氏履德柔靜宜家顯榮教誨見于母儀光輝鍾于世嗣雖慈闈之養每深切于孝思而佳郡之封尚歆承于恩制李周故妻黨氏可贈直寧縣郡故妻詹氏可贈永寧縣君故妻郭氏可贈真定縣君制敕三年而郊受釐于神祇嘉與海內共焉是以布慶施惠及于庶工又從而廣之以及其父母伉儷之親不間存沒率有褒賁幽明之際可無憾矣仁至義盡乃見于斯況侍從之賢早得室家之助淪謝兹久其可忘之具官某故妻某氏等恭儉慈愛能守法度作配君子為時邇臣迹其內助之功榮以進封之澤庶幾冥漠享此追崇皇叔祖感德軍節度使宗景故母襄陽郡太君張氏可特贈泰寧郡太夫人制敕人子之報其親蓋無窮已也生則事之以禮沒則顯之以恩朝廷推本其情而為之節文故郊祀大霈褒榮有典幽明共之仁至義盡見于斯矣況惟屬籍之長永懷慈教之恩爰舉舊章式旌往懿具官某故母某氏婦德惟順母儀可尊篤生世嗣之賢久處宗藩之理雖萬鍾之養莫能伸敬于晨昏而一郡之封尚可致隆于名號庶幾冥識歆此殊休宫正王氏可贈郡夫人制敕某氏六宫之職在朕左右生有懿淑之行沒有哀榮之恩眷言始終不可忘也以爾名族之英掖廷之舊動循女則善輔陰教彤管有煒猶若風徽之存象服是宜式隆褒賁之典詔于冥漠歆此寵光左朝散郎充龍圖閣待制王震故母金華縣太君張氏可贈汝南郡太夫人制敇古之人其母賢則其子有立于時其令名懿德因而見于後世此顯親之恩所以同于存沒而廣孝之教成于天下也具官某故母某氏柔順慈愛嬪于甲族治家以禮著為閨門之法教子以善至于侍從之途遺懿如存榮養莫及會均嚴享之祜用遷大郡之封幽穸有知尚歆寵命皇叔右武衛大將軍德州刺史叔𥅆等所生母朱氏可贈崇仁縣太君制敕具官某故所生母某氏既郊而赦均神祇之休周于天下凡造朝之士皆得褒榮其親漏泉之澤下及幽壤況屬籍之近欲報劬勞之恩恤典有常不可後也以爾柔嘉之德著在閨閫篤生良子貴處宗藩髙堂之養雖不及于承顔湯邑之封尚可明于追逺光靈不泯庶幾歆承右班殿直王志母安氏可封長縣太君制敕具官某母某氏仕而通籍于朝則父母有封敘之别乃故事爾舍是則惟尚年之為貴蓋本先王貴老之義推而行之所以廣孝愛而厚風俗也郊赦所載爾克稱之宜新湯邑之封以旌眉壽之福三班借職盧拱母汲氏可封永安縣太君制敕具官某母某氏父母已老而子未立朝則封敘之恩不可得此人情之所不足也苟能推本其情而與其不可得者則所不足遂有餘矣亦先王忠厚之政乎朕既禋而赦凡一命之吏其親及髦則許以名聞而旌寵之蓋本情貴老之義可以廣孝愛而勸風俗也惟爾克稱其服恩光左班殿直葛世良母郭氏可封長安縣太君制敕具官某母某氏仕而通籍于朝則父母有封敘之别乃故事也舍是則惟髙年之為貴故雖一命之吏其親耄矣而褒寵亦及焉此三代上齒之義推而行之可以厚風化而勸孝悌也郊赦所載爾實稱之宜疏湯沐之恩以榮子孫之養宣義郎致仕孫向母張氏可封長壽縣太君制敕具官某母某氏朕既郊而赦推本先王貴老之義凡一命之吏其親耄矣則以名聞而旌寵之所以勸天下之孝而厚風俗也惟爾高年克稱褒顯其親湯沐之封以榮子孫之養左班殿直袁務成母趙氏可特封長壽縣太君制敕具官某母某氏朕若稽先王之治道務以孝敬為先凡人子之欲尊崇父母者皆徇從其情而與之是故既郊而赦雖非造廷之士而其親耄矣亦有以旌寵焉庶幾風勸吾俗而躋之禮義歟惟爾髙年乃朕所貴其新湯沐之賜以榮子孫之養尚書右僕射兼中書侍郎范純仁妻燕國夫人王氏可封魏國夫人制敕大臣之體國外則以忠良之業成其名賢婦之正家內則以柔靜之志為之助豫方任弼諧之舊以濟乎治爾則有輔佐之力同享其安爰霈寵章式旌懿範具官某妻某氏生于卿相之族而動循女則歸于忠賢之家而率履婦道其退而成約則有勤瘁相成之心其進而居顯則有恭儉自警之德具此茂美是宜褒嘉顧豫全魏之名邦乃爾先臣之舊里遂頒明命特啓大封豈止為室家之榮光輝于中饋抑亦見君臣之分眷厚于老成皇叔興州防禦使仲僕妻崇仁縣君張氏可封長樂郡君制敕朕肇禋于郊蒙神祇之休嘉與海內共焉故推而廣之及于羣臣凡我造庭之士皆得以褒榮其伉儷而況宗屬之貴乎以爾柔嘉之德能履法度雍睦之教著在閨門宜選上郡之封俾正小君之號服此殊命光于而家皇兄右千牛衛將軍士盉等妻高氏等可封永康縣君等制敕朝廷之于宗屬異之以禮而隆之以恩異之不為過制隆之不為私親蓋所以廣睦族之教也是以朕之誕辰得推慶惠以褒寵其室家爾等少循女則長率婦道靜專以處莊順不懈其新湯沐之賜式示宫閫之光皇叔右千牛衛將軍仲微新婦陳氏可封壽安縣君制敇具官某妻某氏圓丘之祀禮成而福隆鈞而錫之中外凡造朝之士皆得以褒榮其室家而況屬籍之親乎以爾令淑之行嬪于宗藩輔佐有常既茂閨門之則寵光以勸宜新脂澤之封敬服恩章益循婦道淨德集卷九
