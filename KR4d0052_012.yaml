body:
  text: 淨德集巻十二宋吕陶撰啟賀宰執正旦啟辰㑹孟陬兹得四時之正嵗推上月葢惟萬物之原恭惟某官器宅天精德參坤載運太寧之化和若鈞鎔固累盛之圖夀如箕翼適厥人正之序諒同邦社之休寖被洪私舉増善頌謹官聮而有繫慶台衮以無從賀蘇内翰啓伏審光膺制命進直禁林蓋朝廷以斯文為難必咨間傑而天下知共議所屬共激歡心恭惟某官道造本元才周貫變語黙繫時之休戚出處為國之重輕密告嘉猷務引君而當道總司大計期節用以裕民逺業寖施貴名増重深被中宸之遇延登内相之崇惟仁經義緯之成文庶幾同於三代况前兄後弟之接武盛事萃於一門將倚全謨共敷元化某逺從吏役恭聴恩俞趨慶莫縁瞻風載抃荅知梓州杜學士啟比叨寄任外總輸將方馳馹以及彊願嚮風而致問恭惟某官處躬於道飾吏以文綴從書殿之游付以藩雄之治朞年報政兹有顯庸一節還朝佇躋禁直某逺方雅眷垂貺珍題即拜祇承併増感怍荅新知梓州周考功啟伏惟柅車臨部頒政諭民治體一新物情交抃恭惟某官躬處於道應務以才藴如圭璧之純發若蓍龜之决寖涉逺業久涉要塗入省為郎議惜馮唐之老還家開府歌傳叔度之來即慶僉俞遂躋華近某叨從晩涖適㑹歸心入境觀風仰仁聲之逺布發函愛教慚禮好之相先良極感銘豈勝叙述荅知廣安家朝請啟忝將使事稔聴治聲褰賈琮之帷足以成政戲老萊之服切於養親緣愛日之純心抑登雲之髙步眷求有待褒召可期譬夫上帝之圭安假人工而後保清廟之瑟不須衆和而流音深慙小言仰累純德遽辱牋修之貺過存禮好之隆佩服至誠叙揚奚悉謝兩府啟自梓易淮引方車而就道由楚得蜀遽委轡以涖官釋萬里奔走之勞享一旦里閭之便清朝信道特重逺民使者觀風許臨故國以可否利害知之有素故亷按職任付而不疑廩祿所霑僅周貧屬松楸在望尤慰永懐事非近比之常力本誤知之及此葢伏遇某官槖籥萬類權衡百工故曲從私欲之所安乃可責公家之後效某謹當清任事情刻已致忠莫敢或遑冀少行其素業毎懷靡及庶無負於斯人倘吏最之有聞則化鈞之可報賀許右丞啟伏審法扆疇庸天臺入輔伏惟清慰竊惟分六卿之職葢推演於道原峻二轄之權賴總特於事統逺存周家之髙躅進見唐室之宏模稽古建官至矣先朝之法度任人共政偉乎盛際之典刑恭惟某官抱道覺民任誠孚物識前言往行以畜德發仁經義緯而成文步朝庭之要塗任天下之大務兩為京兆再直禁林議其更踐之深惟先舊徳倚以弼諧之用幾若後時一發寵章交流歡頌昔魏鄭公以平直稱職韋𢎞景以鯁亮知名惟時鉅公豈持前哲仰聖賢之相與信宗社之無彊某屬綰漕符阻趨賔席卑情無任瞻咏欣躍之至賀新知成都李寳文啓伏審職近清廂任隆全蜀公朝遴簡僉謂難能舊俗交歡前知受恵恭惟某官至誠格物令德冝民凡踐涉於要塗皆發施於逺業西州使指深養治源北到師臺允崇國體特重憑熊之寄再煩叱馭之行視封域之中宻如庭戸澤蒼黔之衆均若子孫行報膚公延登近比某夙叨知奬載抃寵章官守奔馳難逐兒童之候迓鄰光焜燿樂聞父老之謳歌欣詠實勤叙揚奚極謝成都知府李寳文啟誤被詔除就遷漕事莫副朝廷之寄任徒為鄉曲之便安竊自省循率從援致此則某官愛人由義樂善以誠顧盼末塗矜憐拙宦常假游談之助因為仕進之階况復鄉邦久依徳宇澄清行部毎推明恕之心偃息于藩巳報中和之政幸而晩輩仰止下風匪惟日奉於教言抑亦動遵於使範願言感抃奚既叙揚荅知州李守啟伏審詔除適逺政體更新雖屈髙才實歡輿頌恭惟某官處躬于義飭吏以文言其踐厯之深衆推久次考以猷為之素率有嘉聲尚煩叱馭之行聊重憑熊之寄夷塗未駕毎懐驥櫪之嗟瑞翮將翶安復鶉籠之戀即聞褒召歸序髙華某謬綰使符密依容庇捧玉音而載抃瞻徳宇以増勞欣詠之思深切于是答慶帥賀右史啟叨被詔音誤堦柱史名非實稱幸與愧并伏念某學甞誦經仕欲行已涉道至淺彊文不高嵗月馳邁于憂患之塗志氣耗凋于塵滓之域青緗黄巻雖素業之未忘文石赤墀豈寒鄉之可到胡然冒據率有夤緣此葢某官恕以愛人公于引類謂其有一日之雅常借品題知其無萬乗之容隂為禆助乗容以進省己甚明力若舟航己拜嘉于徳宇音如金玉又承教于風郵徒極置藏曷窮敘述賀太原帥啟四國于蕃邦家所以示彊幹弱枝之勢一麾出守州部所以致承流宣化之勞其振舉如裘領之從其委使若臂指之應况論道經邦之舊徳居秉旄杖鉞之達尊克壯其猷増重兩山之氣象所服者衆特高二鄙之威名岱宗之澤不出於一朝洪河之潤自及于千里顧惟陋邑授屬提封常引領於門庭敢薦名於竿牘恭惟某官道光羣辟徳被斯民藉裴令之論兵輟于樞軸仰鄭公之開幕遄返朝廷介圭聞入覲之期繡衮有來歸之詠復資逺業永翊昌圖某叨假郡章獲依帥節𢎞綱具舉願遵條目之常柔轡以驅庶盡疲駑之力前瞻臺席増抃予心答新知遂州馮朝請啟伏審以親自列得郡為榮士論推高民謡胥慶恭惟某官安行於義晦養其才服毳冕以平刑有光使指戲綵衣而致養實便州麾匪惟承不匱之歡抑以溥如膏之澤某叨從晩涖適㑹晝歸握手升堂將襲芝蘭之異發函愛教逺聞金玉之音即俟披承併伸感抃回新及第先輩啟伏審發䇿中程疏恩唱第副士林之博議聳鄉社之樂觀竊以經術取人重本原于數路文章適用逄亨㑹於一時推之風俗則朝廷由道徳以混同言之路什則君子安義命以登進所求不苟其得尤難恭惟新恩先輩問學該深操修純潔登英華而飭掲己坊表以憲時力少徳多非特效儒流之博實先名後實宜然致人爵之隆自此顯塗期於異日偶縁晚涖適㑹晝歸負弩相迎遐想古風之如在使郵垂貺遽煩禮好之過隆回卬州知郡陳大夫啟比者祇命易麾深慙異數及兹受代愧繼前良空傳父老之謡難奉子孫之契重加禮意曲示牋修拜惠何堪瞻風愈切永以為好言莫能勝謝梓州路提舉常平薛寺丞啟起於謫放賁以寵光還書殿之美名領潼川之優寄適父老之願愧無所以承宣事大夫之賢將有依於庇頼恭惟某官文而飭治政必養源襲訓範於樞庭振猷為於使部淵澄流潔餘波有以載霑綱舉綱疎衆目從而不紊况有雲霄之清議其惟堂構之高才即序禁塗益敷逺業息肩故里引領下風行遂參承併伸感忭答簡州知郡楊朝請啟比者起於發放賁以寵光得郡還家難稱邦人之傒望勝牋賤好過煩才哲之撫存觀禮意之勤隆異世途之流薄第増感服奚極敘暢賀簡州知郡楊朝請啟伏審攷績推先頒恩示勸陟郎曹之前列沸郡境之歡聲恭惟某官茂器承家逺材適治要塗更踐惟嫺循吏之風華步超遷元被盛朝之寵行期異日自陟邇聨謝諸公賀致仕啟齒髮衰殘義當避退名勲煥赫恩許歸休於君臣之際幸而有終于朋友之功豈為無助此葢某官至誠嗟恤雅度并包知其勉強不前未甞深責使之安完而去可樂餘生重委牋修曲存軫念且引年謝事庶㡬免賢者之誚義所宜然而杜門養疾聊以待終焉之期禮無足賀襃嘉所及愧懼莫勝方羸疹之纒緜想門庭之阻邈欣聞所教書不盡言回成都監司啟隆恩遣使朝廷委憲度之成清轡戒塗郡邑仰光華之逺式欽茂業良抃下悰夙覿風徽甞親誨語方幸退藏於里巷未由趨集於賓除嚮望實勤敘揚奚悉代賀范相公啟器兼文武道備天人始列周行綽有棟梁之器及參大政蔚為社稷之才果振家聲遂當國相昔韋平嗣興於西漢袁楊繼起于東京張公錫延賞之名陸氏取象先之意雖云華族未必熙朝然猶前史以為美談當世謂之榮事固未有百年遇太平之運四時膺爰立之求以今言之一何盛也某夙登門仞甞頌威容念班謁以無由第承風而竊抃賀新知成都胡資政啟伏審法扆疇庸制函申命易宛邱之巨鎮領令全蜀之要權一發寵章交流歡頌恭惟某官至誠自既大節不欺以道徳文章為經國之逺猷以法度紀綱為致君之先務四鄰作輔獨高治世之典刑九命出藩尤重逺方之形勢即聞温綍復秉洪鈞某早候下風宿聞餘教仰朝位之圗任竊幸依仁知鄉黨之䝉休敢先致慶願言欣詠奚極敘揚答家朝請謝轉官啟伏審天官考績法扆霈恩循格有常遷官示寵恭惟某官内崇徳本旁貫治源賢業周施宜坦雲霄之步禄階敘進榮酬日月之勞仰承君命之光華聊助親幃之喜樂遽煩隆禮特貺珍題感抃交深布宣奚極淨徳集巻十二
