body:
  text: 淨德集卷二十八宋吕陶撰墓表贈大理評事張府君墓表南榮有道之士清河張君既以皇祐初元三月已亥疾卒于家春秋四十有九三年十一月庚午葬于榮德縣榮川鄉歸政里先隴之次後二十五年君之子復為丞祕書天子大享霈赦贈君大理寺丞均慶賚賁潛德也太博君擢進士第與豫同時每懼先烈之不耀思得推叙大略著示後世乃求豫文表諸墓按君譜系由來最遠蓋晉司空華唐曲江公九齡後天寶中有從明皇西幸者占南榮為巨姓曾祖諱儼建隆時王師伐蜀率土兵導所嚮補先鋒將力戰有功祖諱讓亦以智能補和義縣令考諱文煥攝州司馬君諱惟德字輔之幼以孝謹聞執親喪不忘禮讀書先經術務窮大旨尤好春秋孟子凡雜家駮說未嘗顧一試于鄉不薦遂無仕進意訓子孫以雍睦清慎為先平居擇交游惡苟合間或賦詩見志以誨人語純格整與朋友言多援前史得失否臧以相警勵鄉人善者好焉君袁氏壻僚凡壻七人袁富族也為之壻者或私其資幣以豪君獨不爾袁父母嘗厭他壻之求欲以餘積委君則再拜避謝卒不以一金自汙此其衆人所難而君子所貴者也子男七人曰綸曰衍曰復曰衡曰紀曰繹曰侃復即大博君今知陵井監履尚敦懿居官有能名衡猶未仕餘則亡女四人長適勾僑次適袁綬次未嫁而卒季適袁璐孫男六人希逸希道己夭希聖希孟希簡希古皆建侯賓王舋舋嚮學克承厥家孫女五人歸孫誥賈麟袁晦句龜年句師臯曾孫男十人女六人並幼豫嘗閲史載見昔人出處大致若司空在晉曲江公在唐其德操義烈皆社稷臣雖百千年猶使人仰畏不已今考君譜系原究本始則二公之苖裔固可書也況嘉行有足紀乎銘曰人之生無窮達顯晦儻有一節異于衆可以憲子孫風流俗則謂之不朽非必高爵重位乃取貴後世也女有歸矣父母愛之而私以金幣雖受之未為大過君獨無取豈臨財不苟其得歟彼求而惟日不足者聞君行誼可愧矣嗚呼亷哉行狀冲退處士章察行狀蜀有知道君子章察先本閩人五世祖練唐廣明中從僖宗西幸有官守家乘闕而不載高祖父垂裔始居眉之鼓山曾祖曰璉祖曰道方徙居成都之雙流縣考曰惠妣蹇氏三子孟曰忠仲曰亮季即府君字隱之生三年考殁七嵗母氏亡既孤鞠于兄嫂以所以事父母之道悌而報焉未冠治經術往來成都求師質問大義鄉先生任維翰若釋中古皆通經善講解悉從之游得其要旨妙論階之以踐古人之閾故其志修其行懋與人言古今人事物理之變所謂索而難至者皆探抉窔奧務得其極而後已尤好揚子雲太𤣥經知𤣥以數寓道之用三摹九據始終之變著發隱三篇講疏四十五卷太𤣥圖卦氣圖各一雖前世陸績宋東王涯輩通太𤣥學者殆有不及也慶厯四年樞密直學士蔣公堂以其書薦諸朝皇祐三年仁宗祀明堂賜粟帛四年端明殿學士楊公察又薦之除本州助教懇避不拜至和二年宣徽使張公方平奏請以處士號旌之不報嘉祐四年天章閣待制何公郯陛對以疏論列詔委轉運使詳定其實時殿中侍御史趙公抃兼按一道即以學行之懿條悉聞上乃賜今號翰林侍讀學士王公素方牧是郡遂命所居之鄉曰處士里曰通儒坊曰冲退由是浩然以聖賢之道自裕憂喜無纍形是非無攖中者十年非其趣之高遠德之精微疇能爾娶魏氏生二子長曰祀舉進士應嘉祐詔以行藝敦遺今為著作佐郎守漢州綿竹縣事次稷業文未仕孫男四人曰正曰遷曰益曰宣方治經求進處士嘗為歌詩雜文二十卷行于世卦氣圖以石刻於府學之西太𤣥經圖并文集刻於中興寺子雲祠堂熙寧元年四月未病先辟榖六十日嘗言以氣治之六月九日卒于冲退坊所居之第享年七十六明年九月壬申葬于華陽縣普安鄉白土里嗚呼處士道義充于身文章傳於世惜乎固高節隱居不仕今朝廷方修一代之史則處士之清名皆可書也某既得其詳敢序大略以備史館之載録云雜著書術易之道神矣其源出于天地隂陽其流入于蓍龜卜筮其大極于三才造化之精微其小該于一物動息之形象事之隱晦而未究雖聖智不可得而知者必有以告焉非謂之神乎卜筮之書既本于易岐分派别散漫繁衍于天下觸類而長沿波而適其名號種品之多幾不可悉數而至于閭閻畎畝之賤夫亦有通其說者或擲錢擊瓦無知之物而可以考吉凶禍福蓋我以術窺彼以神告安怪其影響之密哉世所謂壬課者尤可信驗始豫之楚悵然以松檟為念遲遲不忍去有匪人焉力于斗筲而進委者方籠利以合而索然無所得乃欲擠之巖壑以充虎狼之求豫憂而占之術言卦為彈射夫射者平心正志循禮而後發君子之求也非幸其中以戕彼之命而鬻我之能也挾彈而射非禮甚矣伏險賊之心用非禮之具隴斷之態穿窬之謀也安能為物之害乎已而果然居楚纍年闔戶終日不與異類接又有匪人焉飽于芻豢而襟裾者既憑邪以逞而靦然無所獻乃欲訥之網罟以資庖鼎之味豫懼而問之術者曰在卦為蒿矢夫矢者貴其直而不枉先王之創制謂之利品巨用則威天下小用則去害而全已非徇我之欲傷彼之生淆亂否臧悖壞典憲一切以忿暴昏虐為務覬覦一售而䝉搜捕之賞也以蒿為矢豈正直不枉之意歟不稟於法度而發狗鼠之盜蹄齧之勇也何恙之及哉已而亦然嗚呼卜筮非感豫也茲二事者地之相去僅萬里晦明之相遠乃于五百日而所告者如符節然不特吉凶之明驗乃善惡之深戒誅賞之大端也夫禍福者天所以賞善罰惡非私快喜怒而加于人也小人而私快喜怒欲以禍福加于人則為善或不能徼福逆天理矣逆天理而逞人欲照臨在上其可使之欺乎昔者左丘明解春秋好言卜筮司馬遷作史記傳龜策漢志載雜占唐史述卜相大率可以明吉凶著善惡為小人之深戒有輔于教也豫感二卦之說作書術淨德集卷二十八
