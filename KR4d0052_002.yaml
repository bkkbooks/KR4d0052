body:
  text: 淨德集卷二宋吕陶撰奏狀奏為乞復置糾察在京刑獄司並審刑院狀臣伏以聖人之政以愼刑為本王者之居以施德為先故于聽斷尤務欽恤設官創局深有意謂敢緣因革之理輒議防制之宜謹具條奏一京師之獄自開封府御史臺大理寺諸寺監開祥二縣并尉司左右外廂馬步軍司三排岸以至臨時詔獄以及書監夜禁等無慮二十餘處祖宗以來雖極詳愼然猶恐有司失實而冤者無告故祥符中詔置糾察一司以統制之如諸路之提刑諸縣之有提㸃也特重其職不令司他務得以專意于決訟報囚之事其訪問則無賓客之禁其巡省則無冬夏之限耳之所聞惟求冤抑目之所見惟審慘暴刺伺防檢深得其要凡大辟獄具本處先已録問乃申糾察司差官審之儻有疑慮並許駁勘或留繫之淹久或處決之過濫大則條奏辨明小則移文戒督而又廣闢治舍標榜其門被枉之人知所赴訴玩法之吏不肆姧欺明愼哀矜于斯至矣近歲罷歸刑部謂之糾察案止以胥吏三人主行其事諸處申到大辟文案亦委郎官一員與吏部所差之官同慮不過引囚讀示再取伏辨而已其名雖存其實已廢緣刑部主天下獄訟簿書文牘紛委目前雖強明幹濟之才日力亦有不給所以在京諸處刑獄無復糾正而察檢之又況省部深逺細民容有不知者豈能皆詣長二求以自置臣恐大衆所聚之地或陷非辜而無以伸其痛恨矣臣愚謂宜復置糾察在京刑獄司庶協先王閲實之意以廣陛下好生之德一本朝以來大理寺主斷天下奏獄而刑部覆之故大理有詳斷官刑部有詳覆官淳化中因蕭氏之訟論決非當朝廷慮庶獄之不愼始置審刑院于中書之側以侍從領其事設屬四員稍增為六謂之詳議官蓋議其當否而後行也當時既有尚書刑部而又置院者何哉蓋以刑部受冤辭主雪正大理審刑之失當者不可亦與斷獄之事也斷以一司審以一司雪以一司前後相成上下相制所主不同各得盡其心而舉其職所以極愼重之意元豐三年始罷審刑院為刑部議司雖移其名而職任亦不改舊官制既行乃以詳議一司歸大理改詳斷為評事改詳議為丞案牘上刑部勘當而施行焉自此刑部始與斷案之事大理刑部責任既同皆為法守讞議既定一成不變或訴理不當則又委刑部受而治之果涉枉撓理當辦正其刑部原斷之官亦須開說合行取勘初則自斷中則自雪終則自劾蓋非人情之所宜萬一主者護短遂非則理斷之人何以伸其冤臣愚謂宜復置審刑院以中書押刑案舍人一員主之以大理寺丞六員為詳議官領職如故其刑部以侍郎一員專掌理雪及餘職事則上順治體下協典故謹録奏聞乞指揮稽考故事參酌施行貼黃臣今所請止罷刑部糾察案復置察刑獄一司於外所貴專舉其職以防冤濫郎於官制並無妨礙又舊置糾察司在京城之東所以京師諸處刑獄疑難者有司皆言過東衙方是了當蓋謂文案既申糾察而别不駁問方可斷遣以此推之則糾察一司于朝廷愼刑之意深有所助今雖臺官一員兼領刑察緣自有職事職任不專恐未能盡知在京諸處刑獄之弊若更置糾察司亦不疑刑察職事又寺丞六員今在大理别無專職備員䝉成何益寺事又近日詳定案內刑部雖分左右曹左曹專斷案右曹專理雪侍郎各不通管亦與當日審刑院之意同然官局相近吏胥往還其間豈無依違附合之情姦弊多端難盡檢察莫若斷以大理審以審刑雪以刑部則周防明愼皆協于理又今大理斷獄每有可疑而㑹議于刑部者其狀乃云評事以為然丞以為不然少卿從評事卿從丞皆虛立兩端務為小異求合當日大理審刑各局之意事類兒戲頗非重愼今若只于刑部分左右曹以斷案雪罪同在一部亦如評事與丞同在一寺深恐不能糾正枉濫之弊又臣今所請只乞置審刑院以中書押刑案舍人一員主之以大理寺丞六員為詳議官即非增置吏員滋廣事目伏乞詳酌施行奏乞降詔舉郡守狀臣竊以今日任官之弊其輕且濫者惟郡守為甚也封疆千里生聚萬衆休戚所係而不問能否一以資格用之為半刺兩任有薦者二人則得之矣侮法慢令戕民害物十郡之中常有二三闒茸不治又有一二舉天下億兆之衆十分而言失其惠飬者將半矣承流宣化又何望焉方今朝廷清明百度講舉憂勞元元以固邦本惟恐一夫不獲而牧守之弊紛繁至此甚可痛也昔兩漢盛時政平訟理民安其業者皆循吏之效唐之貞觀開元號為善治太宗亦嘗自擇刺史志其姓名於屏風而用之當時名臣如馬周張九齡輩皆極言刺史不可輕任載在史册足為龜鑑前日朝廷患監司不得其人乃詔近臣舉用而監司之選稍稍清矣至于郡守尤為親民略而未議是棄民也臣伏請詔內外待制太中大夫以上于通判資序人歲舉堪知州者三人朝廷更加審察送吏部籍記名氏凡遇有闕先差有舉主者如資任未及即差權知其次方差資序合入人庶幾牧守之職有以庇民循良之風無愧前古貼黃天下民事之重大則一路付之監司中則一郡付之太守下則一邑責之縣令如臂指之相附如綱目之相維國朝之制既舉監司之清一路又舉縣令以治一邑則一郡之守亦宜舉矣又自八路差注以來此選尤濫蓋于本道就短求長自知縣兩任則得為通判自通判兩任遂為知州其猥濫庸謬不可勝言今已收闕歸吏部似此等又皆可指占州郡之寄雖人材絶無所取而資任合入則不可不與虛授濫除生民何賴伏請特立薦格以清其流又臣今略舉無狀之尤者數人望朝廷推其所為即知可與不可為郡輕濫之極理當革也王子文者前知華州每決打笞罪須經旬或半月方斷或有百姓過狀者子文先問其人年幾生月日時為之算命告云爾星辰未佳必不得理且休過狀又因雜職行杖生疏子文下㕔親決一杖示之其愚謬如此今差知懷州霍唐臣者知眉州每公㑹設食須留數品折請估直有法司姓孫為吏其兄在提刑司祇應每法司有過唐臣恕之仍告云我為爾兄且放爾罪其猥下如此今差知海州趙袞者通判果州權榮州事一歲中為鹽井破敗決一千六百餘人晝監夜禁常七八十人略不存恤以至為子決父為婦決姑及就兩州繁處各請供給其貪暴如此今知廣安軍張堯士者堯佐同宗之弟好誇族望輒敢以溫成皇后真容示監司又嘗差簿尉分往村鎮販買諸物圖市易之息日夕往還及百餘里而獲一緡之利又嘗有因病殺牛祭鬼而獲罪者堯士云爾雖有病何如且服藥休殺牛周易曰東鄰殺牛不如西鄰之禴祭其庸暗如此今知彰州奏乞放坊場缺錢狀臣伏見近歲以來四海之利多歸公上官司之積動計巨萬私室之有十已九空恭惟聖政日新德澤流霈窮幽極逺䝉被生成其事如大病之後偶得良藥以活之命有望更生而臟腹空虛支體瘁弱喘息之氣所存無幾切宜調護撫飬俾就安完天下之肥然後可得是以堆垜市易義倉抵當免行之類凡為聚斂者一切廢罷此誠德惠及民之深而與之休息也獨有出賣坊場一事最為深害亦願體恤以慰其心其立法之初蓋為在官司吏無有紀極百費浮冗貪吏從而侵漁州郡衙前既勒力役而所得酒𣙜之利盡以奉于公家有至財竭破産而死于凍餒朝廷知其如此于是拘收坊場官自出賣所得淨利一以募人執役二以給公家之用行之漸久弊從而生蓋小人之情競利而不慮患實封投狀務在必得既妄添所置之直又虛增抵産之數適值民間錢弊闕乏酒資不售課利淨利抽貫稅錢供納不足才出季限又有罰錢或委保百姓管押綱運其押綱之人往往盜竊官物走竄失陷則須勒保人賠填或原買價髙界滿無人交割轉更拖缺緣此數事坊場多有破敗乃至出賣抵産以償官錢或抵産價髙出賣不行則強責四鄰承買或四鄰貧乏承買不盡則攤及飛鄰望鄰之家抑令承買或本户抵産罄盡尚缺官錢則勒保人代納亦須破壞産業或虛指債負妄起訟端橫賴論索郡縣急于官課不問有無逋缺遂使平人承認械頸受箠道路相望囚繫坐獄殊無虛日其甚者至于自經溝瀆鬻及男女而猶不能免大率一縣之內中户以上因買坊場或充壯保而破散拖缺者十常四五官方如此百計督責極力掊聚而逐界所得實錢十分只及五六原注成都管內坊埸第一界賣七十二萬餘貫第二界六十六萬餘貫第三界四十二萬餘貫大率則收得一半入官外餘無可催理一則因元買價髙虛張其數二則為物輕錢重酒無厚利三則日趨困窮難于償納以此天下坊場錢積壓少缺其數極多神宗皇帝深知其弊曽于元豐三年明堂大赦并八年正月赦文纍行蠲放及與展限送納詔令所至人皆鼓舞歌頌以為天地大恩莫過于此除已蠲放外至今缺錢不下八九百萬貫簿書之內雖有現缺之名刑獄之下必無可足之理方當陛下布政之初聚斂刻剝之事大半罷去天下臣庶欣戴稱頌以為仁宗復生尤宜廣霈德澤以慰其望臣愚伏願陛下特降睿㫖所係今日以前因買坊場拖缺課利淨利并抽貫稅及過罰錢之類見勒買人或保人送納并破賣抵産者並與除放庶幾窮困之人普沾大恩復遂餘生況皇帝陛下太皇太后陛下恭儉慈仁出于天稟內無土木華靡之費外無兵戈攻戰之賞四海所入國用豐盈雖放免數百萬貫逋缺如去泰山之一塵何闕于事且天下之務固有是非輕重惟聰明睿智能權而行遂中于理今放釋逋負以安生靈與督責收斂以廣用度何者為是何者為非何者為輕何者為重權而行之正在此日又況冬春以來雨雪愆候祈禱備至未聞沾足則除放缺負俾民免于凍餒亦可以感天地之佑召隂陽之和使風雨時若也臣又聞真宗皇帝嘗御偏殿親閲三司逋缺放八萬三千數蓋真宗以逐次降赦放缺多為有司廢格不行或根究追逮益為煩擾故按籍引對而釋之臣願陛下遠法真廟之恤民近倣神宗之布惠斷自聖意特行蠲放坊場缺錢天下不勝幸甚貼黃臣今所奏只是乞朝廷特放坊場缺負可與不可稟自聖明即非衝改户部條貫須至立法伏乞留中裁酌早賜施行又臣每見赦令放缺多為有司百端抑遏追究根窮幸其稍戾于法遂不除放使聖朝仁澤不及困窮大抵人君發號施令常如震雷時雨不測而至則天下知恩出于上若委自有司毫釐契勘立為條約然後施行則弊生于下有損治體伏願聖慈如以臣言萬一可行即乞將臣此奏留中作朝廷意㫖降詔蠲放不必付在有司奏乞相度逐界坊場放免缺錢狀臣伏見朝廷德惠及生民多矣臣下聚斂之態亦已悛革惟坊場一事根株深固條約交紊猶有餘弊未盡蠲除蓋纍界放賣至今凡十五年其始則有實封投狀競利爭占虛增估直詐通抵産之欺其中則有淨利過重月納不足出限罰錢年滿不替之患其中則有正名已敗壯保納官錢餘缺尚存鄰人買産業之禁期㑹嚴迫節目煩多不惟酒户緣此困窮抑亦平民因而朘削或繫獄或受箠或轉徙道路或自經溝瀆天下郡邑無處無之大率一縣之內上中等户因買坊場及充壯保而失業破産者十常四五多者缺至數千貫少者亦三五百緡以四海總計凡幾千家罹此疾苦矣每家以十口為率凡幾萬人失所矣恭惟陛下至仁博愛亦宜為之動心也昔者神宗皇帝通知此弊加意救恤于元豐三年明堂降赦及八年正月赦文纍行蠲免外仍與展限二年送納去歲大饗肆赦亦有權住催理指揮委監司保明聞奏當議等第蠲放德澤之流非不廣及然而此弊終未盡去者一則為有司違慢詔㫖忘失法意少有疑似遂不保明二則為物輕弊重錢貨乏絶或灾傷所困或兵役相仍衣食之費尚且不完至于官錢何從以納況第一界至今已十五年第二界今亦十二年往往生業蕩盡子孫渝散虛載簿書枉費刑撻嵗月愈久重不聊生憔悴之餘必無可得臣愚伏願陛下推廣先志霈發異恩以逺近之差為輕重之序應第一第二界現缺者並與除放其第二第四界亦乞量立分數蠲免如此則大法簡易不為官吏之沮遏聖澤寬深遂除生靈之疲瘵貼黃承買坊場之家抵産物業原價髙大為近年物輕弊重田宅槩減價今雖拘收在官出賣之際必不依得原估官司仍於缺上理納餘錢極為騷擾原注謂如抵産一處原估一千貫今只值七百貫即更令納三百貫之類伏乞特降指揮應係因坊場沒官扺産並許依原估價直充折庶寬民力又又況第一第二界價虛而髙第三第四界價實而低今第一第二界雖缺錢一二分比之第三第四界已是增剩況無可得宜特蠲放又若須候監司保明奏到方議蠲免深恐諸路遷延期限或所見不一及吏緣為奸别生事節致使朝廷實惠未能均遍莫若只以界限逺近各與蠲减所貴德澤早及細民奏乞寬保甲等第并灾傷免冬教事狀臣伏見保甲之法雖己更改猶有二弊未便于民其一為罷去二十畝以下免教指揮却令五等戶有三丁者皆赴冬教一月緣民之貧富不繫丁之多少而教與不教則有幸不幸今田有百畝家有二丁則免教是謂之幸田有十畝家有三丁則赴教是謂之不幸此貧富力役大為不均況今之教閲官中不給錢米一月之食皆其自辦夫有田二十畝之家終年所收不過二十石賦稅伏臘之外又令供贍一丁則力亦難給昔日推行之始不暇講求利害惟務其多今雖將五等下戶精專閲習萬一或有調發雖破竭家財所得幾何裹糧而行豈不重困臣愚欲乞于三等以上或等第雖低而家業及一百貫有三丁者方得差充其二為陜西州郡今秋雨潦髙原之地雖謂順成下濕之田稼亦不善人户有訴災傷去處而蠲稅不及五分並須赴教官司奉法不敢放免臣竊謂保甲之令行已纍年朝廷知其有弊多所釐改欲民休息若須候災傷及得五分方與免教亦恐德澤未廣臣愚欲乞應係災傷縣分並特免冬教以惠陜西三路之民不勝大幸貼黃又況郡縣自來檢視災傷多有通計一縣所放立為分數如原管稅一千石放及五百石則謂之五分即非以逐户所傷立為分數其被災既有多少之異而通計一縣大數偶不及五分遂不免教此朝廷之所當察也如䝉聖慈以災傷之故不限分數特免教閲則朝廷武備未為廢缺而生民受惠深矣又臣訪聞陜西諸縣人户為田土絶少雖家有三丁有以田産微薄陳狀乞免教者并有訴述本户灾傷過多但為一縣總數不反五分亦乞免教者逐縣拘礙條禁不敢輒行伏乞早賜指揮庶免民力淨德集卷二
