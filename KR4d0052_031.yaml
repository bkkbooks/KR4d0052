body:
  text: 淨德集卷三十一宋呂陶撰七言古詩雪意凄風向晚來何頻潛與嘉雪為塗津重雲固結慘不動六幕莾蕩空無塵信哉北帝舉柬令肅清萬類猶時巡人思沾被率土濱有若渴者欲飲醇儻施餘潤及芽蘖寸草亦望繁如茵嘗聞洛陽縱高臥抑有郢客歌陽春何如酒陳與之敵却退寒色其威振天心安肯靳一灑化力自可周羣倫黎明忽見巳盈尺良瑞豈止山溢銀預知豐年此足賀十空九室皆斯民苦寒朔風屢起聲驅雷濃霜不許晨暉開天高地遠槖籥動凝然一氣從中來坤靈至靜體堅厚大罅忽裂如剪裁河流迅疾猛如箭一朝水合鋪瓊瑰山川色勢尚慘沮安恨草木遭衰摧羣隂交盛固如此均被和煦何時哉傳聞西徼有積雪平地數尺光皚皚賊兵夜凍多死者萬衆已望穹廬迥有感春秋二百四十年彗星三見書簡編當時災異豈止此無乃舊史失其傳咸平距今十八載數出妖象垂經躔聖君憂勞畏天戒責躬下詔殊測然吏之不良民失職思得讜諭繩諸愆太平日久德澤厚濟濟多士追昔覽窮幽極逺盡聞命愛君慮國誰敢先聞陳藥石宜有補勿謂綸綍為虛言焦夫子畫豫不見夫子之身不知夫子何如人但見藴之為之贊與可筆其神二公規鑒少許與獨于夫子何勤勤意是抱道者有志不得伸潔操蜀江泉棲心岷嶺雲野飯有藜糝濁杯無醨醇平居不荷蓧來者莫問津笑歌千古巳白日睥睨六合皆紅塵氣貌特怪陋意味尤酸辛破褐聊被體如敝履之安貧爬癢頗適興如捫虱之自珍五六十載一邑間安寧寇亂昏復晨世纍不我及浩然保天真上問西南維是古多隱淪令伯純好任公賢風範皆足師吾民仲元高明君平晦聲迹長共日月新當時傳公議後世仰嘉問夫子雖不逹見于繪像詩與文清標可想味素節難等倫從此千萬年焜耀寂寞濱貽草萊章察漢熖中熄哀平微子雲有道不有時立言盡括二儀數八十一首淵而微至神不形復不見𤣥道固非人易知劉歆嘗恐覆醬瓿切憤學者斯言垂桓談亦謂傳必久賤近貴逺可逆推史臣俗筆擬僭號數字豈免萬世譏侯芭英骨久沒地千均難用一髮維幸且綿綿未歇絶果與後代揚雄期環中先生悟逹者力舉雄道潜其思著圗課見歷象運發隱扣逹乾坤機深嗟范望用心苦意與測異將奚歸乃覃精義述講疏直論雄心非詭隨愚聞是書百日就瀝懇再拜求觀之先生訓我有大略筆端粗可言亳釐在𤣥曰首易曰卦𤣥凖易象測凖詞方州部家雖列位非類六爻高與卑第當縱橫以算計豈可連缺如象為夜詞多凶畫多吉陽家貴偶隂家奇謹持此理讀九贊人事粗可詳其宜餘地三極藴奧妙一朝未許以意窺我從誨言日勉勉始若得濟終無涯性庸才下道悠遠策發未進吁可悲願從諸生北靣請庶幾一釋終身疑以茶寄宋君儀有詩見答和之九峰之民多種茶山村櫛比千萬家朝脯伏臘皆仰此纍嵗憑恃為生涯一朝使者忽禁𣙜振舉法令搖三巴錐刀盡毫髮鞭朴過網罝悲者西南人生長逄勳華垂髫以來至白首未識此事徒憂嗟議欲伐茗荈不如植禾麻一花五出最為早焙戶常于火前造春來畏罪不敢言芽甲任隨黃葉老安得仙崖凝露膏寄與交朋叙勤好廣平先生風格清坐聽萬事心無營日高睡覺懶慵起不欲世態昏瞳睛誠宜玉筒摘佳品或向武夷搜早英汲將楚谷水就取石鼎烹可以助君淳深幽寂之道味高古平淡之詩情小方片甲洎觜翼凡下不足論芳馨西湖所採者抑亦傳虛名不執符移往不由關市征而乃輒贈遺豈非干典刑高賢接物自無間野夫得以芹為誠長謠三百言重報不稱輕文錦方能致珠琲木瓜安敢邀瑰瓊再拜捧嘉貺讀之如寵驚感君裁詩誤題品勸君避患宜詳審平日視世途孤心巳寒凜坐逄俗客不須嘗亦恐持之為冒禁和蒙軒䝉軒高占山之埡其上五頂皆生茶仙崖雲霧不復見上峯紫筍令為嘉地宜物産種植廣疲民所恃如禾麻朝晡衣食足生計賦稅力役供王家頃者憸人獻𣙜議百弊滋長多蘗芽川馳陸走窮嵗月泣血無告天之涯近從吾蜀逺秦陜生意凋落成咨嗟天高聽卑詔令下欲使德澤沾荒遐使節西來善詢度剗削弊蠧除網罝山翁野老盡欣悅市井歌舞尤喧譁憑軒一望快遠目滿山和氣凝丹霞聖君仁政賢臣布信矣原隰生光華遊文水夀寧院原注武后母葬院側重巖一水源何長下浸十頃同江鄉環堤數里植垂柳緣隂交蓋西風凉危橋迤邐渡前岸古寺直枕山之岡門䦨閟邃戶庭闊金碧間鬬皆煌煌并人事佛素巳謹挾以富力尤輝光三朝宸札舊所賜奎文寶蹟人間藏有如方嶽處厚地鎮壓萬衆傳無疆西園嘉卉不知數春暉盡許開琳琅東偏小池亦足愛秋色未老芙蕖香寺旁有曰武陵者高碑大字言其詳武周一旦改唐祚天傾地轉無乾綱睿皇書碑李嶠記常時氣𦦨安可量神功距此四百載孤墳雖在郊原荒年年秋潦過墳側枯盡白草空斜陽且憐景物為一飲誰暇對酒論興亡送程彛仲赴東川教授與君同縣又同甲家世相同學為業陪從最舊今老矣四十餘年如一霎吁嗟先德去已久後嗣皆能守家法君之一第得稍晚更向小官勤檢押鄉閭執友在嗣禁奉詔親題薦賢劄美材猶未立朝庭歸馭依然走川峽文章近嵗頗頺靡庠序得人須鎮壓欲踈密網在提綱思遏狂瀾當下閘由來文黨俗寢盛定見子昻才不乏羡君高堂有慈母日侍歡顔問單夾寶箋銀絡纍年封他日恩書應滿匣聖君文母切求治數路招來不為狹讀書到老必有用一發胸中補熙洽喬松千支雪中青肯向西風感衰颯次伯通雲頂山長句韻金淵地界東西州諺云錦擔垂兩頭中間石城最佳勝二十餘年嘗再遊奇峰雖向郡城見好景半是僧家收松蘿四靣圍絶頂九夏不暑長如秋東隅忽值海日出下照巖壑無深幽羣隂破散宿霧斂萬象開闊晴雲浮軒􅀈高處氣勢别縱欲極望誠難周藍凝後嶂遠更秀雪壅前溪寒不流軟草將春鹿麌麌濃林未暝蟬啾啾襌僧上堂演佛理鏜然鍾韻喧層樓問之浮世輒不語應笑世人多謬悠下山儻有頓悟者直須作意無遲留贈平羌狄尉梁公沒世五百年殊勳茂烈存簡編我懷忠議不復見讀至舊史嘗喟然窮山老尉有狄氏問之乃曰公其先誥書家牒盡炳炳照出往事如目前念公英節不見矣見公遠孫良可賢况公遠孫實賢者本末趣尚疇能肩昔從五季衰亂來簪組飄墜歸農廛平時下詔繼絶世霑以一命聊褒甄天資忠孝遂奮激報祖許國惟勤拳胸中已有霜雪在飲冰食蘗甘如羶嘗云起迹自畎畝幸得寸祿因賞延語言動靜苟一失辱及吾祖為欺天信者清白與剛毅異代猶有芳風傳如何十載走塵坌緑髮减盡成華顚青雲岐路苦悠遠誰借跬步為階緣當途逹者倘在念一顧可使羽翼軒不惟廉操足敦勸抑見袓德光綿綿嗟豫之意止如此感憤為君書此篇送曾尉前年到官殊未久君亦東來為我友握手一笑萬愁寬平日語言期白首山深縣僻庶事荒雖植嘉苖半稂莠我無長術剗芽蘗坐見斯民顏甚厚君有豪才生顯家未涉要津甘五斗巳將客意同休戚復視世途均好醜咄嗟吾屬皆壯年當學古人所無苟勞生險易固多岐未必功名垂不朽自知物理難揆量惟勵身規務恃守丈夫實藴四方志方䖍君命方趨走崎嶇一邑勿云遠赤子歡迎如父母銅梁春晚亦開花猛駕歸軒㑹文酒和運判孫聖微遊大慈西州都㑹坤之維地産豐羡人熙熙朝庭念逺勤撫養欲壯心腹強四肢精求守臣擇使者故有賢業堪依毗導宣德澤廣流𣲖講舉政教先本基不容蠧弊長芽蘖直欲赤子皆充肥泰然一道遂無事犴獄衰止文符希燕閒何以度嵗月憑仗文酒相追隨過從僧舍盡幽邃閲遍畫手多神奇因嗟唐人值喪亂奔走至此常懷歸韜藏絶藝鬱不發壁間一掃窮精微試登高閣凝望久欲將逺眼窮天涯山扃水繞氣象好雲晴日暖光隂移信哉浮生巨河上鼎勢㑹以一足支原注薛許昌登大慈寺誾詩云一足㑹支鼎浮生半在舟方今文軌慶混合帝力何有民何知長廊廣屢數百載留得風景資遊嬉清樽豈特具酬獻髙論不廢評是非鄙夫幸爾陪雅集懷抱芬馥蘭與芝天閽九重勞夢想回首鄉國空遲遲青蠅去年十月青蠅滅高堂小㑹頗清潔今年四月青蠅出競逐腥羶誇羽翼畏途榮悴如寒喧流俗早夜趨貴權一朝勢去即消散可與青蠅同日言席上咏金橘江南種橘繁如粳爾今獨以金為名豈非彼俗甚珍惜謂其可比百鍊精千頭盡帶秋色老一腹皆飽晨霜清初筵特此獻磊落滿座不覺窺光晶寶肆豪華竸相勝瑪瑙散入雕盤盈珠庭變化望已久仙丹忽向洪爐成試侵香潤擘圓粒齒牙滴瀝沾冰瓊自憐孤根出遠土得並衆果親杯觥赤心可恥不嗤棗虛表無用安須橙辛酸甘苦各存味賴有知者加題評奉寄單州太守王聖欽原注詩中所叙皆聖欽來書之意昔嘗請郡歸東川衰遲幸㑹使者賢開誠論議簡條目一境草木沾春妍公齊清假弄詩筆更唱迭和多長篇嵗豐民樂尚蠶市撼罍鬬鼓殊喧闐東山西市頗壯觀飲帳或在山之巔踏青摸石循故事浣花亦倣成都船相從對酒每一笑聊與遠俗同欣然北巖石穴廣似洞疑是古昔棲神仙火雲燒空赤日猛及到此地如冰淵清風滿懷興未盡四望晚景增留連平生宦遊此最適不覺弦晦相推遷郵筒忽報謫書至君命嚴重敢不䖍試思衡嶽詢遠近里堠去蜀凡八千蒼黃去郡别我友一意調琴中斷絃回首鄉邦止數驛欲頃血淚辭松阡藩候迫逐倉使促爭向墜羽誇鳴弦天恩曠漡置不問投放裔土懲小愆闔門良賤三百指孤舟一葉何翩翩瞿唐灔澦遍涉歷內訟過咎歸之天洞庭阻淺輒三夕怒風急兩聲相喧此身恐汚盜賊刃不爾定沾蛟鱷涎偶逄漁艇相援濟稍覺神觀來歸還長沙既下尤怪駭半夜雷雹如烹煎桅傾纜斷船脊折四十餘里中流漩舟人恐懼難致力貌孫顧我皆淚漣嘗聞死生有定所頃刻由此歸重泉東方漸明浪漸息忽造平岸逃危顚胸中悲愁雖未艾分外嵗月疑少延寓居衡陽味亦惡地接炎荒風氣偏每逄三伏如坐甑突焰已熾猶吹煽是時回祿得乘便取次薰灼須及椽回環四顧求避計往往啜食不下咽深冬屢見溫瘴起灑作昏霧飄為煙勇夫壯士尚抱疾嗟我衰憊何由痊雀羅當門人迹少賓榻不解塵生氈難希杜甫遣秋興易學邉韶貪晝眠碧湘萬頃望不極泰嶽數峰高莫攀江山信不與人事日送佳景來目前長腰縮項兼二美早晚嘗稻時差鯿浮生一飽亦已足下筯何必求腥羶親朋書問寂絶久杳似隔世馮誰傳平居分義重膠漆一旦爭敢通寒暄匪惟物態尚流薄抑恐罪戾相攀緣古之交情貴賤見而况利害生其間君乎存守異于是特特萬里郵華箋窮通黨來極慰勉疾疢愈否深哀憐高標豈為霜雪減雅操誠如金石堅羡君高堂有慈母夀髮鬈膩猶垂肩綵衣趨庭奉燕喜玉盤潔膳羅珍鮮復有佳兒富文史闊步直登英俊躔行聞清廟獻雅樂伯仲交奏箎與塤事親教子兩如意此外紛紛烏足言君在山東我劍外一書往返須經年餘生再㑹諒難必我往應在君之先作詩寄君重感慨交道多闕君能全子孫他日有顯者勿以衰門相棄捐淨德集卷三十一
