body:
  text: 淨徳集巻七宋吕陶撰表謝知陳州到任表臣伏奉告命差知陳州巳於四月一日到任者將命出疆自貽罪戾叨恩補郡私享便安仰荷寵靈俯懐隕越伏念臣才非專對學亦寡聞比緣變故而行豈以宴私為事昧從宜之禮兹為失職之愆合正常刑以懲顯咎敢期睿鍳曲庇孤根下遷書使之名尚委藩侯之寄案王稱東都事畧陶奉使契丹以宣仁后在殯辭契丹宴設西府奏陶不先取㫖除集賢院學士知陳州宋史陶傳失載此盖伏遇皇帝陛下􅄐明溥照乾度廣容聼㫁務於原情操術参於使過舜心篤孝矜其寕戚之䘮堯徳尚仁議以惟輕之罪生成所暨塵冐尤深臣敢不敷暢教風遵承憲令勤敕饑之政以綏惠流㪚攷治水之迹以防閑墊災冀集涓埃歸酬覆載謝知河陽州到任表臣伏奉敕命就差知河陽軍州事巳於今月十日到任者出歴近甸即席未温易地專成踈恩過厚仰承重寄俯激危心伏念臣生長遐方沉迷樸學為貧而仕敢懐富貴之求度巳不能安及功名之㑹晩䝉異域稍渉華塗禄過量而易盈位乘髙而速墜既煩宥罪猶許牧民京輔奥區纔布二旬之政河津巨鎮又同千騎之行委任皆優叨塵太甚此盖伏遇皇帝陛下文明齊日洪覆如天恢張百度之新克光前烈役御萬官之衆俾効寸長故以此州付於不肖臣敢不體重民之意堅許國之誠共治惟良勉希漢世之循吏以公其允敬服周官之訓言冀贖往愆歸酬洪造謝知潞州到任表臣伏奉敕命差知潞州已於今月四日到任者引嫌以請遂沾雨露之恩受命而行敢憚道途之役即安於此揣分惕然伏念臣孤拙自将迂踈安用預先帝訪問之選乃竊虛名為陛下侍從之官殊無小補俄以出疆之罪遽膺守土之行僅及一時巳更三郡承流宣化愧職業之未修送故迎新幸封圻之宻邇此盖伏遇皇帝陛下玩心於道繼序以仁崇有國之陛庭優容邇列重斯民之師帥遴簡賢能入而嘗近於清光出則必叨於名鎮因之寄任及此孤愚臣敢不推本淵源講求體要堅險夷之履趣殚夙夜之勤勞晉有唐風惟務順民以治魯非齊政安能累月而成冀收毫髪之功歸答堪輿之賜謝改職名表臣凖都進奏院逓到敕一道伏䝉聖慈荷授臣朝㪚大夫充集賢殿修撰巳祗受者頒恩改職猶参書殿之華拜命撫躬深愧儒林之秩伏念臣稟生寒陋渉世迂踈以章句之學竊禄於盛時以日月之勞致身于要路鸞臺鳯閣嘗塵𨽻屬之員熊軾虎符屢假承宣之寄未能補過安敢冒榮伏遇皇帝陛下繼序以思正名而治酌古今之廢置載以官儀慎予奪之重輕特為國柄不遺衰蹇亦畀寵光臣敢不仰載洪私敬承異數循名責實慚非撰述之才竭節盡誠誓報施生之賜謝知梓州到任表臣伏奉敕命差臣知梓州軍州事臣已於今月二十六日到任者昔乘拜疏願分鄉郡之符今乃叨恩遂載邦侯之斾仰䖍俞命俯激危心伏念臣習不逢原用難應務起家從仕希子雲之安恬發䇿决科鄙谷永之附㑹每䆒觀于義利靡狗易於險夷持以自盟乆而無愧半生零落空驚嵗月之崢嶸晩景亨通忽接雲霄之歩武偶緣使事輕去從班未閲再朞俄更四守既遂里閭之請又塵屏翰之居力薄豈堪恩深宜報此盖伏遇皇帝陛下至仁天覆大智日躋成湯之善與人必於噐使武王之不忘遠燭以皇明未譴衰遅尚優臨遣况臣早嵗曽使此方導徳澤于數州粗能寡過奉教條于一郡敢不潜心兾收毫髪之勞歸答乾坤之賜謝責分司表原註紹聖四年閏二月人臣之過莫大於不忠王者之刑必誅而無赦仰頼好生之徳俾從分務之司敬服寛恩交流感涕伏念臣禀生寒陋渉世艱危不知事主之大方徒感近名之小智出辭妄亂遇事狂迷名教之所莫容憲法之所不宥復何靣目尚緩班聨既假職於别都仍即安于善地餘生甚幸化力自歸此盖伏遇皇帝陛下加意盈成勵精聼㫁繼志述事以光大前烈顯忠遂良以固安永圖察萬物之殊源無容紛糾憫一夫之垂盡未即誅鋤正其罪以示勸懲錫之禄以養衰病臣敢不追訟前𤯝切防後愆革行險之非心持保身之深戒生而無補僅逃蕭斧之常刑死或有知猶兾敝帷之維惠謝責降南嶽廟表壊法容私義當顯戮謫官領局㤙許自新伏省過尤良増戰灼伏念臣禀生寒陋渉世艱危早竊虚名晩塵膴仕持從臣之槖無補猷為佩郡守之符多隳職業縱細民之盗鑄致私鏹之公行罪狀甚明刑書未議洎沗鄉邦之寄任數為風眩之侵陵拜疏自陳方覬退休之幸原情必罸俄聞責黜之音仰畏雷霆俯驚氷谷欲繼上歸田之請慮難逃慢令之誅即扶病以之官已具舟而去里窮途易塞衰氣復傷適當起䌫之初㡬有盖棺之事遽飄流於三峡遽放蕩於重湖以七十之羸軀盡八千之去路傋嘗險阨屢及俄虞偶全犬馬之餘生深荷堪輿之厚賜此盖伏遇皇帝陛下乾行適治豐照通幽督群吏之循公光昭先憲寛一夫之垂盡滋廣至仁未即銖鋤止從廢逐正其罪以警偷惰錫之禄以養衰殘臣敢不追訟愆違恪遵檢押雖有負薪之疾豈敢乞骸空懐結草之心終期報徳謝知卭州表臣五月二十日凖進奏院逓到敕一道至衡州伏䝉聖㤙就差臣知卭州軍州兼管内勸農事臣即時祗受訖者貶處遐方無復全軀之望生還舊里仍叨守土之榮恩出非常力同再造伏念臣禀生寒陋渉世迂踈粗聞修巳之方竊有逢辰之幸熙寕㧞士早緣制䇿之採收元祐擇官晩有禁塗之更踐乏深厚之文以丹書典誥寡周宻之慮以出納樞機責任太隆施為奚稱方朝廷之攻舉嘗勵翼以赴功逮朋黨之論興亦淪胥而被譴天髙莫訴罪大胡言羽翼傷摧尤畏鷹鸇之搏逐夢魂驚悸深憂斧鉞之加鋤敢期放廢之餘遽玷寵光之異此盖伏遇皇帝陛下運乗天造道並日升聖繼聖以儲休光昭大慶新又新而作徳覃及群倫盡成湯觧網之心廣夏禹泣辜之惠哀憐謫籍付畀郡章肉白骨以覬充盈然死灰而求炎熖生成至此報効云何臣敢不欣戴至仁推明初政承流以治少希循吏之所先擊壤以歌願與齊民而共樂庶㡬晩節無累洪鈞謝授再知梓州表臣先以罪分司南京衡州居住於元符三年四月凖告落分司差提舉成都府王局觀至五月内凖敇就差知卭州臣逐次謝恩祗受及奉表以聞去訖至今年二月七日到綿州羅江縣又凖告充集賢殿修撰改差知梓州臣即時望闕謝恩拜受者九殞之餘忽逢再造一年之内輙易三遷初傋位於嗣官旋領麾於鄉郡繼沗集仙之命仍分左蜀之符并出異恩悉還舊物幸非所望感莫能勝伏念臣學不能美身志未可適道動踰涯分易速悔尤奮飛於畎畆而濫陪英俊之存涉獵於縑緗而與聞朝廷之政謂之才則嘗踐更於臺刑加之罪則乆廢放於江湖小人持附㑹之心乗而下石騷客有哀憐之興惟欲招魂累年趨必死之鄉一旦履復生之地洊沾殊澤増賁餘齡此盖伏遇皇帝陛下光紹寳圖勃興治道大判惠邪之勢深權用舎之機雖衆正在朝足跨啇周之盛而一夫失職尚攖尭舜之心䘏及衰殘槩從收叙臣敢不究觀否泰省念初終如痛定而反思若途窮而利往枕邱適願既知於瞑目之前結草酬恩敢惮於没身之後謝知梓州到任表臣近凖告命伏䝉聖恩除臣依前朝請大夫充集賢殿修撰知梓州軍州事巳於三月十七日到任訖臣聞能官人者尭之盛徳欲惠養於生民再為郡者漢之名卿頗光輝於前世蓋知而善任任則必能舉其職故去而復至至則有以慰其思乃君臣上下之交亦古今賢聖之美載之行事可得而聞魏相之於河南以方嚴成治行黄霸之在潁上以寛明得衆心盗賊未平願借㓂恂之力兒童相戯喜聞郭伋之來或體國以致忠或宜民而立政前功不替後效愈明近代以來斯人盖寡未敢有起於廢成賁以寵光復從書殿之賢仍領鄉邦之寄苟踰其量徒厚爾顔伏念臣學文不能信道未篤丁辰於始衰之日誤渉華途被罪於垂老之年乆褄裔土忽逢聖作偶得生還特出淵𠂻悉叨舊物况潼川之區域乃益部之比鄰嘗綰郡章尚傳里誦江山如故得陪父老之嬉逰坵壟不遐庶盡嵗時之孝敬此盖伏遇皇帝陛下鼎新大政萃聚衆材用人如日之照臨正邪自辨成物若天之化育小大不遺所以甄收及於衰朽臣敢不持循素節勉強暮齡廣上徳之寛仁䘏遠方之凋瘵處耕田鑿井之衆不失常生在垂衣拱手之朝庶㡬小補乞致仕表臣生長遠方逢值聖世擢皇祐進士登第寕制舉元祐中塵冐侍從紹聖初謫放江湖伏遇皇帝陛下光紹寳圖誕敷鴻澤昭洗過惡叙復班聨臣深遇勉竭疲駑仰答造化而齒髪衰暮疾恙侵凌竊慮職事曠廢重取非戾伏望聖慈念臣今巳七十四嵗舊感瘴癘間或病作心力昏耗難以釐務伏乞特降指揮許臣守本官致仕庶㡬安養羸疾遂其餘生謝致仕表齒髪衰殘義當告老絲綸煥赫恩許歸休荷君父之始終全臣子之進退敬承俞命感激危心伏念臣起迹至寒逢辰過幸早竭簿書之力徒自沉迷晩叨侍從之班訖無補報侵尋暮境眷戀故郷輙申謝事之誠覬遂乞骸之願仰煩睿鍳俯察愚𠂻此盖伏遇皇帝陛下舜道用中尭仁濟衆如天地隂陽之覆不間于㣲雖蟲魚草木之生亦從其欲因而衰朽得遂休閒臣即解郡章言旋故里想天顔之睟穆難暏清光詠化日之舒長敢忘帝力淨徳集巻七
