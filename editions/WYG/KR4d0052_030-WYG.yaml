body:
  text: 淨徳集巻三十宋吕陶撰五言古詩説學送句輔元赴普慈六經聖人心言以寓微意著示萬世教大略歸簡易先儒事研覃傳注發奥祕其間豈無失十數纔一二沿波而討源自可見極致學者不務此紛紛競非是所得方一毫已謂盡千里譬如就寸管窺覘九清位又如持小蠡測度巨浸水近年經術興衆説尤鼎沸或沿老佛解或取鬼神議或以對偶求或用㸃畫治徃徃勤萬言區區釋數字茫昧超洪荒高闊等天地幽欲根死生明欲混愚智五常孰為常百氏孰為氏古今名家學一旦盡委棄老生分退縮鉗口深有畏晩輩互馳騁鋭力不少避兹事繫風化賢者慎措置吾鄉句夫子天禀最純粹事親存至行執卷考精理平生耽道膄大嚼得鼎味使之典胄席琢玉成貴器不爾坐泮宫好音變惡類頭白顔已蒼猶從一麾寄普慈實名郡良俗先禮義斯文久磨淬浮筆恥誦記有心欲聞韶作樂慮惉懘有道欲適逺驅車患軒輊兹焉遇儒師于學有統帥公若舜權舉明若軒鑑視珍若太羮飽快若醇酎醉詩書文翁治教育孟軻志雖則憩甘棠清風似槐市答宇文公南少年從君游于今已頭白逡廵三十載光景如昨日追懐當時事感慨横胸臆賢侯在泮水多士凡數百探道先淵源學文重氣格君常露華采流品推第一西南有豪俊自此貴名出天池可直上中減扶摇力不免逐鷦鷯搶榆暫棲息北窻換五斗輕重固不敵况當念赤子安忍負愧色歸來林下泉屢把塵衣滌南溟徒爾慕腐鼠莫我嚇清樽及黄巻兩與聖賢覿伊予最不肖厚幸䝉賁飾歸田尚無計苟禄惟自青因循得瘖病放蕩成笑疾持此答長謡慚無雙白璧西風起高原一首奉送應之太博東歸西風起高原萬象動秋色𣺌瀰潔寒流􅆭淡升杲日嗈嗈雲端雁所嚮知自擇豈獨順寒暑行将避矰弋蕭蕭林間葉早暮見疏密危梢怯摇撼懔若遇彊敵騷人與志士趨向在幽寂悲歌節物變浩歎歳月失逺憂積不解難以斗酒滌中夜撫鳴琴餘聲寫沈鬱竊嘗窮天運舒慘固其職胡為世􅃠中情熊異休戚逹觀殊不爾曠懷居自適偉歟當世賢明爽照今昔孤高松柏操肯與霜雪易磊落鷹集拳何憚狐免擊天涯共一笑肝膽露纎悉相從恨不早此别重嗟惜夷途快覽望還馭忘渉歴悲哉宋玉賦安可贈行客仁智亭夜集明月有深意輝光滿層臺佳景豈易得對此持酒杯坐久轉清曠雄風為時來夜闌興未倦歸歩猶徘徊答梁子美召食湘中佳山水使指重他部高賢駐行節儒雅飾治具雖云入郡廣曽不假多慮一扇清微風融和及生聚川原發陽和草木均雨露疎網悉舉綱和聲已載路時登華逺亭每與勝景遇秀巖及南峻碧江爭北注回環如戸庭髣髴若繪素彌望快遐目縱吟盡幽趣雍容接諸生謙屈存異顧飲食出誠眷上下捐禮數賤子慚不肖萬里困飄寓屢嘗造賔除幸此聴談緒斐然無所裁安可繼大句送蔣熙州昔登蔣公門忽忽五十載于今見猶子省記似前代慶源得餘波家範禀性誨筆下吐雄文滔滔湧江海胷中抱英氣落落等嵩岱十嘗試一二卓犖已稱最還朝纔㡬時何時又補外河湟復古地形勢壯且大冊府圖籍存充國城壘在臨洮建都府節制中機㑹守之扼喉吭動則攻腹背西羌輒犯順種落異向背呼嗟秦雍間氛祲恐未艾連年困飛輓何日貯倉廥一病費調養已甚其可再綏懷與剪蕩黒白燦利害吾君鑑勤逺静制六合内仁如天地心萬類悉容貸不矜靈旗伐未奏短簫凱一旦春風來生意入窮塞載瞻將軍鉞猶識使者旆治邊信有術豈徒威克愛原註慶歴中蔣公希魯侍郎守成都某䝉賴數載今五十年矣觀熙州之為人彊裕清敏蓋得其家法云送張子公康定用兵日府谷尤孤危屬當治安久多事盡廢隳三面枕賊境平易如通逵重城輒議葺浮論多背馳賢哉光禄公定慮先本基百堵大興作據險成藩籬城完賊已至善守莫敢窺泉源衆所汲公為親解圍兵勢弱不振公能屢張威賊退城可處生聚始有歸於今三十年功勲書鼎彛邊人毎記憶言者感涕揮近日羽書至討伐加羌夷廟算出帷幄王師整熊羆壯夫思報國志士竊憂時寒日朝惨淡凄風夜號悲昔人何卓犖往事可追維夫君實賢嗣仕宦圖奮飛家聲貴不墜儒學當有為歸歟自磨礪門閥増光輝送唐君益朝家設賢科留意在豪彦三道詢天人萬言極貫變國論庶有補謀身非自薦昧者鮮知此榮禄生貪羡討論遺本原文采事藻絢假之為㨗塗得以歩華選亦有附羣邪藉以肆綺辯心迹既自異事業安可見遂令權貴人待物少明辨概為天下材皆同秦士賤夫君非好名力學久忘倦天資固彊直道業益豐羡純如后䕫音發若老羿箭深有啓沃誠恬無寵榮戀時事方艱虞乾心屢告譴逺憂何時已長䇿殊未獻期君為國醫起疾須瞑眩送杜翁東行我為懐安官君作什邡令封疆苦不逺音驛稍頻併乘閒强吟詩寄去同賦詠其言類諧謔間或有譏病䝉君屢酬荅往問復來聘長謠頗壯贍短語亦清勁大率如為人圭璋有餘瑩得之每急讀醉魄時暫醒方從文字樂忽爾報成政秋風飄行色萬里去意迥知君最留滯文價早馳騁䇿名二十載位未立朝廷一官奚足論百熊委前定自古有通塞誰與造物爭任此不繫舟所至遂游泳西山白雲起回首念温凊恭聞陛前語歸拜堂上慶僕馭倦遊否塵中多㨗徑寄題丹稜李令野亭前山翠光凝後圃穠秀合惜此衆景㑹聊以一亭納地勢得高爽人情逺囂雜縱懐百慮清極望四逺匝風行訟牒簡晝永縣扉闔居常玩文史間亦理杯榼雅趣適安静嘉章屬酬答門外有通衢華輪正騰踏南山有嘉木一首贈友人南山有嘉木秀抜何亭亭盤根蓋得地直幹自挺生朝為杲日照暮得甘雨零氣敵雪霜勁勢凌雲霄青豈非澗下材獨賦輪囷形屬當搆大廈量度審重輕彼尺我已文一柱支百楹夫君承顯家累世公與卿天質由慶禀湛然寳純明膏梁莫能遷志操務潔清紛華未易勝仁義思力行學殖固原本詞章露葩英早夜勤琢磨日望貴器成間歳下明詔時哉㑹光亨遥遥萬里塗思君如户庭和巖起貝暄凄風苦朝寒愛日惜影短翹首望餘照曝背希一暖温如襲裘褐美若悦芻豢在陽頗舒暢適性易飽滿支頤殆忘形縮手豈執版却笑假春衣無乃求之晚感白髪少年事辛勤老大渉憂患撫時感零落髪白亦已慣每思初白時黒者尚千萬晨梳滿一握中有素絲間及其白已甚色勢頗滋蔓種種漸無㡬星星忽大半常情惡衰颯不欲姿容變持鑷屢剪摘煑藥勤㸃換久之反自笑遂事固不諌萬物入形器盛衰有期限葩英乘春芳凋滅向秋晩人生止百歳稚耋如早晏光隂白駒走安得常總丱形骸任驅役膂力資治辦其間得與喪大率皆夢幻既老遂休佚萬熊無足盼方當齊椿菌未暇語鵬鷃霜雪華滿頭長吟又何怨送翰林范侍郎進退為大節君子貴其全獻替實大事良臣所宜先二者苟一失胡得稱至賢況乃勢利誘中性殊易遷趨時或勇鋭顧義少慤堅崑山有良玉烈燄不敢燔太華有蒼松嚴霜豈能干公以學行起華塗三十年器業飽䕫卨文章富雲淵徐行自廊廟羣望惟陶甄適㑹薰風琴為民更五絃潔情思恤物有道當危言一旦謝簮紱易若忘蹄筌冥鴻颺雲霄老鶴得芝田天眞適曠蕩世網脱拘牽安居返故里盛事光塵寰父老相歎詫謂公乃神仙士林素矜式仰公如綺園試閲前代史昔人難比肩嘗䦔喬與固精誠動皇乾願仗至忠力區區塞奔川不幸遭戮辱何由老林泉徒使國士淚至今為之潸又聞廣與受知止皆求還都門祖帳盛鄉里千金捐青以大論議寂寞空簡編猶有繪畫手屢將丹青傳四士所出處得之皆一偏惟公逢聖明雍容巻舒間任職思補報乞身享安閒素履瑩如玉貴名重于山知公享壽考歳月方遐延壯容換老骨緑髪藏華顚諒公保福祚子孫慶綿綿高門納駟馬舊物還青氈令徳終報騐化工可推研小智泥畛域通懷究淵源方爾泥物我其誰計寒暄超遥誠自得局縮亦徒然再拜逺門下長吟歌此篇奉和胡右丞視學所賦成都學最古肇自西漢時寥寥千餘載間有或盛衰慶歴始下詔四方如響隨良哉樂安伯原註蒋公自謂從郡望與封爵也治體由本基逺模類文翁故事循魯僖課試月為度講觧日有規教育猶父兄片言不邇遺學子五百人絃誦何儀儀陶成禮義俗大變西南維距此已一世繼者賢其誰胡公廟堂老天子深倚毗下車急先務勸學為之師時異心則同兩哲吹壎箎作詩遺諸生字字皆典彛近欲美材成逺使純風熙礱石建巨堂豎柱不復欹九經滿四壁高下相支持首尾傳注完粲然日星垂斯經與斯堂天下難等夷原註洛雍雖有石經未若蜀本注釋之完度地得勝勢西隅敞高扉氣象自宏顯出門見通逵嘉木種千本敷隂接春暉人將不剪伐異日甘棠枝賤子昔在泮執經趨綘帷嘗聞先生訓敢告多士知讀書有本統宜先窮是非㣲言率簡易衆説殊支離詳觀聖賢迹於我猶蓍龜不獨事辭章華葩競葳㽔豈徒換爵禄稱謂生光輝立已如逺游縱横亦多岐取舍各異轍義利難兩馳一足少蹭蹬終身陷汚卑君子與小人古今不同歸勉哉篤志操行副公所期再和胡右丞視學士有幸不幸所逢皆一時道隆學自正文敝俗亦衰匪惟古今異況復好惡隨觀詩不觀政爭議毓與基原註詩有孫毓坐基之學窮經不窮法區區論桓僖必得大匠誨然後圓中規譬欲攷躔度亦先由渾儀所以君子教衆材無棄遺公来鎮西州為民張四維且曰化未孚執咎歸之誰醇醲造禮義偷薄生夸毗予其本庠序動以經為師善道易牖進應和如壎箎自此石室生處躬無匪彛勤誠戒挑逹美頌賛緝熙屢聞講鼓集不見儒冠欹逺或千里至篋笥相携持公堂坐無地布滿東西埀學殖務栽培心茅悉芟夷前瞻數仞牆競欲趨公扉謂公富經術執巻将問逹誦公勤學篇華柔鄙𤣥暉杏壇乘春風一日千萬枝昔公長烏臺奏囊成殿帷藥石盡晦密世人罕聞知今公倡儒教羣情革其非道勝逢大壯文明契重離繼有巨篇作拜貺如受龜咸韶奏清廟音中爽與蕤琳琅聚寳肆亘夜騰晶輝蛙鼓畏不鳴䑕璞羞路岐信矣蜀政美聲聞已四馳海宇翹首望天高終聴卑行聞十行詔匪朝促公歸雖欲在泮飲盛事安可期戲作客從中州来客從中州來有旨謫嶺外道由長沙郡行李極狼狽地主惡遷客不許宿闤闠馳逐使之出威勢如下礌我嗟伏蒲君力小忠謇大一言犯雷霆萬里竄江海方當困羈旅復爾招咎悔誰謂守者謀義理亦甚昧人道異邪正天時分否泰外物慎取舍中扄權利善小人􅃷迎合君子恥附㑹如何鄙流放輒欲登善最所持況輕貨安可遷重賄惡名被諸身巨衾不可蓋羞色睟於面洪水安能靧嘗聞賢人生希闊須異代聲華無今昔趣尚一進退李唐距聖宋乃有二徐晦送李鎮北歸昔為并晉游識子十數載當時鄉曲譽學行己可愛公卿察亷孝一命果霑霈飄然從宦游萬里適劍外標操本孤直鋒稜苦磨淬研味氷蘖間規為準䋲内素節雖有常往往駭流輩違順既殊途指此作瑕纇好惡貴必察丁寧昔賢誨羣言徒爾為終有公議在北歸太行道極頂見嵩岱下視丘與阜岌屹殊瑣碎洪河天外來勢欲浮大塊吁嗟衆流小奔走爭合匯長吟助超軼壯氣増感慨善惡忌太明與奪宜少晦此語所繫重非特論進退數路盛得人期君赴亨㑹勇烈侯廟唐衰中原亂賊據西南疆號令不出畿疇能禦彊梁楊侯仗直忠寳劍凌穹蒼誓將掃妖祲得以完金湯嘗膽過勾踐食羮如樂羊嚴顔頸未斷霽雲指何傷衆寡固不敵歳月亦已長孤城屹然峙鋒鋭莫可當譬如泛巨海難以一葦航天心未厭悔人意忽蒼黄百口同穴瘞悲雲惨朝陽寰區既澄静往事極凄凉封爵加美諡幽明知寵章近世修舊史筆削嚴否藏書曰侯死之一褒踰繡裳原註近修唐史書五月丙子王建陷彭州楊某死之彭人念侯徳廟食墓之傍水旱毎致禱豐年屢倉箱父老或有言夜漏猶未央見侯出自廟凛然坐黄堂此理實晦昧有無何𣺌茫子厚羅池神海俗專祈禳乖崖宛丘殯醉者取滅亡原註乖崖殞於私第過其門者必歩有軍校醉至門不下輒委轡以死陳人到今言之英靈果不泯猶足威一方予嘗假州紱秉笏趨侯墻為侯記諱日一奠歳率常出令避侯名示民以䖍莊原註彭人傳云五月二十二日城䧟某嘗于是日率官屬具祭仍作佛事自是歳以為常又嘗諭郡人不得名侯之名又欲建高碑始終載其詳俄以罪戾至慊然視縑緗幸此續大句安能發幽光持以遺彭人庶㡬予不忘答任師中石城山下居草草已經歳終日對山吟何嘗問隂霽自知有義命百事安拙計每䝉親朋念尺書來者繼豈徒問寒温亦惑慰窮滯惟公見愛心不逐時情替親迂老匠筆特枉長吟惠良金豈雕刻文錦自燦麗太羮充餒腸靈藥去昏翳所得適所懐拜賜敢不勵詩騷久寂寞俗士鮮緝綴公常得之深豪贍有規制頃聞湖州禍文字倦且廢朝廷極仁恕風俗當訓厲終令服寛典不忍投四裔吾儕今唱酬正可頌治世况當導情性無自取罪戾敢于韶濩前率爾獻鄭衛原註時蘇子瞻以詩得罪貶黄州詞云黜置方州以勵風俗往服寛典勿忘自新故及之和孔毅甫州名五首毅甫生江南蘊有洙泗質雄文極古今通鑑盡疏宻瀛山繡衣使高歩尚云屈河水潤畎畝隨珠照圭蓽仁風信樂易治體本誠一昌時政多暇豐歳民甚佚撫琴得遺音開卷終舊帙天和内自保萬事皆外物我生本蒿萊豈合顧簪紱南遷至此處惠養殊不失傷心屈原棹掩耳湘靈瑟罪大敢放懷恩深已淪骨辛常從公遊談笑度永日我吟續郢唱緘封彌戰栗衡陽古勝郡齊民頗淳質富饒㡬維揚樸静類高宻易將誠心感難以威勢屈水宿亦安枕巖扉不施蓽太平得良守條教盡一人方樂簡治自為宜老佚窮通有定數舒巻猶古帙深思已諧理逹觀豈言物屢嘗登賔階毎許脱朝紱共談談海鵬志不道塞馬失金聲發鏘鏘寳肆容瑟瑟遂為岷山眼未委瘴江骨賡詠酬真樂聊以歌化日珷玞難重陳黄玉似䒱栗謫宦寓湖南憔悴變容質老懷極孤窮益友最親宻高軒喜陪從雅㑹煩揖屈馨香襲芝蘭文采輝陋蓽談辯雖縱横儀範甚專一毎聞陽春曲欽誦不敢佚遂将蜀溪紙連冩漸成帙慚非高尚者思古感事物當時郢楚士英秀盡簪紱池臺今何在冠劍久淪失我憂復遼逺試聴暮鳴瑟何時還敝廬一奠九泉骨此心實䖍望昭昭有如日未嘗果山柑日饌湘江栗平生知求道冀保衰朽質金闕勞仰望玉經探秘宻嘗聞造化理虛静乃不屈又聞棲真士幽處遯荆蓽深藏雖混同安養自誠一廣采與博訪未遇敢懷佚誦經期萬遍掩巻復開帙纔能簡思慮了不見象物誰将林泉屨易取塵土紱渠意良有得吾曹又何失愛君氣容和忻樂不在瑟得鼎必全神逢丹可換骨方蓬逹去路寰海空白日願開循循誨靈臺非縝栗羨君詩格雄非謂文勝質長篇自博雅短語亦温宻筆端時一揮鋒利不少屈高情寓祥雲幽意及疎蓽豪縱嘆李賀難以憲度一窮愁傷孟郊不欲懐抱佚鋪陳黄堂上一案凡㡬帙先倡乃前輩形容何以物瑁圭施華藻錦段副朱紱測海至千仞穿楊無一失寳器藏巨劍古聲發瓊瑟鳯羽翔徳輝龍種搜駿骨嗟予澤畔吟繼唱輒連日果牓誤收采小榛齊大栗淨徳集巻三十
