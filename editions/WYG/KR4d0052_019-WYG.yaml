body:
  text: 淨徳集巻十九宋吕陶撰論慮邊論一外裔為中國患從古有之雖純王極治所不免然無如今日之盛彊者也禦之之策前世止言中下雖搢紳之儒介胄之士偏見利害廣論得失或專和親以苟一時之安或務討伐以洗數世之恥然無如今日制御之失契丹盛彊之漸非一日而能蓋自光啟以來善窺中原之多故起掠旁鄰以廣部族至於石晉則又藉其兵勢以取天下乃割地以報之夫十六州者皆據宅要害天之所設以峻邊防前世聚兵置帥控扼之要既已棄而為其巢穴矣而乃劃千里平廣之野以自守禦且藩牆不完而户庭易覘則彼得奮臂以入又安怪其有南牧之患哉是以晉祚之末悉衆來寇如蹈無人之境而得志以歸於是有輕中原之意國家之興數從數叛景徳之役氣焰大喪如露講好之請章聖皇帝以休息天下為慮有為民屈已之說可其盟約因而罷兵而天下之武備漸已弛廢至寶元康定之間西鄙不庭王師未克契丹觀我之釁外自連結以邀利於上多張虚聲屢出謾言以駭惑朝廷之聴而當時之勢顧有未安乃議増其金帛以至五十萬今三十年矣時獻一書嵗馳一介設難可之求發非常之問以觀吾君吾相之應荅而朝廷拳拳然若奉盟主未嘗輙忤其意寧忍愧恥不敢興事惟重賂柔辭以固鄰好舉天下生民之膏血刼以鞭扑聚以錐刀而歸于契丹者幾千萬也古之外裔彊盛有如今日者乎古之制御外裔有如今日者乎而乃恃以為長久之計竊為執事者不取也夫兵家之要先據地利不然則善屈敵人之力而勝之故軍志曰先處戰地趣戰者勞又曰以逸待勞以飽待飢謂之理人力彼十六州者古稱險固之㑹我皆失之則我地利有不及也所恃者獨中國之富彊耳而掊剥吾民嵗為供饋使之坐待厚賄以充其力而我之生民日趨困敝王師未舉而邦本先搖動則素所恃者亦不足矣始防外憂而終召内患也雖曰和戎為利又安獲其利哉臣恐積日持久我虚彼實彼佚我勞一旦乘隙而發則勢將不可支是和之愈久則害愈深而禍愈大所謂養虎遺患也善制之者不若是叛戾不率則有戰困窮而馴服然後與之和戰亦在我和亦在我故彼不得中國要領領而我常得計今我常欲和彼常欲戰則彼能測我之所欲而以戰邀利於我乃其計之得也要之彼之所欲者亦未必然耳夫如是則中國何事於畏戰而好和哉今日尤宜思之矣景徳之戰彼力既屈而謀臣猛將欲乘其敗以鏖之此萬世之舉矣貸而不戮則固有噬臍之悔及其以地為請而議者不思逺圗乃許之以金幣垂三十年而請地之釁復作於慶厯之始則又從而增之慶厯距今亦三十年矣知天子之新即位而欲窺中國備禦之淺深彊弱乃其謀也向之虚聲設言而請者疑其旦暮聞於朝廷矣臣雖甚愚不知何以禦之哉彼方窺吾之備禦而苟失其策則陵侮之勢無休已時將拒之以兵邪則平日畏戰而不欲加兵矣將益之以賂邪則民力有限敵心無厭而國之大費日益不給用以制之者適足助之也藉以為利者陰受其害也名為惜民而實乃戕民也勢至於此則莫若一任威斷而不可不用兵矣用兵之畧臣敢繼而備論焉朝廷畏戰甚矣天下疑焉而未知其端也以體言之而謂不順乎順乎則中國固可鞭笞加之而隆主威也以義言之而謂無釁乎則慢求僭請接踵以至而衆心積憤也以地言之而謂其廣乎則我富有四海而彼乃一隅也以兵言之而謂其多乎則我戍軍百萬而彼纔什二也中國之直且彊契丹之曲且弱也如此然猶畏戰而不敢用兵以正其罪論者乃曰兵凶器戰危事不可輕議而妄舉也斯大不然兵所以禁暴也帷其窮兵則受弊戰所以殄寇也惟其好戰則取亡國家方有外裔侵侮之患而未嘗一議誅削之策是以中國之氣鬱鬱不振而天下之心不勝其憾苟一日奮揚皇威以申九伐之令則豈有窮兵好戰之失哉故持是說者膠柱於一偏而未能應變也度今之勢必可不至於兵戰惟甘言厚幣以結其心而致萬世之安乎雖天下之愚夫曲士皆知其不足以結之而必至於兵戰也知甘言厚幣之不足結則何事竭吾力以填盧山之壑而飽寇讎之力哉知兵戰之不可免則又何憚夫凶器危事而不講求其具也昔者六國并力以攻孤秦百戰而歸於覆亡者豈兵之不可勝歟蓋以地賂秦而不知其地盡而兵亦弱也今天下之勢固萬萬異於六國然以契丹與我為敵之情而言則亦有類於秦與六國之事彼常邀賂而無厭者欲窮我之力也以賂與之而不以兵禦也則何以以其見窮哉然而臣之所謂用兵者亦非大舉六師長驅深入輕吾民之命犯天下之危力決於一勝而驟平其巢穴蓋亦大為之防先嚴其備而次絶其賂示以必戰而求其成功於終也夫困則卑順彊則驕逆者敵之情也有田欽祚之勝然後有開寶之盟有撻覽之敗然後有景徳之好今肆其陵慢務求於我而不已也豈其勢必能乘中國之釁哉蓋六十年間狃於國家之仁治珍藏之財嵗嵗厚遺而無窮巳壯夫猛士不敢彎弓而北嚮彼方之人少而耳所聞長而目所見惟知中國貨財之可取而不知中國威武之不可犯故也是以彊而不因驕慢日甚幸今陛下纘治之始乾健離明運照萬物天威霆怒震驚四海殊方異俗深有未測而方覘伺於我則固宜乘此機會而更張備禦之䇿示之以無所貸忍之意而有所必誅之道以變易其視聴而破壞其姦心夫講求邊備申嚴軍政慎擇將帥精練士卒出屯要地以為掎角之勢謹固封畧以全守禦之形然後罷其嵗賄而使之無素蓄之具則契丹之計反覆皆窮而不知所出欲以賂為請乎則我之財不復可覬欲以戰為事乎則我之兵可用而無所憚夫内之既失於貨賄則其力自困外之又逼於守備則其勢無所得如此而部族之不微黨與之不潰者終古未嘗有也不過十年契丹必衰矣苟非屈服於我以就命則必逃遁亡匿於漠北寒苦無水草之域而不之見也夫然後乘坐勝之勢復燕薊之地遵祖宗前定之策即范陽故府建堡置戍以遏三路入寇之漸則勲髙古今而福及社廟豈不偉哉與夫平日委百萬之貲與人而拱手以待寇至者孰為愈也慮邊論二今天下之勢内無彊臣跋扈之漸外無僭國割裂之危朝廷之上早夜深憂切計孜孜而不已者惟二鄙之患臣嘗語其詳而奏於前篇矣乃西戎逆順之情狀臣亦竊覘其火畧焉夫以五州之地數萬之衆而敢肆其豺狼之心求犯天子之威怒而不知懼者其故何哉蓋彼之部族日以盛大而我之制禦失其策也靈武之地方廣千里表裏山河草木肥茂足為放牧耕戰之所而一旦舍之以資彼寇使西域諸𦍑坦無隘礙合而為一則其類益廣其勢益彊不足怪也昔之制匈奴者必通西域以弱其助今之所以不能通者由棄靈武而夏人安處其間為之障蔽也西域不能通則契丹有以連結而夏人之彊梗豈可量哉且自國初而來逆順固非一也太平興國之際繼捧既奉朝貢而繼遷為寇故端拱之詔賜國姓受節鉞以羈縻之至淳化之初侵掠不已是以太宗皇帝奮揚武怒銳意誅翦王師一舉而俘其酋領蕃漢之户來歸者八十餘族因隳夏城徙民於内及至道之始則又有五路之伐然而諸將緩期不援遂喪大功資養餘孽以貽害於後世至今天下深惜之洎乎章聖嗣位遽請蕃任朝廷雖察變詐姑務寧息乃有刺史功臣之拜其後清逺靈武之役起于咸平而二壘陷徳明幼弱則有景徳之歸嚮元昊狂悖則有寶元之僭叛此始終順逆其情狀可見者也賜之以國姓授之以節鉞封之以功臣加之以王爵朝廷之恩信極於此矣皆不足以恱來其心而屈服其志於是賂以以厚幣以固結盟好幸其不犯邊吏而免用師之勞豈恵中國綏四方不戰而屈人兵之長計乎臣故曰彼之部族日以盛大而我之制禦失其策也況比嵗巳來服容官號不復修習舊俗皆竊朝廷之制而倣用之多遣介使以伸難塞之請屢傳閲集以驚近塞之耳目招致逋逃與之謀議叛釁之萌已數年矣而朝廷不為慮從而養之甚可痛也臣計其逆戻之意不過兩端而已大則欲舉衆犯塞徼倖於一勝之利而徐圗所嚮小則欲益吾之嵗賂而飽其貪心就兩端而窺之則所謂舉衆犯塞者亦未必能爾惟求益嵗賂則固其心焉兵說有之詞卑者進詞彊者退昔冒頓匿壯士健馬不以示漢使蓋有攻漢之心也誇人以形聲者豈必有其實哉由此而言則夏人為彼不庭之態者欲求益嵗賂而已也彼以形聲誇我而遂益其賂彼逆計得矣無厭之求何時而息乎此天下之公議而廟堂之所宜慎也就使舉衆入寇則勝敗之際亦有兩端而已戰而勝邪則謂吾畏之而必益其賂戰而敗邪則必曰近塞諸𦍑擅用兵爾為此說者欲吾嵗賜之不絶也彼之得失兩獲其利而吾可以不計哉内府之財羣生之力舍之以啗寇則貽害益甚孰若取之以養兵而彊威也事之施設必有先後而利亦有大小今之所先者莫若精武備謹邊畧不為形聲之所駭動而遂自處於柔弱恐懼之地來則禦之去則守之毋畏其兵毋繼以賂使之不測國家臨制之術夫然則其利雖小可弭數十年邊鄙之患而無旦夕之憂苟欲謀其大者而滌除本根之害則必復靈武而後可也朝廷之棄靈武凡幾十年矣議者以為殊方絶塞無用之地昔漢武以英才雄畧征伐天下舉造陽之地九百里而棄之元帝以捐之一言遂罷珠崖不復討擊皆足以垂裕後世然則何必疲敝中國之力而興事於彼哉臣雖狂愚輙謂不爾今西邊諸郡多與蕃戎接迹旦夕惴惴常有侵掠之虞者蓋失靈武而致其境土迫於我也況西域不能通而北鄙無以弱乎昔東漢之世西𦍑屢擾鄧騭欲棄涼州虞詡以為不可其議乃曰今𦍑所以不敢入據三輔為心腹之害者以凉州在後故也其上人所以摧鋒無反顧之心者為其臣屬於漢故也若棄其境或徙其人衆必生異志雖太公白起為將恐不足禦今靈武久棄而西𦍑甚大二鄙連結而中國之憂不已何以異此故臣愚以為必復之則本根之患庶幾可以除也然而臣所謂復之之䇿者非經營朞月之間而速求其效蓋亦久而不懈而要以成功於終其措置之大畧有三而已一曰離旁鄰之助二曰啟嚮化之心三曰分兵以困其力且西鄙諸𦍑族類至衆有兵可守有兵可戰雖彊弱大小其勢不一而其心不能相君臣此固中國以敵伐敵之資也昔景徳之初潘羅支能以部族出討繼遷卒致敗滅當時議臣欲加王爵褒寵其效今之不負於夏人者其為誰乎則固宜敷導恩信諭之禍福厚賜金幣重假名器以懷結其心而感其力必有輸忠義而為梗於彼者使諸𦍑族類攻戰不暇則外有所忌而内不敢抗於中國此之謂離旁鄰之助臣又聞夏人之性自用而好忍比嵗以來雖腹心之人往往罹陷誅殺是故為其役屬而處於要重者竊有款塞効順之意然而懼乎無見容之地而退就刑戮彷徨猶豫計莫能決則固宜擇任土人為之誘導可其來歸之請而撫存之且以索求其左右之姦謀則西夏之人黨與將漸擕貳此之謂啟嚮化之心況今西夏之兵不滿二十萬其寇於我悉衆而至大抵長於聚而不長於散可以獨支於一隅而不可雜出於諸路是故犯秦隴則涇渭為無虞逼環慶則麟府未嘗警此虚實衆寡可見者也儻壯吾掎角之勢而更相援助彼掠於東則擊其西彼擾於南則迫其北則力有不逮而氣亦喪矣此之謂分兵以困其力為是三說而濟以久而不懈則已失之地庶幾必復而西域有可通之漸乃中國數世之利也奈何不圗長逺之計而過務姑息幸朝夕之無寇至豈不惜哉今之所謂禁地者吾不可徒步輙履而彼得以放牧其間今之所謂巡照者吾不可張弓西嚮而彼得縱暴於我以國體言之殊未壯也苛法細禁徒自損弱而不敢奮然革易者得非畏康定之失乎昔之失也蓋萬事弛廢變生於倉卒而莫能支矣以今況昔則邊不失備兵已知戰而猶甘心於欺侮者誠亦未之思也慮邊論三自周而下外裔之勢稍稍抗於中國而朝廷時有遣將用師之役其見於載籍可得而擬議者在詩則有采薇出車杕杜六月采芑江漢常武之類分列二雅而詠歌之至於齊桓以大國之資起為盟主而衛王室其於外攘最號有功春秋實予之而孔子又稱其一匡天下大概皆務攘除驅逐而不使之有損於中國亦不以為難制漢氏初興大亂甫定外患屢起故其計議雜出於一時之不得已而以和親為說於是中外之分始交而失其别及乎積久而國家旦夕常有邊鄙之憂是以才謀智識之士探窮原本而務為經逺之策志在力平邊鄙之難而不欲使之一日輙犯於中國其思慮精密而規模恢廣雖時異事變亦可倣而用焉夫欲特設以官以主其事使吾日理而彼日危然後施三表五餌而係其頸令千家為一國而處之塞外此賈誼之術也夫欲徙民實邊使逺方無屯戍之勞塞下之民父子相保而無係累之患則與東方戍卒不習地勞而心畏匈奴者功相萬矣此鼂錯之議也夫欲度𦍑人故田及民所未墾願罷兵分屯要害賦以農事益積蓄省大費以待寇之自敝此趙充國之計也夫欲令隴西以北安定以西八郡之民罪非不赦者皆得輸粟於公以贖其過且廣邊備而為守戰之具此張敞之言也今二鄙之釁中國以為大患而百官不尸其責疆埸之謀日勞於吾君吾相之念慮而未聞成功天下之務或委廢而不暇修講則孰若特建一官以專其任使之廣詢博聴端其智力而辦之哉此賈誼之術可於於今日也二邊之地嚴於扞敵一夕不敢忘備而土兵無幾聚四方凶悍不逞之徒坐食塞下如寄於逆旅之中而督以殄寇則孰若募近塞願徙之民及以罪而遷者一切寛假而命之久安於彼以為禦衛哉此鼂錯之議可施於今日也一方少警則四海有饋餉之勞嵗掊月斂竭耗民力以養不耕不戰之卒而勢不可已則孰若募人為屯以墾塞下之閒田而助足兵足食之利哉此趙充國之計可施於今日也不惜國家之公利召富商入穀而給之倍價以官職易民之錢刀假浮屠法以度非類而為饋邊之備則孰若貸民之輕罪而命之以粟贖過且有紓於急饋哉此張敞之言可施於今日也臣竊惟方今之弊蓋危而後為之謀及乎暫安則置而不議皆苟於一時之利而不若古人經營之久以圗其功於永世故也惟吾君吾相深思極慮參求古今之宜而慎其施設則四子之策孰云無補於朝廷乎勿謂其區區既往之陳迹而不之攷也說吕希述字說治心正已為天下國家莫不由之曰道與天地相始終聖人相先後窮幽而神極明而化體要功用不可得而言乎蓋自書契以來發抉秘奥示人以象繼之勲華擴為典謨三代之隆制作完矣覃衍方策煥乎昭哉萬世有傳焉六經者聖人述道而傳之者也是故叙書以述政則可以知號令之興作刪詩以述風則可以酌淳漓之代變定禮以述辨則可以程事物之分義正樂以述和則可以通徳教之端本贊易以述神則可以盡化育之理修春秋以述法則可以適經變之務保民濟世之具其詳如此而曰述而不作者葢能訓範於後世而不能兼善于當時云爾周衰敎敝異端諸子之學不極不根散漫四出天下隨流四潰孟子懼斯道之失其傳也于是力持綱常以起廢墜故其書一出仁義而㑹之王道嗣孟子之業者荀楊王韓也四子之言雖所蓄有醇疵所騁有詳畧要其歸皆祖述六經之趣而得其傳君之名義取于斯矣予以傳叟字之者以明學之宗尚以見君之志也夫百家異變衆說殊指交攻競騖而不知所以折衷君子沈潛而深思力本而篤信非孔孟四子之道吾安能述而傳焉淨徳集巻十九
