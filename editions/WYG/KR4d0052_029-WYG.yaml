body:
  text: 淨徳集巻二十九宋吕陶撰五言古詩雜詩夕隂斂層空素月出西海寥寥俯仰間杳不見纖靄清光信可掬璀璨掌握内虛庭縱逺目中夜如有待念我金石交輕别己十載徳音響球琳道味芬蘭茝悠然阻聲容況復接言誨幽懷願一寫四顧多泛愛迴頭自珍惜欲顯不如晦賴此秋蟾魄千里共光彩思賢搖去意對景慕良㑹此夕雖圓明清賞君何在化阿子竒昔稚齒得官化阿城齊君疑其幼且悔寄任輕同車載白首教告力奉行一日鑄劔㦸二日促農耕官倉不積粟武庫皆無兵魏人錯料事來戰欲蕩平阿俗且感義子弟從父兄小邑抗大國魏敗齊以寧千年陵谷變猶有化阿聲乃知謀人國自古須老成河津女河津女娟者可與壯士儔簡子欲南渡誰人為撑舟娟奮紅袂起姿容盛優柔長篙與風快大翼如雲浮頃刻易千里恬然濟中流心情忽感慨為子發清謳波濤激無際駭畏事禱求杳㝠若形響自爾䝉神休交龍助其維歸櫂勿夷猶聞之意飽滿春風滿華斿禕䄖響環佩蘋藻奉薦羞豈獨女子事可況公與侯一言固有合半䇿或見収惟其遇不遇通塞難相謀旬月取漢相安怪田千秋送周茂叔殿丞并序君子能信道不能必信于人能自知不能必知于人得乎中不奪于外環視天下而輕重在已死生貴賤否泰休戚未嘗少遷其思索以戻其趨向故能也人則分暌于義利取舍好惡交攷競騖而莫知合於至當故不能也予嘗持是説以觀世俗情偽而憤君子之所不足反而求諸傳記至仲尼稱伯夷柳下惠荀卿氏推尊子弓揚子雲珍君平畏仲元而乃知君子之道雖晦必明雖屈必伸蓋聖人之待天下必推之以至公而教存焉然則道人之善而有警于世非佞也公天下而為言也舂陵周茂叔志清而材醇行敏而學博讀易春秋探其原文簡潔有制其政撫而不柔與人交平居若泛愛及其判忠諛拯憂患雖賁育之力莫亢其勇滀之深流必長趨之端適必遠擴而充之斯民有望焉然而常自誦曰俯仰不怍用舍惟道行將遯去山林以全吾志其信道焉而自知明歟或知之或不知之其君子之所不能歟以君子之所不能于君子何損益焉惟知者可與言其然惟不知者亦可與辨其不然亦庶乎道人之善而不為佞歟今年夏六月官滿南歸士大夫皆為文送之某既序又繼以詩高帆颺漢水六月南風温下流乗漲怒一日千里奔湍威雷霆繫石勢龍虎蹲漂搖波濤際渺漫天地昬君心浩溟渤目笑衆水煩外任安濟徳中養澄靜源青雲露三峽寄傲開琴樽白日滿平楚放懷清夢魂夷險既一致巻舒惟義存未易泛滄浪時平斯道尊百合盛夏衆芳息景物殊寂寥庭前有百合頴然學春嬌數枝己聳茂百朶尤富饒擁蔽因巨葉紛數假長條吐秀偏得地爭妍欲于霄素紛間瓔珞輕黄染璚瑤靜若寳幢植動如鳴佩搖盡向杲日麗不畏炎風飄太守雅好事得之詫朋僚綺思入新句彩圖上輕綃衆目遂賞翫英華不虛凋此物既異常論議有以招人情愛惡間輕重何以遼或謂花之祥或譏草木妖嗟予豈博物智慮隨曰消欲窮造化理茫昧増無聊疑此亦偶然發之自根苖莫議妖與祥為公續長謠韓子定嘉雪應祈二首晉地素瘠埆所憂冬氣差明神享其誠瑞霰飄為花輕絲瞥已没散漫撲水涯大片殊易積髣髴填丘窊饑鷹健欲擊伏虎凍不拏比響少鳴鴈南飛絶驚鵶肅然天地中靡聞一聲譁樓觀動曉色江湖壓晴沙度曲宜鼔琴巻葉難吹笳顧此勤儉俗趨時務耕畬三冬苟失望二麥將不芽造化善從欲沾滋罔遺遐須為盈尺喜勿興祁寒嗟清威儼開府和氣方當衙餘潤匝千里歡聲同一家天人報應間其速如馳車我公心在民致禱誠乃加康衢有歌詠繼者慚餘哇天道孰云遠未嘗毫釐差鑒此金石心報之瓊瑰花旱氛滌已去豐嵗來何涯高能累岌業卑亦䝉汙窊密布氣晃蕩急飄勢奔拏掘地得寳馬集庭瞻白鵶嵗功助發洩民口騰讙譁髙原有瑤塵絶漠無黄沙山夫喜執來戍卒愁聞笳鐵甲彼固凝石田吾將畬雰雰既霑足陳根其動芽霏霏幸還反歸路曾忘遐待詔一何寒映書誰肯嗟鳴弓壯暮獵凍鼓咽朝衙羡君詩筆雄退之昔名家染翰動成集巻軸可載車矧此古琴操應和無以加雅鄭本末殊中正䝉多哇朝隂朝隂晝多雨少見日有光四顧天地慘萬物皆茫茫占書久不讀何暇推雨暘試以人事説訝此非吉祥日者人君象照臨及遐荒豈容一物掩有若自晦藏明主躬聽斷萬事付紀綱賞罰信且必威令非不强天子報應間安得隂侵陽疑是蠻冦起勢力殊猖狂王師僅四萬靈旗指邊疆州郡少羡卒饋挽須丁黃父子罷斂穫女妻急縫裳老母哭不忍癡兒亦徬徨將行痛訣别意謂趨死鄉小憂止竄匿大患在殺傷蜀人不慣此聞者皆倉惶所以作霾霧終日爭飄颺秋毫與天地自古不比方中國及夷獠何足校短長帷幄巳坐勝虎貔誰可當天威一掃蕩不使存微芒何時㨗書至喜聲復鏘鏘霄漢忽開霽金烏欲飛翔登高賦常武注目瞻扶桑此願殊未適百憂滿羇腸和陳長蒨休致二首惜君有高才舒巻莫非道趨時忽倦游謝事不待老私謀惟恐晚公論歎其早平生恬淡懐憂恨未嘗抱白日由此間紅塵灑然少鼔棹勿遲遲湘川秋色好進取雖繫時退藏亦在道儻與志不會須惜流年老不知笑君拙知者羡君早知與不知間惡在愜予抱得無鈞石重失乃錙銖少明鏡洗無心向誰論醜好送劉希道龍圖赴䅈亭君子異衆人所繫惟大節著見在功業何嘗一毫缺幽能動金石明可貫日月其間有用舍舒巻不同轍言之尺與尋輕重自區别公以道徳進義操非孑孑早嵗在言路屢補衮衣闕一語定大計永祚慶綿瓞西來委重鎮遠業粗施施岷峨固不動江漢亦澄澈譬如公輸木巨細歸檃括又如后䕫音合止付椌楬爾其遂生成吾豈任呴沬愚者多競利破産營酒蘖官緡逋數萬私計鮮毫髮雖云鬻兒女未免就縲紲巨械壓羸頸重箠困流血亦有凍餒斃枯骸不藏穴兹事關進退聞之宜結舌壯哉仁者勇拜疏為論列詔書即日下蠲除允公説皇慈極霶霑治體非眇末推此不忍心疲瘵庶全活方將秦川命又仗元師鉞何時歸廊廟民望甚飢渴天網舉無外海勢包有截威徳廣所被神武専不殺兩階虞舜舞六月宣王伐梯航走琛賮早夜畏鞭撻相因太倉粟紅腐以時發已朽外府貫浩蕩流不竭乘此全盛力萬事易裁割泰山可轉徙巨浸可壅遏深惟漢唐治丞輔次臯卨弱翁知故事論議頗諄切開府善守文規模亦宏闊敢告天子聖邦基繫明哲斯言得之公非以為容悦送范希聲歸洛策馬太行道西風動㣲凉之子去意遠南望嵩洛鄉日馳百里足急歸拜高堂天倫喜會合親侍生輝光惜此暫闊别送君乏詞章早晩揖回馭秋深籬菊黄雲頂山﨑嶇上層山十里到巍頂天形露空闊物態蓄深靜羣峰峙其旁儼若挈裘領廣野闢於下誰為畫廬井殿閣聳盛觀松檜富清景蕭然古佛界邈矣真仙境枯株吐芽蘖晴雲發祥慶盡手矜妙逸詩毫事奔騁乘高縱閒目意適遐迴班班見髣髴厯厯可窮省茲山介兩蜀鎮壓猶巨屏南連三峨巔北距雙斂嶺東西數萬里高下幾千頃地産號充盈天時與康靖民間豐嵗樂事外化日永攬轡一登臨茲焉聊賦詠見雲頂山朝見雲頂明暮見雲頂暗隂見雲頂濃晴見雲頂淡雲頂乃一物百態異舒慘朝暮不相失隂晴可先探于吾如有縁靜景供遠瞰搜求入風騷刻琢費鉛槧一語小如意讀之惟自頷深惟出處途兩得亦誰敢雲霄有達士豐禄侈飲啗終身落世綱塵垢漬衡紞雖逢物境勝何暇縱遊覽丘壑有幽人俗繩不可䌫茂林適情性清泉滌肝膽野飯止一盂往往乏藜糝予生安拙計萬事恥浮濫宦遊若不樂進退殊壈坎廩俸纔數斛憂責如舍擔飽食坐看山閒心復何憾三亭詩原註清慮治已味道三亭何為者吾友所繕營亭前有標榜雅意異俗生治已已孰治清慮慮孰清吾道固可味未易貫至誠惟天于斯人一槩授五行生質本淳靜外誘徒縱横心術儻芽塞耳目將聾肓上聖貴復本大賢猶性情況其可上下安得不勵精四端匪外鑠語黙無自輕百行皆吾分積漸日有成稂莠荒我懷去之如鋤萌波瀾擾我源止之如澄泓浩然滌萬慮粹矣讀六經不趣楊墨塗將造周孔庭出井見仁義仰天瞻日星甘若飲醇酎珍若享太羮清若餌芝术和若聞咸莖積中而恬愉發外而光享窮不失素守達不孤羣氓生不陷非義死不忘英聲道味固如此身規從可明本原何所來慮之深以閎欲知君子心吾請觀亭名贈蔡山王潛王生性高閒了不掛塵網家居蔡山下景物盡幽爽山松何年植老幹己增長山雲終日飛秀氣自飄蕩山泉涓涓流落澗有餘響山月隠隠出澄輝透林莾生嘗坐巖石寂爾遺萬想横琴試一弄意外忽忘象千年幾興亡六合一俯仰惟傳太古聲猶在五絃上純皇與聖帝作樂理和暢志士及幽人寄情多感愴於焉得深趣不返而遂往銖石莫重輕尺尋奚直枉清哉此標節抑可勸鄉黨予生本靜黙意味欲恬養偶然從宦遊百態殊鞅掌既無移時術力軟不能强亦有超世心倦足欲焉往案此韻􅃨作詩持贈生厚顔尤惘􅐞送呉龍圖歸闕蜀山千尋立竒勢凌穹蒼岷水萬里走怒流吞滄浪南連楚越腹北際秦隴吭乾坤所造作險固天下彊四境高與深沃野蟠中央天時少凶旱地力宜耕桑生齒萬億計貲貨豐且穰運載實内府重車不停箱公廩己腐粟私家始餘糧恬然禮義俗杳在無何鄉王澤或壅閉土風亦悲凉所以二僭偽草木罹凋傷繼有三盜起氛埃屢飛颺耳目殊未遠本末猶可詳朝廷任連帥指顧寧一方聖造爾莫測恩波但流長我公來息蕃琴瑟更而張至誠極愷悌大事費忖量澄撓孰清濁中和匪柔剛蜀人自荷戴頌口殊鏘洋仰公若梁棟愛公比琳琅謂宜立大厦豈特為圭璋願公保遐福堅厚如陵岡期公享眉夀嵗月過綺黄或吐藥石論百脈除膏肓或執陶冶柄四序時雨暘歌徳動金石書勲滿旂常輿意信如此惟公恊行藏清風聳朝野闊步由康莊昔為御史時率先問豺狼及其按河患巨姦縮鋒鋩邊兵好掎角公令無出疆獄奏或反汗公嗟為飛章斯事最卓犖輝耀日月旁平生寳大節安肯差毫芒都俞既㑹合事業尤輝光蓋以大臣道施之輔虞唐雅意有餘裕玩占得黄裳此語知者重不惟談否臧稽首告天子高賢民所望三黜詩原註己酉嵗送吕公出守南陽也有序某今年寓闕下一日聞除書宣猷王公守南都翰林鄭公餘杭紫微錢公金陵又聞法有殊議度嵗未能決又聞狂人上書語及宗黨羣論匈匈咸以為非是獨公懇到為上言疏至八九條剖十失既而出治鄧士大夫相顧失色深惜其去公三黜也視古人何愧耶某用是為詩以述公出下惠為士師子文乃令尹仕也固不喜黜之何嘗愠直道宜少合高風諒難泯大抵君子心惟義素藏韞進非為私謀退亦為道隠顧彼榮與辱於吾不加損我公天下賢許國以誠悃危言屢啟納大事費量忖審如秦和醫良劑起疾疢工如魯匠斵鉅木赴繩準昔嘗遷九江誰謂去途窘又嘗謫蘄水恬然泛驚濆于今已三黜去就決不混遠視前世賢並驅而齊軫大敵衆所畏未戰勢自殞惟公鼓而前萬旅悚兵楯晚節人所重半道或凋隕惟公久益壯千古激忠憤大明方乘離元老反遇遯得喪未易言所繫在邦本和毅甫惠梅竹茶麴春前識寒梅雨裏見脩竹一水自浮花六神休搗麴清惠非塵埃佳章亦金玉毫髪無重輕此意可勵俗即席送堯天行行重行行千里秦蜀道落日飛孤雲秋風蕩衰草極望快歸目深思感幽抱吾俗有謠言公還一何早淨徳集巻二十九
