body:
  text: 淨德集巻三十八宋吕陶撰五言絶句寄題洋川與可學士公園十七首湖橋湖中少塵氛事外得野趣日日過橋來遲留不能去横湖極望𣺌無際悠然澄碧波清風與明月此處得之多荻浦葉底留殘雨叢邉泊小舟夜聲纔索索應是報新秋蓼嶼水際柔枝倒霜前晩穗紅野禽來泊此渾是畫圖中涵虛亭亭如主人心中虛見諸外回環四顧間殊無一毫礙灙泉亭灙泉涓涓流可鍳毛髪影淵源既澄清到處是佳景露香亭春早花方綻朝寒露未晞可憐蜂與蝶巳去逐芳菲溪光亭風來緑衣摇雨罷青煙罩隠隠夕陽間漁人理歸棹過溪亭野亭傍幽溪從此過溪去平日已忘機沙鷗何必懼褉亭山隂已陳迹此樂終如何酒船深不礙去住少風波菡萏軒開軒向芙蓉紅緑如捧擁游魚定相忘時見花光動書軒隠兀坐幽軒幽懷日疆慱黄巻有聖賢幾人知此樂荼䕷洞瓊瑰露華英緑幄相芘覆幾度得風清真香到襟袖篔簹谷漢川如渭川千畝盡修竹疑此是芝田年年生碧玉寒蘆港悠悠江湖思擾擾聲名累溪上見蘆花寧無慊然意野人廬耕鋤事勤苦賦歛少驅逼終日掩柴荆何嘗知帝力金橙徑橙色似黄金佳名最為貴一腹飽秋霜嘗之有餘味北園可愛北園景春來游者多欲知民樂否處處是笙歌六言古詩用與可韻為湖亭雜興十首流水三兩條合翠筠千萬枝垂漫説忘情待物亦嘗對景題詩簿領絶無留事親朋少有來書度日此中閒坐自慙也是官居湖上澄波似鑑林間曲徑如村雙鳥飛來碧照獨蟬呤徹黄昬樓外四垂晴靄簾前一餉清風更倚危欄北望岷山半出雲中治郡乃稱太守退公自是閒人已向環中得趣何湏事外勞神弱柳低低舞岸新蒲拂拂籠沙貪向水邉傾耳不知紗㡌攲斜樸學粗知義命幽懷聊寄風騷道勝何如時與位卑安用高言有著在人為累無營與物何功秪此也該至理懶能更説真空小器秪堪近用要途莫笑閒官到了野情易足自於拙分常安花爛時逢佳節酒醲宜賞青春酩酊任他醉客芳菲付與遊人即事五首斜日半山隠隠暮雲千里濛濛北望黄昬微月西來頃刻清風閉門可以羅雀垂釣何必求魚有耳倦聞俗事無心更讀閒書樂俗亭下流水嘉㑹宫前茂林雙瞳日日凝睇逺夢時時訪尋原註僣偽時嘉㑹宫今為廢第乃私居之蔬圃林下木奴漸熟罇前歡伯差濃萬事都來身外一毫不置胸中岣嶁數峰秀勝瀟湘萬頃清深雲雨有時變化風濤莫測浮沈七言絶句讀韓長孺傳梁孝事平終結愛王恢謀沮已和親早知蹇甚難為相何必齎金與貴人讀朱浮傳權歸刺舉已條陳慱士非才貴得真若也國㤙殊不賣單辭未必死功臣裴矩西巡北幸四夷朝權寵功名盡易邀惟有高麗猶旅拒靈旗從此便征遼宇文士及象牀金埒極豪華出入隋唐似一家自古聖君湏逺佞禁中佳木不湏誇李大亮游田未見説虞箴佞語貪謀競奉承豈獨懷中有佳鷂更教大亮獻名鷹王求禮秋晩棃花忽盛開滿朝稱賀不稱災景佺求禮真竒論冬月如何有瑞雷元德秀二首五鳯樓前觀大酺肯因工拙見賢愚優倡數百被錦繡安得人歌于蒍于嗜酒彈琴徒自知纍囚尸虎縣前歸世人名利心不盡那得冄逢元紫芝王武俊巨盗盤根嵗月深交流戰血競浮沈一言便解蒼生禍何事君恩薄賈林陽城終日銜盃酒是家十年全不話忠邪一朝便伏延英閤餘力猶能壞白麻張萬福聞説宣麻伏紫宸願將忠膽觸龍鱗此翁八十真堪笑何事昌言有直臣錢徽封疆萬里等閒開一日千金不吝財持語無名求貢者何湏更入古銀臺舒元輿仗内邪根欲去難承平思慮漸闌珊殿簾髙捲春風裡空憶詞臣賦牡丹李甘夜進麻詞曉未宣滿朝簪笏盡誼然李甘輕肆君休議不相姦凶已可賢柳仲郢方當炙手已寒灰倚伏循環可動懷試問華堂歌舞妓㡬人曽以玉為釵李景讓終日清風聳搢紳不存騙石逺他人如何議欲遷三廟却使門庭有俗塵王潮六幕恢恢皆綱羅琴書無計避干戈泉南更起招賢院從此衣冠去轉多為山累石封泥一餉間層巖疊嶂盡廻環真形惟有山常在何事徒勞作假山植竹為憐髙節聳寒林擇地培根我意深千畝封候雖未必且慿霜雪試虚心種花春到窮山生意迴試慿山土育根荄花開莫笑無名器縱得名花未易栽樹萱北堂風物不驚秋兒女攀憐欲解愁未悟詩人深切意世間何草可忘憂原註東野云萱草兒女花不解壯士憂栽菊花名藥品兩相兼種菊雖多豈避嫌而我折腰求五斗賞心於爾愧陶潛伐樹此心非是好傷生重倚西軒覺眼明但得樗樠芽櫱盡縣人何必笑丁丁笑徃衛青勲業已闌珊驃騎門前輒得官榮謝不同人事改故人何獨有任安過張彥輔所居二首城裡塵埃空自忙暫來城外覺清涼臨池静坐有餘味雨後荷花無限香秀野埀楊數里青夕陽猶占一峯晴病來兩耳如聾者聞得巖泉㶁㶁聲梅花開盡小桃次之發盡寒梅千萬枝小桃乘暖欲開時春風次第來湏早芳草埀楊莫恨遲答岳山蓮惠茶春芽不染焙中煙山客勤勤惠至前洗滌肺肝時一啜恐如雲露得超仙乍暖可愛馬蹄經嵗踏紅塵閏臘光隂已覺春遲日暖風真可愛年年長是伴行人久旱曉雲將雨午還收晩日餘炎未似秋豈獨稻畦枯已乆兼憂井竭飲汚流次韻分司南京李誠之待制求酒二首世上升沉都夢裡春來强健鬭尊前公田種秫全抛却坐客無氊誰與錢春深風雨半相和節物令人意緒多中酒何湏問賢聖和詩今尚許羊何廣濟寺十年佛跡留於此屈指山門皆所無今日清詩重褒述禪林又復有犀渠瞻岷閣前雙梅將開蘇子羙屢約一賞㑹予行部左錦未果石泉道中僧舍見楊應之阻雨所題李義山詩極有意味因次其韻惜梅之未賞且以寄聚㪚離合之興云原註應之題李義山詩云君問歸期未有期巴山夜雨漲秋池何時共剪西􅙘燭却話巴山夜兩時欲賞寒梅先有期却嗟人事又差池西山雪後東風急應是寒梅爛漫時和通判閻朝奉賞花四絶春來尊酒屢過從萬事無如一醉中聽唱歐公洛陽曲今年花勝去年紅多年已分作衰翁病眼看花似霧中却謝東風無厚薄芳心皆露十分紅田家僧舍有芳叢競折繁枝獻座中持語佳賔莫輕㪚林稍猶見夕陽紅好花長是怯狂風榮謝都來十日中未過清明時節在更湏携酒覔殘紅和提刑戸部賞花年華易去三春半花態増新一雨中自笑白頭連日賞罇前猶挿數枝紅金州值雪留一日詰旦遂晴乃西山下孤城倍寂寥行人無意暫停鑣千林萬壑瓊瑰滿頼有晴曦半日消絶句五首可愛山花百日紅南風開得到西風一般顔色差長乆移取栽培後圃中可羙盆池一寸鱗圓荷隂底自由身金刀落膾非吾事不畏江邊結􅃠人可笑公庭種牡丹日培肥壤設重欄好花三嵗方成就誰向花前一醉㸔可惜賨城足海棠山頭澗底盡芬芳成都花品分先後此地誰人為發揚可喜公居近白雲眼前塵事少紛紛紗㡡竹簟偏宜睡五月庭除不聚蚊庚申四月六日馬上口占聖皇㤙重恤狂愚待罪山城嵗已踰更入西門三百度便湏跨馬上成都華隂道中畏日銜山𫝑欲沉馬頭西去又駸駸道傍槐柳隂濃處時有清風怏我襟過肅寧城百里郊原極目平未寒林葉尚餘青前村一穗濃煙起知是逡巡到肅寧秋晩九月西風未肯涼信知時節𩔖炎􅂽騷人不念天涯逺只愛青山對碧湘西陽道中千山雜遝開還掩一水縈紆淺復深渾似嘉陵江上路轉令覊客動歸心過天彭懷昔遊三首西湖風物似當時惟有流光去莫追十四年前植修竹茂隂如識繞方池原註池畔修竹予在郡時所植昔向朝亭種牡丹花開酒熟不勝歡霧中雙眼猶能㸔更約春深欲􅀝欄曽向髙樓賦晩晴每㸔魚鳥樂長生下樓還是紅塵道不信機心勝野情初春三絶雪霜收盡苦寒威六幕融融喜氣歸原上枯荄還不死有心剛欲報春暉誰知真宰執天端天運無私造化寛是物向榮皆鋭意莫於春色辦蒿蘭窮山幽谷㡬重深一樹東風㪚積隂從此薄冰尤慎履世途平日已寒心和王定國二首三十年前愁送别八千里外喜同歸自甘衰叟鋤新圃未許髙才戀舊磯峽上相逢惟話道湘中一笑又成詩競將酬唱誇新句不為窮愁減昔時見嘉陵嘉陵江水潑藍青徹㡳澄光明鍳形一葉釣舟真自在漁翁應是醉還醒過劍關一别京華十七年野情長是戀家山謀身太拙真堪笑頭白重來度劍關淨德集巻三十八
