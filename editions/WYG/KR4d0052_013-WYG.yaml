body:
  text: 淨德集巻十三宋吕陶撰序鹿鳴燕詩序自三代之衰法制㪚亡禮文殘闕後世考求於䇿牘之間倣而用焉其幸存而僅似者蓋無幾也周之時鄉吏教民於所治至三年大比則鄉老與士大夫興舉賢能飲酒以賔之於是歌小雅合二南以申其尊寵喜樂之意井田既廢校序不講待士以科試取士以文章雖因宜施務倡變治體推迹源派亦甚異於古矣洎唐開元中百憲具葺文化寖隆乃詔州郡以貢士日行鄉飲用少牢當時謂之中禮則今之鹿鳴燕者又從而繁飾之也然猶取講道修徳之歌以為美名言嘉賔之可則傚是故飲食宴樂且將厚意庶幾得盡心焉竊詳味其遺風餘範亦有以見前古之髣髴雖加繁飭愈於闕而不復見者得非幸存而僅似歟成都素號多士比比嚮學親逢熙明率以治經求舉今年秋既試於有司而薦之禮部也府帥蔡公約用舊章敦勵良俗致禮以燕之時翰林范公得謝而歸適居右席實為古之鄉老公與范公洎集賢俞公中祕叚公各為詩以美之如方圭圓璧光焰相燭知與不知皆視以為寳儒林盛遇超邁平昔士大夫賡而獻者凡若干篇信盛矣夫某竊維朝廷念蜀之深慎簡才傑付畀事任故取人待物之道皆由懇誠務盡體要雖古之君子長育人材樂與賢共勸駕明德虚席多聞諒不能過也諸君方志經術豈特務論説苟名第為哉惟好學可以任道惟慎行可以成俗此諸公之所以有望於諸君也某既賦詩求附于後又因而述其然惟諸君勉之無怠熙寧乙卯九月朔日鹿鳴燕詩序成都諸進士既中有司之式度則藩侯為之設燕賦詩寵行相與屬和摹刻而傳循仍久之號曰故事今年秋府帥劉公謂舊禮之不可廢也既燕之遂以詩贈之且述前人題柱奪標之事而勸勵焉葢好賢樂善之心發于詠歌則教存其間也自天章李公洎僚屬賔從及其諸生相繼而賦凡若干篇士林誇尚光輝一時昔王起三領貢籍周墀作詩以賀起亦答之時一榜進士盧肇而下二十二人盡能賡唱後世好事者摭其本末紀為美談有以知朝廷文化之盛多士逢辰之榮想味餘風良可愛慕然則鹿鳴唱和之傳也亦可以見西州學俗之美而禮文之有足觀者陳傳正退居類藁序予嘗誌中表陳公傳正之墓而銘焉其行其學其政事槩可見矣後十二年謫居衡陽過公之子綬始得公漢南退居類藁二十卷讀之信乎誌銘之不妄與也夫君子之學始於治性修身而終于事業豈特規規於辭采章句而謂之文乎積於中乃發於外藴其實乃形於言表裏之相符本末之相濟而後能也譬夫輝山之玉不責功於琢刻撫之則温潤擊之則清越躍冶之金不資巧於鍜錬舉之則堅重扣之則鏗鍧皆本其所有而見焉公忠於君孝於親信於朋友仁於物故其文之典厚詳正出於天質之自然乃仲尼所謂有德者必有言也慶歴二年仁宗皇帝試進士置在乙等上覧卷嘉美謂曰辭理優贍遂擢甲科抑亦士林之宗仰清議之敬服其可欺乎公初名東琪後改曰習字傳正云送唐子方序治亂之源出於任人而賢不肖進退繫天下之幸不幸世主安得不慎取舎哉葢天下之事有本末有重輕賢者志於逺而不肖者苟於近此所以任人之得失為斯民之治亂也漢孝武承文景恭儉之餘中外豐實奮然欲鞭笞四夷竭數十年滋衍之財繼以鹽鐡舟車之入調用於邉猶不能贍乃至桑𢎞羊領大農而盡秋毫之利然戸口减耗邦本摇矣雖悔且哀痛無及也唐憲宗力平冦孽以兵費為先務而异鎛聚斂媚上乃執大政雖裴度崔羣諫輒不聴用上下羣情為之震駭而元和治體亦寖衰矣吾朝舉海域之廣利源貨法一制於上富厚之積跨擬前古然而兵過百萬日有常養二陲嚮順嵗有常賜三載禋賚萬官冗禄尚方之用時或不㑹平居量入而出僅無餘焉自康定用師以四海備一方而天下之力不復全盛比者數年大變繼起優錫之具多貸於民歉饑相仍十室九空而朝廷經費不可一日少損嗚呼用度如此其急也生民如此其勞也則天下利柄誰可屬任耶上嗣位之九月親勵聴斷逺猷庶政究索講舉元臣舊德簡擢信任念公之賢不當久於外乃詔以歸而付之大計天下於是知上之願治而任人得其道也惟公忠純貞亮以仁義禮樂賁飾諸外厯輔三聖無後先游説之助惟直道自致惟大節自處湛然有阜安元元之志承命而往豈非天下之幸歟荀卿書雖雜言王覇至于論足國之道則曰節用以禮裕民以政又曰儒術誠行則天下㤗而富夫上所以任公者本節用裕民之道矣公所以報上者施儒術而躋富夀也推而措之揆席以翊成大化則良史必書其詳此姑述公之行爾送并帥陳公還闕序兵者天下之難事也用之難不若養之難養之難不若御之尤難用兵而失道則威沮於外不可以勝敵養兵而無制則生民之害日益增長於内久而不革禍敗隨之御兵而非其道則内外之釁乘間以發速若反掌故用之難不若養與御之難今之兵習常於治安而不用將用之固難惟其養而有制御而有道則庶幾可適於用而不甚患其難也屯田置府之法不可少倣前世而聚豪悍不逞之徒無慮百萬温衣飽食仰給縣官賦斂過乎什一公利不遺毫末而廩帑無數歲之積耗於兵者十常四五夫耕而殍溝塗婦織而寒無以自覆家苦於轉輸戸勞於饋餉斯民之力有時而竭養兵之制宜爾耶無名不功之賜數下不能厭滿其意而能開誘其貪平居摇摇焉惟恩賚是望不幸有非常之事則聚而議賞嘉祐之末見之而可為太息也有偷生之色無敢死之氣知可愛之政不知可畏之令上下恬然曾莫是恤或匹夫之勇或數級之多不詰其忠義智謀何若遽假以美官重職而措之要地其甚者以捍邉又其甚者以副一道之經制夫小人之情好推其類而歸心焉有唐方鎮之變鮮不由此御兵之道冝爾耶恭惟圖任元臣總握樞柄頼其深謀奥畧以禦遏四海險暴之萌而立成富彊不抜之勢偉乎盛哉惟公忠純貞亮卓然當世出處中外率本大節無好名懼謗之意不為苟簡自安之策早夜孜孜為朝廷畫宏逺無窮之計豈非信道篤而自任以天下之重者歟上嗣位之二年念公之賢不當久於外乃詔以歸將付之鉅任所以塞天下之望而仰成重德也夫如是則畢天下之事不足為了也功名不足為有無也惟大君子盡所以致身行已之道無負而後巳也向之所謂難者俄而易也四夷可懐也生民可福也萬世之利可享也昔漢宣帝厲精求治鍊羣臣核名實而魏相總領衆職頗稱其意上下相安莫敢苟且又嘗陳五兵之要諫擊匈奴右地言行計從有三世稱藩之效唐憲宗憤國勢之陵蕩奮英武削亂階而裴度抗志大䇿以靖盤結之祲姦臣兇將蓄鋭喪氣憚其威稜二十年間王室繫之輕重以古揆今而觀聖賢之㑹則公之勲誼德業豈特偕漢唐名臣而巳國有良史必能書其詳送田宻學元均還闕詩序某儒衣非好侫者耳目公之仁治久矣㑹公以王命歸涖宰府鄉之稚耋皆嗟咨涕洟戀念公德業顯異發於謳歌喧喧載塗然能謡而不能文其何以逹九重播四方傳千萬祀乎敢次第其言為古詩一章贈公之行庶幾中和之政流聞于無窮爾送曾子山序待士之薄補吏之輕今天下之公患也採以章句之學秩以斗升之禄合賢不肖而一焉以日月為勞而位焉幸雖小人能苟容媮合則進而得騁不幸雖君子有毫毛之缺則見廢於世故世而居小官者舉皆以簿書期㑹冗末勞賤之役為任其施為思索一不敢外繩墨甚者至於俯仰步趨亦習其柔瘁寒弱之態辦於是謂之材安於是謂之分舍是以為好高取異往往乘而蹈禍以躓其終身君子處之而顧其勢之如此也雖有偉特閎逺之心必養之以䝉納之以蓄庶乎有待焉爾非敢茍於時也臨川曾子山識明氣勁以名節自礪一命為尉銅梁而處已慮事外雖混混於流俗中則瑩然以清毎語及當世利害必感慨引論有愛君援民之意豈非所謂有待者耶夫行植於初必裕於終誠發於言必著於事予乃知子山將有立於今也記利州修城記皇祐四年冬蠻寇嶺表犯諸郡惟廣州城堅可守攻之五旬不陷自是搢紳大夫言於朝謂蜀久治安武備稍廢城當城不當遂廢不議詔俾治之此繕修之大槩利據蜀之四逹古號控扼地既喉而藩其勢孰禦將臣之出守者綰有兵制統治邉疆朝廷建置之意逺矣城圯弗顧焉能率職况天子明詔存焉郡守太原王侯勤勞民務率有矩矱奉詔祗飭乃謀于城尋其廣凡千有五百㑹其入總千有三萬欲賦於民則地瘠財窘雖豐年猶有艱食重困以勞肌將不膏欲給於兵則給役無幾但緩歲月未克以究乃請於漕刑二府仰其資給而成之咸以為天下之事一也協議而濟孰謂損權顧巳而處孰謂知變矧為之城非私一郡豈宜坐視州郡之闕而恬愉其心於是集他州羡卒千人致廩粟數千斛以周其事郡守王侯日至城所以勞以食衆罔不勉起甲午仲冬至乙未夏四月而新城成觀夫墉壘屹立山河慿輔以控則壯以居則完乃襟帶之利也城之為效可述矣然天下久安雖三王之政必有敝不救不革元元疇依則利固有大於城害固有大於不城必曰警而後慮非慮之原也推此及彼功業烏可涯哉利州重建永安廟記利城東北隅有隙地廣袤數十步廟貌棟宇圯不復見歲之春秋郡遣官祭其神至則設爼豆榛棘間行獻禮訖事棄而去考諸圖志廟以永安目之索其創建之本末不得而悉然詳觀稱謂摭禮經命祀之説揆前世所以神夫豈非法足以濟時功足以保國捍災禦患貽斯民之利者歟又豈非邱陵川谷出雲為風雨見怪物資萬物之生者歟抑良吏嘉政有以入人之心没而不能忘者歟不然孰能傳廟祀歴千百年雖血食幾廢而美名尚存耶嘉祐二年冬十月郡守張侯遵按祀典追懐神烈嚴其像而屋之於是明靈以安薦獻以位歳時致報不黷而肅客有過而嘆曰民荷神之休以生神於民有功也太守司民甘苦務寧其生故推本於神而奉以禮具以永民之休太守於民無愧也神享太守之報何愧矣十二月五日重修成都西樓記原註代呂公弼嘉祐六年夏四月予自延安就領成都節制至則考求風俗之敝及其所便安乃知蜀人循柔思義易以誠感治得其道皆能樂生於是平心而思律已而動事罔鉅細務中適宜庶幾宣布皇澤使之泳游則亦無愧既而普淖大熟新陳相仍物遂平價昔之飢者有腴其膚向之寒者或温其軀野農晝嬉廛叟夜娛皥皥然不知其從來若處於唐虞豈非堯仁舜明覆被幽逺庶黎䝉福之效歟夫然奉詔令導德惠因其安生而與之共樂者亦牧守之事也府署西樓創建逺矣據藩翰之峻勢宅林園之勝地登臨濶視可以極山川之秀景燕閒高㑹可以快風月之清意歲之方春物狀尤異紅葩鮮妍䑓榭交輝綠樹茂宻亭宇爭蔭吾民來游醉于樓下實一方之偉觀四時之絶賞也惜乎基級傾圯梁栱腐橈遽一風雨慮至剥覆此而不葺殆非起舊起廢悅民便俗之理然議者重於興作欲改豎㕔舍予以為斯樓之建亦西州故事一日乘毁輒易民其謂何乃辦材鳩功因而新之不賦於民不耗於公未踰月而事具觀夫巍構山立重楹翬飛上虚下廣内顯外壯穹隆奐麗疑若天設旣落成之酌而謂同僚曰昔齊宣梁惠有園囿臺沼之勝不與民共孟子譏之㑹今承平逺方無他憂斯人熙熙知樂生之趣予幸守土不咈其欲則是役也庶不為孟子所譏耳因筆為記云集真觀記道術與吾儒並驅爭騖于中國厯千百年源深流長津際漫渺徒類益滋氣勢益壯自國都郡邑至鄉閭黨巷之聚率置廟貌以䖍祀事學六經者謂其戾去吾教有駮去掃蕩之志為言與力舉能勇也若乃信嚮堅慤崇奉切至則反愧彼焉走郡城而南瀕江流而東田壤内平而積腴園林競秀而交蔭遺基舊棘屹然其間者集真老子祠也唐天寳中以金星玉芝之祥始命創建榜曰真符宋朝祥符六年又賜今額前府尹宋公俾青城山道士黄方中居之府民句希廣多出緡錢以繕緝乃崇門屋乃翼廡序乃嚴神位乃闢壇宇惡儉鄙侈得虚寂清淨之勝焉夫天寳距治平踰三百年治亂不常兵戈間作民廬官舍多若陵谷之變獨此仙祠雖圯不壊後有居者自能完治惟仲尼之德覆被四海義均社稷血食無愧自天子逹於庶人咸有北面尊事之禮著在祀典大不可忽而州邑之廟傾敗不屋十常二三慶厯中詔天下興學多士靡然向風識絃誦之地未幾議者舛馳學校又廢豈吾儒信嚮崇奉其道不若彼徒之堅慤切至耶抑禍福之理近則易諭仁義之功逺而難知也記集真者得而詳之治平元年二月二日淨德集巻十三
