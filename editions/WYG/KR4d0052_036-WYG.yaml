body:
  text: 淨德集巻三十六宋吕陶撰七言律詩廣安鹿嗚燕送諸進士文章得雋自雄飛平地青雲有路岐勸駕寂寥慙漢詔升歌髣髴見周詩九秋煙雨登臨日三月風雷變化時回首不須題競渡錦標爭勝已先知次韻李才元舍人二首求閒得請信賢哉曽歴星垣侍從來標節向人清似玉紛華於已冷如灰仙壇露重吟懐爽禪榻風輕睡眼開昨日尋梅奉談笑竹軒松塢共徘徊當年累疏徹堯廷不爲虚名自得名霜雪盛來松秀茂風波散後水澄清紅塵漸與高情隔緑髪應隨喜氣生否泰巻舒公自悟不須端筴問君平致政侍郎知郡學士賡和詩凡數篇謹用元韻寄呈知郡學士玉色諸皃馥若蘭綵衣想見日承顏塵纓遠濯滄浪水燕几深居畏壘山俗眼漫譏身察察人情方喜志閒閒夕陽歸興隨飛鳥眞意無人語此還遊交城石壁寺二首十里縈紆路轉山山城深入翠微間何年勝地雲霞老終日清風歳月閒池上蟄龍方隱伏巖前遊客暫躋攀却嗟鸞綽遺居在難向空堦一叩關山僧何事下山迎歩徹山腰到寺庭清梵一聲沈夕籟碧嵐千幅展春屏自慙韁鎖非眞賞乍見林泉似獨醒回首暮鐘留恨處斷煙層靄倍青青題信相院林亭深靜禪門秋復春不知門外是紅塵滿庭修竹有君子終日好風如故人曲徑最宜巢翠羽澄潭猶足養纖鱗年年寓泊知閒味毎謝林泉作四鄰按視麋棗堰次韻郊原氣象欲迎春祠下喬林秀色勻數里舊防能禦患二江流水不迷津輿言此日䝉深利惠政當時念遠人公意勤勤議増築又逢賢傑繼芳塵麋棗道中藩政雍容慮在民暫行千騎按江津寒侵客袂逢輕雨翠拂林梢覺淺春極望風光迷緑野縱吟懐抱脱紅塵願公改作劉公堰留得嘉名諭蜀人松游人何事種芳菲試把庭松較盛衰得地不將天質改有心惟與歳寒期一軒野色栽培後十月霜華秀茂時造化果能周及物亦須千丈引喬枝遣興毎嗟無計遠紅塵願讀仙書學養眞収得寸心清似水放教雙􅁂白於銀功名見誤回頭晩風物相驚滿眼新一巻黄庭有深趣誦持聊以愛吾身和李寳文紫庭玉節花雲枝玉蘂兩難加應是殊庭種此花地產有時呈秀異仙標無意競繁華已持寳瑞傳君命更擁香幢送道家若預景文方物志定先羣卉賛祥葩原註皇祐中宋景文誌蜀中方物凡數十種物爲之賛惜乎時無此花送李寳文還朝使華西指主恩深又見鰲頭此鎮臨十載星霜皆化日原註公領漕鎮蜀凡十年厚德及物多矣百城桃李盡穠隂層霄自得翺翔路止水難摇淡靜心全蜀蒼黔共傾耳即聞和氣入薰琴古松館大字新題重古松標題不與衆人同何年直幹藏山驛半夜寒聲滿道宫並秀雅宜雲壑外相逢最愛雪霜中秋深縱使喬林減未許堅姿墜晩風和郄仲輔開化寺三首寺在西山第幾重山僧相遇喜相容寂無塵慮到禪室瞥有秋聲來野松已恨夕陽催返轡又過危磴聼殘鐘􅃄霞更約他時望未必高懐負翠峯目前塵坌最重重乍見名山喜動容選勝道裝堪著屐談禪麈柄亦揮松千尋急欲攀秋徑十里猶聞擊午鐘下得巒林又牽俗特書歸恨寄晴峯煙嵐深處幾千重難向丹靑寫物容層閣試憑窺百里函經慵讀倚雙松喬林乍響囙秋籟棲鳥頻驚爲晩鐘莫笑下山猶悵望浪仙平昔愛三峯送錢端履歸二曲君去金淵十五春暫歸翻是客中身千年丘壟勝當日兩世親朋無幾人麈尾幸能銷白書馬蹄還厭踏紅塵錦衣㑹有重來約應笑衰翁漉酒巾晩飲霽景宜將遠眼看緑隂垂地已春闌山巓日出方乘暖峽口風來又作寒老去心情非往事閒中談笑有餘歡玉盤四照江如練忍對澄輝不倚闌送文逹甫贊善洪河一曲晉溪濱自有餘波及四隣循吏風聲今慕昔淡交情味故如新江山極目登臨遠嵗月驚心聚㪚頻無限名園費吟賞化工偏與洛陽春和成都轉運判官孫聖微見寄文章平昔擅才名使指於今總列城甲乙常聯榜中第東西俱作劍南行清吟愈覺交朋厚老别難堪嵗月驚惟喜歸途近霄漢吾鄉留得是嘉聲和重己晩菊三首衆菊爭開此獨遲已過重九見新枝自甘化力均先後不與春芳較盛衰秀蘂漸繁微雨夜清香終在早霜時詩人未便移青眼㑹有金樽是己知花開雖晩莫嗟遲落盡千葩發幾枝清露有恩殊未報寒風無賴不能衰幽芳自占三秋景眞賞堪同九日時蝶少蜂愁人事别餐英獨有屈平知仙翁培種一何遲㸃綴黄金更滿枝秋色已高方秀茂物華皆老未凋衰幾多俗客慵留意無限妖花笑後時獨向風霜對松竹潔清標格自相知聞説一首寄與可爲堯夫作聞説蓬仙作小麾湛恩從此破羣疑平生直道宜三黜自古周防用四知松竹何嘗凋晩秀稻梁應且續朝飢不須利口歸豺虎皎皎清穹未易欺次韻贈陳季常一塵殊不掛胷中標韻高閒辯論雄詩得江山深有助道囙橐籥易爲功平生擬效漆園吏何日相逢黄石公可惜壯年長䇿在却陪明月與清風伏日池上二首塵氛不到此池亭庚伏長來駐旆旌波蕩畫船衝岸急露明翠蓋遇風傾一先有得碁頻勝衆樂無嫌酒屢行紅日漸低鐘鼓近路人歌笑望專城南風時起有餘溫晷影炎炎勢欲焚堤上遊人皆樂俗坐中豪客少將軍深思闊沼生冰色尤畏晴霞㪚錦紋待得清凉到襟袖斷煙重疊送西曛題致仕袁成均燕申亭掛冠歸後愛林泉擇地爲亭欲看山清畫絶無塵坌到白雲常與性情閒詩書教子雍容外琴酒娯賔笑傲間堂構不隳門有慶綵衣終約錦衣還送李寳之流落文塲晩得名十年猶未脱銓衡軒昻本爲太平起憤歎却囙多難成方畧滿懐期樹立塵埃䝉袂且將迎由來不遇須藏器豈是佯愚學甯生送修孺歸通泉用陳圖南韻猿鶴皆飛昔日聲安車歸去路岐平高懐無累能知止半禄雖微亦代耕林下光隂尤覺永環中氣象有餘清塵埃滿抱華顚客笑指泉山羡此行次韻送人有感三月山城送客時山頭芳草又離離紅塵道路今猶古清酒罇罍樂勝悲鄉外忽搖懐遠意坐中聊賦惜春詩洛陽風景别來乆應屬少年游俠皃送交代茹安禮二首平日陽和已浹民浪馳幽迹紹芳塵芝蘭秀品推前輩桃李清隂及後人諄誨有聞知契厚縱談無間覺情親去思從此憑何慰待刻銘詞上翠珉原註安禮新縣獄記且銘之當爲刻石以久其傳越溪春水碧迢迢岷岫晴嵐翠欲飄故國風光頻夢斷殊鄉景物易魂銷何時執友無暌索此日長亭倍寂寥把酒送君同一醉羡君東去客心搖送曹憲州山頭紅日照紅旌祖席仍歌塞上行慷慨有心終破敵燕閒無事暫專城朔風動色驊騮健秋水澄光寳劍輕萬一羽書飛到郡定煩方畧取功名送范庠博十載閒經紫塞秋辟書連上得君留一身已共冰壺潔八法堪同墨寳収壽几歡心憐綵服詩庭虚席待良籌古今京洛風埃甚去有亨途莫倦遊再和送李大夫莫聽灘前漲水聲少遲樽酒話平生堪嘉祁老初辭位却笑樊湏欲問耕落日望君三舍遠西風惠我一襟清江流自在悠哉興得得回船十里行送永康司理張思純東歸曽把叢蓍叩大鈞少逢升漸屢逢屯平生道在惟藏器今日途窮恥問津萬事感懐歸白髪九衢欺客是紅塵何須便作林泉計未必文章誤此身送秭歸胡宜甫京洛前年困客塵孤舟今去楚江濱位無高下在行已邑有政刑宜福民人子歡心憐白髪壯夫幽抱感青春絃歌已治庭闈樂休説窮通問大鈞送淳于温其五陵豪客攬歸鞍行矣休嗟蜀道難世治不須專將閫才雄自可陟詩壇虎符金印亨途在夜笛秋琴逸氣安至寳投人猶按劍愼將騷雅載毫端送道粹泛交如面頗紛紛珍重賢豪有所存高論向人須藥石壯心於俗不寒温已懐忠孝歸儒術誓取功勲襲將門蜀道阻長秦塞闊夕陽芳草最銷魂大享肆赦府帥賦詩次其韻運際重熙講克禋祖宗嚴配答慈仁典章備物該三代殿寳殊名應五辰早嵗侍祠曽受嘏外方留鎭屢頒春皇恩更遠皆宣布自此祥風起八垠答文通卽席見及春華穠處客心闌俗事勞勞近萬端嘉景良朋豈常遇清詩濁酒暫相歡飄零宦況誠非欲烜赫名途未易干惜别戀游深意在寄聲絃上約誰彈喜文通西歸毎記江頭舉别觴别來如昨幾炎涼年華莫問當時水􅁂髪皆添近日霜伏櫪已甘常蹭蹬凌雲猶滯遠翺翔羨君標韻終蕭灑恰是花開到故鄕喻明仲自成都憲使領漕湖北荆楚旬宣盛事誇十年重復賦皇華原註公頃年嘗提㸃湖北刑獄今復將漕更絃己見調疏越切玉猶須試鏌鎁隨手春風飄塞下原註渠陽飛輓公是任焉迴頭膏雨潤天涯親聞父老慇懃説溝壑沾恩數百家原註西州盜醖之獄沒產甚衆公推舉法令多所還給憔悴更生無慮千數人父老能談其詳予熟聞之寄眉守黎希聲千騎駸駸出錦城鄕人翹首望先生二年爲郡應須樂數日遊山已快晴泉石有誰陪道話雲霞無限愜詩情紅塵拂袂良朋少時向西風願寄聲送戴正仲大夫歸玉局請得琳宫别未央西行行色重増光官曹冷淡如逋客風物鮮明類故鄕歸去林泉謀已定閒中詩酒味偏長市橋側畔鄰居日應許過從亦道裝送陳正臣遊昌元三月狂風不惜春客愁千斛付行人平生操履由吾道何日安閒遂此身陌上紛華空白畫山中氣味少紅塵歸來必遇求賢詔莫向窮途苦問津答趙賓與同年見寄羨君方寸最澄清何必滄浪更濯纓玉麈縱談聊入幕錦衣歸養自專城交情久似喬松茂詩興濃如皎月明閲味來章佩勤好却慙塵耳聽咸莖和子瞻寄希聲二首通江山水甲岷川和氣融融滿四邊儒者易成千里政鄉人近得兩重天金罍淺飲雖歌舞玉麈高談盡聖賢不是春秋爲冷學借畱何計及三年海勢茫茫㑹百川一麾正在海西邊鴻収迅翮方棲渚鶴吐清音自徹天落筆盡降詩裏將放懐常對酒中賢及鋒急用應非晩畱帶紅塵已數年和信夫屯田疾間偶作二首安居無事莫興嗟聊放高情喜溢涯攬照不驚頭染雪讀書未信眼生花謳吟罷後詩筒減方論搜來藥劑加見說道心從此壯幾囙清夢到仙家仕路浮沈不足嗟到頭何處是津涯庭中度日多無事湖上經年各有花熟焙春芽香不㪚輕澄臘醑味偏加憑君莫賦思歸引一郡相歡似一家和王霽太博見寄惜别心情彼此難想君歸去自能安輕舟盪槳依平岸快水流冰下險灘夢到親聞方嵗晩路迎江國少春寒牡丹時節西園醉不得相同一倚闡送皇甫秉彛殿丞征車千里極關河特遣離懷賦緑波晩節不隨華髪變歸裝還載異書多雲霄有約増攀望文酒相逢異嘯歌若相清朝許投筆生平孤劍願重磨淨德集巻三十六
