body:
  text: 淨徳集巻五宋吕陶撰奏􅃺奏乞罷開樂宴􅃺臣伏聞國朝故事祥禫既除有開樂一宴近來中外喧傳謂巳擇日排辦日夕必行此禮臣愚竊疑之盖自春徂夏旱暵為災陛下憂勞恐懼避殿减膳精誠祈禱夙夜不遑以至過自貶損權罷受册務答天心以兾亨嘉之應此乃曠古未有之徳天下幸甚今群臣屢拜封章乞從禮聼樂陛下報詔未䝉允許乃未有開晏之期而中外相傳皆謂晏在旦夕似於事體未便伏祈宣諭有司一就坤成節賜宴則於禮文亦非簡踈内可以隆二聖慈孝之徳外可以稱上帝眷佑之意貼黄臣又聞英宗朝八月將宴後苑劉庠言去日食近非畏天之意特為罷之神宗朝四月將宴富弼以災異為言亦䝉嘉納今旱暵之沴雖已消弭而天道尤宜欽畏願陛下無災而懼為徳天下幸甚奏乞蠲放開封諸縣熙寧中殘欠常平錢狀臣訪聞開封府諸縣人戸自熙寜五六年後累欠常平錢等至今凡十二三料經渉十六七年計所出息已過鉅萬緣逐處貧下之家見今猶有殘欠官中不住督歛或父祖已亡勒子孫填還或無戸可催責干繫人代納或經災傷委實貧乏多者不滿千錢少者􅅻過一二百而追呼監靠動有騷擾昨來雖䝉降赦指揮分作六料逐嵗送納仁恤之意極為寛厚然嵗月深遠無可催理者終是有此疾苦未沾聖澤臣愚伏謂王治之體惠中國以綏四方徳教之流先京師而後諸夏畿内之民尤宜安養諸路所欠多自随料次催納無如府界累經倚閣積累十餘年猶有少欠伏望聖慈特賞指揮府界諸縣自熙寜五年後有人戸殘欠常平現累子孫填還或干繫人代納及昨經災傷第四等以下等現欠者並與蠲放庶使徳惠實及困窮貼黄赦文雖許展限年月送納諸縣未免将積欠之數分作六料催理數目雖不多而煩擾甚衆莫若特賜蠲免又昨赦文市易錢二百貫以下並得除放今來殘欠青苖錢多者每戸不滿百貫累嵗倚閣莫非貧乏之家却将催納重輕之理顯見未均如䝉採察特與除放則惠澤實及農民方當新陳未接之際早賜指揮極為厚幸辭免居起舎人狀右臣凖閣門告除臣起居舎人伏以柱下之官記人主言動偹一代典章傳信後世惟愽學多聞習知史法之士可稱其職如臣衰陋材不足用安敢冒據以速罪戾仰祈睿明慎惜名噐特寝誤恩庶允公論所有告命未敢祗受奏乞罷郭茂恂工部郎中狀臣去年三月中曽弹奏郭茂恂前任陕西監牧日枷禁無罪婦人阿黨等令賠錢雇女使及在秦州永興軍皆有不檢之罪醜聲流播道路喧聞不可為省郎并相度監牧䝉朝廷採納臣言罷茂恂庫部郎中更不遣經畫牧地仍除軍噐少監當時士大夫謂朝廷既知茂恂猥惡如此而尚不許補外者盖執政以親舊之愛曲為庇䕶姑且處之京局俟人言稍息必復進用今日果如所料乃以茂恂任工部郎中詔命既傳頗駭群聼且進善退惡者天下之公議信賞必罸者人主之大權貪亷既稟於天資安有昔汙而今潔陞黜動關於國體豈可前是而後非倘從輔弼之主張必誤朝廷之任使伏願陛下深明本末洞察公私特罷恩除庶清郎選貼黄况茂恂領軍噐監以來仍更違法冐請製造神御帳興工下手節料了畢等錢貪猥之行乆而不革臣巳嘗弹奏伏請論罪如律豈可因其有過又復遷官奏乞進擢奉議郎杜敏求􅃺臣嘗被㫖遠使詢察官吏之能否得善不薦有愧於心臣伏見奉議郎監成都府啇税杜敏求治身知義為學知本從政知體良材嘉噐可用於朝恭惟陛下虛心求賢尤善任使如敏求者伏請進擢以觀報效奏舉任伯雨充學官狀臣先准朝㫖舉内外學官二人臣巳奉詔舉果州團練推官知成都府新都縣李由頤充學官其人雖䝉朝㫖差充河中府教授原不曽赴任巳差充酈延路經畧司勾當公事訖臣後來别未曽舉官今伏見前施州清江縣主簿任伯雨素有文行今保舉充學官任使貼黄臣伏見兵部侍郎趙彦若昨奏舉周純充重法地分知縣其周純為少得闕次情願不就近趙彦若再舉温俊民充重法地分知縣巳䝉吏部施行有此體例伏祈照㑹奏乞察小人邪妄之言􅃺臣察謂人君深居九重尊髙如天雖有聖智亦未能周知天下之事必以納諫為先既能納諫則臣子可盡下情以陳治亂之要今陛下聼政之初臣傋位侍從朝廷之事得以論思敢竭愚鄙少報萬分之一願陛下特加省覧伏以太皇太后保佑聖躬於今九年垂簾聼政天下治安一旦棄四海之養凡在臣庶痛心泣血無所逮及方其得疾之初陛下憂形玉色躬侍藥食衣不觧帯告於天地社禝禱於宗廟山川薄刑赦罪釋逋輕賦凡可以祈福禳災之事講求傋至及其疾勢大漸則召髙族子弟入於禁中丁寜撫慰有安心免憂之言既以大殮内侍有需索酒食者禮部臣僚謂方當哀毁不可為閭閻鄙俚之事恐累聖徳陛下即從批奏遂罷其請繼有手詔稱揚太皇太后臨朝累年抑損外戚未嘗假借無以報稱盛徳議於髙族子弟推恩又慮諸處應奉山陵過有勞費遂令降詔有司並須遵依遺詔指揮遠近臣子聞此等事無不感歎皆謂太皇太后於陛下有天地之功於社禝有萬世之力陛下深知本末尊而報之一言一事不敢違戾太皇太后之徳上合天心足以享萬夀下副人望足以保四海宗社幸甚天下幸甚然臣於此時以無可疑而為疑以不必言而為言則其罪不勝誅矣所恃者陛下之仁好諫明而察物必能納臣私憂過計之罪爾盖自太皇太后垂簾以來屏黜凶邪裁抑僥倖横㤙濫賞一切革去小人之心不無怨憾萬一或有奸邪不正之言上惑聖聼謂太皇太后斥革舊臣更改政事今日陛下既親萬㡬則某人宜復用某事宜復行此乃治亂之端安危之機君子小人消長之兆在陛下察與不察也辨與不辨也陛下察其是非辨其邪正使非不敢勝是邪不能害正則君子進小人退天下治而安矣昔元祐之初臣任臺官嘗因奏事簾前恭聞徳音宣諭云朝廷政事若果于民有害即當更改其他不繫利害者亦不須改每改一事必説與太后恐外人不知臣深思此語則太皇太后凡有更改固非出于私意蓋不得已而後改也至如章惇悖慢無禮吕惠卿姦回害物蔡確謗毁大不敬李定不持母䘮張誠一盗父墓中物宋用臣掊歛過當李憲王中正邀功生邉事皆事積惡盈罪不容誅若敗露於先帝之朝必須不免竄逐若暴揚於陛下之手亦合正以典刑以此而言則太皇太后所改之事皆欲生民之便所逐之臣盡是天下之惡豈可以為非乎恭惟陛下聰明聖智出於天縱是非邪正進退可否必巳了然於心豈待人言而後辨臣乃不避斧鉞之譴喋喋以告陛下者亦嫠婦不恤緯而憂宗周之意也夫嫠婦以組織為事惟經緯是恤今乃不恤其緯而以周亡為憂固可怪矣愚者千慮亦有一得狂夫之言明主擇焉臣又聞昔者明肅太后稱制之日多以私㤙徧及親黨聼断庶物或涉過差及至仁宗皇帝親政之初臣下遂有希合上意言其闕失仁宗察見情偽降詔止絶其畧曰明肅太后夙承先顧保佑冲人勤約之風化流四海或號令之所出或聼㫁之從宜盖機務之實繁雖旰昃而無暇賞善罸惡惟命令之已行革故鼎新非孝思之所至易月方臨於庶政虛懐覬納於讜言其有關識遠圖靡循理體逹於聞聼姑務矜容多形𤨏碎之言復有迎合之意宜申誡勵以警姦回應明肅太后垂簾日所行詔命巳經施行過諸般公事輙不得更有上言於是天下之人皆謂仁宗深念社稷之功能全子母之愛聖徳廣大超越今古載在史册垂範後世陛下所宜法而行之臣愚竊謂明肅太后之政時有過闕仁宗念其保䕶尚降詔書不容小人輙有議論而况太皇太后垂簾九年所行之政皆巳便民所逐之臣各已當罪無可擬議萬一小人狂妄獻言豈可容哉豈可信哉願陛下明示黜罸杜塞其端以副天下之望以隆宗社之福乞别給致仕狀右臣任受上件差遣於建中靖國元年正月十七日到任為年及七十五嵗齒髪衰暮竊慮職事曠廢尋於建中靖國元年二月十二日據梓州進奏官鄭永通狀申稱正月二十六日逓到臣陳乞致仕奏狀於當日投進訖二十七日計㑹收取到許本官依前集賢殿修撰致仕敇於二十七日申時發逹字號入馬逓前去臣契勘上件致仕敕命馬遞條限日行三百里梓州至京三千六百里計程合在二月初十日遞到梓州今來巳經五十日尚未見到緣都進奏院自正月二十八日以後至二月二十五日發來馬逓皮角計十七件並巳先次到州惟是臣致仕敕牒未到臣屢差人自本州以去至鳯翔府沿路根究前件今正月二十七日逹字號遞角委是未見轉送前來竊慮在路沉失念臣衰病累年勉強不行方具奏聞陳乞致仕巳䝉聖㤙俞允許臣守本官致仕出給敕命兼已䝉聖恩官朝奉大夫李仲知梓州填現闕本官現已取索接人非乆到任臣尚未受到致仕敕命􅄐任未得伏望聖慈檢㑹臣前奏狀别降致仕敕命付臣照㑹以慿􅄐任劄子辭免殿中侍御史劄子臣今月二十一日凖尚書省劄子奉聖㫖除殿中侍御史者聞命震悸不知所為竊以副端之與丞雜雖輕重不倫而任責畧等非材識兼茂望臨一時何以稱選矧時多艱厥任尤重如臣樸陋之學豈能有行衰遅之蹤無所可用賜還舊列曽未踰時無補秋毫方圖丐罷遽䝉擢序大懼無以仰副睿明耳目之寄欲望聖慈追寝新命上殿劄子臣昨凖朝㫖往成都路計度轉運司諭以更改差役大意同共定議見得本路人戸貧富等第髙下不均盖諸縣大半以税錢多少立為戸等有自一貫至於十貫以上或自五貫至五十貫以上並為第一等若各差一役皆三二年一替則富者常幸貧者常不幸又緣中等人戸緣少除官户單丁女戸寺觀外一縣之役有差一两番不足處况役人數目已依熙寜後來裁定難更减省今來若不頻差上户則無以寛中下之家須相度立法其戸多處以十二年户少處以九年為率分作三次總計合役之數均勻定差謂如有一貫税錢於九年或十二年中合差役一次則二貫以上者差两次逐次各一人三貫以上者差三次逐次各一人其税錢轉多則又增所差之役於九年或十二年之内三次差役共不過五六人原註謂逐次各差两人即非併差五六人也仍令私自僱人祗應其一貫以下等第漸低只差縣役一年又其次者差户長或渡子半年所有第四等往往更不應役第五等别並不差充大約如此風俗以為稍平外餘衙前皆悉招募以坊場錢酬支重難及出賣坊場只據現今第四界直令管押綱運了當人指占承買更不實封投狀並在本路役帳畫一開説差官齎赴闕訖伏乞䧏臣此奏付詳定役法所照㑹候本路文字到日相度可否施行貼黄臣又聞近降朝㫖出等戸更不差役只令减半出免錢則諸縣合役之户轉少須至差上等人户兼一两役所貴少寛中下之家又上殿劄子臣奉使遠方察知民間疾苦及官政未安凡一十事已嘗呈奏其一乞减瀘州兵戍不示賊以形且省饋運之勞其二乞不築雅州城以節横費免於遠方生事其三乞立科折條約使轉運司與州縣同任其責以戒重歛其四乞添和買布價以寛民力其五乞减成都税院小料綾綺罷監官免勾百姓助工按此下有脱文其七乞興州濟衆監鑄减輕錢庶使疲民不為鑪冶所困其八乞詳審改正蔡濛所减鐡價并所奪人鐡鑪其九乞開卓筒鹽井以濟困窮頼其課入可助本路之用其十乞罷興州青陽鎮銅錫場監官以减冗濫凡此十者或陳一道之利害或指一郡之休戚或議一邑或言一國以朝廷視之乃細𤨏毫末不足上禅國論以遠方望之則皆切近人情最為急務仰惟聖治願賜採納奉使至河北劄子臣将命出疆與聞使事既見遼人往還之際事體小有未便不敢隐黙今具大概以凂天聼臣不勝惶懼待罪之至臣經由河北州軍訪聞近有朝㫖為據坤成節接伴所相度裁减人使經過處冗占兵士數目過多将来祗應恐有闕事官吏多以為憂只如邢州一千二百三人其他州郡若以邢州為率例皆裁减深恐臨時誤闕臣竊謂朝廷懐接遼人恩禮優厚務存國體必不計較毫末之費自來遼人經過州郡雖有冗占人兵一則是州縣上下務要供應了畢不令闕事二則是小人群集希覬數日酒食積習成弊勢雖盡革令若便依坤成節接伴所定到人數施行臣恐未能盡去僥倖之弊却有供應闕誤之失盖異域之人既至中國不可䋲以文法或沿路收買物色行李重大所差之人津般不足未免須要添差人兵或道塗雨雪泥潦大寒後兵逃走死亡折傷疾病别無餘剰人數應急補填亦致留滯以此逐處須至各差凖傋人兵亦未為過當伏望聖慈特降指揮下河北路州軍於舊例差兵士應副遼人往來數内十分量减二分所貴不至闕誤生事貼黄臣又聞昨來坤成節遼人北歸沿路為雨水所阻每車一乗差四五十人牛驢二三十頭方牽拽得行以此推之豈可過减人兵緣今來賀興龍節人使相次入界伏乞早降指揮奉使契丹回上殿劄子臣竊見河朔州郡宻接北疆過雄州三十里便為境界然地勢平坦絶無險阻控扼去處雖州郡修完城壘訓練兵屯以傋緩急然萬一有􅇏燧之警終是易為衛把惟塘水一事極可禦冦盖自淳化中知雄州何承矩相度地形衆流所㑹開為塘泊上自順安軍至雄州莫州覇州保定信安乾安軍及滄州凡八州軍地分東西長六百餘里南北濶至二十餘里狭亦七八里周回二千餘里深亦有數丈處沿隄各置寨舖守把比之據髙設險則用力最省為備最大謂宜常切開廣愛䕶易令小有侵損壅塞乃邉防之要務也自近年以來許人於髙仰水不到處種蒔漸次冐佃官中因而打量界至立定租課其逐處所取已及四五十餘頃每嵗所入止有三千四百五十餘石寝慮嵗月寖乆侵佃漸多於邉防之計頗為闕失雖北人通好多年務守盟約百事恭順然敵情難測不可一日不講其傋伏望聖明特降睿㫖下河北安撫轉運屯田司密切指揮應係塘泊今後不得更令人户以髙仰為名妄有指射侵占如所出租課稍重許令退佃以廣塘水之利庶㡬邉防不致誤闕又奉使契丹回上殿劄子臣奉使過燕京見數回紇立於道傍指郝惟立而言却是郝使來盖惟立嘗抑伴拂蒜諸蠻所以有識認者又過中京見數回紇臣問蕭奭回紇來此是進奉或是買賣奭云回紇有數州屬本朝常來進奉亦非時常來買賣臣竊思之回紇既有數州𨽻屬北界常至彼處貢奉不缺則往來之迹不踈一日見中國使人便能識認若為北人所遣令至本朝以進奉為名探問事意或與北人混雜而至同為姦偽或有小人因緣為姦别致漏露安可不防緣回紇至本朝雖差押伴臣僚其關防出入及買賣諸物切慮法禁未至周偹臣愚伏望特降指揮别立條約宻加檢察淨徳集巻五
