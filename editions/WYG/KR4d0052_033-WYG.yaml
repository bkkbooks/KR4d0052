body:
  text: 淨徳集巻三十三宋吕陶撰五言長律詩和春雪歲改春將半春寒雪又飛積隂殊未散生氣一何㣲忽墜千尋險偏增百仞巍密難沾煖席冷易襲征衣慿仗凄風助遲留煦景歸聚來難得勢消去乃知幾衆喜勻萌潤私憂氣候違方當乘太蔟慎勿掩靈威尺地惟書異豐年可免饑持言問真宰天道是耶非再和初春微雪治有春陽感和無月律差濃雲方聚鶴凍桞亦飄花瑞應來如響羣情喜溢涯縱觀天勢淡俄失地形窊素月交暉耀狂風助擊拏一斑迷隠豹三尺晦祥鵶塞上威尤澟軍中語敢譁漢兵同被練朔地訝吹沙冷熖侵殘燧寒聲入舊笳飛紈安用裂種玉豈須畬清潔山川景微茫草木芽墾田因澤及望歲已心遐共荷沾濡力應忘旱歉嗟詩豪夜傳巻賀客曉趨衙滲漉元侯徳生成赤子家指期三日耜拭目萬箱車况頼深仁恤㑹蠲重賦加願賡稱頌句豈肯匿咬哇和喜雪向夕層雲結黎明漫漫飛山川都變色松竹倍生輝共喜飄方密翻憂落漸稀隂功施黒律寒侯應璿璣右席延文客先塗奉玉妃二儀清景混四野遠光圍愛日因藏照狂飈間作威三冬兹有得一榖敢言饑渇望於時久華心在物微霈然䝉大潤化力少知歸和對雪嚴冬飛朔雪此景望中嘉雲暗垂天幕江平壓浪花翅寒低獨鴈枝重折叢葭冷甲窮邊戍凝煙野叟家聚來風有助消去日難遮爐煖頻烘獸盃濃不飲蜿謝呤殊可愛郢唱更何加好盡登臨興搜題徹四遐上韓端明要道根皇極純王攬懿網域中洪造廣天下大形彊臣主同千載藩宣奠四方乾文耀參井地鎮聳岷梁景谷餘波迥靈關古塞荒限蠻唐節制析部漢封彊石穴延通道山扄設巨防利源充内帑兵勢壓巴羌付畀關休戚權宜任弛張紫封傳墨敕金印坐黄堂自昔都俞重其誰徳業彰乖崖施遠略忠獻紹前良樂得中和職人躋富庶鄉含生知化力永日載春陽滲漉淵源在醲醇骨髓藏深和流耳目盛事載縑緗歲月徒為久風猷信不忘恩褒賈逵祀人愛召公棠檜有喬枝荗蘭宜後葉芳惟公真輔翼與世㑹明昌間發乾坤秀親逢日月光國華增黼黻地寳獻琳琅尹道存先覺軻心藴至剛朝廷尊閥閲士黨貴文章髙視雲霄路遐飛翰墨場鵬圖指溟渤驥歩得康莊藩㑹初關決仙瀛已踐揚本元游祕府侍從陟清廂偉望全康濟周才厯浩穰中天承帝選南國撫民傷使範資勤恤君言務肅將繡衣恩燦燦大旆遠皇皇賑惠常聞黯澄清乃識滂疲羸起溝壑暴濫去豺狼大節堅特守純忠自激昻還登文石陛頻上諫書囊人鑑分今古神龜憲否藏斯猷三接告至理一言詳柱下尊良史螭頭立左郎纂修該七法注録擅三長午夜星垣㢠南風省户凉揮毫綸綵爛垂佩玉聲鏘春老常聨萼雲晴鴈綴行雄名出蘇李公論羙常楊眷倚隆矜式諮詢行賛㐮得人居内相有道輔明王大手憑才識深謀恊典常五花曾執判七寳屢登牀燕見趨東閣優容對未央儀刑真謇謇謨訓極洋洋重委臺綱正終圖國體康至誠頻啓導大事費裁量多僻消芽孽羣邪潔肺膓諄諄聞藥石凜凜畏氷霜論議他奚恤猷為己所當安危一身繫出處萬民望蔡俗嗟延哺堯心慮納隍建侯崇屏翰選徳庇災殃異政乘時立清飈與惠翔界中生穭榖境上散飛蝗儒將能専閫神兵豈頓鋩十連循節鉞四面固金湯拓地歸充國謀軍得子房天威神臂指戎氣窒喉吭屬國恬懷撫函書恥謾狂具贍宜廟幄遐福合陵岡迺顧西南遠明如左右旁大門堪世守輿頌願時颺命䇿榮千矢封圭判二章物傳家乃舊刀應夣為祥善事知弓冶竒毛識鳯凰百尋標落落萬頃信汪汪廟瑟餘音靜庖刀發刃鋼闊難求畛域微不誤毫芒雅意儒為寳宏規沼象璜魯公先請學髙䀢力崇庠教化惟敦奬衣冠敢怠遑七經登講舎數仞企師牆樂善無遺芥懲非易去稂百城損慱塞萬井絶貪攘牧廐寛收歛原註許收芻之積罷斂一歳窮閻飽歳糧原註嵗窮發廩以貸周及貧窶吏姦藏𤓰吻人瘼愈膏盲昔謂庖厨侈徒矜口體嘗愛心加俎豆和氣落壺觴蔀屋晴曦燭枯荄湛露瀼盛時逢召杜奕世見龔黄至矣紓宵旰熙然恊雨暘里閭敦悌讓原野競農桑指顧寧陬落生成及稻梁邉聲息金皷民室富囷倉共樂親熒座僉期輔峻廊定登賢相器行促舎人装奕奕驅軺傳喈喈餙鏤鍚矢謨勤翼舜納誨永隆商鄭武髙風盛韋成懿跡相洪鑪専皷鑄大鼎薦烹鬺浩漡躋民域安平援世航詩人褒繡袞坤道吉黄裳歌舞真賢進光華至治香欲知能事畢四海處陶唐和質夫運使大夫久旱喜雨長句六月陽初亢三農否忽傾應祈由化力䝉惠得歡聲草木英華動山川氣象清石間看燕舞池上覺蛙鳴水闊江尤𣺌雲濃夜未明逡巡煩暑薄時序好風輕喜意知餘潤憂心恐易晴秀園吟際適豐野望中平勤有賢侯志霖非舊史評不須窮造物土俗但犂耕又和喜雨壇宇嚴封築牲羞薦潔鮮精誠宜有感惠澤果無愆暑氣沉虛谷濃雲布滿天雷霆馳勢力河漢動經躔農作方勞甚人情忽㤗然春渠慙訟水夜皷促芸田優足過三日豐登又一年隨車循吏事應可繼前賢雲頂山次韻地峻山形壯周遭盡勝遊抱巖如拱手轉嶺似回頭老木凌空㢠濃雲覆石幽朝陽千里快暮雨數峯愁澗底猿隨鹿松顛鶴勝鷗香花開靜宇煙火認他州寳翰中朝錫神燈半夜留勢容逋客戀景許化工偷雪色連年貯嵐光幾院收仙葩多躑躅野果號獼猴法印傳無礙禪機問郎酬叢林分徑路蓮社得朋儔眼遠層霄闊心澄外物浮登臨豁塵抱今古信悠悠送俞漕積有儒林望聊從使節行髙文自經緯壯志欲澄清地鎮三峨重江波萬里平闊難求畛域深不為功名吉象光圖籍祥風巻旆旌巢阿贍鳯彩運海見鵬程事外神鋒晦胸中寳鑑明淵源千慮極肝膽一言傾徳業期康濟諮詢屬老成定知前席對有以澤羣生送人為郡回當世勲賢後嶄然器業髙劒鋒天際倚虹氣王中韜列乘提藩總雙旌署郡曹至精慿寳鑑大割見庖刀曠闊非私物周流不失毫霜威摧吏𤓰春煦起民膏治世須醫國亨塗合擁旄蜀人懷舊徳涪漢共滔滔送楊秘丞赴戎南倅萬里南溪水滔滔逼郡城四時多雨氣終日是江聲蠻市煙中合山疇火後耕孤村隨漑斷絶嶂與雲平甲冷三冬成蜂髙半夜驚盛朝咨鎮守别乘委才明愛日迎舟檝春風巻旆旌蘭陔新膳潔原註迎侍太夫人之官花縣舊隂成原註君嘗佐邑戎南荔子瓊瑤破藤梢琥珀傾羈懷休念遠淺醉易忘情宦況如郵傳年華似送迎笑談聊布政閒暇亦論兵僻地非通轍層霄有去程行聞海沂詠流入竹枝清送王昌州屯田百里鄰疆宇詳聞懿迹多本原由簡厚論議必中和平日春陽愛斯民徳澤歌藩宣聊息偃名教足逶迤遠業今猶鬱亨塗去若何蓬仙終到海軒鳯必巢阿裁割神鋒舉光輝國鑑磨公乎難隠讓忠義貴無他送張景元并序天下之勢如腹心手足之相須而成求其所以安靜於中者必少休其外也勞敝四體則歡寧愉悦之氣化而形色槁瘁孰謂四方之地可不暫紓其力以養中國之用乎天子恭已於上萬官任職於下廟堂權其謀方部維其紀綱郡邑赴嚮其事雖付畀之迹異而愛念元元之心均焉以一道處之重任也舉天下財賦之出蜀最多焉正朔始歸中原時為生豐贍物估擬今率十之一司租庸者闇經遠之慮沿其時直以限王賦賦雖重矣而他求未及民不吿勞數十年間供億日益繁泉幣日益輕物估日益湧而乃務足經費者以半價市繒帛按户而歛歲無慮四十萬康定中兵興於西饋軍之費又三十餘萬地産有常而賦重於昔物估日湧而半價之歛增齊民無聊竊自憤難間或乘以饑旱則溝壑之委可為寒心嗚呼天下一體也治天下一道也四民之勞如此其極也而議者曾不顧恤乃曰殖財具事則於吾何歉豈朝廷所以待遠方之意耶豈君子所以均愛物之心耶比歲臺雜趙公以漕節出按閔蜀困匱乃列上利病得減康定之數疲羸延頸庶幾休息今明公臨部未幾惻然有撫恤之心計當道繒帛所積凡半價之八為罷一歲夫豈非君子慿其所存於中者以度物制宜而濟其徳業乎固不能遷度於外而與之疾徐也旣而上召公以副大計士有惜公之去之速而謂吾蜀不能深被其賜者此安知天下之治戒乎遺逺而君子之徳業惟其有加於民之為貴奚遲速遐邇之間乎用是推公之心則吾蜀被賜非特今而已某敢第其説以為序而繼之詩方域提權重朝廷擇士尊綱疎因正紀流潔為澄源寒日風威靜熙陽氣序溫人知廉使體物荷聖皇恩清轡纔周境歸途已駕轅光華三節瑞邃宻九重閽韶集丹山鳯雲升北海鯤聞公難避讓天下盡元元送馮樞密帥領來全蜀掄魁祗一人原註由進士狀元鎮蜀者惟公一人崧髙雪山勢清徹錦江津旒冕思長䇿機衡屬老臣部中方拜賜天下又廻春出處無非道安危繫此身巖贍殊慶快塗説敢開陳聖運重熙久皇威萬里振勒兵充宇宙按劒待煙塵權術輕三表韜鈴貴五申招懷及蠻徼指顧下洮岷文誥傳荒服天聲壓外鄰捷書連歲上故壤一朝新計費千金易論功百勝頻征衣空杼軸戰骨委荆榛水旱乾坤慘錐刀畎畝貧人情危欲鎮帝澤壅難均幸㑹公歸國相歡物在鈞華心生草野和氣滿楓宸士論歸依切風謠禱頌真嘉謨慿獻納大事費經綸治術關休戚規模有革因號寒思挾纊引哺願嘗珍圖治雖更化封侯漫富民髙明深鑒照密勿定諮詢悟主言稱舜論兵諭借秦無為羣動悦不陳四夷賓寶鼎千鈞重薰琴九奏純放懷留化日反掌叙彛倫邦體還清靜王綱務率循太平勲業就寰海被堯仁送師厚毳冕登車後薫琴易柱時遐方新視聽赤子繫安危羅網難投足錐刀漸削肌激昻忠論發絡繹奏封馳有意同休戚無心計險夷海傾身亦禦山轉力須支沸鼎憂魚爛沈疴待藥治正邪雙辯起義利兩塗知帝徳終柔遠天聰善聽卑丁寧詢使指勞來及坤維大法圖公共憸言惡詭隨弊從經嵗積恩許一朝釐治體今殊昔仁聲喜換悲方期講原本何暇語毫釐虎噬猶吾怯蠅營漫爾為隂功符監佑直道擁祥禧行色青雲棧英游白玉遲是非都一笑歸旆巻晴曦送范堯夫并序自改作之議興士大夫有以言獲罪者罪之愈多而言之愈不已天下之事其是乎其非乎公由諫員謫守蒲津領漕於蜀察民重困不忍以厚歛加之凡朝廷詢間可否則述利病以對毅然不可少奪其於天下國家始終無毫髪愧負也世之人平居以端良自處或慷慨論議決不為得喪所遷一旦紛華悦於前困阻脅於後則顧望縮伏務以求容於衆向所謂志尚操履者棄置若長物然仰聽下風亦厚顔矣公之去蜀人思焉某於是序而又為之詩欲賦旋歸樂翻成感遇篇盛時惟道在輿誦自民傳伊昔更張議於今造化權綱條籠宇宙號令震山川大畧先農穡餘波及貨泉俊豪爭援世忠亮欲回天暮對青蒲側朝留赭案前堪憂逐江海猶許治蕃宣此地勞飛輓何人念瘠捐壯心摧更激高節困尤堅晩歲松方荗洪爐燄不燃迂從鄒叟得原註前史有謂孟子為鄒叟者勇在孟賁先坦若王良轍端如后羿弦一毫無畏惜千慮極哀憐定論予張膽游辭彼脅肩尺尋難枉直鑿枘自方圓止沸愁烘鼎調音恥絶絃漢緡寛酒𣙜唐賦舎庸錢睿智期開允生靈懼削朘弊端殊皎皎物望甚拳拳白日功名久浮雲富貴遷萬鍾均廩禄一品漫貂蟬儻為升沈動誰能事業全寄言天下士無愧屬眞賢送蔡帥赴平涼劒外開三蜀回中宿萬兵召還宜北覲賜鉞又西征體貌均先後權綱一重輕淵衷尤愼簡輿意尚難平伊昔藩條振於今治體成有為終簡易無迹但恢閎筆下銷頑弊樽前得隠情快如長劒立通若巨河傾闊刃從虛落醇源及物情山川增氣象草木遂勾萌煖褐三冬足豐疇百室盈詠歌今父母畏服古神明方幸華輪柅俄聞瑞節迎渇心猶借冦翹望欲還瓊況復盤關路常瞻部使旌十連依玉帳一道固金城後詔光前出新棠似舊榮于宣推徳業所至盡功名塞馬寜非福溟鵬豈問程惟期未温席歸去纂家聲郊祀禮成詩皇極恢臨照嘉時屬盛隆八年登至治大祀答圓穹並報知坤道推尊見祖功先期齊廣殿將旦謁真宫杲日迎鑾皎祥雲遶蓋紅衣冠開祕寢幢節下層空東嚮經途近前贍太室崇過門遵徃徳降輅屈清躬原註臣聞嚮者先帝入太廟望見神室郎降輅歩至齋殿此盛徳也陛下循而行之尊神重禮孝敬之至八聖威神在三牲薦品豐奉璋人左右進俎序西東上意精純至英靈顧享同念深堯八彩感切舜重瞳原註臣闈唐韓愈作元和聖徳詩羙憲宗功徳有薦享新宫淚落人俎之句恭惟陛下大資仁孝親享祖宗之神考之室必有永懷之感臣愚敢輙形容之地勝壇灣闊原註近郊壇地名塵清輦路通綵城齊北闕天仗轉南風旂動三辰麗兵嚴萬衞雄國容殊肅穆丘勢自穹窿虛次移銅漏原註圜丘之禮旣作樂降神陛下立於小次前移刻然後登壇以獻深得祖宗敬天之意升壇儼玉珫禮惟三獻具樂以六成終燔燎交神聽髙明鑒睿衷岡陵均委積箕翼等光融海沸歡聲振天旋瑞氣充呼嵩喧宇宙迎仗抃華戎盛典千春備洪恩庶彚䝉山河皆户牖寰海一帡幪獨運陶鈞術齊驅造化工令行雷洊震澤及雨其濛苛密寛三面幽潛達四聰華心歸荗草蟄户啓昆蟲六合澄清外羣生富夀中願賡成命頌垂裕播無窮送呉龍圖仲庶赴江寧方域開全晉權綱委巨公深仁吾所導實惠物常䝉曠濶歸儒術周流見治功蠢生無不贍豪利豈須籠金糓邉屯鋭農桑漢地豐頌聲如響答和氣與春融天下殊庸冠朝廷偉望隆咨詢懷舊徳付畀出清衷禁直圖書近龎恩屏翰崇鄉衣新粲錦都軾再慿熊自昔金陵盛於今玉節雄江山三國勢臺殿六朝風地勝名區在時移徃事空貢先淮甸入化接海隅同封宇緩安外煙波賦詠中民瞻深繫屬國論素探窮此日留藩鎮何時補上聰鈞衡須遠業藥石仰真忠孰謂勞申伯前知用弱翁南歸勿遲久登弻代天工送江巨源奉議呉㑹儒林勝坤維使節雄人誰攀景躅物自得清風繅玉塵埃外氷壺愷悌中教源資濬遵治具費磨礱舉向權衡見難相畛域窮章傳青瑣闥夢徹紫真宫自昔文章手能成造化功夷途方濶歩公論況僉同晝永朝紳接天髙奏牘通平生先遠業有以助堯聰送聞人夷庾太愽邑有循良政人特介潔心庖刀發虛刃廟瑟鼔遺音閒草豐春野修篁荗晩林恤民中詔遠及物上恩深歲月呉江夢山川蜀道吟歸歟清議在直筆待君簪送茹世羙少卿切慕真仙理能收至靜心紛華雖爾共勢利莫吾侵造化歸三鼎逍遙託五禽一言平物我萬事委浮沈研味經翻玉吁嗟礫變金太霞方夢想流水漫光隂得郡情應樂休官志已深遐飛脱塵網髙視笑蹄涔舊徳淹卿寺清風聳士林却憂公議在未易解朝簪和提舉遊上方南禪十韻宿約遊雲谷晨興過寺扉雨聲隨歩急暑氣逐風微正午逢晴照層霄歛夕霏江濤千里湧城郭萬山圍清集同揮塵髙談及轉璣虛涼河朔飲蕭散道家衣適意朋簪盛回頭世網非碁休誇小勝禪莫問餘機對景聊行樂因吟欲賦歸髙人應笑我白首戀輕肥答王仲髙從政宜師古為儒貴席珍承流仰循吏慮患屬孤臣休戚同千里輕肥止一身虛名稱有土慙色見斯民羅網甘投足波瀾恥問津狂言千重辟冷笑待憸人琴瑟方調節芻蕘願采詢閉關聊度日開巻易經春地煖畦蔬足年豐甕粟陳惟特三不愧通塞任天鈞淨徳集巻三十三
