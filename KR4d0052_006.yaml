body:
  text: 淨德集卷六宋吕陶撰表辭免殿中侍御史表原注元祐元年閏三月官有其責實繫紀綱材非所長徒纍名器方睿明之善繼惟聼納之處先宜任忠純以司獻替如臣者生而孤遠學則迂踈不通治道之本原安能論政未熟朝廷之典故何以繩愆碩回拔擢之恩愼委端良之士庶使言能適用官不偹員聖君有得於謀猷愚者獲安於守分所有告命未敢祗受辭免左司諫表原注元祐二年六月官以序遷人非實稱况七臣之所貴豈一介之可勝敢瀝愚𠂻願還寵命伏念臣學未能造道材不足適時向自郎曹擢用言路徒更嵗月何補涓埃立伏在廷尚緩黜幽之典伏蒲獻説愈懷竊位之羞匪惟清議之莫容抑恐孤忠之易隕仰祈睿鑒特寢誤恩所有告命未敢祗受進郊祀禮成詩表臣聞承天莫重于郊蓋求端而報本惟聖為能享帝務薦德以交神共慶昌期傋熙能事恭惟皇帝陛下道該元化運席重熙勤色養于三宫動遵慈訓格歡心於萬國肇舉嚴禋參求今古之宜倣用祖宗之憲具陳百禮並報兩儀丕承穰簡之休大布生成之澤湯仁解網周俗虗圉遠之侯甸要荒盡驅躋於夀域小則蟲魚草木亦茂遂於恩波臣叨侍清光親逢盛觀聼圜丘降神之樂均有虔誠續昊天成命之歌愧無善頌謹吟成郊祀禮成詩一首三十韻奉表投進以聞謝梓州路轉運副使表臣伏奉告命差權梓州路計度轉運副使兼本路勸農使臣巳於今月二十五日到任者京右輸將轉引嫌而願避坤維刺舉復申命以遣行壘被靈寵徒知感懼伏念臣寒鄉寡與素守自明偶待罪于中臺旋充員于左省爝火不能助太陽之精勺水無以益滄海之深每竭慮以上聞多蒙開納及叨恩而外補盡出保全此蓋太皇太后陛下垂計寶圖玩心治道優容言職以隆聼諫之美名愼重使權欲廣愛民之盛德因而孤蹇預此光華况巴蜀之數州去朝廷而百舍土居險陋俗尚孱迷雖平時賦入之饒經常粗給自頃嵗軍興之後瘡痏未完網密則人用咎咨轡柔則事將廢弛臣敢不講求中術推導至仁少圖日月之勞仰報乾坤之賜又謝梓州路轉運副使表諫省傋員分宜罷黜潼江領漕誤委事權仰戴異恩俯流感涕伏念臣生而孤遠學則迂踈自奔走于末途常激昂於壯節當先帝御圖之始選在賢科及陛下繼照之初推居言路無禆毫髮徒歷嵗時常引過以乞麾遂忝恩而生計始終幸會進退全存此蓋皇帝陛下運德同堯察言如舜明有燭幽之理仁無異遠之心器使庶工術懷羣動謂臣久塵臺省特假以使名如臣素熟土風又付之鄉部臣敢不恪遵吏檢深養治源推惠澤以濟困窮舉條教以繩偷惰庶無罪悔特報生成謝成都府路轉運副使表進奏院遞到告命一道伏蒙聖恩就差臣權成都府路轉運副使已於今月七日到任訖者轉輸淮甸既受命以之官亷按坤維遽叨恩而易地寵章特異感涕交流伏念臣早以踈凡誤蒙役使傋員臺省預聞國論之幾微賜對簾帷屢奉德音之奬訓一違朝綴四涉年華甘簿領之沉迷事道途之奔走抗章宸扆少希惻恤之私得請鄉邦極享便安之幸此蓋太皇太后陛下德由坤載道濟離明有任賢使能之心碩登至治無泄邇忘遠之意昭示大公終賜矜憐俾塵寄任况岷峨之列壤乃桑梓之封封入境觀風情偽同於指掌過家上蒙嵗時得以薦誠恩實光華力難報稱臣敢不致勤夙夜積慮簡書有以澄清雖愧古人之志近於忘厚敢忘君子之風庶幾涓勞仰酬化力又謝成都府路轉運副使表王事言私蓋犯辭難之義天心垂宥特推從欲之恩就畀漕符即居鄉閈深慚委任俯切兢惶伏念臣生長寒鄉棲遲冗路雖曰為貧而願仕曷常枉已以求容親逢納諫之朝屢伸狂瞽深體裕民之意久蒞輸將何補涓塵僅逃罪戾輒露由𠂻之請苟希恤隱之私亟奉詔俞仍叨使領罷淮壖之奔走習井絡之便安自省孤根極知幸會此蓋皇帝陛下堯仁天覆湯德日新以四海為一家視兆民如赤子敷施大信役駁萬官付臣以故里之行責臣以遠方之治地産之盈虛可度物情之􅍇惡粗知郡邑相望如在户庭之內松楸密邇每寬霜露之思竊祿于兹厚顔已甚臣敢不布宣惠澤申飭教條勤恤疲氓力繩慢吏期得富饒之實預防弛廢之端倘于父母之邦可安其職則報君親之賜無愧此生辭免中書舍人表原注元祐八年六月竊以法從回翔盛時尤貴掖垣潤色儒者共榮既代王言亦聞政事貴任至重簡拔惟賢如臣踈愚况復衰晚文辭不足以發揮典制議論不足以補助簡書忽添詔除何堪器使願寢巳行之命免貽不稱之譏所有告命未敢祗受謝中書舍人表言惟作命愧無潤色之才服以章身誤被分頒之寵便蕃異數震恐懦悰伏念臣世處寒鄉性非中智少而嚮學粗知為巳之方長亦效官偶適代耕之願熙寧中以賢科射䇿元祐初以言路傋員竟難補報于朝廷巳分棲遲于郡國何期白首重瞻日月之光遂向清時輒上雲霄之路此蓋伏遇太皇太后陛下德由坤載道契離明夙夜萬事之幾思濟于治網羅一介之善俾效其長乘大化之生成致枯核之發育文章爾雅安能贊一代之輝光忠義成名敢不勵平生之操守庶幾晚節少答洪私又謝中書舍人表詞禁代言乃諸生之榮遇身章被賜蓋明主之厚恩拜命優隆省躬愧幸伏念臣生而孤遠學則迂踈知善惡之異途惟務養心而自貴信通塞之有命安能枉巳以求容進退何常險夷不易嵗月耗凋于奔走之後形迹沮縮于憂患之餘何期雨露之私誤及桑榆之景爰從右蜀付以都郎既躋柱史之華遂及掖垣之職故為虛受實繫親逢此蓋伏遇皇帝陛下舜治以恭湯新厥德以發號施令為先務欲紀之以文章以因能任官為大公必考之以名實苟片善可收而用雖至寒不使之遺幸眷于兹叨塵過甚詔見王者之志其何以發揮服有君子之容敢忘於報稱誓堅履尚特逹釣陶謝入伏早出表嵗有一時之暑安敢忘勞恩加三事之臣遽令退食敬承溫旨竊愧懦𠂻臣等誤以短才與聞庶政雖窮日力莫代天工適逢庚伏之辰得遂燕居之欲此蓋伏遇太皇太后陛下德該洪造治格太和愠巳解於薰風景自長於化國是致弼諧之職殊忘勤瘁之憂動復便安極知幸會在公之事居常早夜以深思報上之心不以炎涼而易輒庶幾憾髮少答生成又謝入伏早出表金火將交當晝分而極暑絲綸其出許夙退以少休仰荷恩憐俯慚悃素臣等丁辰過幸軸政寡能每惜分隂欲收寸效雖逢三伏之氣象敢覬一身之燕間伏遇皇帝陛下大智察微深仁恤物謂天道既施于炎燠則人情皆願於佚安曲軫清𠂻特頒溫詔日方中而或息豈有疲勞時易失而可珍惟勤補報坤成節賀表佛果周圓罄後天之善祝主恩隆盛錫湛露之洪私禮被臣鄰慶同宇宙恭惟太皇太后陛下坤元至靜乾造曲成積保佑之深功享太平之至樂時乘慶節帝與遐齡勝因巳集於清躬廣燕遂均於列辟臣等幸瞻法扆敬奉夀觴詠歌既醉之篇傋陳五福稱頌無疆之算期至萬年又坤成節賀表演三乘之教覺緣潛會於慶長獻萬夀之觴禮敬極隆於孝治旁均燕喜下及臣工恭惟皇帝陛下堯化時雍舜心日治東朝養志欽承母道之尊南極占星稽合夀祺之應凡遇祝延之列皆施命宥之恩臣等叨傋近司親逢盛旦屬饜而巳莫酬鎬飲之仁敬畏待之更祝嵩呼之福辭免給事中表原注元祐八年十一月伏以命令之行貴於中理論駮之任慎於擇人或誤選掄將貽罪咎臣學不造道材非適時平生安流落之常晚嵗有亨通之漸既塵侍從未報涓埃忽叨制綍之恩又進瑣闈之職厚顔滋甚騰口謂何雖行已直前無所畏避而遇事當斷多涉迂踈苟宣納之過差乃是非之混亂伏願追回成命妙選良臣使還詔批敕之風不減前輩則發號施令之體無纍聖明臣之愚誠虔切於是謝給事中表潤辭西掖不能發揮典制之文遷職東臺何以報塞朝廷之遇恩隆選重感切憂深臣植自孤根進由朴學佩服聖賢之訓常秉危心審知義利之途敢愆素履服勞雖久涉險居多偶暮境之親逢致亨衢之序涉屢塵華貫疊拜寵章况封駮之置官亦論思之任責豈朝衰薄輒與選掄此蓋伏遇皇帝陛下乾健有為離明能照攬政機而獨斷格舉綱條循治路以安行動嚴樞柅推任人之誠而不求其偹操厲世之術而用勸其忠誤以踈凡處於津要臣敢不勉遵約守祇慎攸司體從政之大方戒近名之小智庶無瘝曠特答生成淨德集卷六
