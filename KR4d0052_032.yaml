body:
  text: 淨德集卷三十二宋呂陶撰五言律詩和成都道中溝畎清穿道禾麻緑蔭疇地形從此坦山勢為誰收使指星言駕皇恩雨既優愛吟吟不盡目斷錦江頭嘉州陸氏涵秀樓勝地林泉近層楹物象間野平秋璋列天闊暮雲還快目登臨外棲心嘯傲間羡君談雅槩持語寄江山范才元參議求酒於延平使君邀豫同賦謹次其韻桑落冷篘玉菊衰霜滿天飄零河朔飲悵望竹林賢烏有防前轍青州貴下田使君能遣騎端為喚魚船二月一日郡郊賞花得郊字春仲方迎朔花農已滿郊曉園香散路晴樹錦垂梢耽勝為髙會通歡有淡交芳時去尤速吟賞莫輕拋寄句輔元普州公事少太守讀書多見得是非盡無如今古何老懷驚歲月冷夢到雲蘿郡下有佳士幾人陪詠歌送李公擇同年赴嘉倅極目三峩頂濃嵐切沓冥宦心甘似水親髮己如星夀几陪春斚吟齋息晝鈴何須二千石旟隼衒丹青過羅氏圜亭官暇無多事春深偶一來溪隨芳榭轉門入翠嵐開有得供吟筆將間付酒杯暫遊殊草草空趂夕陽迥西郊西郊村落好歲月甚優遊野性每自適倦心何所求鼓鐘催永晝砧杵報新秋若遇延形術猶能換白頭思道同晦甫春日過李氏園亭次思道韻官暇頻遊覽春闌勿嘆嗟間情寓文酒好景付鶯花笑語留長日園林訪幾家歸途最喧塞紅燭數行斜和思道招晦甫相親未多時相别已旬日詩筒須奉招棊手欲求敵三春有餘間一醉安足惜此樂真無涯交情重金石金竹原注渠江有竹其色深黃里人目為金竹修竹已可愛況復如黃金天地與正色雪霜堅此心雲芝生有節栗玉種成林回首渭川遠山間饒翠隂送楊日卿移任潘原謫宦成流落移官自寵恩窮通雖異迹得喪盡忘言車馬動行色江山勞别魂關西三十世祠下見雲孫歲除前五日獨往黎氏園見梅花盛發慘淡歲將暮煙村忽見梅年光背我去春色為誰開半日憑軒檻無人共酒杯芳標深可惜聊作看花回和賞梅何處為真賞芳園白玉英春前挺仙質物外得花名雪月資間淡風霜與潔清偏宜文字斂嘉客盡詩成和聞蛩有感二首志士感幽寂杜門臨晚晴流年無奈老永夜有餘清秋夏欲交處古今皆此聲羈愁與離恨為爾忽相并思婦感離别夕霖殊未晴九秋消息近千里夢魂清續縷有深意促機無緩聲寒衣遠須寄人去在幽并送杜常壯士軒昻早窮塗蹭蹬多直將天命説其奈客愁何晚歲饒歸興青春亦浩歌舊溪如何守應便挂漁蓑淨德集卷三十二
